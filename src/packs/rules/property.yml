      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.60
    flags:
      teriock:
        journalIcon: ms-info
    name: Cursed
    system:
      effectTypes:
        - text
      identifier: cursed
    text:
      content: >-
        <p>When a creature @Wiki[Core:Attunement]{attunes} to a <b>cursed</b>
        item, they gain some @Identifier[keyword:curse]{curse} as specified by
        the item. These @Identifier[keyword:curse]{curses} are especially strong
        and challenging to get rid of. The only way to do so is to remove the
        item that gave the curse from the creature while they are dead and have
        the item @Wiki[Core:Attunement]{attuned}. At
        @Identifier[core:game-master]{GM} discretion, identical items may
        sometimes count as the same item for the purpose of removing these
        @Identifier[keyword:curse]{curses}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: dampened00000000
    _key: '!journal.pages!property00000000.dampened00000000'
