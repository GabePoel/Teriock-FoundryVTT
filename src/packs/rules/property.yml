      identifier: impressionable
    text:
      content: >-
        <p>An <b>impressionable</b> substance absorbs ingredients put into it
        and then, once @Identifier[core:hit-points-and-mana-points]{MP} is put
        into it, it settles and becomes a potion of unknown effect, based on the
        ingredients and amount of
        @Identifier[core:hit-points-and-mana-points]{MP} put in! This effect is
        @Wiki[Category:Alchemical effects]{alchemical} and is determined by the
        @Identifier[core:game-master]{GM}.</p>
