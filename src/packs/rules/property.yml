  - _id: granting00000000
    _key: '!journal.pages!property00000000.granting00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.60
    flags:
      teriock:
        journalIcon: ms-info
    name: Granting
    system:
      effectTypes:
        - text
      identifier: granting
    text:
      content: >-
        <p>An item that <b>grants</b> some @Pack[teriock.abilities]{ability}
        gives its user said @Pack[teriock.abilities]{ability}. Unless
        specifically noted or specified by the
        @Identifier[core:game-master]{GM}, granted
        @Pack[teriock.abilities]{abilities} do not have
        @Identifier[core:proficiency-bonus]{proficiency}. On live action <a
        target="_blank" rel="nofollow noreferrer noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a> item cards,
        @Pack[teriock.abilities]{abilities} are sometimes written in colors
        (green, blue, purple, orange, etc.) these are a shorthand for the
        granting property.</p><dl><dt>Green</dt>

        <dd>Item grants the listed ability.</dd>

        <dt>Blue</dt>

        <dd>Item grants a @Identifier[keyword:gifted]{gifted} version of the
        listed ability.</dd>

        <dt>Purple</dt>

        <dd>Item grants a
        non-@UUID[Compendium.teriock.rules.JournalEntry.class00000000000]{standard}
        listed ability, or the ability is special in some other way.</dd>

        <dt>Orange</dt>

        <dd>Item grants the listed ability, but it is powered by some phenomena
        in the game world. The ability is @Identifier[keyword:gifted]{gifted}
        when outside the phenomena.</dd>

        <dt>Black</dt>

        <dd>The item does <i>not</i> grant the ability. This item is not
        typically considered to have the "granting" property. Rather, the item
        itself physically has the ability, and can be used to delivery
        it.</dd></dl>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
