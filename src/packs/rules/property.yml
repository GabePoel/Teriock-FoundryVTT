      identifier: darksteel
    text:
      content: >-
        <p>Items that are <b>darksteel</b> can
        @Identifier[core:block-interaction]{block} @Wiki[Category:Magically
        powered abilities]{magically powered abilities} even if they are
        @Identifier[keyword:ub]{UB}. If you are wearing darksteel
        @Wiki[Category:Armor]{armor}, then @Wiki[Category:Magically powered
        abilities]{magically powered} @Wiki[Category:Attack abilities]{attacks}
        made against you are not @Identifier[keyword:av0]{AV0}. Darksteel items
        are also @Identifier[keyword:resistance]{resistant} to all
        @Wiki[Category:Magical effects]{magical effects}. If a creature is
        @Identifier[keyword:bearing]{bearing} a dirty dark item that gets
        @Identifier[property:shattered]{shattered} or
        @Identifier[property:destroyed]{destroyed}, it is as though they had
        taken [[/damage 4d20[dirtydark]]] @Identifier[core:damage]{damage} for
        the purpose of developing @Identifier[damage:dirtydark]{black rot}.</p>
      format: 1
    title:
      level: 1
      show: true
