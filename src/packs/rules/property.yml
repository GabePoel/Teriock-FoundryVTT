        @Identifier[keyword:immunity]{immune} to becoming
        @Identifier[property:shattered]{shattered} or
        @Identifier[property:destroyed]{destroyed}. It is also
        @Identifier[keyword:immunity]{immune} to @Wiki[Category:Destruction
