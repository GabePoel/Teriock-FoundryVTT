      systemId: teriock
      systemVersion: 0.12.60
    flags:
      teriock:
        journalIcon: ms-info
    name: Involved
    system:
      effectTypes:
        - text
      identifier: involved
    text:
      content: >-
        <p>Using an <b>involved</b> @Wiki[Category:Involved equipment]{item} is
        more complicated than a regular one and gives other creatures a chance
        to interfere. Doing any of the following with an @Wiki[Category:Involved
        equipment]{involved item} counts as a valid trigger for
        @Identifier[ability:opportunity-attack]{opportunity
        attacks}.</p><ul><li>@Identifier[ability:reload]{Reloading} it.</li>

        <li>@Wiki[Category:Attack abilities]{Attacking} with it.</li>

        <li>@Identifier[ability:interact]{Interacting} with it to somehow
        activate it. Not all @Identifier[ability:interact]{interactions}
        involving an @Wiki[Category:Involved equipment]{involved item} count.
        Drawing a @Pack[teriock.equipment]{pistol} wouldn't, but sliding pieces
        around in some involved puzzle box would.</li></ul>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
