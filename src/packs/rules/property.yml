      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.60
    flags:
      teriock:
        journalIcon: ms-info
    name: Sentient
    system:
      effectTypes:
        - text
      identifier: sentient
    text:
      content: >-
        <p>A <b>sentient</b> item has some form of conscious thought, feelings,
        and emotions. It can perceive and sense its user and
        @Pack[teriock.creatures]{creatures} that it hits, although it is not
        necessarily able to communicate with them. Sentient items are not
        necessarily intelligent, but they can be affected by
        @Wiki[Category:Mental effects]{mental effects} and can choose to not
        follow their user's commands. Some sentient items may have a
        personality, greater senses of their surroundings, and be able to act on
        their own.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: shattered0000000
    _key: '!journal.pages!property00000000.shattered0000000'
