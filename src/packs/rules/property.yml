      effectTypes:
        - text
      identifier: ranged
    text:
      content: >-
        <p>Weapons with this property can hit targets at a distance. A weapon
        that can be used to make a ranged attack has a range in parentheses
        after specifying if it requires
        @Identifier[property:ammunition]{ammunition} or if is
        @Identifier[property:thrown]{thrown}. The range lists two numbers. The
        first is the weapon's normal range in feet, and the second indicates the
        weapon's long range. When attacking a target beyond normal range, you
        have @Identifier[core:disadvantage]{disadvantage} on the
        @Identifier[core:attack-interaction]{attack roll}. You can't attack a
        target beyond the weapon's long range.</p>
