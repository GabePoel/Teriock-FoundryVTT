    text:
      content: >-
        <p>Items that are <b>dirtydark</b> are
        @Identifier[property:darksteel]{darksteel} and deal
        @Identifier[damage:dirtydark]{dirtydark}
        @Identifier[core:damage]{damage}. If a creature is
        @Identifier[keyword:bearing]{bearing} a dirtydark item that gets
        @Identifier[property:shattered]{shattered} or
        @Identifier[property:destroyed]{destroyed}, it is as though they had
        taken [[/damage 8d20[dirtydark]]] @Identifier[core:damage]{damage} for
        the purpose of developing @Identifier[damage:dirtydark]{black rot}. This
        is instead of the [[/damage 4d20[dirtydark]]]
        @Identifier[core:damage]{damage} from
        @Identifier[property:darksteel]{darksteel}. In addition, every day spent
        @Identifier[keyword:bearing]{bearing} a dirtydark item acts as 1
        @Identifier[damage:dirtydark]{dirtydark} for the purpose of develeoping
        @Identifier[damage:dirtydark]{black rot}.</p>
