    flags:
      teriock:
        journalIcon: ms-info
    name: Cumbersome
    system:
      effectTypes:
        - text
      identifier: cumbersome
    text:
      content: >-
        <p>A <b>cumbersome</b> @Pack[teriock.equipment]{item} <i>always</i>
        makes its user @Identifier[status:encumbered]{encumbered}, regardless of
        how much they are @Identifier[core:carrying-capacity]{carrying}. If the
        user would have not been @Identifier[status:encumbered]{encumbered}
        otherwise, they are @Identifier[status:encumbered]{lightly encumbered}.
        If they would have been @Identifier[status:encumbered]{lightly
        encumbered} otherwise, they are @Identifier[status:encumbered]{heavily
        encumbered}. And if they would have been
        @Identifier[status:encumbered]{heavily encumbered} otherwise, they are
        rendered @Identifier[status:immobile]{immobile}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: cursed0000000000
