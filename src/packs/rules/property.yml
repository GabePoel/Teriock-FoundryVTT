      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.60
    flags:
      teriock:
        journalIcon: ms-info
    name: Dampened
    system:
      effectTypes:
        - text
      identifier: dampened
    text:
      content: >-
        <p>A <b>dampened</b> item has all its @Wiki[Category:Magical
        properties]{magical properties} suppressed. This means, for instance,
        that it cannot @Identifier[property:granting]{grant}
        @Pack[teriock.abilities]{abilities} to its
        @Identifier[keyword:using]{user}. However, any mundane
        @Wiki[Category:Martially powered abilities]{martially powered abilities}
        that are intrinsic to the item itself (those marked with black text in
        live action <a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://www.fanwar.com/">FanWar</a>)
        continue to function.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: darksteel0000000
