    flags:
      teriock:
        journalIcon: ms-info
    name: Glued
    system:
      effectTypes:
        - text
      identifier: glued
    text:
      content: >-
        <p>If an item is <b>glued</b> to a creature, it is bonded to their
        spirit. The item and creature are @Identifier[keyword:immunity]{immune}
        to @Wiki[Category:Stealing effects]{effects that would steal it} from
        the creature's body (even if the creature is dead).</p><div
        class="note"><b>Note:</b> This does not prevent the creature from
        throwing, dropping, or handing off the item. In which case, the item is
        still glued to them.</div>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
