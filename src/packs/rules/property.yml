      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.60
    flags:
      teriock:
        journalIcon: ms-info
    name: Shattered
    system:
      effectTypes:
        - text
      identifier: shattered
    text:
      content: >-
        <p>An item that is <b>shattered</b> does not function. It cannot be used
        to @Identifier[core:attack-interaction]{attack} nor
        @Identifier[core:block-interaction]{block}, provides no
        @Identifier[core:armor-class]{AV}, does not have any
        @Pack[teriock.properties]{properties} (other than
        @Identifier[property:runic]{runic}), and has no magical effects nor
        @Pack[teriock.abilities]{abilities}. The item continues to
        @Identifier[core:carrying-capacity]{weigh} the same amount. It may
        sometimes be possible to repair items that are shattered, if your
        @Identifier[core:game-master]{GM} allows it.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
