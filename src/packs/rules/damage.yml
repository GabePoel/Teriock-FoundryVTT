  - _id: starbright000000
    _key: '!journal.pages!damage0000000000.starbright000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    name: Starbright Damage
    system:
      automations:
        AA1sRImdkVnhDSXq:
          _id: AA1sRImdkVnhDSXq
          display:
            label: Deal 1d8
          formula: 1d8[starbright]
          impact: damage
          merge: false
          type: roll
        yKQfuIb3yrVY93Cc:
          _id: yKQfuIb3yrVY93Cc
          sfx: |-
            {
              "specialEffect": "PlayAnimationParticleSpiral"
            }
          style: |-
            {
              "foreground": "#99C1F1",
              "background": "#FFFFFF",
              "outline": "white",
              "texture": "glitter",
              "composite": "multiply"
            }
          type: rollStyle
      effectTypes:
        - damaging
      identifier: starbright
      img: systems/teriock/src/icons/damage-types/starbright.webp
      powerSources:
        - magical
        - material
    text:
      content: >-
        <p><b>Starbright</b> damage is a rare
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        type} dealt by @Identifier[property:starbright]{starbright} items. It
        acts as any other
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        type} or combination of
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} for the purposes of being <i>able to deal damage</i> to
        creatures, but has none of those
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} other effects. For instance, if a creature is somehow
        @Identifier[keyword:immunity]{immune} to all
        @Identifier[core:damage]{damage} <i>other</i> than
        @Identifier[damage:fire]{fire}, starbright will
        @Identifier[core:damage]{damage} them <i>as though</i> it was
        @Identifier[damage:fire]{fire} but <i>will not</i>
        @Identifier[status:burned]{burn} them. If a different creature had only
        @Identifier[ability:fire-damage-immunity]{Fire Damage Immunity}, then
        starbright would @Identifier[core:damage]{damage} them as though it was
        something other than @Identifier[damage:fire]{fire}
        @Identifier[core:damage]{damage}. So long as there exists <i>some</i>
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        type} that can @Identifier[core:damage]{damage} a creature, then
        starbright will work against them. If a creature is somehow
        @Identifier[keyword:immunity]{immune} to <i>all</i>
        @Identifier[core:damage]{damage} then starbright will not affect
        them.</p><p>A consequence of starbright's versatility is that it is also
        immutable. It always deals <i>exactly</i> [[/damage 1d8[starbright]]]
        @Identifier[core:damage]{damage}, cannot be
        @Identifier[keyword:boosted]{boosted} or
        @Identifier[keyword:deboosted]{deboosted}, cannot have its
        @Identifier[core:damage]{damage} amount changed such as with
        @Identifier[ability:tumble]{Tumble}, and it cuts through
        @Wiki[Category:Resistance effects]{resistances} but is not considered to
        be @Identifier[keyword:warded]{warded}. It cannot be converted to
        @UUID[Compendium.teriock.rules.JournalEntry.drain00000000000]{drain} or
        some other effect such as through @Identifier[ability:chi-strike]{Chi
        Strike} or @Identifier[ability:withering-damage]{Withering Damage} and
        supersedes all other
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} that might be dealt with the same die as it. For instance, using
        @Identifier[ability:slay]{Slay} with a
        @Identifier[property:starbright]{starbright}
        @Identifier[equipment:dagger]{dagger} will still deal only [[/damage
        1d8[starbright]]] @Identifier[core:damage]{damage}. However, using the
        same dagger with @Identifier[ability:control-and-resist-fire]{Control
        and Resist Fire} will deal [[/damage 1d8[starbright] + 1d4[fire]]]
        @Identifier[core:damage]{damage} because the
        @Identifier[core:abilities]{ability} adds a <i>different</i>
        @Identifier[core:damage]{damage} die. If that
        @Identifier[core:damage]{damage} is then
        @Identifier[keyword:boosted]{boosted} it will deal [[/damage
        1d8[starbright] + 2d4[fire]]] @Identifier[core:damage]{damage},
        completely ignoring the starbright @Identifier[core:damage]{damage}
        die.</p><p>@Identifier[core:attack-interaction]{Attacks} that deal
        starbright @Identifier[core:damage]{damage} can still be stopped
        physically such as through @Identifier[core:block-interaction]{blocking}
        or by
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: damage
    video:
      controls: true
      volume: 0.5
