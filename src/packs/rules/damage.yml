  - _id: hack000000000000
    _key: '!journal.pages!damage0000000000.hack000000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    name: Hack Damage
    system:
      automations:
        AjZ7GaZtKtlLesRi:
          _id: AjZ7GaZtKtlLesRi
          hacks:
            - arm
            - body
            - ear
            - eye
            - leg
            - mouth
            - nose
          type: hacks
      effectTypes:
        - damaging
      identifier: hack
      img: systems/teriock/src/icons/damage-types/hack.webp
    text:
      content: >-
        <p><b>Hack</b> damage does not reduce
        @Identifier[core:hit-points-and-mana-points]{HP}. Instead, it applies
        different
        @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
        or effects to creatures depending on the part of their body being
        hacked. Hack damage will always have some body part
        specified.</p><dl><dt>Arm Hacks</dt>

        <dd><b>1st Arm Hack:</b> @Identifier[core:attack-interaction]{Attacks}
        you make with handheld @Wiki[Category:Item delivery abilities]{items},
        @Wiki[Category:Missile delivery abilities]{missiles}, or your
        @Wiki[Category:Hand delivery abilities]{hands} are done with
        @Identifier[core:disadvantage]{disadvantage}. And you cannot make any
        @Identifier[core:attack-interaction]{attacks} requiring two hands (such
        as those with @Identifier[property:two-handed]{two-handed}
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons}).
        You also cannot execute @Wiki[Category:Somatic component
        abilities]{somatic abilities} unless both your hands are free.</dd>

        <dd><b>2nd Arm Hack:</b> You now cannot
        @Identifier[core:attack-interaction]{attack}, @Wiki[Category:Block
        abilities]{block}, nor use any other @Pack[teriock.abilities]{abilities}
        with handheld @Wiki[Category:Item delivery abilities]{items},
        @Wiki[Category:Missile delivery abilities]{missiles}, or your
        @Wiki[Category:Hand delivery abilities]{hands} at all. You also cannot
        execute @Wiki[Category:Somatic component abilities]{somatic abilities}
        at all.</dd>

        <dt>Leg Hacks</dt>

        <dd><b>1st Leg Hack:</b> You are @Identifier[status:slowed]{slowed} and
        @Identifier[core:attack-interaction]{attacks} you make with your
        @Identifier[body:foot]{feet} are done with
        @Identifier[core:disadvantage]{disadvantage}.</dd>

        <dd><b>2nd Leg Hack:</b> You are
        @Identifier[status:immobilized]{immobilized} and cannot make
        @Identifier[core:attack-interaction]{attacks} with your
        @Identifier[body:foot]{feet}.</dd>

        <dt>Vitals Hacks</dt>

        <dd>The effects of Vitals Hacks have even more granularity. Vitals Hacks
        will always have a more specific body part specified and apply effects
        accordingly.</dd>

        <dd><b>Vitals Ear Hack:</b> You are @Identifier[status:deaf]{deaf}.</dd>

        <dd><b>Vitals Eye Hack:</b> You are
        @Identifier[status:blind]{blind}.</dd>

        <dd><b>Vitals Nose Hack:</b> You are
        @Identifier[status:anosmatic]{anosmatic}.</dd>

        <dd><b>Vitals Mouth Hack:</b> You are @Identifier[status:mute]{mute} and
        cannot make @Identifier[core:attack-interaction]{attacks} with your
        @Identifier[equipment:mouth]{mouth}.</dd>

        <dt>Body Hacks</dt>

        <dd>You are @Identifier[status:immobile]{immobile}.</dd></dl><p>Despite
        not reducing @Identifier[core:hit-points-and-mana-points]{HP}, hack
        damage can be @Identifier[core:healing]{healed}.
        @Identifier[core:healing]{Healing} hack damage does not typically
        consume @Identifier[core:hit-points-and-mana-points]{hit dice}. However,
        one @Identifier[core:hit-points-and-mana-points]{hit die} worth of
        @Identifier[core:healing]{healing} only mends one hack. Each type of
        vitals hack must be @Identifier[core:healing]{healed} independently.
        Arms and legs must receive an amount of
        @Identifier[core:healing]{healing} equal to the amount of hacks they've
        taken in order to be fully @Identifier[core:healing]{healed}.</p>
      format: 1
    title:
      level: 1
      show: true
