  - _id: dirtydark0000000
    _key: '!journal.pages!damage0000000000.dirtydark0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    name: Dirtydark Damage
    system:
      automations:
        S1RJ14Ausf3URVd8:
          _id: S1RJ14Ausf3URVd8
          attachDocuments: true
          automatic: true
          multi: false
          separate: false
          type: addDocuments
          uuids:
            - Compendium.teriock.templateEffects.ActiveEffect.h7IEcRZUGweB1Nka
        jNmjOzQaSSJ6WNQc:
          _id: jNmjOzQaSSJ6WNQc
          macro: Compendium.teriock.execution.Macro.2HrGdsMYsIC0Apmw
          type: chatMacro
        Wq7wkVQjLURFxPOO:
          _id: Wq7wkVQjLURFxPOO
          sfx: |-
            {
              "specialEffect": "PlayAnimationDark"
            }
          style: |-
            {
              "colorset": "custom",
              "foreground": "#dddddd",
              "background": "#3d3846",
              "texture": "skulls"
            }
          type: rollStyle
      effectTypes:
        - damaging
      identifier: dirtydark
      img: systems/teriock/src/icons/damage-types/dirtydark.webp
      powerSources:
        - material
    text:
      content: >-
        <p>When a creature is @Identifier[status:down]{dropped} with
        <b>dirtydark</b> damage or dealt it while
        @Identifier[status:down]{down}, they are
        @Identifier[status:terrored]{terrored}. This condition ends when they
        are no longer @Identifier[status:down]{down}. Dirtydark damage also
        leaves lasting long term health consequences that may take years to be
        observed. If a creature takes dirtydark damage, roll [[/roll 1d100]]
        each month. If they took N damage, then a roll of N or lower means they
        develop stage 1 <b>black rot</b>. For every month that passes without
        black rot developing, the chance of getting it decreases and the number
        lowers by 1. But the risk of black rot it never goes away entirely.
        Unless properly treated, a roll of 1 will always lead to black rot, no
        matter how it's been since the dirtydark damage was taken. If a creature
        develops black rot, they start to weaken and age rapidly. For every
        month with black rot, roll [[/roll 1d100]]. On a roll of 50 or less, the
        black rot progresses to the next stage.</p><table class="wikitable">

        <caption>Black Rot

        </caption>

        <tbody><tr>

        <th>Stage</th>

        <th>Symptoms

        </th></tr>

        <tr>

        <td>1</td>

        <td>Fatigue and shortness of breath. Become permanently
        @Identifier[status:encumbered]{lightly encumbered}.

        </td></tr>

        <tr>

        <td>2</td>

        <td>Roll [[/roll 1d4]] to determine if the black rot starts in the arm,
        leg, vitals, or body. The body part becomes permanently
        @Identifier[status:hacked]{hacked} and loses all color, becoming a
        sickly grey instead. If vitals was rolled, roll [[/roll 1d4]] to
        determine which part of the vitals was affected.

        </td></tr>

        <tr>

        <td>3</td>

        <td>The black rot starts expanding to other parts of the body. Start
        @Identifier[drain:wither]{withering} at a rate of 1 per day. And roll
        [[/roll 1d4]] each week to determine what area of the body black rot
        expands into. If you roll an area that already has it, progress the
        @Identifier[status:hacked]{hack} accordingly. This means adding an
        additional arm, leg, or vitals @Identifier[status:hacked]{hack}. If it
        progresses in the body, take [[/drain 1d10[wither]]]. A creature with
        stage 3 black rot is also @Identifier[keyword:inept]{inept} at
        @Wiki[Category:Magically powered abilities]{magically powered
        abilities}.

        </td></tr>

        <tr>

        <td>4</td>

        <td>The black rot progresses to all parts of the body. The creature is
        fully @Identifier[status:hacked]{hacked}, takes [[/drain 1d10[wither]]]
        each day and is @Identifier[keyword:incapable]{incapable} of
        @Wiki[Category:Magically powered abilities]{magically powered
        abilities}. They also develop a @Identifier[ability:thin-soul]{Thin
        Soul}.

        </td></tr>

        <tr>

        <td>5</td>

        <td>If a creature survives to stage 5 black rot, they become
        @Identifier[keyword:incapable]{incapable} of all
        @Wiki[Category:Resistance effects]{resistance}, @Wiki[Category:Hexproof
        effects]{hexproof}, @Wiki[Category:Hexseal effects]{hexseal}, and
        @Wiki[Category:Immunity effects]{immunity effects} and they start
        @Identifier[status:suffocating]{suffocating}. They also develop a
        @Identifier[ability:frail-soul]{Frail Soul}.

        </td></tr></tbody></table><p>Black rot cannot be removed with
        @Identifier[ability:cure-illness]{Cure Illness} or
        @Identifier[ability:exorcism]{Exorcism}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: damage
    video:
      controls: true
      volume: 0.5
