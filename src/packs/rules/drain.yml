  - _id: memory0000000000
    _key: '!journal.pages!drain00000000000.memory0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.24
    name: Memory Drain
    system:
      effectTypes:
        - draining
        - mental
      identifier: memory
      img: systems/teriock/src/icons/drain-types/memory.webp
    text:
      content: >-
        <p><b>Memory drain</b> is identical to @Identifier[drain:mana]{mana
        drain}, but it is not blocked by @Identifier[property:silver]{silver}.
        If you are @Identifier[condition:down]{dropped} with Memory Drain then
        you forget the hour before you went @Identifier[condition:down]{down}.
        If you are @Identifier[condition:dead]{killed} by memory drain, you
        automatically forget all the events of the day prior to your
        @Identifier[condition:dead]{death}. You pull from the
        @Identifier[keyword:death-bag]{death bag} as though you <i>always</i>
        have one additional black stone. Pulling one black stone will give you a
        @Identifier[keyword:death-bag]{death scar} and two will make you
        @Identifier[keyword:death-bag]{PD}. You always gain a permanent insanity
        from memory drain deaths determined by the
        @Identifier[core:game-master]{GM}.</p><p>Memory drain is considered a
        @Wiki[Category:Mental effects]{mental effect}, but is only partially
        stopped by @Wiki[Category:Protection keywords]{protections} such as
        @Identifier[ability:resist-mental-effects]{Resist Mental Effects}. They
        @Identifier[keyword:deboosted]{deboost} memory drain instead of causing
        it to fully @Identifier[core:fizzles]{fizzle}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: drain
    video:
      controls: true
      volume: 0.5
