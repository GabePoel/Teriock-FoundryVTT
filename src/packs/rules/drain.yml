  - _id: lethal0000000000
    _key: '!journal.pages!drain00000000000.lethal0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.24
    name: Lethal Drain
    system:
      automations:
        O8m8y3CvQbCK9YcG:
          _id: O8m8y3CvQbCK9YcG
          amount: 999999
          take: drain
          title: Remove MP
          type: take
      effectTypes:
        - draining
        - killing
      identifier: lethal
      img: systems/teriock/src/icons/drain-types/lethal.webp
    text:
      content: >-
        <p>When a creature is reduced to 0
        @Identifier[core:hit-points-and-mana-points]{MP} or below due to
        <b>lethal</b> drain, it is instead reduced to half their maximum
        @Identifier[core:hit-points-and-mana-points]{MP} below zero
        @Identifier[core:hit-points-and-mana-points]{MP}. If this is not
        possible, their @Identifier[core:hit-points-and-mana-points]{MP} reduces
        to the lowest value it can go to. This counts as a
        @Wiki[Category:Killing effects]{killing effect}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: drain
    video:
      controls: true
      volume: 0.5
