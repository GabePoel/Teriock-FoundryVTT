    name: Abbreviations
    system:
      identifier: abbreviations
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>The following is a list of common abbreviations in <a target="_blank"
        rel="nofollow noreferrer noopener" class="external text"
        href="https://www.teriock.com/">Teriock</a> Online.</p><table
        class="wikitable sortable">

        <tbody><tr>

        <th>Abbreviation</th>

        <th>Meaning</th>

        <th>Numerical Value

        </th></tr>

        <tr>

        <td>@Identifier[core:armor-class]{AC}</td>

        <td>@Identifier[core:armor-class]{Armor class}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:multiple-attacks]{AP}</td>

        <td>@Identifier[core:multiple-attacks]{Attack Penalty}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:armor-class]{AV}</td>

        <td>@Identifier[core:armor-class]{Armor value}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[keyword:armor-voiding]{AV0}</td>

        <td>This once meant "armor value equals zero", but now it stands for
        "@Identifier[keyword:armor-voiding]{armor voiding}".</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:death-bag]{DI}</td>

        <td>@Identifier[core:death-bag]{Divine Intervention}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:block-interaction]{BV}</td>

        <td>@Identifier[core:block-interaction]{Block value}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:elder-sorcery]{ES}</td>

        <td>@Identifier[core:elder-sorcery]{Elder Sorcery}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:fluency-bonus]{F}</td>

        <td>@Identifier[core:fluency-bonus]{Fluency bonus}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:game-master]{GM}</td>

        <td><a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://gpe.fyi">Gabriel man</a></td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:hit-points-and-mana-points]{HP}</td>

        <td>@Identifier[core:hit-points-and-mana-points]{Hit points}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:intelligence]{INT}</td>

        <td>@Identifier[core:intelligence]{Intelligence attribute}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:leveling-up]{LVL}</td>

        <td>@Identifier[core:leveling-up]{Total level}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td><a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://fanwar.com">LARP</a></td>

        <td><a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://fanwar.com">Live action role
        playing</a></td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[archetype:mage]{MR}</td>

        <td>@Identifier[archetype:mage]{Ranks in mage classes}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:movement]{MOV}</td>

        <td>@Identifier[core:movement]{Movement attribute}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:hit-points-and-mana-points]{MP}</td>

        <td>@Identifier[core:hit-points-and-mana-points]{Mana points}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:elder-sorcery]{OP}</td>

        <td>@Identifier[core:elder-sorcery]{Order of power}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:proficiency-bonus]{P}</td>

        <td>@Identifier[core:proficiency-bonus]{Proficiency bonus}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:perception]{PER}</td>

        <td>@Identifier[core:perception]{Perception attribute}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:presence]{PRES}</td>

        <td>@Identifier[core:presence]{Presence tier}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:style-bonus]{SB}</td>

        <td>@Identifier[core:style-bonus]{Style bonus}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[archetype:semi]{SR}</td>

        <td>@Identifier[archetype:semi]{Ranks in semi classes}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:size]{SIZE}</td>

        <td>@Identifier[core:size]{Size}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:sneak]{SNK}</td>

        <td>@Identifier[core:sneak]{Sneak attribute}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:strength]{STR}</td>

        <td>@Identifier[core:strength]{Strength attribute}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[core:leveling-up]{RANK}</td>

        <td>@Identifier[core:leveling-up]{Total rank}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[keyword:ub]{UB}</td>

        <td>@Identifier[keyword:ub]{Unblockable}</td>

        <td>No

        </td></tr>

        <tr>

        <td>@Identifier[core:presence]{UNP}</td>

        <td>@Identifier[core:presence]{Unused presence}</td>

        <td>Yes

        </td></tr>

        <tr>

        <td>@Identifier[archetype:warrior]{WR}</td>

        <td>@Identifier[archetype:warrior]{Ranks in warrior classes}</td>

        <td>Yes

        </td></tr></tbody></table>
      format: 1
