        Sight}</li><li>@Identifier[ability:supernatural-perception]{Supernatural
        Perception}</li></ul>

        </td></tr></tbody></table><h2>Attributes and Feat
        Saves</h2><p>@Identifier[core:feat-interaction]{Feat saves} always have
        an attribute associated with them. You add the value of that attribute
        when making the [[/roll d20]] roll for that Save. In addition, some
        abilities grant @Identifier[core:proficiency-bonus]{proficiency} or
        @Identifier[core:fluency-bonus]{fluency} to the Save as well.</p><table
        class="wikitable">

