  - _id: intelligence0000
    _key: '!journal.pages!core000000000000.intelligence0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    flags:
      teriock:
        journalIcon: ms-neurology
    name: Intelligence
    system:
      identifier: intelligence
      img: systems/teriock/src/icons/core-rules/intelligence.webp
    text:
      content: >-
        <p>A creature's intelligence (abbreviated as <b>INT</b>) is a measure of
        its mental acuity. It has no standard intrinsic mechanical effects on
        its own. By default, a creature's INT is 0, but there are
        @Wiki[Category:INT setting abilities]{various abilities that set it to
        different values}.</p><table class="wikitable">

        <caption>Abilities that affect INT

        </caption>

        <tbody><tr>

        <th>Value</th>

        <th>Ability

        </th></tr>

        <tr>

        <td>-3</td>

        <td><ul><li>@Identifier[ability:stupid-intelligence]{Stupid
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>-2</td>

        <td><ul><li>@Identifier[ability:dense-intelligence]{Dense
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>-1</td>

        <td><ul><li>@Identifier[ability:low-intelligence]{Low
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>0</td>

        <td><ul><li>@Identifier[ability:normal-intelligence]{Normal
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>+1</td>

        <td><ul><li>@Identifier[ability:bright]{Bright}</li></ul>

        </td></tr>

        <tr>

        <td>+2</td>

        <td><ul><li>@Identifier[ability:brilliant]{Brilliant}</li></ul>

        </td></tr>

        <tr>

        <td>+3</td>

        <td><ul><li>@Identifier[ability:high-intelligence]{High
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>+4</td>

        <td><ul><li>@Identifier[ability:very-high-intelligence]{Very High
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>+5</td>

        <td><ul><li>@Identifier[ability:extreme-intelligence]{Extreme
        Intelligence}</li></ul>

        </td></tr>

        <tr>

        <td>Proficiency</td>

        <td><ul><li>@Identifier[ability:flame-disciplines]{Flame
        Disciplines}</li><li>@Identifier[ability:life-disciplines]{Life
        Disciplines}</li><li>@Identifier[ability:nature-disciplines]{Nature
        Disciplines}</li><li>@Identifier[ability:necromancy-disciplines]{Necromancy
        Disciplines}</li><li>@Identifier[ability:storm-disciplines]{Storm
        Disciplines}</li></ul>

        </td></tr>

        <tr>

        <td>Fluency</td>

        <td><ul><li>@Identifier[ability:mind-lock]{Mind Lock}</li></ul>

        </td></tr></tbody></table>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: itemDelivery0000
    _key: '!journal.pages!core000000000000.itemDelivery0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Item Delivery
    system:
      identifier: item-delivery
      img: systems/teriock/src/icons/core-rules/item-delivery.webp
    text:
      content: >-
        <p>Item Sourced Abilities are transmitted from the User to the Target
        via one of the User's items. Some Abilities may only specify "item" as
        the Source. Others may give a more specific description such as
        "weapon", "shield", or "armor". These are all considered to be Sourced
        with items and are just shorthands for the type of item that can be
        used.</p><p>The Range of Item Sourced Abilities is that of the item.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: interactions0000
    _key: '!journal.pages!core000000000000.interactions0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Interactions
    system:
      identifier: interactions
      img: systems/teriock/src/icons/core-rules/interactions.webp
    text:
      content: >-
        <p>Every @Identifier[core:abilities]{ability} in <a target="_blank"
        rel="nofollow noreferrer noopener" class="external text"
        href="https://www.teriock.com/">Teriock</a> Online is mediated by one of
        four Interactions. There are also several responses that may come into
        play.</p><h2>Interactions</h2><h3>Attack Interaction</h3><p>The most
        important interaction is the <b>attack interaction</b>, which is used
        whenever a weapon, body part, or missile would come into contact with a
        target. The attacker first makes an <b>attack roll</b> ([[/roll 1d20]])
        against the target's @Identifier[core:armor-class]{armor class} (AC). If
        the attacker is @Identifier[core:proficiency-bonus]{proficient} with the
        @Identifier[core:abilities]{ability} they are using, they add their
        @Identifier[core:proficiency-bonus]{proficiency bonus} (P) to the roll.
        If this roll is equal to or greater than the target's
        @Identifier[core:armor-class]{AC} (typically 10 +
        @Identifier[core:armor-class]{AV}), the attack <b>hits</b>. If the roll
        is less than the target's AC, the attack <b>misses</b>. A natural 20 on
        the die is always a hit, and a natural 1 is always a miss. The
        consequence of a hit is described in the "On hit" section of the
        @Identifier[core:abilities]{ability} that's used.</p><p>If the hit is
        from a natural 20, then the attack is a <b>critical hit</b> and the
        effect of the @Identifier[core:abilities]{ability} "goes critical". If
        this changes anything about the effect, then it's described in the
        @Identifier[core:abilities]{ability's} "On critical hit" section.

        Any creature that is @Identifier[status:up]{up} may choose to be hit by
        an attack, even if the attack would normally miss. This is called
        "Taking the hit". They cannot choose to take a critical
        hit.</p><p>Shields have special rules regarding if a creature can
        attack. Shields always have the @Identifier[property:blocking]{blocking
        property}. But different types of shields have additional rules and
        @Pack[teriock.properties]{properties} that govern what can be used with
        them.</p><dl><dt>@Identifier[equipment:buckler-shield]{Buckler
        Shields}</dt>

        <dd>Any type of item can be held in an arm
        @Identifier[keyword:using]{using} this.</dd>

        <dt>@Identifier[equipment:large-shield]{Large Shields}</dt>

        <dd>Any type of item can be held in an arm that's
        @Identifier[keyword:using]{using}
        @Identifier[property:large-shielding]{large shielding equipment}. But
        only @Identifier[property:small]{small equipment} can be used to
        @Identifier[core:attack-interaction]{attack} or
        @Identifier[core:block-interaction]{block}.</dd>

        <dt>@Identifier[equipment:tower-shield]{Tower Shields}</dt>

        <dd>Only @Identifier[property:small]{small equipment} can be held in an
        arm that's @Identifier[keyword:using]{using}
        @Identifier[property:tower-shielding]{tower shielding equipment}. But
        but no @Pack[teriock.equipment]{equipment} can be used to
        @Identifier[core:attack-interaction]{attack} or
        @Identifier[core:block-interaction]{block}.</dd></dl><div
        class="ext-mermaid" data-mermaid="{&quot;content&quot;:&quot;flowchart
        TD\nai[&amp;quot;Attack Interaction
        Begins&amp;quot;]\nar{{&amp;quot;Attack
        Roll&amp;quot;}}\nch(&amp;quot;Critical
        Hit?&amp;quot;)\neg[\/&amp;quot;Effect Goes
        Critical&amp;quot;\/]\nor((&amp;quot;Responses&amp;quot;))\na([&amp;quot;Effect
        Applies&amp;quot;])\nf([&amp;quot;Effect Fizzles&amp;quot;])\n\nai
        --&amp;gt; ar\nar -- &amp;quot;Attack Hits&amp;quot; --&amp;gt; ch\nar
        -- &amp;quot;Attack Misses&amp;quot; --&amp;gt; f\nch --
        &amp;quot;Yes&amp;quot; --&amp;gt; eg\nch -- &amp;quot;No&amp;quot;
        --&amp;gt; or\neg --&amp;gt; or\nor -- &amp;quot;Responses
        Succeed&amp;quot; --&amp;gt; f\nor -- &amp;quot;Responses Fail&amp;quot;
        --&amp;gt;
        a&quot;,&quot;config&quot;:{&quot;theme&quot;:&quot;forest&quot;}}"><div
        class="mermaid-dots"></div></div><h4>Multiple Attacks</h4><p>The first
        @Identifier[core:attack-interaction]{attack} you make in a given
        @Identifier[core:turns]{turn} has no penalty to hit. Each subsequent
        @Identifier[core:attack-interaction]{attack} you make accrues some
        cumulative <b>attack penalty</b> (AP) which will apply to future attacks
        made in the same @Identifier[core:turns]{turn}. The value of the penalty
        that's added is the AP of the @Pack[teriock.equipment]{equipment} or
        @Pack[teriock.bodyParts]{body part} you
        @Identifier[core:attack-interaction]{attack} with. Unless otherwise
        noted, an @Identifier[core:attack-interaction]{attack} has an AP of -3.
        This is the AP for @Wiki[Category:Missile delivery abilities]{missile
        attacks} as well as any other
        @Identifier[core:attack-interaction]{attack} where an -3 isn't stated.
        Your attack penalty resets to 0 at the end of each
        @Identifier[core:turns]{turn} (not just your own).</p><h3>Block
        Interaction</h3><p>If an attack hits, but has not gone critical, then
        the defender has a chance to <b>block</b>. In addition to the
        @Identifier[core:armor-class]{AV} of
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor},
        every @Pack[teriock.equipment]{other item} has some <b>block value</b>
        (BV). If the defender attempts an @Identifier[core:abilities]{ability}
        that uses the <b>block interaction</b>, then they add the item's BV to
        their @Identifier[core:armor-class]{armor class}. If the new total is
        <i>greater than</i> the attacker's attack roll, then the block succeeds.
        If the new total is less than or equal to the attacker's attack roll,
        then the block fails. The consequence of a successful or unsuccessful
        block are described in the "On success" and "On fail" section of the
        @Wiki[Category:Block abilities]{ability} that's used. For a
        @Identifier[ability:basic-block]{Basic Block}, a successful block causes
        the attacking effect to @Identifier[core:fizzles]{fizzle}.</p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/block-interaction.svg"></p><h3>Feat
        Interaction</h3><p>The <b>feat interaction</b> (or "feat save
        interaction") is used whenever a target would have the chance to respond
        to an @Identifier[core:abilities]{ability} that doesn't hit them
        physically (such as area of effect abilities like @Wiki[Category:Aura
        delivery abilities]{auras}). Any @Identifier[core:abilities]{ability}
        using the feat interaction has a "Saving feature" section which
        describes which @Identifier[core:attributes]{attribute} the target must
        use to make the save. They then add two times that
        @Identifier[core:attributes]{attribute}. For instance, if an ability
        requires a "feat of strength" to make the save, then the target will
        roll [[/roll 1d20]] + (2 × @Wiki[Core:STR]{STR}). If they are
        @Identifier[core:proficiency-bonus]{proficient} in the attribute they
        are saving with, they will add their
        @Identifier[core:proficiency-bonus]{proficiency bonus} to the roll as
        well. If the roll is equal to or greater than the <b>save DC</b> then
        the save <b>succeeds</b>. If the roll is less than the save DC then the
        save <b>fails</b>. The consequence of a successful or unsuccessful save
        are described in the "On success" and "On fail" section of the
        @Identifier[core:abilities]{ability} that's used. Some feats may also be
        able to "go critical" if the save is a natural 1.</p><p>The save DC
        depends on the creature using the @Identifier[core:abilities]{ability}.
        If they're @Identifier[core:proficiency-bonus]{proficient} in the
        ability, then the save DC is 10 +
        @Identifier[core:proficiency-bonus]{P}. If not, then it's just
        10.</p><p><img class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/feat-interaction.svg"></p><h3>Manifest
        Interaction</h3><p>The final interaction is the <b>manifest
        Interaction</b>. It's by far the simplest and is used whenever an effect
        "just happens". There's no built in way to deal with a manifest, only
        responses like @Identifier[keyword:resistance]{resistances} and
        @Identifier[keyword:immunity]{immunities}.</p><div class="ext-mermaid"
        data-mermaid="{&quot;content&quot;:&quot;flowchart
        TD\nmi[&amp;quot;Manifest Interaction
        Begins&amp;quot;]\nor((&amp;quot;Responses&amp;quot;))\na([&amp;quot;Effect
        Applies&amp;quot;])\nf([&amp;quot;Effect Fizzles&amp;quot;])\n\t\nmi
        --&amp;gt; or\nor -- &amp;quot;Other Responses Succeed&amp;quot;
        --&amp;gt; f\nor -- &amp;quot;Other Responses Fail&amp;quot; --&amp;gt;
        a&quot;,&quot;config&quot;:{&quot;theme&quot;:&quot;forest&quot;}}"><div
        class="mermaid-dots"></div></div><p><br></p><h2>Responses</h2><h3>Resistances</h3><p>Some
        @Identifier[core:abilities]{abilities} grant Resistances to certain
        effects. Rather than being "absolute" like in live action <a
        target="_blank" rel="nofollow noreferrer noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a>, Resistances in <a
        target="_blank" rel="nofollow noreferrer noopener" class="external text"
        href="https://www.teriock.com/">Teriock</a> Online have only a chance of
        stopping an effect.

        When a creature would be affected by something they are <b>resistant</b>
        to, they make a resistance save. This is a DC 10 [[/roll d20]] roll that
        they add their @Identifier[core:proficiency-bonus]{proficiency bonus} to
        if they are @Identifier[core:proficiency-bonus]{proficient} in the
        @Identifier[core:abilities]{ability} that grants them their resistance.
        On a success, the target is not affected by whatever was going to happen
        to them. On a fail, they are. Resistance saves cannot be failed
        automatically. Only one resistance save can be attempted per
        interaction. A resistance cannot stop a
        @Identifier[keyword:warded]{warded}
        @Identifier[core:abilities]{ability}.</p><h3>Immunities</h3><p>If you
        are <b>immune</b> to something, it does not work against you at all. A
        @Identifier[keyword:warded]{warded} @Identifier[core:abilities]{ability}
        does not cut through immunities.</p><h2>Order of Operations</h2><p>As a
        rule of thumb, the basic rules of Interactions happen first, followed by
        Immunities, then Resistances. In case it's needed, the complete
        interaction routines are provided below.</p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/complete-attack-block-interaction.svg"></p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/complete-feat-interaction.svg"></p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/complete-manifest-interaction.svg"></p>
