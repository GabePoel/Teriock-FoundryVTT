        <p>A character's <b>proficiency bonus</b> is a static bonus that applies
        to any [[/roll d20]] rolls that they are proficient in. Players can be
        proficient in
        @UUID[Compendium.teriock.rules.JournalEntry.tradecraft000000]{tradecrafts},
        @Identifier[core:abilities]{abilities}, any many other things. However,
        the proficiency bonus is always the same and scales as a character
        levels up.</p><p>If you train in a @Pack[teriock.classes]{class}, you
        are automatically proficient in its abilities so long as you are not
        wearing armor beyond that @Pack[teriock.classes]{class'}
        @Identifier[core:armor-class]{maximum AV}. Unless otherwise noted, if
        you are proficient in an ability that provides some other ability, then
        that second ability has proficiency as well.</p><p>As a shorthand, your
        proficiency bonus may sometimes be written as "P".</p><p>The levels at
        which characters gain increased Proficiency are shown highlighted in the
