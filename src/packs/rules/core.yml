        journalIcon: ms-book-2
    name: Size
    system:
      identifier: size
      img: systems/teriock/src/icons/core-rules/size.webp
    text:
      content: >-
        <p>A creature's size (also referred to as <b>SIZE</b>) affects how
        @Identifier[core:sneak]{sneaky} it is, how much it weighs, how far it
        can reach with its @Identifier[core:attack-interaction]{attacks}, and
        how much space it takes up on the battlefield. The space it takes up is
        as follows.</p><table class="wikitable">

        <tbody><tr>

        <th>Size</th>

        <th>Size Category</th>

        <th>Space Taken Up</th>

        <th>Reach

        </th></tr>

        <tr>

        <td>0 - ½</td>

        <td>Tiny</td>

        <td>2.5 × 2.5 feet</td>

        <td>5 feet

        </td></tr>

        <tr>

        <td>1 - 2</td>

        <td>Small</td>

        <td>5 × 5 feet</td>

        <td>5 feet

        </td></tr>

        <tr>

        <td>3 - 4</td>

        <td>Medium</td>

        <td>5 × 5 feet</td>

        <td>5 feet

        </td></tr>

        <tr>

        <td>5 - 9</td>

        <td>Large</td>

        <td>10 × 10 feet</td>

        <td>10 feet

        </td></tr>

        <tr>

        <td>10 - 14</td>

        <td>Huge</td>

        <td>15 × 15 feet</td>

        <td>15 feet

        </td></tr>

        <tr>

        <td>15 - 19</td>

        <td>Massive</td>

        <td>20 × 20 feet</td>

        <td>20 feet

        </td></tr>

        <tr>

        <td>20 - 24</td>

        <td>Gargantuan</td>

        <td>25 × 25 feet</td>

        <td>25 feet

        </td></tr>

        <tr>

        <td>25+</td>

        <td>Colossal</td>

        <td>30 × 30 feet (or more)</td>

        <td>30 feet (or more)

        </td></tr></tbody></table><h2>Weight</h2><p>A creature's weight is
        determined by its SIZE. Typically, it is equal to (3 + SIZE)³ lb.
        However, there is some variation from creature to creature. The actual
        weight could be anything from (3 + (SIZE - 0.5))³ lb. to (3 + (SIZE +
        0.5))³ lb. Creatures with a size of 0.5 typical have a weight of 15 lb.
        And those of size 0.25 have typically have a weight of 0.002 lb. The
        complete values are given in the table below.</p><table
        class="wikitable">

        <caption>Weight

        </caption>

        <tbody><tr>

