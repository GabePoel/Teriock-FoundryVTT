  - _id: slowManeuvers000
    _key: '!journal.pages!core000000000000.slowManeuvers000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Slow Maneuvers
    system:
      identifier: slow-maneuvers
      img: systems/teriock/src/icons/core-rules/slow-maneuvers.webp
    text:
      content: >-
        <p><b>Slow maneuvers</b> are those that take longer than a single turn
        to execute. Some may be on the scale of a @Wiki[Category:Short rest
        abilities]{short} or @Wiki[Category:Long rest abilities]{long rest}, in
        which case they cannot be used in combat. Other @Wiki[Category:Slow
        abilities]{slow abilities}, such as most @Wiki[Category:Ritual delivery
        abilities]{rituals}, have a more precise <b>execution time</b> (or
        <b>casting time</b>) specified in seconds, minutes, hours, or some other
        defined unit of time. These can be done during combat so long as a round
        doesn't pass without the creature executing them using
        @Identifier[ability:sustain]{Sustain} at least once.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: standardAbilitie
    _key: '!journal.pages!core000000000000.standardAbilitie'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Standard Abilities
    system:
      identifier: standard-abilities
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>Noted under the "delivery sources" section of an
        @Pack[teriock.abilities]{ability}, is whether it is considered
        <b>@UUID[Compendium.teriock.rules.JournalEntry.class00000000000]{standard}</b>.
        This is a legacy term inherited from live action <a target="_blank"
        rel="nofollow noreferrer noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a> and has no mechanical effect
        in <a target="_blank" rel="nofollow noreferrer noopener" class="external
        text" href="https://www.teriock.com/">Teriock</a> Online. In live action
        <a target="_blank" rel="nofollow noreferrer noopener" class="external
        text" href="https://www.fanwar.com/">FanWar</a>, these
        @Pack[teriock.abilities]{abilities} are typically those given by
        @Pack[teriock.classes]{classes} or those that are particularly common,
        well known, or easy to interact with. @Wiki[Category:Conjured
        spells]{Standard spells} are referred to as <b>@Wiki[Category:Conjured
        spells]{conjured}</b> and @Wiki[Category:Semblant skills]{standard
        skills} as <b>@Wiki[Category:Semblant skills]{semblant}</b>.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: somaticComponent
    _key: '!journal.pages!core000000000000.somaticComponent'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Somatic Components
    system:
      identifier: somatic-components
      img: systems/teriock/src/icons/core-rules/somatic-components.webp
    text:
      content: >-
        <p>If an @Wiki[Category:Somatic component abilities]{ability} has a
        somatic component, the creature executing it must have at least one free
        hand to do so. If the creature has an @Identifier[damage:hack]{arm hack}
        then it must have both hands free. If the creature has two
        @Identifier[damage:hack]{arm hacks} then it cannot execute the
        @Wiki[Category:Somatic component abilities]{ability}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: standardAndCriti
    _key: '!journal.pages!core000000000000.standardAndCriti'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Standard and Critical Damage
    system:
      identifier: standard-and-critical-damage
      img: systems/teriock/src/icons/core-rules/standard-and-critical-damage.webp
    text:
      content: >-
        <p>The total set of all damage dice that would be rolled (including
        types) is referred to as <b>standard damage</b>. If an
        @Pack[teriock.abilities]{ability} says it "deals standard damage" it
        means deals damage, considering all relevant modifiers in the process.
        Some @Pack[teriock.abilities]{abilities} also deal <b>critical
        damage</b>. In these cases, roll each damage die twice (after applying
        all @Identifier[keyword:boosted-damage]{boosts} and
        @Identifier[keyword:deboosted-damage]{deboosts}) and deal that much
        damage instead. This doesn't automatically double static increases or
        decreases to the amount of damage dealt, unless explicitly stated (such
        as by @Identifier[ability:slay]{Slay}).</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: surpriseRounds00
    _key: '!journal.pages!core000000000000.surpriseRounds00'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Surprise Rounds
    system:
      identifier: surprise-rounds
      img: systems/teriock/src/icons/core-rules/surprise-rounds.webp
    text:
      content: >-
        <p>Sometimes abilities or other circumstances will allow some combatants
        to get the upper hand on their foes by surprising them at the start of
        combat. When this happens, everyone still rolls for initiative, but the
        creatures that benefit from the <b>surprise round</b> are the only ones
        that get to act. Everyone else has their turns skipped.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: strength00000000
    _key: '!journal.pages!core000000000000.strength00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    flags:
      teriock:
        journalIcon: ms-exercise
    name: Strength
    system:
      identifier: strength
      img: systems/teriock/src/icons/core-rules/strength.webp
    text:
      content: >-
        <p>A creature's strength (abbreviated as <b>STR</b>) is a measure of its
        capacity to lift and carry other objects. By default, a creature's STR
        is 0, but there are @Wiki[Category:STR setting abilities]{various
        abilities that set it to different values}.</p><table class="wikitable">

        <caption>Abilities that affect STR

        </caption>

        <tbody><tr>

        <th>Value</th>

        <th>Ability

        </th></tr>

        <tr>

        <td>-3</td>

        <td><ul><li>@Identifier[ability:no-strength]{No Strength}</li></ul>

        </td></tr>

        <tr>

        <td>-2</td>

        <td><ul><li>@Identifier[ability:tiny-strength]{Tiny Strength}</li></ul>

        </td></tr>

        <tr>

        <td>-1</td>

        <td><ul><li>@Identifier[ability:low-strength]{Low Strength}</li></ul>

        </td></tr>

        <tr>

        <td>0</td>

        <td><ul><li>@Identifier[ability:normal-strength]{Normal
        Strength}</li></ul>

        </td></tr>

        <tr>

        <td>+1</td>

        <td><ul><li>@Identifier[ability:beastly-carrying-capacity]{Beastly
        Carrying Capacity}</li><li>@Identifier[ability:beastly-strength]{Beastly
        Strength}</li></ul>

        </td></tr>

        <tr>

        <td>+2</td>

        <td><ul><li>@Identifier[ability:improved-carrying-capacity]{Improved
        Carrying
        Capacity}</li><li>@Identifier[ability:improved-strength]{Improved
        Strength}</li></ul>

        </td></tr>

        <tr>

        <td>+3</td>

        <td><ul><li>@Identifier[ability:giant-carrying-capacity]{Giant Carrying
        Capacity}</li><li>@Identifier[ability:giant-strength]{Giant
        Strength}</li></ul>

        </td></tr>

        <tr>

        <td>+4</td>

        <td><ul><li>@Identifier[ability:supernatural-carrying-capacity]{Supernatural
        Carrying
        Capacity}</li><li>@Identifier[ability:supernatural-strength]{Supernatural
        Strength}</li></ul>

        </td></tr>

        <tr>

        <td>+5</td>

        <td><ul><li>@Identifier[ability:monstrous-carrying-capacity]{Monstrous
        Carrying
        Capacity}</li><li>@Identifier[ability:monstrous-strength]{Monstrous
        Strength}</li></ul>

        </td></tr>

        <tr>

        <td>Proficiency</td>

        <td><ul><li>@Identifier[ability:military-and-battle-training]{Military
        and Battle Training}</li></ul>

        </td></tr>

        <tr>

        <td>Fluency</td>

        <td><ul><li>@Identifier[ability:warrior-stance]{Warrior
        Stance}</li></ul>

        </td></tr></tbody></table><h2>Carrying Capacity</h2><p>How much a
        creature can lift and carry is determined by its STR and
        @Identifier[core:size]{SIZE}.</p><table class="wikitable">

        <caption>Carrying Capacity Under Size 5

        </caption>

        <tbody><tr>

        <th>Amount in Pounds</th>

        <th>Effect Upon Hitting Threshold

        </th></tr>

        <tr>

        <td>65 + (20 × STR)</td>

        <td>@Identifier[status:encumbered]{Lightly Encumbered}

        </td></tr>

        <tr>

        <td>130 + (40 × STR)</td>

        <td>@Identifier[status:encumbered]{Heavily Encumbered}

        </td></tr>

        <tr>

        <td>195 + (60 × STR)</td>

        <td>Cannot carry anything more

        </td></tr></tbody></table><table class="wikitable">

        <caption>Carrying Capacity of Size 5 and Larger

        </caption>

        <tbody><tr>

        <th>Amount in Pounds</th>

        <th>Effect Upon Hitting Threshold

        </th></tr>

        <tr>

        <td>65 + (20 × (STR + (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>@Identifier[status:encumbered]{Lightly Encumbered}

        </td></tr>

        <tr>

        <td>130 + (40 × (STR + (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>@Identifier[status:encumbered]{Heavily Encumbered}

        </td></tr>

        <tr>

        <td>195 + (60 × (STR + (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>Cannot carry anything more

        </td></tr></tbody></table><p>A creature may also push, drag, or lift a
        weight in pounds up to twice their carrying capacity. While pushing or
        dragging weight in excess of their carrying capacity, the creature's
        @Identifier[core:movement-speed]{movement speed} drops to 5 feet.

        The amount a creature can carry without becoming
        @Identifier[status:encumbered]{encumbered} is shown in the table
        below.</p><table class="wikitable">

        <caption>Lightly Encumbered Carrying Capacity

        </caption>

        <tbody><tr>

        <th>@Identifier[core:size]{SIZE}</th>

        <th>STR = -3</th>

        <th>STR = -2</th>

        <th>STR = -1</th>

        <th>STR = 0</th>

        <th>STR = 1</th>

        <th>STR = 2</th>

