  - _id: passiveManeuvers
    _key: '!journal.pages!core000000000000.passiveManeuvers'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Passive Maneuvers
    system:
      identifier: passive-maneuvers
      img: systems/teriock/src/icons/core-rules/passive-maneuvers.webp
    text:
      content: >-
        <p><b>Passive maneuvers</b> act in the background and don't require any
        decision to use. @Wiki[Category:Passive abilities]{passive abilities}
        will always have a <b>duration</b> listed that tell you when they are
        and aren't in effect.</p><p class="note"><b>Note:</b>
        @Wiki[Category:Passive abilities]{passive abilities} are in effect
        whether you like them or not. You can not simply choose to not use
        them.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: permanentDeath00
    _key: '!journal.pages!core000000000000.permanentDeath00'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Permanent Death
    system:
      identifier: permanent-death
      img: systems/teriock/src/icons/core-rules/permanent-death.webp
    text:
      content: >-
        <p>If you pull all 3 black stones from the
        @Identifier[core:death-bag]{death bag} then you "permanently die" (or
        "PD"). This is where the red stones come into play. The first time you
        PD, you have a chance to receive "divine intervention" (or "DI"). This
        means some powerful supernatural being has intervened in the events of
        the world to spare you from your fate. So long as you pull at least 1
        red stone, you have a divine intervention of some sort. But the strength
        of the intervention varies by how many red stones you pull. Minor divine
        interventions may change very little about you, and major ones can give
        powerful new @Pack[teriock.abilities]{abilities} and obligations as
        determined by the @Identifier[core:game-master]{GM}. The
        @Identifier[core:game-master]{GM} will take into account the strength of
        your character's faith, their actions in life, the power of different
        divine beings in the area, and perhaps other aspects in determining what
        exactly your divine intervention is. You may not know everything about
        your divine intervention from the moment you are offered it, but will
        likely have some sense of what you're gaining and what may be expected
        of you. You can always turn down a divine intervention that you don't
        want to receive, but you may not have any other options. At
        @Identifier[core:game-master]{GM} discretion, it is occasionally
        possible to get more than one offer of divine intervention at once as
        well as offers from deities you may not have a great history with in the
        past. An intervention may be from magnanimous deities you have strong
        ties to. Or it could be from one hoping to use you to gain power in this
        world. Interventions are not to be taken
        lightly.</p><p>@Embed[Compendium.teriock.tables.RollTable.b034b3cd8f613d8c]</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: powerSources0000
    _key: '!journal.pages!core000000000000.powerSources0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Power Sources
    system:
      identifier: power-sources
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>Every @Pack[teriock.abilities]{ability} is <b>@Wiki[Category:Powered
        abilities]{powered}</b> through some means. For many
        @Pack[teriock.abilities]{abilities}, the <b>power source</b> is simply
        "@Wiki[Category:Martially powered abilities]{martial}", which means they
        stem from the physical capabilities of the user. Other abilities could
        be "@Wiki[Category:Magically powered abilities]{magical}",
        "@Wiki[Category:Spiritually powered abilities]{spiritual}", or powered
        through other means. For an @Pack[teriock.abilities]{ability} to work,
        <i>all</i> power sources must be accessible.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: presence00000000
    _key: '!journal.pages!core000000000000.presence00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    flags:
      teriock:
        journalIcon: ms-self-improvement
    name: Presence
    system:
      identifier: presence
      img: systems/teriock/src/icons/core-rules/presence.webp
    text:
      content: >-
        <p>A creature's <b>presence tier</b> is a numerical indicator of their
        capacity to passively maintain their will over magical artifacts,
        spirits, or other beings. As they level up, a character's presence tier
        will continue to increase. Magic items, mounts, and the like will
        typically have the required tier it takes to use them specified. A
        character can only maintain control over things with a <i>total</i> tier
        less than or equal to their presence tier. Using something that requires
        presence takes @Identifier[ability:attune]{Attunement}.
        @Identifier[ability:deattune]{Deattunement} is required to free up
        presence for another purpose. Whenever <b>PRES</b> is written, it refers
        to a character's <i>total</i> presence tier. <b>UNP</b> is a character's
        <i>unused</i> presence.</p><p class="note"><b>Note:</b> This is just a
        generalization of Item Tiers from Roekron. Any item with an Item tier
        (even one where the tier isn't listed) is one that requires
        Presence.</p><p>When a creature @Identifier[status:dead]{dies} and is
        @Wiki[Category:Revival effects]{revived}, they release control over
        anything that is no longer on their person, freeing up the corresponding
        presence in the process. This includes
        @Pack[teriock.equipment]{equipment} that is no longer equipped, mounts
        that no longer with them, and so on.</p><p>The levels at which
        characters gain Presence are shown highlighted in the table
        below.</p><table class="wikitable">

        <caption>Bonuses By Level

        </caption>

        <tbody><tr>

        <th>Rank

        </th>

        <th>Level

        </th>

        <th>@Identifier[archetype:warrior]{Warrior}

