    text:
      content: >-
        <p>Tradecrafts are used for <b>tradecraft checks</b>. These arise either
        when some rules text specifies (such as in
        @Identifier[ability:first-aid]{First Aid}), or when the
        @Identifier[core:game-master]{GM} tells you to attempt one. When this
        happens, you roll [[/roll 1d20]] and, if proficient in the associated
        tradecraft, you add your @Identifier[core:proficiency-bonus]{proficiency
        bonus} (P). You do <i>not</i> need to be proficient in a tradecraft to
        attempt a tradecraft check.</p><p class="note"><b>Note:</b> Tradecrafts
        have no levels associated with them. This differs from live action
        FanWar. You either have a given tradecraft
        @Identifier[core:proficiency-bonus]{proficiency} or you
        don't.</p><h2>Tradecraft Fluencies</h2><p>As you rank up, you get the
        option to take additional tradecrafts, or gain a <b>fluency</b> in a
        tradecraft you already have. A tradecraft fluency is a more tailored
        form of the tradecraft it corresponds to. For instance, you could be a
        @Identifier[tradecraft:historian]{historian} with a fluency in ancient
        Shaloban history, a @Identifier[tradecraft:tailor]{tailor} with a
        fluency in wizard robes, or an
        @Identifier[tradecraft:enforcer]{enforcer} with a fluency in
        intimidating homeless people. When you make a tradecraft check where
        your fluency is relevant, you add your
        @Identifier[core:fluency-bonus]{fluency bonus} (F) instead of your
        @Identifier[core:proficiency-bonus]{proficiency bonus} (P) to the roll.
        The @Identifier[core:game-master]{GM} may also tailor the results of
        your check with regards to your fluency.</p><p>The levels at which
        characters gain tradecrafts and tradecraft fluencies are shown
        highlighted in the table below.</p><table class="wikitable">

        <caption>Bonuses By Level

