        journalIcon: ms-book-2
    name: Aura Delivery
    system:
      identifier: aura-delivery
      img: systems/teriock/src/icons/core-rules/aura-delivery.webp
    text:
      content: >-
        <p>Abilities with the <b>aura</b> delivery source are ones that could
        affect every target within some specified radius, centered on the
        @Identifier[core:executer]{executer}. Unless specifically noted by the
        ability, the @Identifier[core:executer]{executer} is not affected by
        @Wiki[Category:Aura delivery abilities]{aura abilities}.</p>
      format: 1
