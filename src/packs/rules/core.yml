  - _id: disadvantage0000
    _key: '!journal.pages!core000000000000.disadvantage0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Disadvantage
    system:
      identifier: disadvantage
      img: systems/teriock/src/icons/core-rules/disadvantage.webp
    text:
      content: >-
        <p>Sometimes an effect will specify that you have Disadvantage on an
        @Identifier[core:attack-interaction]{attack}, @Wiki[Category:Feat
        abilities]{feat save}, @Identifier[keyword:resistance]{resistance save},
        or some other dice roll involving a single die. When this is the case,
        you roll that die twice and take the lower of the two rolls. If multiple
        sources would impose Disadvantage, you still only roll the die twice. If
        you have both Disadvantage and @Identifier[core:advantage]{advantage},
        then you roll normally. This is the case even if you have different
        numbers of sources of Disadvantage and Advantage.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: effects000000000
    _key: '!journal.pages!core000000000000.effects000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Effects
    system:
      identifier: effects
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>An <b>effect</b> is a catch-all term for "something that does
        something". Some types of effects merely describe an aspect of an
        @Pack[teriock.abilities]{ability} with no additional rules. Others (like
        @Wiki[Category:Knockout effects]{knockout effects} or
        @Wiki[Category:Transformation effects]{transformation effects}) have
        rules for how they operate built into the effect itself.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: duration00000000
    _key: '!journal.pages!core000000000000.duration00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Duration
    system:
      identifier: duration
      img: systems/teriock/src/icons/core-rules/duration.webp
    text:
      content: >-
        <p>The <b>duration</b> of an @Pack[teriock.abilities]{ability} is the
        <i>maximum</i> amount of time that @Pack[teriock.abilities]{ability's}
        effect applies for. Many abilities have an "end condition" that can
        apply before the full duration is reached. Other abilities have an
        "@Wiki[Category:Instant duration abilities]{instant}" duration which
        means the effect is simply applied at once. The duration of
        @Wiki[Category:Passive abilities]{passive abilities} describes the
        conditions under which they're in effect.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
