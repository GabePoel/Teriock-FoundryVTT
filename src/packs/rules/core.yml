  - _id: handDelivery0000
    _key: '!journal.pages!core000000000000.handDelivery0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Hand Delivery
    system:
      identifier: hand-delivery
      img: systems/teriock/src/icons/core-rules/hand-delivery.webp
    text:
      content: >-
        <p>Like with @Wiki[Category:Sight delivery abilities]{sight} and
        eyeballs, @Wiki[Category:Hand delivery abilities]{hand delivery sourced
        abilities} don't require the user to physically have a dexterous
        humanoid hand with recognizable fingers. Some creatures with claws,
        tentacles, or other appendages can use Hand Abilities without problem.
        However, something of this nature is always required. If a creature that
        typically has @Identifier[equipment:hand]{literal hands} has their arms
        @Identifier[ability:hack]{Hacked} or has their
        @Identifier[equipment:hand]{hands} cut off, then they are unable to use
        @Wiki[Category:Hand delivery abilities]{hand delivered abilities}. It
        may be possible for them to find other ways to use these abilities in
        the future, but that's up to @Identifier[core:game-master]{GM}
        discretion.</p><p>The range of @Wiki[Category:Hand delivery
        abilities]{hand delivery sourced abilities} is the reach of the
        @Identifier[core:executer]{executer's} arm (or other appendage). This
        depends in part on the creature's @Identifier[core:size]{size}, but is
        usually 5 feet.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: healing000000000
    _key: '!journal.pages!core000000000000.healing000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Healing
    system:
      identifier: healing
      img: systems/teriock/src/icons/core-rules/healing.webp
    text:
      content: >-
        <p>Someone receiving <b>healing</b> may instantly spend a
        @Wiki[Core:HP]{hit die} to recover that many
        @Identifier[core:hit-points-and-mana-points]{HP} or may recover one
        @Identifier[damage:hack]{hack damage}. Healing may also typically be
        used for damage. If the target is capable of taking healing for damage
        (such as if they're
        @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead}),
        then they must roll their <i>largest</i> hit die and take that much
        @Identifier[damage:holy]{holy damage}. This does not consume any of
        their hit dice. If a creature that's
        @Identifier[status:unconscious]{unconscious} receives healing, they are
        @Identifier[keyword:awaken]{awakened}.</p><p>@Identifier[core:damage]{Damage}
        that is healed more than 24 hours after it was dealt doesn't heal as
        fully as when it's fresh. All
        @Identifier[core:hit-points-and-mana-points]{HP} can still be restored,
        but visible scars remain. These scars have no mechanical effect.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: heightening00000
    _key: '!journal.pages!core000000000000.heightening00000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Heightening
    system:
      identifier: heightening
      img: systems/teriock/src/icons/core-rules/heightening.webp
    text:
      content: >-
        <p>Some @Wiki[Category:Heightened abilities]{abilities} allow you to
        <b>heighten</b> them. In these cases, you can choose to spend additional
        @Identifier[core:hit-points-and-mana-points]{MP} as you execute the
        @Wiki[Category:Heightened abilities]{ability} and the effect will be
        altered in some way described in its "Heightened" text. Abilities that
        don't have this text cannot be heightened. You can only heighten
        @Wiki[Category:Heightened abilities]{abilities} you are
        @Identifier[core:proficiency-bonus]{proficient} or
        @Identifier[core:fluency-bonus]{fluent} in and, even then, can only
        heighten up to the corresponding bonus. If an
        @Identifier[core:attack-interaction]{attack ability} is heightened, it
        gets +1 to hit per level of heightening. If a @Wiki[Category:Feat
        abilities]{feat ability} is heightened, it gets +1 to the DC per level
        of heightening.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: initiative000000
    _key: '!journal.pages!core000000000000.initiative000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Initiative
    system:
      identifier: initiative
      img: systems/teriock/src/icons/core-rules/initiative.webp
    text:
      content: >-
        <p>At the start of combat, every participant rolls for <b>initiative</b>
        ([[/roll 1d20]] + @Identifier[core:movement]{MOV} +
        @Identifier[core:proficiency-bonus]{P}). This determines the combatants'
        turn order, with the higher rollers acting first. If another creature
        joins the combat partway through, they roll initiative as well and can
        act at times in accordance with their roll.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: hitPointsAndMana
    _key: '!journal.pages!core000000000000.hitPointsAndMana'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Hit Points and Mana Points
    system:
      identifier: hit-points-and-mana-points
      img: systems/teriock/src/icons/core-rules/hit-points-and-mana-points.webp
    text:
      content: >-
        <p>Unlike in live action FanWar, characters in Teriock Online have many
        <b>Hit Points</b> (HP) and <b>Mana Points</b> (MP). And as characters
        level up, they continue to gain more. Partway through every rank,
        characters gain a <b>hit die</b> and a <b>mana die</b>. The type of die
        (5 HP ([[/roll 1d8]]), 6 HP ([[/roll 1d10]]), or 7 HP ([[/roll 1d12]]))
        determines how much a character's maximum HP or MP increases by with
        each rank (3, 4, and 5 respectively). Which type of die is determined by
        the type of class (@Identifier[archetype:warrior]{warrior},
        @Identifier[archetype:semi]{semi}, or @Identifier[archetype:mage]{mage})
        that the character is. Journeymen count as
        @Identifier[archetype:semi]{semis} for this purpose. At
        @Identifier[core:leveling-up]{level 1}, characters have maximum HP and
        MP of 1 each. They get their first hit die and mana die at level 5 (both
        6 HP ([[/roll 1d10]])s), and then get different ones as they keep
        ranking up.</p><p>Hit dice (but not mana dice) can be expended for
        @Identifier[core:healing]{healing} or during a
        @Identifier[core:short-rest]{short rest}. Both hit dice and mana dice
        are regained during a @Identifier[core:long-rest]{long rest}.</p><p>The
        levels at which characters gain HP and MP are shown highlighted in the
        table below.</p><table class="wikitable">

