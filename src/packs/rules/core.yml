  - _id: targets000000000
    _key: '!journal.pages!core000000000000.targets000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Targets
    system:
      identifier: targets
      img: systems/teriock/src/icons/core-rules/targets.webp
    text:
      content: >-
        <p>An ability's <b>target</b> type determines what kinds of things can
        be affected by the Ability. Some of the most common ones are listed
        here.</p><h3>Creature</h3><p>Abilities that target
        @Pack[teriock.creatures]{creatures} affect some sort of being. A
        "creature" doesn't necessarily have to be an @Wiki[Category:Animal
        creatures]{animal}, it may be an animated statue or a sentient
        @Wiki[Category:Plant creatures]{plant}. Check with your
        @Identifier[core:game-master]{GM} if in doubt of whether something is a
        @Pack[teriock.creatures]{creature} or not.</p><h4>Limb</h4><p>Rather
        than hitting an entire creature, some
        @Pack[teriock.abilities]{abilities} will say that they only hit arms,
        legs, or limbs. If @Wiki[Category:Limb target abilities]{these
        abilities} are @Identifier[core:attack-interaction]{attacks}, then they
        are slightly harder to land a hit with than ones that can hit a creature
        anywhere. They require hitting that creature's
        @Identifier[core:armor-class]{AC} +
        2.</p><h4>Vitals</h4><p><b>Vitals</b> targeted
        @Pack[teriock.abilities]{abilities} need to hit a creature's head or
        other vital organs rather than landing anywhere. If
        @Wiki[Category:Vitals target abilities]{these abilities} are
        @Identifier[core:attack-interaction]{attacks}, then they require hitting
        a creature's @Identifier[core:armor-class]{AC} +
        3.</p><h3>Item</h3><p>@Wiki[Category:Item target abilities]{Attacks that
        target items} need different @Identifier[core:attack-interaction]{hit
        rolls} depending on the @Pack[teriock.equipment]{type of
        item}.</p><ul><li>Wielded items (such as
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons} or
        @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shields}):
        @Identifier[core:armor-class]{AC} + 3 -
        @Identifier[core:block-interaction]{BV}</li>

        <li>Large worn items (such as
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} or
        @Identifier[equipment:cloak]{cloaks}):
        @Identifier[core:armor-class]{AC}</li>

        <li>@Identifier[property:small]{Small}
        @Identifier[property:searchable]{searchable items} (such as rings or
        amulets): @Identifier[core:armor-class]{AC} + 6</li></ul><p>If an
        @Wiki[Category:Item target abilities]{ability that targets an item} is
        successfully @Identifier[core:block-interaction]{blocked}, it
        automatically hits the item that
        @Identifier[core:block-interaction]{blocked}
        it.</p><h3>Area</h3><p>Abilities that target an area do not have a
        precisely defined size. Rather, they affect a small, cohesive space such
        as a campsite, a room in a dungeon, or a small shack. These abilities
        may or may not have a range specified.</p><h3>Self</h3><p><b>Self</b>
        targeted @Identifier[core:abilities]{abilities} affect
        @Identifier[core:executer]{the creature that executes them}. They
        typically do not have a range specified.</p><h3>Ability</h3><p>Instead
        of targeting some person, place, or other physical thing, some
        @Pack[teriock.abilities]{abilities} target other
        @Pack[teriock.abilities]{abilities}. These include cases that target
        @Wiki[Category:Attack target abilities]{attack target abilities},
        @Wiki[Category:Conjured spells]{conjured} @Wiki[Category:Spell target
        abilities]{spells}, or other types of
        @Pack[teriock.abilities]{abilities}.</p><h3>Other</h3><p>Some ability
        targets don't fit nearly into one of the predefined categories. In these
        cases, the ability's target will just say "other".</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: tradecraftFluenc
