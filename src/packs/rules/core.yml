    name: Verbal Components
    system:
      identifier: verbal-components
      img: systems/teriock/src/icons/core-rules/verbal-components.webp
    text:
      content: >-
        <p>If an @Wiki[Category:Verbal component abilities]{ability} has a
        verbal component, the creature executing it must be able to speak to do
        so. The must not be @Identifier[status:deaf]{deaf}.</p>
      format: 1
