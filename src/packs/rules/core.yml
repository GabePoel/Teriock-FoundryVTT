  - _id: blockInteraction
    _key: '!journal.pages!core000000000000.blockInteraction'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Block Interaction
    system:
      identifier: block-interaction
      img: systems/teriock/src/icons/core-rules/block-interaction.webp
    text:
      content: >-
        <p>If an attack hits, but has not gone critical, then the defender has a
        chance to <b>block</b>. In addition to the
        @Identifier[core:armor-class]{AV} of
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor},
        every @Pack[teriock.equipment]{other item} has some <b>block value</b>
        (BV). If the defender attempts an @Identifier[core:abilities]{ability}
        that uses the <b>block interaction</b>, then they add the item's BV to
        their @Identifier[core:armor-class]{armor class}. If the new total is
        <i>greater than</i> the attacker's attack roll, then the block succeeds.
        If the new total is less than or equal to the attacker's attack roll,
        then the block fails. The consequence of a successful or unsuccessful
        block are described in the "On success" and "On fail" section of the
        @Wiki[Category:Block abilities]{ability} that's used. For a
        @Identifier[ability:basic-block]{Basic Block}, a successful block causes
        the attacking effect to @Identifier[core:fizzles]{fizzle}.</p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/complete-attack-block-interaction.svg"></p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: battleRating0000
    _key: '!journal.pages!core000000000000.battleRating0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Battle Rating
    system:
      identifier: battle-rating
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>A creature type's <b>battle rating</b> is a measure of how powerful
        it is. In principle, it is equal to the
        @Identifier[core:leveling-up]{level} of character that would be expected
        to be an even match for it in @Identifier[core:combat]{combat}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: baseDamage000000
    _key: '!journal.pages!core000000000000.baseDamage000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Base Damage
    system:
      identifier: base-damage
      img: systems/teriock/src/icons/core-rules/base-damage.webp
    text:
      content: >-
        <p>Every
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon} has
        a <b>base damage</b> it deals. This is represented by some die ([[/roll
        d4]], [[/roll d6]], [[/roll d8]], etc.). Assuming nothing else modifies
        the damage dealt, if a creature hits another with a
        @Identifier[ability:basic-attack]{Basic Attack}, it's player rolls this
        <b>damage die</b> and the target takes that much damage.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: biteDelivery0000
    _key: '!journal.pages!core000000000000.biteDelivery0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Bite Delivery
    system:
      identifier: bite-delivery
      img: systems/teriock/src/icons/core-rules/bite-delivery.webp
    text:
      content: >-
        <p>Abilities with the @Wiki[Category:Bite delivery abilities]{bite
        delivery source} are similar to @Wiki[Category:Hand delivery
        abilities]{hand abilities}, but they are transmitted with something that
        at least <i>resembles</i> a @Identifier[body:mouth]{mouth} rather than a
        @Identifier[body:hand]{hand}. These are typically
        @Identifier[property:biting]{biting}.</p><p>The range of
        @Wiki[Category:Bite delivery abilities]{bite delivered abilities} is the
        reach of the @Identifier[core:executer]{executer's} neck (or other
        similar body part). This depends in part on the creature's
        @Identifier[core:size]{size}, but is usually 5 feet.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: combat0000000000
    _key: '!journal.pages!core000000000000.combat0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Combat
    system:
      identifier: combat
      img: systems/teriock/src/icons/core-rules/combat.webp
    text:
      content: >-
        <p><b>Combat</b> in <a target="_blank" rel="nofollow noreferrer
        noopener" class="external text"
        href="https://www.teriock.com/">Teriock</a> Online is broken into <a
        href="#Rounds">rounds</a> and <a
        href="#Turns">turns</a>.</p><h2>Rounds</h2><p>Each <b>round</b> of
        combat is considered to take 5 seconds.</p><h3>Initiative</h3><p>At the
        start of combat, every participant rolls for <b>initiative</b> ([[/roll
        1d20]] + @Identifier[core:movement]{MOV} +
        @Identifier[core:proficiency-bonus]{P}). This determines the combatants'
        turn order, with the higher rollers acting first. If another creature
        joins the combat partway through, they roll initiative as well and can
        act at times in accordance with their roll.</p><h3>Surprise
        Rounds</h3><p>Sometimes abilities or other circumstances will allow some
        combatants to get the upper hand on their foes by surprising them at the
        start of combat. When this happens, everyone still rolls for initiative,
        but the creatures that benefit from the <b>surprise round</b> are the
        only ones that get to act. Everyone else has their turns
        skipped.</p><h2>Turns</h2><p>On a creature's <b>turn</b>, they may make
        up to <i>three</i> <b>actions</b>. @Identifier[ability:move]{Moving},
        @Identifier[core:attack-interaction]{attacking}, and so on typically use
        some number of these actions. Creatures also have one <b>reaction</b>
        that can, in principle, be use at any time within a round. They regain
        their reaction at the start of their turn. Creatures cannot "save up"
        their actions or reactions between rounds or turns. Actions and
        reactions reset regardless of whether or not they're used.</p><p>In
        addition, some effects may begin, apply, or cease at the start or end of
        a creature's turn. These are specified within the relevant rules
        text.</p><h2>Maneuvers</h2><p>Everything a creature does in combat turn
        is codified in terms of <b>@Identifier[core:abilities]{abilities}</b>.
        Each @Identifier[core:abilities]{ability}, in turn, has one of four
        possible <b>maneuvers</b> that determine when it can be
        used.</p><h3>Active Maneuvers</h3><p><b>Active maneuvers</b> are done
        proactively within the time scale of a single turn. On each creature's
        turn, they may take up to <i>three</i> Actions in total. Every
        @Wiki[Category:Active abilities]{active ability} will specify how many
        of these actions it consumes. They may be @Wiki[Category:Single action
        abilities]{single actions}, @Wiki[Category:Double action
        abilities]{double actions}, or @Wiki[Category:Triple action
        abilities]{triple actions}. Some @Wiki[Category:Active abilities]{active
        abilities} may also be @Wiki[Category:Free action abilities]{free
        actions}. These not only don't consume a creature's actions, but can be
        done at <i>any</i> time (even on other creatures' turns)! However, they
        cannot be used in reaction to other
        @Pack[teriock.abilities]{abilities}.</p><h3>Reactive
        Maneuvers</h3><p><b>Reactive maneuvers</b> can only be done in response
        to some event that <b>triggers</b> them. Every reactive maneuver will
        specify what its <b>triggering conditions</b> are. These could be
        @Identifier[ability:tumble]{taking damage},
        @Identifier[ability:resolve-conflict]{hearing another creature speak},
        @Identifier[ability:opportunity-attack]{another creature moving away
        from you}, or anything else. Each creature has <i>only one</i>
        @Wiki[Category:Reaction abilities]{reaction} per turn. However, some
        @Wiki[Category:Reactive abilities]{reactive abilities} are
        @Wiki[Category:Free reaction abilities]{free reactions}. These have no
        limit on the number of times they can be used, so long as their
        triggering condition is met every time.</p><p>The order of reactive
        maneuver resolution is determined by a "last in, first out" stack. So if
        so if a creature casts @Identifier[ability:fire-ball]{Fire Ball}, and
        another casts @Identifier[ability:dispel-magic]{Dispel Magic}, and the
        creature that first cast @Identifier[ability:fire-ball]{Fire Ball} casts
        @Identifier[ability:dispel-magic]{Dispel Magic} on the first dispel,
        then the @Identifier[ability:fire-ball]{Fire Ball} resolves. A given
        creature can only use a given @Wiki[Category:Reactive
        abilities]{reactive ability} once within a given stack.</p><h3>Passive
        Maneuvers</h3><p><b>Passive maneuvers</b> act in the background and
        don't require any decision to use. @Wiki[Category:Passive
        abilities]{passive abilities} will always have a <b>duration</b> listed
        that tell you when they are and aren't in effect.</p><p
        class="note"><b>Note:</b> @Wiki[Category:Passive abilities]{passive
        abilities} are in effect whether you like them or not. You can not
        simply choose to not use them.</p><h3>Slow Maneuvers</h3><p><b>Slow
        maneuvers</b> are those that take longer than a single turn to execute.
        Some may be on the scale of a @Wiki[Category:Short rest
        abilities]{short} or @Wiki[Category:Long rest abilities]{long rest}, in
        which case they cannot be used in combat. Other @Wiki[Category:Slow
        abilities]{slow abilities}, such as most @Wiki[Category:Ritual delivery
        abilities]{rituals}, have a more precise <b>execution time</b> (or
        <b>casting time</b>) specified in seconds, minutes, hours, or some other
        defined unit of time. These can be done during combat so long as a round
        doesn't pass without the creature executing them using
        @Identifier[ability:sustain]{Sustain} at least once.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: competence000000
    _key: '!journal.pages!core000000000000.competence000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Competence
    system:
      identifier: competence
      img: systems/teriock/src/icons/core-rules/competence.webp
    text:
      content: >-
        <p>A creature's <b>competence</b> in something is a shorthand for
        whether they have @Identifier[core:proficiency-bonus]{proficiency} or
        @Identifier[core:fluency-bonus]{fluency} in that thing. For instance,
        their competence in some @Pack[teriock.abilities]{ability} could be
        "fluent", "proficient", or "none".</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: cascadeExpansion
    _key: '!journal.pages!core000000000000.cascadeExpansion'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Cascade Expansion
    system:
      identifier: cascade-expansion
      img: systems/teriock/src/icons/core-rules/cascade-expansion.webp
    text:
      content: >-
        <p>An @Pack[teriock.abilities]{ability} that <b>cascades</b> is one that
        executes again if it hits the target and does not
        @Identifier[core:fizzles]{fizzle}. This can happen a maximum number of
        times equal to the value specified in the expansion range and occur
        sequentially, each new target being within the expansion range of the
        previous. You choose the additional targets. These extra executions do
        <i>not</i> count as new attacks for the purposes of
        @Identifier[core:multiple-attacks]{attack penalties}, although they must
        still be rolled.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: components000000
    _key: '!journal.pages!core000000000000.components000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Components
    system:
      identifier: components
      img: systems/teriock/src/icons/core-rules/components.webp
    text:
      content: >-
        <p>Many @Wiki[Category:Component abilities]{abilities} require one or
        more components in order to be executed.</p><h2>Verbal
        Components</h2><p>If an @Wiki[Category:Verbal component
        abilities]{ability} has a verbal component, the creature executing it
        must be able to speak to do so. The must not be
        @Identifier[status:deaf]{deaf}.</p><h2>Somatic Components</h2><p>If an
        @Wiki[Category:Somatic component abilities]{ability} has a somatic
        component, the creature executing it must have at least one free hand to
        do so. If the creature has an @Identifier[damage:hack]{arm hack} then it
        must have both hands free. If the creature has two
        @Identifier[damage:hack]{arm hacks} then it cannot execute the
        @Wiki[Category:Somatic component abilities]{ability}.</p><h2>Material
        Components</h2><p>If an @Wiki[Category:Material component
        abilities]{ability} has a material component, the creature executing it
        must have the material component on hand to do so. The specific material
        component is listed in the @Wiki[Category:Material component
        abilities]{ability's} description. Material components are consumed by
        the ability unless otherwise noted.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: creatureTarget00
    _key: '!journal.pages!core000000000000.creatureTarget00'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Creature Target
    system:
      identifier: creature-target
      img: systems/teriock/src/icons/core-rules/creature-target.webp
    text:
      content: >-
        <p>Abilities that target @Pack[teriock.creatures]{creatures} affect some
        sort of being. A "creature" doesn't necessarily have to be an
        @Wiki[Category:Animal creatures]{animal}, it may be an animated statue
        or a sentient @Wiki[Category:Plant creatures]{plant}. Check with your
        @Identifier[core:game-master]{GM} if in doubt of whether something is a
        @Pack[teriock.creatures]{creature} or not.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: cover00000000000
    _key: '!journal.pages!core000000000000.cover00000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Cover
    system:
      identifier: cover
      img: icons/magic/nature/vines-thorned-entwined-green.webp
    text:
      content: >-
        <dl><dt>Half Cover</dt>

        <dd>+2 bonus to @Identifier[core:armor-class]{AC} and
        @Identifier[core:movement]{MOV} @Identifier[core:feat-interaction]{feat
        saves}</dd>

        <dt>Three-quarters Cover</dt>

        <dd>+5 bonus to @Identifier[core:armor-class]{AC} and
        @Identifier[core:movement]{MOV} @Identifier[core:feat-interaction]{feat
        saves}</dd>

        <dt>Full Cover</dt>

        <dd>Can't be targeted directly by
        @Pack[teriock.abilities]{abilities}.</dd></dl>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: costs00000000000
    _key: '!journal.pages!core000000000000.costs00000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Costs
    system:
      identifier: costs
      img: systems/teriock/src/icons/core-rules/costs.webp
    text:
      content: >-
        <p>@Wiki[Category:Cost abilities]{Some abilities} have <b>costs</b> that
        must be spent in order to use them. These could be @Wiki[Category:HP
        cost abilities]{HP}, @Wiki[Category:MP cost abilities]{MP}, or something
        else. If the cost is not paid, then the
        @Pack[teriock.abilities]{ability} does not execute.</p>
      format: 1
    title:
      level: 1
      show: true
