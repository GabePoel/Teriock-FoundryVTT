  - _id: styleBonus000000
    _key: '!journal.pages!core000000000000.styleBonus000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Style Bonus
    system:
      identifier: style-bonus
      img: systems/teriock/src/icons/core-rules/style-bonus.webp
    text:
      content: "<p>A <b>style bonus</b> (SB) is a +@Identifier[core:proficiency-bonus]{P} bonus to hit that @Identifier[core:attack-interaction]{attacks} can gain when done in a certain way. Many @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons} have criteria in which they get SB. You can also get SB by using @Identifier[ability:aim]{Aim}. If an @Identifier[core:attack-interaction]{attack} would have SB from multiple sources, it still only gets a +@Identifier[core:proficiency-bonus]{P} bonus to hit. However, SB stacks with other bonuses, such as those granted by @Identifier[core:proficiency-bonus]{proficiency} or @Identifier[keyword:armor-voiding]{AV0}.</p><table class=\"wikitable sortable\">\n<tbody><tr>\n<th>Style\n</th>\n<th>When it grants SB\n</th>\n<th>What gets it\n</th></tr>\n<tr>\n<td>@Wiki[Property:Blunt Force Fighting Style]{Blunt Force Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} with a @Wiki[Category:Knockout effects]{knockout effect}.\n</td>\n<td><div>@Identifier[equipment:battle-staff]{Battle Staff},\_@Identifier[equipment:rod]{Rod},\_@Identifier[equipment:short-staff]{Short Staff}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Charging Fighting Style]{Charging Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a creature you moved at least 5 feet towards this @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[body:bump]{Bump},\_@Identifier[body:colossal-horn]{Colossal Horn},\_@Identifier[body:goring-horn]{Goring Horn},\_@Identifier[body:horn]{Horn},\_@Identifier[body:piercing-horn]{Piercing Horn},\_@Identifier[body:stabbing-horn]{Stabbing Horn}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Gladiator Fighting Style]{Gladiator Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a @Identifier[status:prone]{prone}, @Identifier[status:snared]{snared}, @Identifier[status:frightened]{frightened}, @Identifier[status:hacked]{hacked}, or @Identifier[status:goaded]{goaded} creature.\n</td>\n<td><div>@Identifier[equipment:boulder]{Boulder},\_@Identifier[equipment:halberd-axe]{Halberd Axe},\_@Identifier[equipment:pickaxe]{Pickaxe},\_@Identifier[equipment:tall-axe]{Tall Axe},\_@Identifier[equipment:throwing-axe]{Throwing Axe},\_@Identifier[equipment:war-hammer]{War Hammer}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Great Kenjutsu Fighting Style]{Great Kenjutsu Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a creature smaller than you on another creature's @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[equipment:odachi]{Ōdachi}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Great Swordsman Fighting Style]{Great Swordsman Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a creature smaller than you for the first time on your @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[equipment:claymore]{Claymore}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Javelinier Fighting Style]{Javelinier Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} with a @Identifier[property:thrown]{thrown} @Identifier[core:attack-interaction]{attack}.\n</td>\n<td><div>@Identifier[equipment:javelin]{Javelin}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Juttejutsu Fighting Style]{Juttejutsu Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a creature you've @Wiki[Category:Block abilities]{blocked} since the end of your last @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[equipment:jitte]{Jitte}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Kenjutsu Fighting Style]{Kenjutsu Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} on another creature's @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[equipment:katana]{Katana},\_@Identifier[equipment:ninjatu]{Ninjatu},\_@Identifier[equipment:wakizashi]{Wakizashi}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Knife Fighting Style]{Knife Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} on your @Identifier[core:turns]{turn} while @Identifier[status:hidden]{hidden}.\n</td>\n<td><div>@Identifier[equipment:dagger]{Dagger},\_@Identifier[equipment:knife]{Knife}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Kunai Fighting Style]{Kunai Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} if this was sheathed at the start of your @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[equipment:kunai]{Kunai}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Phalanx Fighting Style]{Phalanx Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a creature if you have an ally using a @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shield} directly between you and your target.\n</td>\n<td><div>@Identifier[equipment:spear]{Spear}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Quickshot Fighting Style]{Quickshot Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} on your @Identifier[core:turns]{turn} if you had three actions remaining prior to making this @Identifier[core:attack-interaction]{attack}.\n</td>\n<td><div>@Identifier[equipment:blowgun]{Blowgun},\_@Identifier[equipment:pistol]{Pistol},\_@Identifier[equipment:shortbow]{Shortbow}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Savage Fighting Style]{Savage Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a @Identifier[status:prone]{prone}, @Identifier[status:snared]{snared}, @Identifier[status:frightened]{frightened}, @Identifier[status:suffocating]{suffocating}, or @Identifier[status:immobilized]{immobilized} creature.\n</td>\n<td><div>@Identifier[body:air-tendril]{Air Tendril},\_@Identifier[body:beak]{Beak},\_@Identifier[equipment:boomerang]{Boomerang},\_@Identifier[equipment:brass-knuckles]{Brass Knuckles},\_@Identifier[equipment:chain]{Chain},\_@Identifier[body:claw]{Claw},\_@Identifier[equipment:crowbar]{Crowbar},\_@Identifier[body:crushing-beak]{Crushing Beak},\_@Identifier[body:crushing-jaw]{Crushing Jaw},\_@Identifier[body:devouring-beak]{Devouring Beak},\_@Identifier[body:devouring-maw]{Devouring Maw},\_@Identifier[body:earth-tendril]{Earth Tendril},\_@Identifier[body:fanged-jaw]{Fanged Jaw},\_@Identifier[body:ferocious-beak]{Ferocious Beak},\_@Identifier[body:ferocious-jaw]{Ferocious Jaw},\_@Identifier[body:fire-tendril]{Fire Tendril},\_@Identifier[equipment:glove-claw]{Glove Claw},\_@Identifier[equipment:hammer]{Hammer},\_@Identifier[equipment:hook-hand]{Hook Hand},\_@Identifier[body:jaw]{Jaw},\_@Identifier[body:mouth]{Mouth},\_@Identifier[body:nipper]{Nipper},\_@Identifier[equipment:nunchucks]{Nunchucks},\_@Identifier[body:paw]{Paw},\_@Identifier[body:pecker]{Pecker},\_@Identifier[body:pincer]{Pincer},\_@Identifier[equipment:pipe]{Pipe},\_@Identifier[body:prehensile-claw]{Prehensile Claw},\_@Identifier[body:prehensile-rending-claw]{Prehensile Rending Claw},\_@Identifier[body:prehensile-ripping-claw]{Prehensile Ripping Claw},\_@Identifier[body:prehensile-savage-claw]{Prehensile Savage Claw},\_@Identifier[body:prehensile-sharp-claw]{Prehensile Sharp Claw},\_@Identifier[body:rending-claw]{Rending Claw},\_@Identifier[body:rending-pincer]{Rending Pincer},\_@Identifier[body:ripping-claw]{Ripping Claw},\_@Identifier[body:ripping-pincer]{Ripping Pincer},\_@Identifier[body:savage-claw]{Savage Claw},\_@Identifier[body:savage-pincer]{Savage Pincer},\_@Identifier[equipment:saw]{Saw},\_@Identifier[equipment:scythe]{Scythe},\_@Identifier[body:shadow-tendril]{Shadow Tendril},\_@Identifier[body:sharp-beak]{Sharp Beak},\_@Identifier[body:sharp-claw]{Sharp Claw},\_@Identifier[body:sharp-pincer]{Sharp Pincer},\_@Identifier[equipment:sickle]{Sickle},\_@Identifier[body:water-tendril]{Water Tendril}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Sniper Fighting Style]{Sniper Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} on your @Identifier[core:turns]{turn} if you have not @Identifier[ability:move]{moved} since the end of your last @Identifier[core:turns]{turn} and will have no actions remaining after this @Identifier[core:attack-interaction]{attack}.\n</td>\n<td><div>@Identifier[equipment:crossbow]{Crossbow},\_@Identifier[equipment:longbow]{Longbow}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Swordsman Fighting Style]{Swordsman Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} for the first time on your @Identifier[core:turns]{turn}.\n</td>\n<td><div>@Identifier[equipment:broadsword]{Broadsword},\_@Identifier[equipment:cutlass]{Cutlass},\_@Identifier[equipment:longsword]{Longsword},\_@Identifier[equipment:saber]{Saber},\_@Identifier[equipment:scimitar]{Scimitar},\_@Identifier[equipment:shortsword]{Shortsword}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Trident Fighting Style]{Trident Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} from or into the water.\n</td>\n<td><div>@Identifier[equipment:trident]{Trident}</div>\n</td></tr>\n<tr>\n<td>@Wiki[Property:Wraparound Fighting Style]{Wraparound Fighting Style}\n</td>\n<td>@Identifier[core:attack-interaction]{Attacking} a creature with a @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shield}.\n</td>\n<td><div>@Identifier[body:colossal-stinger]{Colossal Stinger},\_@Identifier[body:colossal-tail]{Colossal Tail},\_@Identifier[body:crushing-stinger]{Crushing Stinger},\_@Identifier[body:crushing-tail]{Crushing Tail},\_@Identifier[body:crushing-tentacle]{Crushing Tentacle},\_@Identifier[body:crushing-vine]{Crushing Vine},\_@Identifier[body:enormous-vine]{Enormous Vine},\_@Identifier[body:ferocious-tail]{Ferocious Tail},\_@Identifier[body:grasping-tentacle]{Grasping Tentacle},\_@Identifier[body:grasping-vine]{Grasping Vine},\_@Identifier[equipment:long-flail]{Long Flail},\_@Identifier[body:mighty-tail]{Mighty Tail},\_@Identifier[equipment:net]{Net},\_@Identifier[body:piercing-stinger]{Piercing Stinger},\_@Identifier[body:prehensile-colossal-tail]{P