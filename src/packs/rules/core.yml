  - _id: damage0000000000
    _key: '!journal.pages!core000000000000.damage0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Damage
    system:
      identifier: damage
      img: icons/creatures/abilities/stinger-spine-horn-blood.webp
    text:
      content: >-
        <p>Every
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon} has
        a <b>base damage</b> it deals. This is represented by some die ([[/roll
        d4]], [[/roll d6]], [[/roll d8]], etc.). Assuming nothing else modifies
        the damage dealt, if a creature hits another with a
        @Identifier[ability:basic-attack]{Basic Attack}, it's player rolls this
        <b>damage die</b> and the target takes that much damage.</p><p>Many
        @Pack[teriock.abilities]{abilities} and other effects modify the amount
        of damage an @Identifier[core:attack-interaction]{attack} deals (through
        @Identifier[keyword:boosted-damage]{boosting},
        @Identifier[keyword:deboosted-damage]{deboosting},
        @Identifier[ability:might-strike]{adding additional damage dice}, or
        other means). These damage dice may also have
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} associated with them that may incur additional effects. Damage
        may have multiple types. If no type is specified, the damage is
        considered to be "@Identifier[damage:mundane]{mundane}".</p><p>The total
        set of all damage dice that would be rolled (including types) is
        referred to as <b>standard damage</b>. If an
        @Pack[teriock.abilities]{ability} says it "deals standard damage" it
        means deals damage, considering all relevant modifiers in the process.
        Some @Pack[teriock.abilities]{abilities} also deal <b>critical
        damage</b>. In these cases, roll each damage die twice (after applying
        all @Identifier[keyword:boosted-damage]{boosts} and
        @Identifier[keyword:deboosted-damage]{deboosts}) and deal that much
        damage instead. This doesn't automatically double static increases or
        decreases to the amount of damage dealt, unless explicitly stated (such
        as by @Identifier[ability:slay]{Slay}).</p><p>If someone is
        @Identifier[status:down]{dropped} by an
        @Identifier[core:attack-interaction]{attack} or other source of damage
        that includes dice of several
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types}, then they are considered to have been
        @Identifier[status:down]{dropped} by <i>all</i> those
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types}.</p><p class="note"><b>Note:</b> Not all
        @Identifier[core:attack-interaction]{attacks} deal damage (e.g.
        @Identifier[ability:snare]{Snare}. And, of those that do, not all deal
        standard damage (e.g. @Identifier[ability:flame-ray]{Flame Ray}). The
        effect of an @Identifier[core:attack-interaction]{attack} is that which
        is described in its "On hit" section. And the effect of a critical hit
        is that which is described in its "On critical hit" section (if it has
        one). If an @Identifier[core:attack-interaction]{attack} does not say it
        deals critical damage, then that is not something it does.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: deathBag00000000
    _key: '!journal.pages!core000000000000.deathBag00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Death Bag
    system:
      identifier: death-bag
      img: icons/containers/bags/sack-twisted-skull-purple.webp
    text:
      content: >-
        <p>You pull from the <b>death bag</b> whenever you are
        @Wiki[Category:Revival effects]{revived} from
        @Identifier[status:dead]{death}. This is a bag that has 20 white stones,
        10 red stones, and 3 black stones in it. How many stones you pull
        depends on how many times you've @Identifier[status:dead]{died} since
        your last @Identifier[core:long-rest]{long rest}. The first time you
        @Identifier[status:dead]{die} and are @Wiki[Category:Revival
        effects]{revived}, you pull 10 stones. Each additional
        @Identifier[status:dead]{death}, you pull 1 additional stone up to a
        maximum of 30. You then experience consequences depending on the number
        of black stones you've pulled.</p><h2>Forgotten Death</h2><p>If you pull
        at least 1 black stone, you forget the immediate circumstances of your
        @Identifier[status:dead]{death} and have a shaky recollection of the 24
        hours leading up to it. The first time you try and recall something from
        this time, you must make a DC 10 @Identifier[core:intelligence]{INT}
        @Identifier[core:feat-interaction]{feat save}. On a success, you can
        recollect the vague outline of what you're trying to remember. On a
        failure, you are unable to recall anything. On a critical success, you
        actually do remember the details of what you're trying to remember. And
        on a critical failure, you have an inaccurate memory given to you by the
        @Identifier[core:game-master]{GM}. You can only attempt this
        recollection once for any time you have forgotten. If you have multiple
        deaths with at least 1 black stone pulled and overlapping forgotten time
        frames, you can still only attempt this once.</p><h2>Death
        Scars</h2><p>If you pull 2 or more black stones from the death bag, you
        gain a <b>death scar</b>. This is a permanently lost memory or spiritual
        or personality change. This is also a physical scar, as whatever it was
        that caused your death does not fully heal (although this has no
        mechanical consequences). Death scars are chosen by the
        @Identifier[core:game-master]{GM} but are not typically crippling.
        Instead, they should provide a new narrative hook and may be fine tuned
        in collaboration with the player. The @Identifier[core:game-master]{GM}
        may take into account the history of your character, the circumstances
        of their @Identifier[status:dead]{death}, or other factors when writing
        a death scar. They may also roll or pick one of the @Wiki[Core:Example
        Death Scars]{example death
        scars}.</p><p>@Embed[Compendium.teriock.tables.RollTable.0f72bd7624712693
        rollable]</p><h2>Permanent Death</h2><p>If you pull all 3 black stones
        from the death bag then you "permanently die" (or "PD"). This is where
        the red stones come into play. The first time you PD, you have a chance
        to receive "divine intervention" (or "DI"). This means some powerful
        supernatural being has intervened in the events of the world to spare
        you from your fate. So long as you pull at least 1 red stone, you have a
        divine intervention of some sort. But the strength of the intervention
        varies by how many red stones you pull. Minor divine interventions may
        change very little about you, and major ones can give powerful new
        @Pack[teriock.abilities]{abilities} and obligations as determined by the
        @Identifier[core:game-master]{GM}. The @Identifier[core:game-master]{GM}
        will take into account the strength of your character's faith, their
        actions in life, the power of different divine beings in the area, and
        perhaps other aspects in determining what exactly your divine
        intervention is. You may not know everything about your divine
        intervention from the moment you are offered it, but will likely have
        some sense of what you're gaining and what may be expected of you. You
        can always turn down a divine intervention that you don't want to
        receive, but you may not have any other options. At
        @Identifier[core:game-master]{GM} discretion, it is occasionally
        possible to get more than one offer of divine intervention at once as
        well as offers from deities you may not have a great history with in the
        past. An intervention may be from magnanimous deities you have strong
        ties to. Or it could be from one hoping to use you to gain power in this
        world. Interventions are not to be taken
        lightly.</p><p>@Embed[Compendium.teriock.tables.RollTable.b034b3cd8f613d8c]</p><h2>When
        to Pull</h2><p>You pull from the death bag immediately upon being
        @Wiki[Category:Revival effects]{revived}. However, the full extent of
        what happens doesn't manifest right away. The consequences from pulling
        1 stone applies immediately. But death scars, the effects of divine
        intervention, and permanent death often take a little time to appear. If
        the @Identifier[core:game-master]{GM} has aspects they know immediately,
        they might tell you something right away. But the full details of a
        death doesn't typically arrive until the next
        @Identifier[core:short-rest]{short rest},
        @Identifier[core:long-rest]{long rest}, or other period of relative
        downtime. Nevertheless, you have immediately knowledge of what you
        pulled. This includes if you are about to permanently die. You are free
        to go out in a blaze of glory.</p><p>Your
        @Identifier[core:game-master]{GM} may also have you pull from the death
        bag for circumstances beyond a typical @Identifier[status:dead]{death}.
        These are usually cases where you are still somehow permanently
        incapacitated such as being rendered
        @Identifier[status:unconscious]{unconscious} by
        @Identifier[damage:morganti]{morganti damage}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
