        </td></tr>

        <tr>

        <td>27

        </td>

        <td colspan="3">+1 @Identifier[core:proficiency-bonus]{proficiency
        bonus} / +1 @Identifier[core:fluency-bonus]{fluency bonus}

        </td>

        <td rowspan="10">+3

        </td>

        <td rowspan="5">+6

        </td></tr>

        <tr>

        <td style="background-color:color-mix(in srgb, var(--color-warning) 10%,
        transparent)">28

        </td>

        <td style="background-color:color-mix(in srgb, var(--color-warning) 10%,
        transparent)" colspan="3">New tradecraft or
        @Identifier[core:tradecraft-fluencies]{tradecraft fluency}

        </td></tr>

        <tr>

        <td>29

        </td>

        <td colspan="3">+1 @Identifier[core:presence]{presence tier}

        </td>

        <td rowspan="5">7

        </td></tr>

        <tr>

        <td>30

        </td>

        <td>+7 HP ([[/roll 1d12]]) / +5 MP ([[/roll 1d8]])

        </td>

        <td>+6 HP ([[/roll 1d10]]) / +6 MP ([[/roll 1d10]])

        </td>

        <td>+5 HP ([[/roll 1d8]]) / +7 MP ([[/roll 1d12]])

        </td></tr></tbody></table><h2>List of Tradecrafts</h2><p>What follows
        are the main tradecrafts that are available in <a target="_blank"
        rel="nofollow noreferrer noopener" class="external text"
        href="https://www.teriock.com/">Teriock</a> Online. The
        @Identifier[core:game-master]{GM} will typically pick checks that
        correspond to one of these.</p><h3>Artisan Tradecrafts</h3><table
        class="wikitable">

        <tbody><tr>

        <th>Tradecraft

        </th>

        <th>Description

        </th></tr>

        <tr>

        <td>@Identifier[tradecraft:artist]{Artist}

        </td>

        <td>Artist checks can be used to create and evaluate works of art.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:blacksmith]{Blacksmith}

        </td>

        <td>Blacksmith checks can be used to forge
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor},
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons},
        and other metal goods. It can also be used to understand the make and
        quality of metal @Pack[teriock.equipment]{items}.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:builder]{Builder}

        </td>

        <td>Builder checks can be used to build and repair wooden or stone
        objects and structures. It can also be used to understand the make and
        quality of such objects and structures.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:chef]{Chef}

        </td>

        <td>Chef checks can be used to cook, prepare, serve, and evaluate
        @Wiki[Category:Refreshments]{food and drink}.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:locksmith]{Locksmith}

        </td>

        <td>Locksmith checks can be used to assemble, pick, and evaluate locks.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:mariner]{Mariner}

        </td>

        <td>Mariner checks can be used to sail and understand ships and the sea.
        It can also be used to understand the workings of ships and how to
        repair them.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:tailor]{Tailor}

        </td>

        <td>Tailor checks can be used to sew and repair
        @Wiki[Category:Clothing]{clothing} and other cloth
        @Pack[teriock.equipment]{items}. It can also be used to understand the
        make and quality of cloth @Pack[teriock.equipment]{items}.

        </td></tr></tbody></table><h3>Mediator Tradecrafts</h3><table
        class="wikitable">

        <tbody><tr>

        <th>Tradecraft

        </th>

        <th>Description

        </th></tr>

        <tr>

        <td>@Identifier[tradecraft:courtier]{Courtier}

        </td>

        <td>Courtier checks can be used to befriend, manipulate, and deceive,
        and adjust the attitudes of other cratures.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:enforcer]{Enforcer}

        </td>

        <td>Enforcer checks can be used to intimidate others and appear
        authoritative.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:gambler]{Gambler}

        </td>

        <td>Gambler checks can be used to play games of skill or luck and assess
        the odds of things.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:innkeeper]{Innkeeper}

        </td>

        <td>Innkeeper checks can be used to find information about other people
        and hear or spread rumors.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:peacekeeper]{Peacekeeper}

        </td>

        <td>Peacekeeper checks can be used to know if other creatures are
        attempting to lie or deceive you.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:performer]{Performer}

        </td>

        <td>Performer checks can be used to impress, entertain, and distract
        other creatures. It can also be used to recognize or evaluate the
        quality of performances.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:trader]{Trader}

        </td>

        <td>Trader checks can be used to make deals with other creatures and
        find opportunities to trade that wouldn't otherwise be available.

        </td></tr></tbody></table><h3>Scholarly Tradecrafts</h3><table
        class="wikitable">

        <tbody><tr>

        <th>Tradecraft

        </th>

        <th>Description

        </th></tr>

        <tr>

        <td>@Identifier[tradecraft:cartographer]{Cartographer}

        </td>

        <td>Cartographer checks can be used to navigate and read or make <a
        target="_blank" rel="nofollow noreferrer noopener" class="external text"
        href="https://map.teriock.com/">maps</a>.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:diplomat]{Diplomat}

        </td>

        <td>Diplomat checks can be used to understand the law and navigate the
        political landscape.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:historian]{Historian}

        </td>

        <td>Historian checks can be used to research and understand past events
        as well as the people, places, and items associated with them.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:messenger]{Messenger}

        </td>

        <td>Messenger checks can be used to recall words, phrases, and other
        information you have encountered previously.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:priest]{Priest}

        </td>

        <td>Priest checks can be used to tend shrines or temples and understand
        theology.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:scribe]{Scribe}

        </td>

        <td>Scribe checks can be used to speak, read, and write in Common or
        other languages.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:teacher]{Teacher}

        </td>

        <td>Teacher checks can be used to train others and share your knowledge.

        </td></tr></tbody></table><h3>Survivalist Tradecrafts</h3><table
        class="wikitable">

        <tbody><tr>

        <th>Tradecraft

        </th>

        <th>Description

        </th></tr>

        <tr>

        <td>@Identifier[tradecraft:farmer]{Farmer}

        </td>

        <td>Farmer checks can be used to grow and tend crops or gardens to
        produce food. It can also be used to recognize edible plants.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:herbalist]{Herbalist}

        </td>

        <td>Herbalist checks can be used to gather herbs and prepare herbal
        remedies. It can also be used to apply basic medicine to other
        creatures.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:hunter]{Hunter}

        </td>

        <td>Hunter checks can be used to trap or hunt animals for food and
        hides. It can also be used to know what parts of animals are useful for
        different purposes.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:investigator]{Investigator}

        </td>

        <td>Investigator checks can be used to search areas for hidden objects.
        It can also be used to hide objects.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:miner]{Miner}

        </td>

        <td>Miner checks can be used to find your way in or out of caves and
        dungeons. It can also be used to understand the properties of minerals
        and ores.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:tamer]{Tamer}

        </td>

        <td>Tamer checks can be used to tame, calm, or rile up wild and
        domesticated animals. It can also be used to intuit an animal's
        intentions.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:tracker]{Tracker}

        </td>

        <td>Tracker checks can be used to find your way in the wild and follow
        or evade others.

        </td></tr></tbody></table><h3>Prestige Tradecrafts</h3><table
        class="wikitable">

        <tbody><tr>

        <th>Tradecraft

        </th>

        <th>Description

        </th></tr>

        <tr>

        <td>@Identifier[tradecraft:metaphysicist]{Metaphysicist}

        </td>

        <td>Metaphysicist checks can be used to recognize and interpret arcane
        features of the world. Although this tradecraft may often come up, it is
        not standardly learnable.

        </td></tr>

        <tr>

        <td>@Identifier[tradecraft:tinkerer]{Tinkerer}

        </td>

        <td>Tinkerer checks can be used to comprehend and fiddle with machinery.
        Although this tradecraft may often come up, it is not standardly
        learnable.

        </td></tr></tbody></table>
