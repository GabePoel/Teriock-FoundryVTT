  - _id: itemTarget000000
    _key: '!journal.pages!core000000000000.itemTarget000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Item Target
    system:
      identifier: item-target
      img: systems/teriock/src/icons/core-rules/item-target.webp
    text:
      content: >-
        <p>@Wiki[Category:Item target abilities]{Attacks that target items} need
        different @Identifier[core:attack-interaction]{hit rolls} depending on
        the @Pack[teriock.equipment]{type of item}.</p><ul><li>Wielded items
        (such as
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons} or
        @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shields}):
        @Identifier[core:armor-class]{AC} + 3 -
        @Identifier[core:block-interaction]{BV}</li>

        <li>Large worn items (such as
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} or
        @Identifier[equipment:cloak]{cloaks}):
        @Identifier[core:armor-class]{AC}</li>

        <li>@Identifier[property:small]{Small}
        @Identifier[property:searchable]{searchable items} (such as rings or
        amulets): @Identifier[core:armor-class]{AC} + 6</li></ul><p>If an
        @Wiki[Category:Item target abilities]{ability that targets an item} is
        successfully @Identifier[core:block-interaction]{blocked}, it
        automatically hits the item that
        @Identifier[core:block-interaction]{blocked} it.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: materialComponen
    _key: '!journal.pages!core000000000000.materialComponen'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Material Components
    system:
      identifier: material-components
      img: systems/teriock/src/icons/core-rules/material-components.webp
    text:
      content: >-
        <p>If an @Wiki[Category:Material component abilities]{ability} has a
        material component, the creature executing it must have the material
        component on hand to do so. The specific material component is listed in
        the @Wiki[Category:Material component abilities]{ability's} description.
        Material components are consumed by the ability unless otherwise
        noted.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: limbTarget000000
    _key: '!journal.pages!core000000000000.limbTarget000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Limb Target
    system:
      identifier: limb-target
      img: systems/teriock/src/icons/core-rules/limb-target.webp
    text:
      content: >-
        <p>Rather than hitting an entire creature, some
        @Pack[teriock.abilities]{abilities} will say that they only hit arms,
        legs, or limbs. If @Wiki[Category:Limb target abilities]{these
        abilities} are @Identifier[core:attack-interaction]{attacks}, then they
        are slightly harder to land a hit with than ones that can hit a creature
        anywhere. They require hitting that creature's
        @Identifier[core:armor-class]{AC} + 2.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: maneuvers0000000
    _key: '!journal.pages!core000000000000.maneuvers0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Maneuvers
    system:
      identifier: maneuvers
      img: systems/teriock/src/icons/core-rules/maneuvers.webp
    text:
      content: >-
        <p>Everything a creature does in combat turn is codified in terms of
        <b>@Identifier[core:abilities]{abilities}</b>. Each
        @Identifier[core:abilities]{ability}, in turn, has one of four possible
        <b>maneuvers</b> that determine when it can be used.</p><h2>Active
        Maneuvers</h2><p><b>Active maneuvers</b> are done proactively within the
        time scale of a single turn. On each creature's turn, they may take up
        to <i>three</i> Actions in total. Every @Wiki[Category:Active
        abilities]{active ability} will specify how many of these actions it
        consumes. They may be @Wiki[Category:Single action abilities]{single
        actions}, @Wiki[Category:Double action abilities]{double actions}, or
        @Wiki[Category:Triple action abilities]{triple actions}. Some
        @Wiki[Category:Active abilities]{active abilities} may also be
        @Wiki[Category:Free action abilities]{free actions}. These not only
        don't consume a creature's actions, but can be done at <i>any</i> time
        (even on other creatures' turns)! However, they cannot be used in
        reaction to other @Pack[teriock.abilities]{abilities}.</p><h2>Reactive
        Maneuvers</h2><p><b>Reactive maneuvers</b> can only be done in response
        to some event that <b>triggers</b> them. Every reactive maneuver will
        specify what its <b>triggering conditions</b> are. These could be
        @Identifier[ability:tumble]{taking damage},
        @Identifier[ability:resolve-conflict]{hearing another creature speak},
        @Identifier[ability:opportunity-attack]{another creature moving away
        from you}, or anything else. Each creature has <i>only one</i>
        @Wiki[Category:Reaction abilities]{reaction} per turn. However, some
        @Wiki[Category:Reactive abilities]{reactive abilities} are
        @Wiki[Category:Free reaction abilities]{free reactions}. These have no
        limit on the number of times they can be used, so long as their
        triggering condition is met every time.</p><p>The order of reactive
        maneuver resolution is determined by a "last in, first out" stack. So if
        so if a creature casts @Identifier[ability:fire-ball]{Fire Ball}, and
        another casts @Identifier[ability:dispel-magic]{Dispel Magic}, and the
        creature that first cast @Identifier[ability:fire-ball]{Fire Ball} casts
        @Identifier[ability:dispel-magic]{Dispel Magic} on the first dispel,
        then the @Identifier[ability:fire-ball]{Fire Ball} resolves. A given
        creature can only use a given @Wiki[Category:Reactive
        abilities]{reactive ability} once within a given stack.</p><h2>Passive
        Maneuvers</h2><p><b>Passive maneuvers</b> act in the background and
        don't require any decision to use. @Wiki[Category:Passive
        abilities]{passive abilities} will always have a <b>duration</b> listed
        that tell you when they are and aren't in effect.</p><p
        class="note"><b>Note:</b> @Wiki[Category:Passive abilities]{passive
        abilities} are in effect whether you like them or not. You can not
        simply choose to not use them.</p><h2>Slow Maneuvers</h2><p><b>Slow
        maneuvers</b> are those that take longer than a single turn to execute.
        Some may be on the scale of a @Wiki[Category:Short rest
        abilities]{short} or @Wiki[Category:Long rest abilities]{long rest}, in
        which case they cannot be used in combat. Other @Wiki[Category:Slow
        abilities]{slow abilities}, such as most @Wiki[Category:Ritual delivery
        abilities]{rituals}, have a more precise <b>execution time</b> (or
        <b>casting time</b>) specified in seconds, minutes, hours, or some other
        defined unit of time. These can be done during combat so long as a round
        doesn't pass without the creature executing them using
        @Identifier[ability:sustain]{Sustain} at least once.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: minions000000000
    _key: '!journal.pages!core000000000000.minions000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Minions
    system:
      identifier: minions
      img: systems/teriock/src/icons/core-rules/minions.webp
    text:
      content: >-
        <p>A <b>minion</b> is a creature that act at the direction of some other
        one, which is referred to as its <b>commander</b>. This is purely a
        mechanical distinction and does not necessarily imply any sort of
        "@Wiki[Category:Control effects]{control}". Minions share their turn
        with their commander and take no actions unless directed to do so (such
        as with @Identifier[ability:basic-command]{Basic Command}). The start
        and end of a minion's turn is considered to happen simultaneously with
        their commander's.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: missileDelivery0
    _key: '!journal.pages!core000000000000.missileDelivery0'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Missile Delivery
    system:
      identifier: missile-delivery
      img: systems/teriock/src/icons/core-rules/missile-delivery.webp
    text:
      content: >-
        <p>Abilities with the missile source are those that would have spell
        stones in live action <a target="_blank" rel="nofollow noreferrer
        noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a>. These are most often
        @Identifier[core:attack-interaction]{attacks}, but do not have any
        physical weapon that mediates them. Instead, these Abilities may
        correspond to a ball of fire, a bolt of lightning, a gust of wind, or
        some other phenomenon. Missile
        @Identifier[core:attack-interaction]{attacks} have
        @Identifier[core:disadvantage]{disadvantage} on targets that have their
        executor within melee range. Missile sourced abilities also requite that
        the creature executing them have an open hand.</p><p
        class="note"><b>Note:</b> A creature with
        @Identifier[ability:staff-touch]{Staff Touch} wielding a
        @Identifier[property:magelore]{magelore item} in their hand, counts as
        having that hand open.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: longRest00000000
    _key: '!journal.pages!core000000000000.longRest00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Long Rest
    system:
      identifier: long-rest
      img: systems/teriock/src/icons/core-rules/long-rest.webp
    text:
      content: >-
        <p>A long rest is a period of extended downtime, at least 8 hours long,
        during which a creature sleeps or performs light activity: reading,
        talking, eating, or standing watch for no more than 2 hours. If the rest
        is interrupted by a period of strenuous activity—at least 1 hour of
        walking, fighting, casting spells, or similar adventuring activity—the
        creatures must begin the rest again to gain any benefit from it.</p><p
        class="note"><b>Note:</b> Your @Identifier[core:game-master]{GM} may
        decide on a different time period or conditions for a long
        rest.</p><p>Some @Wiki[Category:Long rest abilities]{abilities} (such as
        @Identifier[ability:elder-sorcery-creation]{Elder Sorcery Creation})
        have "long rest" as their execution time. A creature may choose to do
        <i>one</i> of these during their long rest.</p><p>At the end of a long
        rest, a creature regains all lost
        @Identifier[core:hit-points-and-mana-points]{HP} and all lost
        @Identifier[core:hit-points-and-mana-points]{MP}. The creature also
        regains all spent @Identifier[core:hit-points-and-mana-points]{hit dice
        and mana dice}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: manifestInteract
