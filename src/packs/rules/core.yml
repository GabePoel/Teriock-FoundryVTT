  - _id: temporaryHitPoin
    _key: '!journal.pages!core000000000000.temporaryHitPoin'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Temporary Hit Points
    system:
      identifier: temporary-hit-points
      img: systems/teriock/src/icons/core-rules/temporary-hit-points.webp
    text:
      content: >-
        <p>Temporary Hit Points (temp HP) are not actual
        @Identifier[core:hit-points-and-mana-points]{HP}; they are a buffer
        against damage. When you have temp HP and take damage, your temp HP are
        reduced first, and any remaining damage carries over to your normal
        @Identifier[core:hit-points-and-mana-points]{HP}. If the
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{type of
        damage} is not one that would reduce
        @Identifier[core:hit-points-and-mana-points]{HP} (such as
        @Identifier[damage:hack]{hack damage}), then your temp HP has no effect
        on the damage and is not reduced. You cannot spent temp HP as an
        @Wiki[Category:HP cost abilities]{HP cost}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: sustained0000000
    _key: '!journal.pages!core000000000000.sustained0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Sustained
    system:
      identifier: sustained
      img: systems/teriock/src/icons/core-rules/sustained.webp
    text:
      content: >-
        <p>A <b>sustained</b> @Wiki[Category:Sustained abilities]{ability} needs
        to be maintained throughout its duration. If a creature becomes
        @Identifier[keyword:incapable]{incapable} of an @Wiki[Category:Sustained
        abilities]{ability} they're sustaining or otherwise loses the
        @Wiki[Category:Sustained abilities]{ability} then the effects of that
        @Wiki[Category:Sustained abilities]{ability} end.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: tradecrafts00000
