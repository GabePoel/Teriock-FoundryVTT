        </td>

        <td>+5 HP ([[/roll 1d8]]) / +7 MP ([[/roll 1d12]])

        </td></tr></tbody></table><h2>Tradecraft Fluencies</h2><p>As you rank
        up, you get the option to take additional tradecrafts, or gain a
        <b>fluency</b> in a tradecraft you already have. A tradecraft fluency is
        a more tailored form of the tradecraft it corresponds to. For instance,
        you could be a @Identifier[tradecraft:historian]{historian} with a
        fluency in ancient Shaloban history, a
        @Identifier[tradecraft:tailor]{tailor} with a fluency in wizard robes,
        or an @Identifier[tradecraft:enforcer]{enforcer} with a fluency in
        intimidating homeless people. When you make a tradecraft check where
        your fluency is relevant, you add your fluency bonus (F) instead of your
        @Identifier[core:proficiency-bonus]{proficiency bonus} (P) to the roll.
        The @Identifier[core:game-master]{GM} may also tailor the results of
        your check with regards to your fluency.</p>
