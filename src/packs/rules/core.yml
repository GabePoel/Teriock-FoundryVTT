  - _id: resting000000000
    _key: '!journal.pages!core000000000000.resting000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Resting
    system:
      identifier: resting
      img: systems/teriock/src/icons/core-rules/resting.webp
    text:
      content: >-
        <p><a target="_blank" rel="nofollow noreferrer noopener" class="external
        text" href="https://www.teriock.com/">Teriock</a> Online has no concept
        of "encounters". Instead, everything is specified in
        @Identifier[core:turns]{turns}, @Identifier[core:rounds]{rounds}, time
        (minutes, seconds, days, etc.) or as <b>short rests</b> and <b>long
        rests</b>.</p><h2>Short Rest</h2><p>A short rest is a period of
        downtime, at least 1 hour long, during which a creature does nothing
        more strenuous than eating, drinking, reading, and tending to wounds.
        Some @Wiki[Category:Short rest abilities]{abilities} (such as
        @Identifier[ability:recover]{Recover}) have "short rest" as their
        execution time. A creature may choose to do <i>one</i> of these during
        their short rest.</p><p class="note"><b>Note:</b> Your
        @Identifier[core:game-master]{GM} may decide on a different time period
        or conditions for a short rest.</p><h2>Long Rest</h2><p>A long rest is a
        period of extended downtime, at least 8 hours long, during which a
        creature sleeps or performs light activity: reading, talking, eating, or
        standing watch for no more than 2 hours. If the rest is interrupted by a
        period of strenuous activity—at least 1 hour of walking, fighting,
        casting spells, or similar adventuring activity—the creatures must begin
        the rest again to gain any benefit from it.</p><p
        class="note"><b>Note:</b> Your @Identifier[core:game-master]{GM} may
        decide on a different time period or conditions for a long
        rest.</p><p>Some @Wiki[Category:Long rest abilities]{abilities} (such as
        @Identifier[ability:elder-sorcery-creation]{Elder Sorcery Creation})
        have "long rest" as their execution time. A creature may choose to do
        <i>one</i> of these during their long rest.</p><p>At the end of a long
        rest, a creature regains all lost
        @Identifier[core:hit-points-and-mana-points]{HP} and all lost
        @Identifier[core:hit-points-and-mana-points]{MP}. The creature also
        regains all spent @Identifier[core:hit-points-and-mana-points]{hit dice
        and mana dice}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
