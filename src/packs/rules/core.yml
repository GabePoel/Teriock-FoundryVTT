  - _id: abilityTarget000
    _key: '!journal.pages!core000000000000.abilityTarget000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Ability Target
    system:
      identifier: ability-target
      img: systems/teriock/src/icons/core-rules/ability-target.webp
    text:
      content: >-
        <p>Instead of targeting some person, place, or other physical thing,
        some @Pack[teriock.abilities]{abilities} target other
        @Pack[teriock.abilities]{abilities}. These include cases that target
        @Wiki[Category:Attack target abilities]{attack target abilities},
        @Wiki[Category:Conjured spells]{conjured} @Wiki[Category:Spell target
        abilities]{spells}, or other types of
        @Pack[teriock.abilities]{abilities}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: alternateRules00
    _key: '!journal.pages!core000000000000.alternateRules00'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Alternate Rules
    system:
      identifier: alternate-rules
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p><b>Alternate Rules</b> are common rules changes that you can play
        with if you prefer. They are generally compatible with the rest of the
        game, but may still change its balance.</p><dl><dt>Armor Weakens
        Ranks</dt>

        <dd>If you wear
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} above
        a @Pack[teriock.classes]{class'} maximum
        @Identifier[core:armor-class]{AV}, you lose
        @Identifier[core:proficiency-bonus]{proficiency} in its
        @Pack[teriock.abilities]{abilities} instead of losing the
        @Pack[teriock.abilities]{abilities} entirely.</dd></dl>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: activeManeuvers0
    _key: '!journal.pages!core000000000000.activeManeuvers0'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Active Maneuvers
    system:
      identifier: active-maneuvers
      img: systems/teriock/src/icons/core-rules/active-maneuvers.webp
    text:
      content: >-
        <p><b>Active maneuvers</b> are done proactively within the time scale of
        a single turn. On each creature's turn, they may take up to <i>three</i>
        Actions in total. Every @Wiki[Category:Active abilities]{active ability}
        will specify how many of these actions it consumes. They may be
        @Wiki[Category:Single action abilities]{single actions},
        @Wiki[Category:Double action abilities]{double actions}, or
        @Wiki[Category:Triple action abilities]{triple actions}. Some
        @Wiki[Category:Active abilities]{active abilities} may also be
        @Wiki[Category:Free action abilities]{free actions}. These not only
        don't consume a creature's actions, but can be done at <i>any</i> time
        (even on other creatures' turns)! However, they cannot be used in
        reaction to other @Pack[teriock.abilities]{abilities}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: advantage0000000
    _key: '!journal.pages!core000000000000.advantage0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Advantage
    system:
      identifier: advantage
      img: systems/teriock/src/icons/core-rules/advantage.webp
    text:
      content: >-
        <p>Sometimes an effect will specify that you have Advantage on an
        @Identifier[core:attack-interaction]{attack}, @Wiki[Category:Feat
        abilities]{feat save}, @Identifier[keyword:resistance]{resistance save},
        or some other dice roll involving a single die. When this is the case,
        you roll that die twice and take the higher of the two rolls. If
        multiple sources would grant you Advantage, you still only roll the die
        twice. If you have both Advantage and
        @Identifier[core:disadvantage]{disadvantage}, then you roll normally.
        This is the case even if you have different numbers of sources of
        Advantage and Disadvantage.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: abilities0000000
    _key: '!journal.pages!core000000000000.abilities0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Abilities
    system:
      identifier: abilities
      img: systems/teriock/src/icons/core-rules/abilities.webp
    text:
      content: >-
        <p>In <a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://www.teriock.com/">Teriock</a>
        Online, everything a creature can do is determined by its
        @Pack[teriock.abilities]{abilities}. These may be granted by the
        creature's species type, their @Pack[teriock.classes]{classes}, magic
        items they use, or other @Wiki[Category:Stats]{stats} of theirs. By
        default, every creature is able to use any
        @Identifier[power:basic-abilities]{basic abilities} so long as they meet
        whatever conditions are specified for the given
        @Identifier[power:basic-abilities]{basic ability}.</p><p>Regardless of
        where it comes from, each ability has the same underlying
        structure.</p><h2>User</h2><p>An Ability's User is simply the creature
        that is using the Ability. This is the same for all
        Abilities.</p><h2>Target</h2><p>An ability's <b>target</b> type
        determines what kinds of things can be affected by the Ability. Some of
        the most common ones are listed here.</p><h4>Creature</h4><p>Abilities
        that target @Pack[teriock.creatures]{creatures} affect some sort of
        being. A "creature" doesn't necessarily have to be an
        @Wiki[Category:Animal creatures]{animal}, it may be an animated statue
        or a sentient @Wiki[Category:Plant creatures]{plant}. Check with your
        @Identifier[core:game-master]{GM} if in doubt of whether something is a
        @Pack[teriock.creatures]{creature} or not.</p><h5>Limb</h5><p>Rather
        than hitting an entire creature, some
        @Pack[teriock.abilities]{abilities} will say that they only hit arms,
        legs, or limbs. If @Wiki[Category:Limb target abilities]{these
        abilities} are @Identifier[core:attack-interaction]{attacks}, then they
        are slightly harder to land a hit with than ones that can hit a creature
        anywhere. They require hitting that creature's
        @Identifier[core:armor-class]{AC} +
        2.</p><h5>Vitals</h5><p><b>Vitals</b> targeted
        @Pack[teriock.abilities]{abilities} need to hit a creature's head or
        other vital organs rather than landing anywhere. If
        @Wiki[Category:Vitals target abilities]{these abilities} are
        @Identifier[core:attack-interaction]{attacks}, then they require hitting
        a creature's @Identifier[core:armor-class]{AC} +
        3.</p><h4>Item</h4><p>@Wiki[Category:Item target abilities]{Attacks that
        target items} need different @Identifier[core:attack-interaction]{hit
        rolls} depending on the @Pack[teriock.equipment]{type of
        item}.</p><ul><li>Wielded items (such as
        @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons} or
        @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shields}):
        @Identifier[core:armor-class]{AC} + 3 -
        @Identifier[core:block-interaction]{BV}</li>

        <li>Large worn items (such as
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} or
        @Identifier[equipment:cloak]{cloaks}):
        @Identifier[core:armor-class]{AC}</li>

        <li>@Identifier[property:small]{Small}
        @Identifier[property:searchable]{searchable items} (such as rings or
        amulets): @Identifier[core:armor-class]{AC} + 6</li></ul><p>If an
        @Wiki[Category:Item target abilities]{ability that targets an item} is
        successfully @Identifier[core:block-interaction]{blocked}, it
        automatically hits the item that
        @Identifier[core:block-interaction]{blocked}
        it.</p><h4>Area</h4><p>Abilities that target an area do not have a
        precisely defined size. Rather, they affect a small, cohesive space such
        as a campsite, a room in a dungeon, or a small shack. These abilities
        may or may not have a range specified.</p><h4>Self</h4><p><b>Self</b>
        targeted abilities affect @Identifier[core:executer]{the creature that
        executes them}. They typically do not have a range
        specified.</p><h4>Ability</h4><p>Instead of targeting some person,
        place, or other physical thing, some @Pack[teriock.abilities]{abilities}
        target other @Pack[teriock.abilities]{abilities}. These include cases
        that target @Wiki[Category:Attack target abilities]{attack target
        abilities}, @Wiki[Category:Conjured spells]{conjured}
        @Wiki[Category:Spell target abilities]{spells}, or other types of
        @Pack[teriock.abilities]{abilities}.</p><h4>Other</h4><p>Some ability
        targets don't fit nearly into one of the predefined categories. In these
        cases, the ability's target will just say
        "other".</p><h2>Range</h2><p>Each Ability has some Range over which it
        can be used. These depend on the Delivery and
        Target.</p><h2>Delivery</h2><p>Every Ability has one and <i>only one</i>
        @Wiki[Category:Delivery abilities]{delivery}. This always has at least
        two parts, a <a href="#Source">Source</a> and <a
        href="#Interaction">Interaction</a>.</p><h3>Source</h3><p>The Source of
        an Ability's Delivery is the means by which it is transmitted from the
        User to the Target. There are many possible Sources, but the most common
        ones are as follows.</p><h4>Item</h4><p>Item Sourced Abilities are
        transmitted from the User to the Target via one of the User's items.
        Some Abilities may only specify "item" as the Source. Others may give a
        more specific description such as "weapon", "shield", or "armor". These
        are all considered to be Sourced with items and are just shorthands for
        the type of item that can be used.</p><p>The Range of Item Sourced
        Abilities is that of the item.</p><h4>Missile</h4><p>Abilities with the
        missile source are those that would have spell stones in live action <a
        target="_blank" rel="nofollow noreferrer noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a>. These are most often
        @Identifier[core:attack-interaction]{attacks}, but do not have any
        physical weapon that mediates them. Instead, these Abilities may
        correspond to a ball of fire, a bolt of lightning, a gust of wind, or
        some other phenomenon. Missile
        @Identifier[core:attack-interaction]{attacks} have
        @Identifier[core:disadvantage]{disadvantage} on targets that have their
        executor within melee range. Missile sourced abilities also requite that
        the creature executing them have an open hand.</p><p
        class="note"><b>Note:</b> A creature with
        @Identifier[ability:staff-touch]{Staff Touch} wielding a
        @Identifier[property:magelore]{magelore item} in their hand, counts as
        having that hand open.</p><h4>Sight</h4><p>Abilities sourced by
        <b>sight</b> do <i>not</i> require the user to literally see the target
        with their eyeballs. While that's still necessary in most cases, some
        creatures may have some sort of "@Wiki[Category:Sensory
        effects]{blindsight}" that allows them to "see" other creatures even
        when there's no light in the environment. Nevertheless, these abilities
        always require that the user have some sort of direct "visibility" of
        the target akin to seeing them directly. Regardless of how exactly the
        user sees the target, sight abilities can be used over some range that
        <i>may not</i> actually be as far as the user can see. For instance,
        @Identifier[ability:duel]{Duel} operates by sight, but has a range of 30
        feet even though the user may see the target from much further
        away.</p><h4>Aura</h4><p>Abilities with the <b>aura</b> delivery source
        are ones that could affect every target within some specified radius,
        centered on the @Identifier[core:executer]{executer}. Unless
        specifically noted by the ability, the
        @Identifier[core:executer]{executer} is not affected by
        @Wiki[Category:Aura delivery abilities]{aura
        abilities}.</p><h4>Hand</h4><p>Like with @Wiki[Category:Sight delivery
        abilities]{sight} and eyeballs, @Wiki[Category:Hand delivery
        abilities]{hand delivery sourced abilities} don't require the user to
        physically have a dexterous humanoid hand with recognizable fingers.
        Some creatures with claws, tentacles, or other appendages can use Hand
        Abilities without problem. However, something of this nature is always
        required. If a creature that typically has
        @Identifier[equipment:hand]{literal hands} has their arms
        @Identifier[ability:hack]{Hacked} or has their
        @Identifier[equipment:hand]{hands} cut off, then they are unable to use
        @Wiki[Category:Hand delivery abilities]{hand delivered abilities}. It
        may be possible for them to find other ways to use these abilities in
        the future, but that's up to @Identifier[core:game-master]{GM}
        discretion.</p><p>The range of @Wiki[Category:Hand delivery
        abilities]{hand delivery sourced abilities} is the reach of the
        @Identifier[core:executer]{executer's} arm (or other appendage). This
        depends in part on the creature's @Identifier[core:size]{size}, but is
        usually 5 feet.</p><h4>Bite</h4><p>Abilities with the
        @Wiki[Category:Bite delivery abilities]{bite delivery source} are
        similar to @Wiki[Category:Hand delivery abilities]{hand abilities}, but
        they are transmitted with something that at least <i>resembles</i> a
        @Identifier[body:mouth]{mouth} rather than a
        @Identifier[body:hand]{hand}. These are typically
        @Identifier[property:biting]{biting}.</p><p>The range of
        @Wiki[Category:Bite delivery abilities]{bite delivered abilities} is the
        reach of the @Identifier[core:executer]{executer's} neck (or other
        similar body part). This depends in part on the creature's
        @Identifier[core:size]{size}, but is usually 5
        feet.</p><h4>Self</h4><p>Self Sourced Abilities are the simplest ones.
        They have no special means of transmission, but simply come from the
        User. This is sometimes used as a catch-all for Abilities that don't fit
        with any other Source.</p><h3>Interaction</h3><p>In addition to a
        Source, every Ability is mediated by one of four
        @Identifier[core:interactions]{interactions}. This determines what types
        of dice rolls, if any, need to be done for an Ability to affect its
        Target. See the @Identifier[core:interactions]{interactions} page for
        complete detail.</p><h3>Other Delivery Modifiers</h3><p>Some Abilities
        are <i>always</i> @Identifier[keyword:av0]{AV0} or
        @Identifier[keyword:ub]{UB}. When this is the case, it's mentioned
        within the Delivery.</p><h3>Delivery Packages</h3><p>Abilities may be
        listed as @Wiki[Category:Strike delivery abilities]{strikes},
        @Wiki[Category:Ritual delivery abilities]{rituals}, @Wiki[Category:Touch
        delivery abilities]{touches}, @Wiki[Category:Ball delivery
        abilities]{balls}, or @Wiki[Category:Ray delivery abilities]{rays}.
        These represent certain common deliveries composed out of the source and
        interaction primitives as well as other modifiers. What exactly these
        mean is listed in parentheses in the "delivery" section of relevant
        @Pack[teriock.abilities]{abilities}.</p><h2>Execution or Casting
        Time</h2><p>Each Ability has a specified amount of "time" it takes to
        use. For @Wiki[Category:Spells]{spells} this is called the "Casting"
        time. For @Wiki[Category:Skills]{skills} and other
        @Pack[teriock.abilities]{abilities} this is the "Execution" time. This
        is always paired with the type of @Identifier[core:maneuvers]{maneuver}
        (written in parentheses) the Ability operates under.</p><p>Make sure to
        read the @Identifier[core:maneuvers]{maneuvers} page for complete
        information.</p><h2>Duration</h2><p>The <b>duration</b> of an
        @Pack[teriock.abilities]{ability} is the <i>maximum</i> amount of time
        that @Pack[teriock.abilities]{ability's} effect applies for. Many
        abilities have an "end condition" that can apply before the full
        duration is reached. Other abilities have an "@Wiki[Category:Instant
        duration abilities]{instant}" duration which means the effect is simply
        applied at once. The duration of @Wiki[Category:Passive
        abilities]{passive abilities} describes the conditions under which
        they're in effect.</p><h2>Power Sources</h2><p>Every
        @Pack[teriock.abilities]{ability} is <b>@Wiki[Category:Powered
        abilities]{powered}</b> through some means. For many
        @Pack[teriock.abilities]{abilities}, the <b>power source</b> is simply
        "@Wiki[Category:Martially powered abilities]{martial}", which means they
        stem from the physical capabilities of the user. Other abilities could
        be "@Wiki[Category:Magically powered abilities]{magical}",
        "@Wiki[Category:Spiritually powered abilities]{spiritual}", or powered
        through other means. For an @Pack[teriock.abilities]{ability} to work,
        <i>all</i> power sources must be accessible.</p><h3>Standard
        Abilities</h3><p>Noted under the "delivery sources" section of an
        @Pack[teriock.abilities]{ability}, is whether it is considered
        <b>@UUID[Compendium.teriock.rules.JournalEntry.class00000000000]{standard}</b>.
        This is a legacy term inherited from live action <a target="_blank"
        rel="nofollow noreferrer noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a> and has no mechanical effect
        in <a target="_blank" rel="nofollow noreferrer noopener" class="external
        text" href="https://www.teriock.com/">Teriock</a> Online. In live action
        <a target="_blank" rel="nofollow noreferrer noopener" class="external
        text" href="https://www.fanwar.com/">FanWar</a>, these
        @Pack[teriock.abilities]{abilities} are typically those given by
        @Pack[teriock.classes]{classes} or those that are particularly common,
        well known, or easy to interact with. @Wiki[Category:Conjured
        spells]{Standard spells} are referred to as <b>@Wiki[Category:Conjured
        spells]{conjured}</b> and @Wiki[Category:Semblant skills]{standard
        skills} as <b>@Wiki[Category:Semblant
        skills]{semblant}</b>.</p><h2>Effect Types</h2><p>Some Abilities are
        considered "effects" of various types. Effect types don't generally
        influence the way Abilities mechanically operate. However, many
        Abilities interact with different effect types in various
        ways.</p><h2>Heightening</h2><p>Some @Wiki[Category:Heightened
        abilities]{abilities} allow you to <b>heighten</b> them. In these cases,
        you can choose to spend additional
        @Identifier[core:hit-points-and-mana-points]{MP} as you execute the
        @Wiki[Category:Heightened abilities]{ability} and the effect will be
        altered in some way described in its "Heightened" text. Abilities that
        don't have this text cannot be heightened. You can only heighten
        @Wiki[Category:Heightened abilities]{abilities} you are
        @Identifier[core:proficiency-bonus]{proficient} or
        @Identifier[core:fluency-bonus]{fluent} in and, even then, can only
        heighten up to the corresponding bonus. If an
        @Identifier[core:attack-interaction]{attack ability} is heightened, it
        gets +1 to hit per level of heightening. If a @Wiki[Category:Feat
        abilities]{feat ability} is heightened, it gets +1 to the DC per level
        of heightening.</p><h2>Components</h2><p>Many @Wiki[Category:Component
        abilities]{abilities} require one or more components in order to be
        executed.</p><h3>Verbal Components</h3><p>If an @Wiki[Category:Verbal
        component abilities]{ability} has a verbal component, the creature
        executing it must be able to speak to do so. The must not be
        @Identifier[status:deaf]{deaf}.</p><h3>Somatic Components</h3><p>If an
        @Wiki[Category:Somatic component abilities]{ability} has a somatic
        component, the creature executing it must have at least one free hand to
        do so. If the creature has an @Identifier[damage:hack]{arm hack} then it
        must have both hands free. If the creature has two
        @Identifier[damage:hack]{arm hacks} then it cannot execute the
        @Wiki[Category:Somatic component abilities]{ability}.</p><h3>Material
        Components</h3><p>If an @Wiki[Category:Material component
        abilities]{ability} has a material component, the creature executing it
        must have the material component on hand to do so. The specific material
        component is listed in the @Wiki[Category:Material component
        abilities]{ability's} description. Material components are consumed by
        the ability unless otherwise noted.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
