    name: Area Target
    system:
      identifier: area-target
      img: systems/teriock/src/icons/core-rules/area-target.webp
    text:
      content: >-
        <p>Abilities that target an area do not have a precisely defined size.
        Rather, they affect a small, cohesive space such as a campsite, a room
        in a dungeon, or a small shack. These abilities may or may not have a
        range specified.</p>
