    name: Weight
    system:
      identifier: weight
      img: systems/teriock/src/icons/core-rules/weight.webp
    text:
      content: >-
        <p>A creature's weight is determined by its
        @Identifier[core:size]{SIZE}. Typically, it is equal to (3 +
        @Identifier[core:size]{SIZE})³ lb. However, there is some variation from
        creature to creature. The actual weight could be anything from (3 +
        (@Identifier[core:size]{SIZE} - 0.5))³ lb. to (3 +
        (@Identifier[core:size]{SIZE} + 0.5))³ lb. Creatures with a size of 0.5
        typical have a weight of 15 lb. And those of size 0.25 have typically
        have a weight of 0.002 lb. The complete values are given in the table
        below.</p><table class="wikitable">

