  - _id: movementSpeed000
    _key: '!journal.pages!core000000000000.movementSpeed000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Movement Speed
    system:
      identifier: movement-speed
      img: systems/teriock/src/icons/core-rules/movement-speed.webp
    text:
      content: >-
        <p>A creature's <b>base movement speed</b> determines the maximum amount
        they can @Identifier[ability:move]{Move} in a single action under normal
        conditions. It is determined by the creature's
        @Identifier[core:movement]{MOV} attribute and is equal to 30 + (10 ×
        @Identifier[core:movement]{MOV}) in feet per action. A creature's base
        movement speed alone does not actually determine how far it can move in
        practice. Every creature has speeds for different types of movement,
        such as walking, leaping, swimming, climbing, and flying. The possible
        speed adjustments are double, normal, half, quarter, and none. Moving 5
        feet at half speed uses 10 feet of movement, while moving 5 feet at
        double speed uses only 2.5 feet of movement. The following table
        summarizes the different movement speed adjustments.</p><table
        class="wikitable">

        <caption>Movement Speed Adjustments

        </caption>

        <tbody><tr>

        <th>Step</th>

        <th>Speed Adjustment</th>

        <th>Cost of Moving 5 Feet

        </th></tr>

        <tr>

        <td>4</td>

        <td>Double</td>

        <td>2.5 feet

        </td></tr>

        <tr>

        <td>3</td>

        <td>Normal</td>

        <td>5 feet

        </td></tr>

        <tr>

        <td>2</td>

        <td>Half</td>

        <td>10 feet

        </td></tr>

        <tr>

        <td>1</td>

        <td>Quarter</td>

        <td>20 feet

        </td></tr>

        <tr>

        <td>0</td>

        <td>None</td>

        <td><i>Cannot move in this way at all</i>

        </td></tr>

        </tbody></table><p>The default speed adjustments for different types of
        movement are as follows.</p><table class="wikitable">

        <caption>Default Movement Speed Adjustments

        </caption>

        <tbody><tr>

        <th>Move Type</th>

        <th>Speed Adjustment

        </th></tr>

        <tr>

        <td>Walk Speed</td>

        <td>Normal

        </td></tr>

        <tr>

        <td>Difficult Terrain Speed</td>

        <td>Half

        </td></tr>

        <tr>

        <td>Crawl Speed</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Swim Speed</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Climb Speed</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>@Identifier[status:hidden]{Hidden Speed}</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Leap Speed (horizontal)</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Leap Speed (vertical)</td>

        <td>None

        </td></tr>

        <tr>

        <td>Fly Speed</td>

        <td>None

        </td></tr>

        <tr>

        <td>Dig Speed</td>

        <td>None

        </td></tr>

        <tr>

        <td>Dive Speed</td>

        <td>None

        </td></tr></tbody></table><h2>Special Movements</h2><p><b>Special
        movements</b> are the types of movement aren't easily described as
        traversing some distance. Instead of having a rate, these have a fixed
        amount of movement that they cost.</p><table class="wikitable">

        <caption>Special Movements

        </caption>

        <tbody><tr>

        <th>Name</th>

        <th>Description</th>

        <th>Cost

        </th></tr>

        <tr>

        <td>Descending</td>

        <td>You move down a vertical distance. This requires that you are
        somehow @Identifier[ability:flying]{hovering in the air} of your own
        volition.</td>

        <td>5 feet

        </td></tr></tbody></table>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
