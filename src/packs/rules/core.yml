    flags:
      teriock:
        journalIcon: ms-book-2
    name: Vitals Target
    system:
      identifier: vitals-target
      img: systems/teriock/src/icons/core-rules/vitals-target.webp
    text:
      content: >-
        <p><b>Vitals</b> targeted @Pack[teriock.abilities]{abilities} need to
        hit a creature's head or other vital organs rather than landing
        anywhere. If @Wiki[Category:Vitals target abilities]{these abilities}
        are @Identifier[core:attack-interaction]{attacks}, then they require
        hitting a creature's @Identifier[core:armor-class]{AC} + 3.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: weight0000000000
