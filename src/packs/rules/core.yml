    text:
      content: >-
        <p>How much a creature can lift and carry is determined by its
        @Identifier[core:strength]{STR} and
        @Identifier[core:size]{SIZE}.</p><table class="wikitable">

        <caption>Carrying Capacity Under Size 5

        </caption>

        <tbody><tr>

        <th>Amount in Pounds</th>

        <th>Effect Upon Hitting Threshold

        </th></tr>

        <tr>

        <td>65 + (20 × @Identifier[core:strength]{STR})</td>

        <td>@Identifier[status:encumbered]{Lightly Encumbered}

        </td></tr>

        <tr>

        <td>130 + (40 × @Identifier[core:strength]{STR})</td>

        <td>@Identifier[status:encumbered]{Heavily Encumbered}

        </td></tr>

        <tr>

        <td>195 + (60 × @Identifier[core:strength]{STR})</td>

        <td>Cannot carry anything more

        </td></tr></tbody></table><table class="wikitable">

        <caption>Carrying Capacity of Size 5 and Larger

        </caption>

        <tbody><tr>

        <th>Amount in Pounds</th>

        <th>Effect Upon Hitting Threshold

        </th></tr>

        <tr>

        <td>65 + (20 × (@Identifier[core:strength]{STR} +
        (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>@Identifier[status:encumbered]{Lightly Encumbered}

        </td></tr>

        <tr>

        <td>130 + (40 × (@Identifier[core:strength]{STR} +
        (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>@Identifier[status:encumbered]{Heavily Encumbered}

        </td></tr>

        <tr>

        <td>195 + (60 × (@Identifier[core:strength]{STR} +
        (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>Cannot carry anything more

        </td></tr></tbody></table><p>A creature may also push, drag, or lift a
        weight in pounds up to twice their carrying capacity. While pushing or
        dragging weight in excess of their carrying capacity, the creature's
        @Identifier[core:movement-speed]{movement speed} drops to 5 feet.

        The amount a creature can carry without becoming
        @Identifier[status:encumbered]{encumbered} is shown in the table
        below.</p><table class="wikitable">

