    text:
      content: >-
        <p>A creature's perception (abbreviated as <b>PER</b>) is a measure of
        how perceptive they are about the world around them. By default, a
        creature's PER is 0, but there are @Wiki[Category:PER setting
        abilities]{various abilities that set it to different values}.</p><table
        class="wikitable">

