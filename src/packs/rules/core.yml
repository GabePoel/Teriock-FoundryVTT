    name: Game Master
    system:
      identifier: game-master
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>The <b>game master</b> (or "GM") is a player in the game, but with a
        distinct role different from all others. While most players will be
        playing individual characters and directing their actions, the game
        master will be deciding the actions' results and how the world
        responds.</p>
