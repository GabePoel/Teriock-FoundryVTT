        <td>@Identifier[ability:ice-blast-aura]{Ice Blast Aura}</td>

        <td>@Identifier[ability:storm-shelter]{Storm Shelter}

        </td></tr></tbody></table><h2>Domain Blessings</h2><p>Other
        @Pack[teriock.abilities]{abilities}, such as
        @Identifier[ability:blessing]{Blessing}, allow for selecting an
