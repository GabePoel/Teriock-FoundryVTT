  - _id: attackInteractio
    _key: '!journal.pages!core000000000000.attackInteractio'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Attack Interaction
    system:
      identifier: attack-interaction
      img: systems/teriock/src/icons/core-rules/attack-interaction.webp
    text:
      content: >-
        <p>The most important interaction is the <b>attack interaction</b>,
        which is used whenever a weapon, body part, or missile would come into
        contact with a target. The attacker first makes an <b>attack roll</b>
        ([[/roll 1d20]]) against the target's
        @Identifier[core:armor-class]{armor class} (AC). If the attacker is
        @Identifier[core:proficiency-bonus]{proficient} with the
        @Identifier[core:abilities]{ability} they are using, they add their
        @Identifier[core:proficiency-bonus]{proficiency bonus} (P) to the roll.
        If this roll is equal to or greater than the target's
        @Identifier[core:armor-class]{AC} (typically 10 +
        @Identifier[core:armor-class]{AV}), the attack <b>hits</b>. If the roll
        is less than the target's AC, the attack <b>misses</b>. A natural 20 on
        the die is always a hit, and a natural 1 is always a miss. The
        consequence of a hit is described in the "On hit" section of the
        @Identifier[core:abilities]{ability} that's used.</p><p>If the hit is
        from a natural 20, then the attack is a <b>critical hit</b> and the
        effect of the @Identifier[core:abilities]{ability} "goes critical". If
        this changes anything about the effect, then it's described in the
        @Identifier[core:abilities]{ability's} "On critical hit" section.

        Any creature that is @Identifier[status:up]{up} may choose to be hit by
        an attack, even if the attack would normally miss. This is called
        "Taking the hit". They cannot choose to take a critical
        hit.</p><p>Shields have special rules regarding if a creature can
        attack. Shields always have the @Identifier[property:blocking]{blocking
        property}. But different types of shields have additional rules and
        @Pack[teriock.properties]{properties} that govern what can be used with
        them.</p><dl><dt>@Identifier[equipment:buckler-shield]{Buckler
        Shields}</dt>

        <dd>Any type of item can be held in an arm
        @Identifier[keyword:using]{using} this.</dd>

        <dt>@Identifier[equipment:large-shield]{Large Shields}</dt>

        <dd>Any type of item can be held in an arm that's
        @Identifier[keyword:using]{using}
        @Identifier[property:large-shielding]{large shielding equipment}. But
        only @Identifier[property:small]{small equipment} can be used to attack
        or @Identifier[core:block-interaction]{block}.</dd>

        <dt>@Identifier[equipment:tower-shield]{Tower Shields}</dt>

        <dd>Only @Identifier[property:small]{small equipment} can be held in an
        arm that's @Identifier[keyword:using]{using}
        @Identifier[property:tower-shielding]{tower shielding equipment}. But
        but no @Pack[teriock.equipment]{equipment} can be used to attack or
        @Identifier[core:block-interaction]{block}.</dd></dl><h2>Multiple
        Attacks</h2><p>The first @Identifier[core:attack-interaction]{attack}
        you make in a given @Identifier[core:turns]{turn} has no penalty to hit.
        Each subsequent @Identifier[core:attack-interaction]{attack} you make
        accrues some cumulative <b>attack penalty</b> (AP) which will apply to
        future attacks made in the same @Identifier[core:turns]{turn}. The value
        of the penalty that's added is the AP of the
        @Pack[teriock.equipment]{equipment} or @Pack[teriock.bodyParts]{body
        part} you @Identifier[core:attack-interaction]{attack} with. Unless
        otherwise noted, an @Identifier[core:attack-interaction]{attack} has an
        AP of -3. This is the AP for @Wiki[Category:Missile delivery
        abilities]{missile attacks} as well as any other
        @Identifier[core:attack-interaction]{attack} where an -3 isn't stated.
        Your attack penalty resets to 0 at the end of each
        @Identifier[core:turns]{turn} (not just your own).</p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/complete-attack-block-interaction.svg"></p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: armorClass000000
    _key: '!journal.pages!core000000000000.armorClass000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Armor Class
    system:
      identifier: armor-class
      img: systems/teriock/src/icons/core-rules/armor-class.webp
    text:
      content: >-
        <p>All
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} has
        an <b>armor value</b> referred to as its <b>AV</b>. When worn, this
        gives you an <b>armor class</b> (or <b>AC</b>) of 10 + AV. These numbers
        may seem low for people familiar with other systems, but that's because
        @Identifier[core:block-interaction]{blocking} is a core part of the
        game. Some abilities such as
        @Identifier[ability:unbreachability]{Unbreachability} will improve a
        creature's AC regardless of what
        @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} they
        are wearing. In <a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://www.teriock.com/">Teriock</a>
        Online, AV <i>does not stack</i>. This means if you have an ability like
        @Identifier[ability:natural-hide]{Natural Hide} and then don
        @Identifier[equipment:leather-armor]{leather armor} that your AC does
        not change.</p><p>Many classes also have a <b>maximum AV</b> they can
        wear.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: auraDelivery0000
    _key: '!journal.pages!core000000000000.auraDelivery0000'
