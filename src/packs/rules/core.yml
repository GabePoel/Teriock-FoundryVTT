  - _id: attributes000000
    _key: '!journal.pages!core000000000000.attributes000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Attributes
    system:
      identifier: attributes
      img: icons/sundries/documents/document-official-capital.webp
    text:
      content: >-
        <p>In <a target="_blank" rel="nofollow noreferrer noopener"
        class="external text" href="https://www.teriock.com/">Teriock</a>
        Online, <b>attributes</b> are set by
        @Pack[teriock.abilities]{abilities}. The first three attributes were
        chosen because they're useful to have and we have good scaling abilities
        for them in live action <a target="_blank" rel="nofollow noreferrer
        noopener" class="external text"
        href="https://www.fanwar.com/">FanWar</a> already. The latter two were
        set because they were the minimum needed to make other
        @Pack[teriock.abilities]{abilities} work. The one exception is SNK,
        which is determined by @Identifier[core:size]{SIZE}.</p><h2>The
        Attributes</h2><h3>Intelligence (INT)</h3><p>A creature's intelligence
        (abbreviated as <b>INT</b>) is a measure of its mental acuity. It has no
        standard intrinsic mechanical effects on its own. By default, a
        creature's INT is 0, but there are @Wiki[Category:INT setting
        abilities]{various abilities that set it to different
        values}.</p><h3>Strength (STR)</h3><p>A creature's strength (abbreviated
        as <b>STR</b>) is a measure of its capacity to lift and carry other
        objects. By default, a creature's STR is 0, but there are
        @Wiki[Category:STR setting abilities]{various abilities that set it to
        different values}.</p><h4>Carrying Capacity</h4><p>How much a creature
        can lift and carry is determined by its @Identifier[core:strength]{STR}
        and @Identifier[core:size]{SIZE}.</p><table class="wikitable">

        <caption>Carrying Capacity Under Size 5

        </caption>

        <tbody><tr>

        <th>Amount in Pounds</th>

        <th>Effect Upon Hitting Threshold

        </th></tr>

        <tr>

        <td>65 + (20 × @Identifier[core:strength]{STR})</td>

        <td>@Identifier[status:encumbered]{Lightly Encumbered}

        </td></tr>

        <tr>

        <td>130 + (40 × @Identifier[core:strength]{STR})</td>

        <td>@Identifier[status:encumbered]{Heavily Encumbered}

        </td></tr>

        <tr>

        <td>195 + (60 × @Identifier[core:strength]{STR})</td>

        <td>Cannot carry anything more

        </td></tr></tbody></table><table class="wikitable">

        <caption>Carrying Capacity of Size 5 and Larger

        </caption>

        <tbody><tr>

        <th>Amount in Pounds</th>

        <th>Effect Upon Hitting Threshold

        </th></tr>

        <tr>

        <td>65 + (20 × (@Identifier[core:strength]{STR} +
        (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>@Identifier[status:encumbered]{Lightly Encumbered}

        </td></tr>

        <tr>

        <td>130 + (40 × (@Identifier[core:strength]{STR} +
        (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>@Identifier[status:encumbered]{Heavily Encumbered}

        </td></tr>

        <tr>

        <td>195 + (60 × (@Identifier[core:strength]{STR} +
        (@Identifier[core:size]{SIZE} - 4)²))</td>

        <td>Cannot carry anything more

        </td></tr></tbody></table><p>A creature may also push, drag, or lift a
        weight in pounds up to twice their carrying capacity. While pushing or
        dragging weight in excess of their carrying capacity, the creature's
        @Identifier[core:movement-speed]{movement speed} drops to 5 feet.

        The amount a creature can carry without becoming
        @Identifier[status:encumbered]{encumbered} is shown in the table
        below.</p><table class="wikitable">

