        <tr>

        <td>30</td>

        <td>13525 lb.</td>

        <td>13545 lb.</td>

        <td>13565 lb.</td>

        <td>13585 lb.</td>

        <td>13605 lb.</td>

        <td>13625 lb.</td>

        <td>13645 lb.</td>

        <td>13665 lb.</td>

        <td>13685 lb.

        </td></tr></tbody></table><h3>Movement (MOV)</h3><p>A creature's
        movement (abbreviated as <b>MOV</b>) is a measure of how quickly it can
        move. By default, a creature's MOV is 0, but there are
        @Wiki[Category:MOV setting abilities]{various abilities that set it to
        different values}.</p><h4>Movement Speed</h4><p>A creature's <b>base
        movement speed</b> determines the maximum amount they can
        @Identifier[ability:move]{Move} in a single action under normal
        conditions. It is determined by the creature's
        @Identifier[core:movement]{MOV} attribute and is equal to 30 + (10 ×
        @Identifier[core:movement]{MOV}) in feet per action. A creature's base
        movement speed alone does not actually determine how far it can move in
        practice. Every creature has speeds for different types of movement,
        such as walking, leaping, swimming, climbing, and flying. The possible
        speed adjustments are double, normal, half, quarter, and none. Moving 5
        feet at half speed uses 10 feet of movement, while moving 5 feet at
        double speed uses only 2.5 feet of movement. The following table
        summarizes the different movement speed adjustments.</p><table
        class="wikitable">

        <caption>Movement Speed Adjustments

        </caption>

        <tbody><tr>

        <th>Step</th>

        <th>Speed Adjustment</th>

        <th>Cost of Moving 5 Feet

        </th></tr>

        <tr>

        <td>4</td>

        <td>Double</td>

        <td>2.5 feet

        </td></tr>

        <tr>

        <td>3</td>

        <td>Normal</td>

        <td>5 feet

        </td></tr>

        <tr>

        <td>2</td>

        <td>Half</td>

        <td>10 feet

        </td></tr>

        <tr>

        <td>1</td>

        <td>Quarter</td>

        <td>20 feet

        </td></tr>

        <tr>

        <td>0</td>

        <td>None</td>

        <td><i>Cannot move in this way at all</i>

        </td></tr>

        </tbody></table><p>The default speed adjustments for different types of
        movement are as follows.</p><table class="wikitable">

        <caption>Default Movement Speed Adjustments

        </caption>

        <tbody><tr>

        <th>Move Type</th>

        <th>Speed Adjustment

        </th></tr>

        <tr>

        <td>Walk Speed</td>

        <td>Normal

        </td></tr>

        <tr>

        <td>Difficult Terrain Speed</td>

        <td>Half

        </td></tr>

        <tr>

        <td>Crawl Speed</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Swim Speed</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Climb Speed</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>@Identifier[status:hidden]{Hidden Speed}</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Leap Speed (horizontal)</td>

        <td>Quarter

        </td></tr>

        <tr>

        <td>Leap Speed (vertical)</td>

        <td>None

        </td></tr>

        <tr>

        <td>Fly Speed</td>

        <td>None

        </td></tr>

        <tr>

        <td>Dig Speed</td>

        <td>None

        </td></tr>

        <tr>

        <td>Dive Speed</td>

        <td>None

        </td></tr></tbody></table><h5>Special Movements</h5><p><b>Special
        movements</b> are the types of movement aren't easily described as
        traversing some distance. Instead of having a
        @Identifier[core:movement-speed]{rate}, these have a fixed amount of
        movement that they cost.</p><table class="wikitable">

        <caption>Special Movements

        </caption>

        <tbody><tr>

        <th>Name</th>

        <th>Description</th>

        <th>Cost

        </th></tr>

        <tr>

        <td>Descending</td>

        <td>You move down a vertical distance. This requires that you are
        somehow @Identifier[ability:flying]{hovering in the air} of your own
        volition.</td>

        <td>5 feet

        </td></tr></tbody></table><h3>Sneak (SNK)</h3><p>A creature's sneak
        (abbreviated as <b>SNK</b>) is a measure of how stealthy it is. By
        default, a creature's SNK is determined by its
        @Identifier[core:size]{SIZE}, but there are @Wiki[Category:SNK setting
        abilities]{various abilities that set it to different
        values}.</p><h4>SNK by SIZE</h4><p>If there's no @Wiki[Category:SNK
        setting abilities]{ability} that sets a creature's SNK, it is determined
        by its @Identifier[core:size]{SIZE} as follows.</p><table
        class="wikitable">

        <tbody><tr>

        <th>@Identifier[core:size]{SIZE}</th>

        <th>SNK

        </th></tr>

        <tr>

        <td>20+</td>

        <td>-4

        </td></tr>

        <tr>

        <td>10 - 19</td>

        <td>-3

        </td></tr>

        <tr>

        <td>6 - 9</td>

        <td>-2

        </td></tr>

        <tr>

        <td>4 - 5</td>

        <td>-1

        </td></tr>

        <tr>

        <td>3</td>

        <td>0

        </td></tr>

        <tr>

        <td>2</td>

        <td>+1

        </td></tr>

        <tr>

        <td>1</td>

        <td>+2

        </td></tr>

        <tr>

        <td>½</td>

        <td>+3

        </td></tr>

        <tr>

        <td>¼</td>

        <td>+4

        </td></tr></tbody></table><h3>Perception (PER)</h3><p>A creature's
        perception (abbreviated as <b>PER</b>) is a measure of how perceptive
        they are about the world around them. By default, a creature's PER is 0,
        but there are @Wiki[Category:PER setting abilities]{various abilities
        that set it to different values}.</p><h2>Passive Attributes</h2><p>For
        each attribute, there is an associated <b>passive attribute</b> value
        that is often used in cases where the attribute in question is relevant,
        but no check is being done.</p><table class="wikitable">

        <caption>Passive Attributes

        </caption>

        <tbody><tr>

        <th>Passive Attribute</th>

        <th>Value

        </th></tr>

        <tr>

        <td>Passive @Identifier[core:intelligence]{intelligence}</td>

        <td>10 + 2 × @Identifier[core:intelligence]{INT}

        </td></tr>

        <tr>

        <td>Passive @Identifier[core:strength]{strength}</td>

        <td>10 + 2 × @Identifier[core:strength]{STR}

        </td></tr>

        <tr>

        <td>Passive @Identifier[core:movement]{movement}</td>

        <td>10 + 2 × @Identifier[core:movement]{MOV}

        </td></tr>

        <tr>

        <td>Passive @Identifier[core:sneak]{sneak}</td>

        <td>10 + 2 × @Identifier[core:sneak]{SNK}

        </td></tr>

        <tr>

        <td>Passive @Identifier[core:perception]{perception}</td>

        <td>10 + 2 × @Identifier[core:perception]{PER}

        </td></tr></tbody></table><h2>Attribute by Ability</h2><table
