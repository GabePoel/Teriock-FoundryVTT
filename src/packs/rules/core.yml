    text:
      content: >-
        <p>The final interaction is the <b>manifest Interaction</b>. It's by far
        the simplest and is used whenever an effect "just happens". There's no
        built in way to deal with a manifest, only responses like
        @Identifier[keyword:resistance]{resistances} and
        @Identifier[keyword:immunity]{immunities}.</p><p><img
        class="interaction-routine"
        src="systems/teriock/src/assets/interaction-routines/complete-manifest-interaction.svg"></p>
      format: 1
