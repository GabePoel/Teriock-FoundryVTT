    name: Domains
    system:
      identifier: domains
      img: icons/magic/holy/prayer-hands-glowing-yellow.webp
    text:
      content: >-
        <p>Deities are categorized into different "domains" depending on their
        areas of influence, the powers they grant to their followers, and what
        they represent.</p><h2>Domain Benefits</h2><p>Several
        @Wiki[Category:Divinely powered abilities]{divinely powered abilities}
        such as @Identifier[ability:might-strike]{Might Strike},
        @Identifier[ability:righteous-aura]{Righteous Aura}, and
        @Identifier[ability:zone-of-divinity]{Zone of Divinity} have different
        effects depending on the domain of the deity that granted
        them.</p><table class="wikitable sortable">

        <caption>Benefits by Domain

        </caption>

        <tbody><tr>

        <th>Domain</th>

        <th>@Identifier[ability:might-strike]{Might Strike} Damage Type</th>

        <th>@Identifier[ability:righteous-aura]{Righteous Aura} Ability</th>

        <th>@Identifier[ability:zone-of-divinity]{Zone of Divinity} Ability

