        <p>Each @Pack[teriock.abilities]{ability} has some <b>range</b> over
        which it can be used. These depend on the @Wiki[Category:Delivery
        abilities]{delivery} and @Wiki[Category:Target abilities]{target}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: reactiveManeuver
    _key: '!journal.pages!core000000000000.reactiveManeuver'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Reactive Maneuvers
    system:
      identifier: reactive-maneuvers
      img: systems/teriock/src/icons/core-rules/reactive-maneuvers.webp
    text:
      content: >-
        <p><b>Reactive maneuvers</b> can only be done in response to some event
        that <b>triggers</b> them. Every reactive maneuver will specify what its
        <b>triggering conditions</b> are. These could be
        @Identifier[ability:tumble]{taking damage},
        @Identifier[ability:resolve-conflict]{hearing another creature speak},
        @Identifier[ability:opportunity-attack]{another creature moving away
        from you}, or anything else. Each creature has <i>only one</i>
        @Wiki[Category:Reaction abilities]{reaction} per turn. However, some
        @Wiki[Category:Reactive abilities]{reactive abilities} are
        @Wiki[Category:Free reaction abilities]{free reactions}. These have no
        limit on the number of times they can be used, so long as their
        triggering condition is met every time.</p><p>The order of reactive
        maneuver resolution is determined by a "last in, first out" stack. So if
        so if a creature casts @Identifier[ability:fire-ball]{Fire Ball}, and
        another casts @Identifier[ability:dispel-magic]{Dispel Magic}, and the
        creature that first cast @Identifier[ability:fire-ball]{Fire Ball} casts
        @Identifier[ability:dispel-magic]{Dispel Magic} on the first dispel,
        then the @Identifier[ability:fire-ball]{Fire Ball} resolves. A given
        creature can only use a given @Wiki[Category:Reactive
        abilities]{reactive ability} once within a given stack.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: rounds0000000000
    _key: '!journal.pages!core000000000000.rounds0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Rounds
    system:
      identifier: rounds
      img: systems/teriock/src/icons/core-rules/rounds.webp
    text:
      content: >-
        <p>Each <b>round</b> of combat is considered to take 5
        seconds.</p><h2>Initiative</h2><p>At the start of combat, every
        participant rolls for <b>initiative</b> ([[/roll 1d20]] +
        @Identifier[core:movement]{MOV} +
        @Identifier[core:proficiency-bonus]{P}). This determines the combatants'
        turn order, with the higher rollers acting first. If another creature
        joins the combat partway through, they roll initiative as well and can
        act at times in accordance with their roll.</p><h2>Surprise
        Rounds</h2><p>Sometimes abilities or other circumstances will allow some
        combatants to get the upper hand on their foes by surprising them at the
        start of combat. When this happens, everyone still rolls for initiative,
        but the creatures that benefit from the <b>surprise round</b> are the
        only ones that get to act. Everyone else has their turns skipped.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: revitalizing0000
    _key: '!journal.pages!core000000000000.revitalizing0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Revitalizing
    system:
      identifier: revitalizing
      img: systems/teriock/src/icons/core-rules/revitalizing.webp
    text:
      content: >-
        <p>Someone receiving <b>revitalizing</b> may instantly spend a
        @Wiki[Core:MP]{mana die} to recover that many
        @Identifier[core:hit-points-and-mana-points]{MP}. If a creature that's
        @Identifier[status:unconscious]{unconscious} receives revitalizing, they
        are @Identifier[keyword:awaken]{awakened}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: selfDelivery0000
    _key: '!journal.pages!core000000000000.selfDelivery0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Self Delivery
    system:
      identifier: self-delivery
      img: systems/teriock/src/icons/core-rules/self-delivery.webp
    text:
      content: >-
        <p>Self Sourced Abilities are the simplest ones. They have no special
        means of transmission, but simply come from the User. This is sometimes
        used as a catch-all for Abilities that don't fit with any other
        Source.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: selfTarget000000
    _key: '!journal.pages!core000000000000.selfTarget000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Self Target
    system:
      identifier: self-target
      img: systems/teriock/src/icons/core-rules/self-target.webp
    text:
      content: >-
        <p><b>Self</b> targeted @Identifier[core:abilities]{abilities} affect
        @Identifier[core:executer]{the creature that executes them}. They
        typically do not have a range specified.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: shatterCost00000
    _key: '!journal.pages!core000000000000.shatterCost00000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Shatter Cost
    system:
      identifier: shatter-cost
      img: systems/teriock/src/icons/core-rules/shatter-cost.webp
    text:
      content: >-
        <p>@Wiki[Category:Shatter cost abilities]{Abilities with the shatter
        cost} are always delivered with some sort of @Wiki[Category:Item
        delivery abilities]{item}. As a cost of using the @Wiki[Category:Shatter
        cost abilities]{ability}, the @Pack[teriock.equipment]{item} is
        @Identifier[property:shattered]{shattered}. If the item cannot be
        @Identifier[property:shattered]{shattered}, the @Wiki[Category:Shatter
        cost abilities]{ability} can still be used. The
        @Pack[teriock.equipment]{item} must not already be
        @Identifier[property:shattered]{shattered}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: sneak00000000000
    _key: '!journal.pages!core000000000000.sneak00000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.13.7
    flags:
      teriock:
        journalIcon: ms-domino-mask
    name: Sneak
    system:
      identifier: sneak
      img: systems/teriock/src/icons/core-rules/sneak.webp
    text:
      content: >-
        <p>A creature's sneak (abbreviated as <b>SNK</b>) is a measure of how
        stealthy it is. By default, a creature's SNK is determined by its
        @Identifier[core:size]{SIZE}, but there are @Wiki[Category:SNK setting
        abilities]{various abilities that set it to different values}.</p><table
        class="wikitable">

        <caption>Abilities that affect SNK

        </caption>

        <tbody><tr>

        <th>Value</th>

        <th>Ability

        </th></tr>

        <tr>

        <td>-3</td>

        <td><ul><li>@Identifier[ability:lumbering]{Lumbering}</li></ul>

        </td></tr>

        <tr>

        <td>-2</td>

        <td><ul><li>@Identifier[ability:bumbling]{Bumbling}</li></ul>

        </td></tr>

        <tr>

        <td>-1</td>

        <td><ul><li>@Identifier[ability:clumsy]{Clumsy}</li></ul>

        </td></tr>

        <tr>

        <td>0</td>

        <td><ul><li>@Identifier[ability:normal-sneak]{Normal Sneak}</li></ul>

        </td></tr>

        <tr>

        <td>+1</td>

        <td><ul><li>@Identifier[ability:hitman]{Hitman}</li><li>@Identifier[ability:sneaky]{Sneaky}</li></ul>

        </td></tr>

        <tr>

        <td>+2</td>

        <td><ul><li>@Identifier[ability:furtive]{Furtive}</li><li>@Identifier[ability:hide]{Hide}</li></ul>

        </td></tr>

        <tr>

        <td>+3</td>

        <td><ul><li>@Identifier[ability:stealth]{Stealth}</li><li>@Identifier[ability:stealthy]{Stealthy}</li></ul>

        </td></tr>

        <tr>

        <td>+4</td>

        <td><ul><li>@Identifier[ability:elusive]{Elusive}</li></ul>

        </td></tr>

        <tr>

        <td>+5</td>

        <td><ul><li>@Identifier[ability:ghostlike]{Ghostlike}</li></ul>

        </td></tr>

        <tr>

        <td>Proficiency</td>

        <td><ul><li>@Identifier[ability:hide]{Hide}</li></ul>

        </td></tr>

        <tr>

        <td>Fluency</td>

        <td><ul><li>@Identifier[ability:stealth]{Stealth}</li></ul>

        </td></tr></tbody></table><h2>SNK by SIZE</h2><p>If there's no
        @Wiki[Category:SNK setting abilities]{ability} that sets a creature's
        SNK, it is determined by its @Identifier[core:size]{SIZE} as
        follows.</p><table class="wikitable">

        <tbody><tr>

        <th>@Identifier[core:size]{SIZE}</th>

        <th>SNK

        </th></tr>

        <tr>

        <td>20+</td>

        <td>-4

        </td></tr>

        <tr>

        <td>10 - 19</td>

        <td>-3

        </td></tr>

        <tr>

        <td>6 - 9</td>

        <td>-2

        </td></tr>

        <tr>

        <td>4 - 5</td>

        <td>-1

        </td></tr>

        <tr>

        <td>3</td>

        <td>0

        </td></tr>

        <tr>

        <td>2</td>

        <td>+1

        </td></tr>

        <tr>

        <td>1</td>

        <td>+2

        </td></tr>

        <tr>

        <td>½</td>

        <td>+3

        </td></tr>

        <tr>

        <td>¼</td>

        <td>+4

        </td></tr></tbody></table>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: sightDelivery000
    _key: '!journal.pages!core000000000000.sightDelivery000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Sight Delivery
    system:
      identifier: sight-delivery
      img: systems/teriock/src/icons/core-rules/sight-delivery.webp
    text:
      content: >-
        <p>Abilities sourced by <b>sight</b> do <i>not</i> require the user to
        literally see the target with their eyeballs. While that's still
        necessary in most cases, some creatures may have some sort of
        "@Wiki[Category:Sensory effects]{blindsight}" that allows them to "see"
        other creatures even when there's no light in the environment.
        Nevertheless, these abilities always require that the user have some
        sort of direct "visibility" of the target akin to seeing them directly.
        Regardless of how exactly the user sees the target, sight abilities can
        be used over some range that <i>may not</i> actually be as far as the
        user can see. For instance, @Identifier[ability:duel]{Duel} operates by
        sight, but has a range of 30 feet even though the user may see the
        target from much further away.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: shortRest0000000
    _key: '!journal.pages!core000000000000.shortRest0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Short Rest
    system:
      identifier: short-rest
      img: systems/teriock/src/icons/core-rules/short-rest.webp
    text:
      content: >-
        <p>A short rest is a period of downtime, at least 1 hour long, during
        which a creature does nothing more strenuous than eating, drinking,
        reading, and tending to wounds. Some @Wiki[Category:Short rest
        abilities]{abilities} (such as @Identifier[ability:recover]{Recover})
        have "short rest" as their execution time. A creature may choose to do
        <i>one</i> of these during their short rest.</p><p
        class="note"><b>Note:</b> Your @Identifier[core:game-master]{GM} may
        decide on a different time period or conditions for a short rest.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: size000000000000
