  - _id: multipleAttacks0
    _key: '!journal.pages!core000000000000.multipleAttacks0'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Multiple Attacks
    system:
      identifier: multiple-attacks
      img: systems/teriock/src/icons/core-rules/multiple-attacks.webp
    text:
      content: >-
        <p>The first @Identifier[core:attack-interaction]{attack} you make in a
        given @Identifier[core:turns]{turn} has no penalty to hit. Each
        subsequent @Identifier[core:attack-interaction]{attack} you make accrues
        some cumulative <b>attack penalty</b> (AP) which will apply to future
        attacks made in the same @Identifier[core:turns]{turn}. The value of the
        penalty that's added is the AP of the
        @Pack[teriock.equipment]{equipment} or @Pack[teriock.bodyParts]{body
        part} you @Identifier[core:attack-interaction]{attack} with. Unless
        otherwise noted, an @Identifier[core:attack-interaction]{attack} has an
        AP of -3. This is the AP for @Wiki[Category:Missile delivery
        abilities]{missile attacks} as well as any other
        @Identifier[core:attack-interaction]{attack} where an -3 isn't stated.
        Your attack penalty resets to 0 at the end of each
        @Identifier[core:turns]{turn} (not just your own).</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
