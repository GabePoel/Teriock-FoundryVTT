      controls: true
      volume: 0.5
  - _id: turns00000000000
    _key: '!journal.pages!core000000000000.turns00000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-book-2
    name: Turns
    system:
      identifier: turns
      img: systems/teriock/src/icons/core-rules/turns.webp
    text:
      content: >-
        <p>On a creature's <b>turn</b>, they may make up to <i>three</i>
        <b>actions</b>. @Identifier[ability:move]{Moving},
        @Identifier[core:attack-interaction]{attacking}, and so on typically use
        some number of these actions. Creatures also have one <b>reaction</b>
        that can, in principle, be use at any time within a round. They regain
        their reaction at the start of their turn. Creatures cannot "save up"
        their actions or reactions between rounds or turns. Actions and
        reactions reset regardless of whether or not they're used.</p><p>In
        addition, some effects may begin, apply, or cease at the start or end of
        a creature's turn. These are specified within the relevant rules
        text.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: vitalsTarget0000
    _key: '!journal.pages!core000000000000.vitalsTarget0000'
    _stats:
