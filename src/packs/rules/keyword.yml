  - _id: vulnerability000
    _key: "!journal.pages!keyword000000000.vulnerability000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.14.4
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Vulnerability
    system:
      identifier: vulnerability
      img: systems/teriock/src/icons/keywords/vulnerability.webp
    text:
      content: >-
        <p>If a creature is <b>vulnerable</b> to someone or something, they
        cannot @Identifier[keyword:resistance]{resist} (including if they are
        @Identifier[keyword:hexproof]{hexproof}) that person or thing, their
        @Pack[teriock.abilities]{abilities}, @Identifier[core:damage]{damage}
        they deal, or any other @Wiki[Category:Effects]{effects} directly caused
        by them. This does not apply to indirect effects. For instance, if a
        creature were @Identifier[keyword:resistance]{resistant} to
        @Identifier[core:damage]{damage}, but vulnerable to another creature,
        they would not be able to @Identifier[keyword:resistance]{resist}
        @Identifier[core:damage]{damage} resulting from an
        @Identifier[core:attack-interaction]{attack} that creature made against
        them. However, they would @Identifier[keyword:resistance]{resist} the
        @Identifier[core:damage]{damage} dealt due to hitting the ground if that
        creature pushed them off a cliff.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
