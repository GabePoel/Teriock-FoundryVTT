pages:
  - _id: adept00000000000
    _key: "!journal.pages!keyword000000000.adept00000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Adept
    system:
      identifier: adept
      img: systems/teriock/src/icons/keywords/adept.webp
    text:
      content: >-
        <p>If you are adept at something, then doing it costs 1 less
        @Identifier[core:hit-points-and-mana-points]{MP} (with a minimum of
        0).</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: blessing00000000
    _key: "!journal.pages!keyword000000000.blessing00000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Blessing
    system:
      identifier: blessing
      img: icons/magic/holy/prayer-hands-glowing-yellow.webp
    text:
      content: >-
        <p>A <b>blessing</b> is a @Wiki[Category:Divinely powered
        abilities]{divine ability} or set of @Wiki[Category:Divinely powered
        abilities]{abilities} that is either directly granted by a divine entity
        or @Wiki[Category:Blessing granting abilities]{through some ability}
        (such as @Identifier[ability:divine-gift]{Divine Gift} or
        @Identifier[ability:blessing]{Blessing}) that connects to one. Not all
        @Wiki[Category:Divinely powered abilities]{divinely powered abilities}
        count as blessings. It should be specifically noted when something is a
        blessing.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: awaken0000000000
    _key: "!journal.pages!keyword000000000.awaken0000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Awaken
    system:
      identifier: awaken
      img: systems/teriock/src/icons/keywords/awaken.webp
    text:
      content: >-
        <p>A being being awakened goes from
        @Identifier[condition:unconscious]{unconscious} to
        @Identifier[rule:conscious]{conscious}. This does <i>not</i> count as
        @Identifier[core:healing]{healing} and does not necessarily restore any
        @Identifier[core:hit-points-and-mana-points]{HP} nor other
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{types of
        damage}. If the creature being awakened had less than 1
        @Identifier[core:hit-points-and-mana-points]{HP}, they now have 1.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: curse00000000000
    _key: "!journal.pages!keyword000000000.curse00000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Curse
    system:
      identifier: curse
      img: systems/teriock/src/icons/keywords/curse.webp
    text:
      content: >-
        <p>A <b>curse</b> is a @Wiki[Category:Flaw abilities]{flaw} that remains
        on a creature even if whatever gave the curse is no longer present. A
        creature can only have up to three curses on them. Once they have a
        fourth curse, the curses all blend together into more powerful curse as
        determined by the @Identifier[core:game-master]{GM}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: boosted000000000
    _key: "!journal.pages!keyword000000000.boosted000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Boosted
    system:
      identifier: boosted
      img: systems/teriock/src/icons/keywords/boosted.webp
    text:
      content: >-
        <p>When an @Identifier[core:attack-interaction]{attack} is boosted, one
        more of the largest damage die is added to the
        @Identifier[core:damage]{damage roll}. If there's multiple damage dice
        of the same size that would tie for being the largest, combine all the
        different
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} together in the damage die that is added.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: effective0000000
    _key: "!journal.pages!keyword000000000.effective0000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Effective
    system:
      identifier: effective
      img: systems/teriock/src/icons/keywords/effective.webp
    text:
      content: >-
        <p>An <b>effective</b> @Pack[teriock.abilities]{ability} is identical to
        the normal version of it, except it is not considered to be
        @UUID[Compendium.teriock.rules.JournalEntry.class00000000000]{standard},
        a @Wiki[Category:Spells]{spell}, nor a @Wiki[Category:Skills]{skill}. It
        is not associated with any @Pack[teriock.classes]{class} and does not
        have any of the @Identifier[core:power-sources]{power sources} (nor
        power-associated @Wiki[Category:Effects]{effect types}) of the base
        @Pack[teriock.abilities]{ability}. New
        @Identifier[core:power-sources]{power sources} will be specified instead
        (such as "@Wiki[Category:Divinely powered abilities]{Divine} Effective
        @Identifier[ability:lightning-ray]{Lightning Ray}"). If no
        @Identifier[core:power-sources]{power source} is specified, then the
        @Pack[teriock.abilities]{ability} is @Wiki[Category:Martially powered
        abilities]{martial}. The @Pack[teriock.abilities]{ability} may also be
        specified to be a @Wiki[Category:Spells]{spell},
        @Wiki[Category:Skills]{skill}, or anything else as appropriate.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: expertise0000000
    _key: "!journal.pages!keyword000000000.expertise0000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Expertise
    system:
      identifier: expertise
      img: icons/skills/movement/arrows-up-trio-red.webp
    text:
      content: >-
        <p>If you make a @Identifier[core:tradecrafts]{check} with
        <b>expertise</b> then you do so with an additional +2 bonus. This is
        referred to as being an <b>expert</b>. This supersedes the bonus gained
        from being @Identifier[keyword:talented]{talented} and does not stack
        with it. If a @Identifier[core:tradecrafts]{check} would have expertise
        from multiple sources, then it still only gains the +2 bonus once.
        However, expert stacks with other bonuses, such as those granted by
        @Identifier[core:proficiency-bonus]{proficiency} or
        @Identifier[core:tradecraft-fluencies]{fluency}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: deboosted0000000
    _key: "!journal.pages!keyword000000000.deboosted0000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Deboosted
    system:
      identifier: deboosted
      img: systems/teriock/src/icons/keywords/deboosted.webp
    text:
      content: >-
        <p>When an @Identifier[core:attack-interaction]{attack} is deboosted,
        the largest damage die is removed from the
        @Identifier[core:damage]{damage roll}. If there are multiple damage dice
        with different
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types}, a random one is removed.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: gifted0000000000
    _key: "!journal.pages!keyword000000000.gifted0000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Gifted
    system:
      identifier: gifted
      img: systems/teriock/src/icons/keywords/gifted.webp
    text:
      content: >-
        <p>If an @Pack[teriock.abilities]{ability} is <b>gifted</b>, it costs 1
        additional @Identifier[core:hit-points-and-mana-points]{MP} per use. If
        it is @Wiki[Category:Passive abilities]{passive}, then it takes a
        @Wiki[Category:Single action abilities]{single action} to execute and
        has a duration of 1 minute.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: armorVoiding0000
    _key: "!journal.pages!keyword000000000.armorVoiding0000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Armor Voiding
    system:
      identifier: armor-voiding
      img: systems/teriock/src/icons/keywords/armor-voiding.webp
    text:
      content: >-
        <p>If an @Identifier[core:attack-interaction]{attack} is <b>armor
        voiding</b> ("AV0"), it has a +2 to hit. This doesn't stack. If an
        @Identifier[core:attack-interaction]{attack} would be AV0 for multiple
        reasons, it still only has a +2 to hit.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: bearing000000000
    _key: "!journal.pages!keyword000000000.bearing000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Bearing
    system:
      identifier: bearing
      img: systems/teriock/src/icons/keywords/bearing.webp
    text:
      content: >-
        <p>If a creature is carrying some item on their person then they are
        considered to be bearing it and are referred to as the item's "bearer".
        This is the case regardless of <i>how</i> the creature carries the item
        or if they are @Identifier[keyword:using]{using} it.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: hexseal000000000
    _key: "!journal.pages!keyword000000000.hexseal000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: mdi-shield-half-full
    name: Hexseal
    system:
      identifier: hexseal
      img: systems/teriock/src/icons/keywords/hexseal.webp
    text:
      content: >-
        <p>If a creature is <b>hexsealed</b> to something, then it is as though
        they are @Identifier[keyword:immunity]{immune} to it, except that they
        can choose whether or not they take it.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: illusionary00000
    _key: "!journal.pages!keyword000000000.illusionary00000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Illusionary
    system:
      identifier: illusionary
      img: systems/teriock/src/icons/keywords/illusionary.webp
    text:
      content: >-
        <p>If an effect is Illusionary, then its presence is merely a trick of
        the mind and it's not really there. Illusions can have different levels
        of strength.</p><dl><dt>Minor Illusion</dt>

        <dd>A Minor Illusion is a purely sensory experience that can be seen,
        heard, or felt. It can not, however, be physically touched or interacted
        with. A Minor Illusion can be detected with
        @Identifier[ability:detect-illusion]{Detect Illusion} or disbelieved
        with @Identifier[ability:disbelieve]{Disbelieve} (DC 6
        @Wiki[Core:INT]{INT} @Identifier[core:feat-interaction]{feat save}). If
        disbelieved, the creature disbelieving can choose to no longer perceive
        the illusion.</dd>

        <dt>Full Illusion</dt>

        <dd>A Full Illusion can be touched and interacted with, but it is still
        not real. Nevertheless, Full Illusions can be quite dangerous if they
        are not recognized as such and can still cause physical harm. A Full
        Illusion can be detected with
        @Identifier[ability:detect-illusion]{Detect Illusion} or disbelieved
        with @Identifier[ability:disbelieve]{Disbelieve} (DC 12
        @Wiki[Core:INT]{INT} @Identifier[core:feat-interaction]{feat save}). If
        disbelieved, the creature still perceives the illusion, but is no longer
        affected by it.</dd>

        <dt>Greater Illusion</dt>

        <dd>A Greater Illusion is a powerful effect that can be touched and
        interacted with and that is very hard to overcome. A Greater Illusion
        can be detected with @Identifier[ability:detect-illusion]{Detect
        Illusion} or disbelieved with
        @Identifier[ability:disbelieve]{Disbelieve} (DC 18 @Wiki[Core:INT]{INT}
        @Identifier[core:feat-interaction]{feat save}). If disbelieved, the
        creature disbelieving it has only 5 seconds of respit where they are not
        affected by the illusion. After that, the illusion is back to full
        strength.</dd></dl><p>The @Identifier[core:game-master]{GM} may choose
        to change the DC of the @Identifier[ability:disbelieve]{Disbelieve}
        check based on the complexity or power of the illusion.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: hexproof00000000
    _key: "!journal.pages!keyword000000000.hexproof00000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: mdi-shield-half-full
    name: Hexproof
    system:
      identifier: hexproof
      img: systems/teriock/src/icons/keywords/hexproof.webp
    text:
      content: >-
        <p>If a creature is <b>hexproof</b> to something, then it is as though
        they are @Identifier[keyword:resistance]{resistant} to it, except that
        they can choose whether or not they make a
        @Identifier[keyword:resistance]{resistance save}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: immunity00000000
    _key: "!journal.pages!keyword000000000.immunity00000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: mdi-shield-half-full
    name: Immunity
    system:
      identifier: immunity
      img: systems/teriock/src/icons/keywords/immunity.webp
    text:
      content: >-
        <p>If you are <b>immune</b> to something, it does not work against you
        at all. A @Identifier[keyword:warded]{warded}
        @Identifier[core:abilities]{ability} does not cut through
        immunities.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: invoke0000000000
    _key: "!journal.pages!keyword000000000.invoke0000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Invoke
    system:
      identifier: invoke
      img: icons/magic/fire/flame-burning-hand-white.webp
    text:
      content: >-
        <p>If an @Wiki[Category:Invoked abilities]{ability is invoked} then it
        requires that the creature executing it be wielding a
        @Identifier[property:magelore]{magelore item} and that the
        @Wiki[Category:Invoked abilities]{ability} has @Wiki[Category:Verbal
        component abilities]{verbal} and @Wiki[Category:Somatic component
        abilities]{somatic} components.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: innate0000000000
    _key: "!journal.pages!keyword000000000.innate0000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Innate
    system:
      identifier: innate
      img: icons/magic/perception/hand-eye-pink.webp
    text:
      content: >-
        <p>Some @Pack[teriock.creatures]{species} have <b>innate</b> ranks.
        These are similar to the ones earned by
        @Identifier[core:leveling-up]{leveling up} except that they no not
        provide any @Identifier[core:hit-points-and-mana-points]{hit dice nor
        mana dice} and do not count towards learning @Wiki[Category:Guildmaster
        abilities]{guildmaster abilities}. @Pack[teriock.creatures]{Creatures}
        are proficient in the @Pack[teriock.abilities]{abilities} provided by
        their innate ranks.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: inept00000000000
    _key: "!journal.pages!keyword000000000.inept00000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Inept
    system:
      identifier: inept
      img: systems/teriock/src/icons/keywords/inept.webp
    text:
      content: >-
        <p>If a creature is inept at something, then doing it costs them 1
        additional @Identifier[core:hit-points-and-mana-points]{MP}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: improved00000000
    _key: "!journal.pages!keyword000000000.improved00000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Improved
    system:
      identifier: improved
      img: systems/teriock/src/icons/keywords/improved.webp
    text:
      content: >-
        <p>An Improved @Pack[teriock.abilities]{ability} is one that is
        identical to some other @Pack[teriock.abilities]{ability}, but that is
        better in some way. The Improved @Pack[teriock.abilities]{ability} still
        counts as the original @Pack[teriock.abilities]{ability} for all other
        purposes (being @Identifier[keyword:incapable]{incapable} of it, making
        it @Identifier[keyword:adept]{adept}, etc.).</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: incapable0000000
    _key: "!journal.pages!keyword000000000.incapable0000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Incapable
    system:
      identifier: incapable
      img: systems/teriock/src/icons/keywords/incapable.webp
    text:
      content: >-
        <p>If a creature is Incapable of something, then they are not able to do
        it even if some effect would otherwise make them able to.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: resistance000000
    _key: "!journal.pages!keyword000000000.resistance000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: mdi-shield-half-full
    name: Resistance
    system:
      identifier: resistance
      img: systems/teriock/src/icons/keywords/resistance.webp
    text:
      content: >-
        <p>When a creature would be affected by something they are
        <b>resistant</b> to, they make a resistance save. This is a DC 10
        [[/roll d20]] roll that they add their
        @Identifier[core:proficiency-bonus]{proficiency bonus} to if they are
        @Identifier[core:proficiency-bonus]{proficient} in the
        @Identifier[core:abilities]{ability} that grants them their resistance.
        On a success, the target is not affected by whatever was going to happen
        to them. On a fail, they are. If a resistance is granted by a
        @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{condition},
        it is typically rolled with
        @Identifier[core:proficiency-bonus]{proficiency}. Resistance saves
        cannot be failed automatically. Only one resistance save can be
        attempted per @Identifier[core:interactions]{interaction}. A resistance
        cannot stop a @Identifier[keyword:warded]{warded}
        @Identifier[core:abilities]{ability}. If an item <i>itself</i> is
        resistant to something (such as if it is
        @Identifier[property:durable]{durable}) and it is being
        @Identifier[keyword:using]{used} by a creature that's
        @Identifier[ability:attune]{attuned} to it, then the save is made with
        its @Identifier[keyword:using]{user's}
        @Identifier[core:proficiency-bonus]{proficiency bonus}. Otherwise, it is
        made without a @Identifier[core:proficiency-bonus]{proficiency
        bonus}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: limited000000000
    _key: "!journal.pages!keyword000000000.limited000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Limited
    system:
      identifier: limited
      img: systems/teriock/src/icons/keywords/limited.webp
    text:
      content: >-
        <p>A <b>limited</b> @Pack[teriock.abilities]{ability} is one that is
        identical to some other @Pack[teriock.abilities]{ability}, but that is
        worse in some way. The limited @Pack[teriock.abilities]{ability} still
        counts as the original @Pack[teriock.abilities]{ability} for all other
        purposes (being @Identifier[keyword:incapable]{incapable} of it, making
        it @Identifier[keyword:adept]{adept}, etc.).</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: mastery000000000
    _key: "!journal.pages!keyword000000000.mastery000000000"
    _stats:
      coreVersion: "14"
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-format-quote
    name: Mastery
    system:
      identifier: mastery
      img: icons/skills/movement/arrows-up-trio-red.webp
    text:
      content: >-
        <p>If you make a @Identifier[core:tradecrafts]{check} with
        <b>mastery</b> then you do so with an additional +3 bonus. This is
        referred to as being a <b>master</b>. This supersedes the bonus gained
        from being @Identifier[keyword:talented]{talented} or an
        @Identifier[keyword:expertise]{expert} and does not stack with it. If a
        @Identifier[core:tradecrafts]{check} would have mastery from multiple
        sources, then it still only gains the +3 bonus once. However, master
        stacks with other bonuses, such as those granted by
        @Identifier[core:proficiency-bonus]{proficiency} or
        @Identifier[core:tradecraft-fluencies]{fluency}.</p>
      format: 1
    title:
      level: 1
      show: true
