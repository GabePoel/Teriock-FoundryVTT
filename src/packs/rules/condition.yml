  - _id: transformed00000
    _key: '!journal.pages!condition0000000.transformed00000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Transformed
    system:
      identifier: transformed
      img: systems/teriock/src/icons/conditions/transformed.webp
    text:
      content: >-
        <p>If a creature is <b>transformed</b> then they are in a different form
        than their original form. Transformations can have different levels of
        strength.</p><dl><dt>Minor Transformation</dt>

        <dd>A minor transformation is a transformation that is not very strong
        and is usually temporary. It can be reverted with a
        @Identifier[ability:treeform-ball]{Treeform Ball}, a
        @Identifier[ability:force-revert]{Force Revert}, or with a
        @Identifier[ability:self-revert]{Self Revert} (DC 6 @Wiki[Core:INT]{INT}
        @Identifier[core:feat-interaction]{feat save}). Minor transformations do
        not change creatures' @Identifier[core:intelligence]{INT} nor maximum
        @Identifier[core:hit-points-and-mana-points]{MP}. Minor transformations
        cannot be "layered". That is, if a creature is minorly transformed into
        one form, and then minorly transformed into another, reverting from the
        second form puts them back into their original state. They do not revert
        into the first form they transformed into. Creatures are not
        @Identifier[core:proficiency-bonus]{proficient} in
        @Pack[teriock.abilities]{abilities} they gain from being minorly
        transformed.</dd>

        <dt>Full Transformation</dt>

        <dd>A full transformation is stronger than a minor transformation. It
        cannot be reverted with a @Identifier[ability:treeform-ball]{Treeform
        Ball} or a @Identifier[ability:force-revert]{Force Revert}. But it can
        be reverted with a @Identifier[ability:self-revert]{Self Revert} (DC 12
        @Wiki[Core:INT]{INT} @Identifier[core:feat-interaction]{feat save}).
        Full transformations change creatures'
        @Identifier[core:intelligence]{INT} from that of their original form to
        the one they're transformed into at a rate of 1 per month. It takes the
        same amount of time to recover if reverted. A creature's maximum
        @Identifier[core:hit-points-and-mana-points]{MP} does not change as a
        result of a full transformation until their
        @Identifier[core:intelligence]{INT} has fully changed. Similarly to
        minor transformations, full transforms can't be layered on top of each
        other. However, a fully transformed creature can then be minorly
        transformed. If that minor transformation is reverted, the creature then
        returns to their <i>fully transformed</i> state. Creatures are not
        @Identifier[core:proficiency-bonus]{proficient} in
        @Pack[teriock.abilities]{abilities} they gain from being fully
        transformed.</dd>

        <dt>Greater Transformation</dt>

        <dd>A greater transformation is even stronger than a full
        transformation. It can be reverted with a
        @Identifier[ability:self-revert]{Self Revert} (DC 18
        @Wiki[Core:INT]{INT} @Identifier[core:feat-interaction]{feat save}).
        Greater transformations immediately change creature's
        @Identifier[core:intelligence]{INT} and maximum
        @Identifier[core:hit-points-and-mana-points]{MP} to that of whatever
        they're transformed into. The original
        @Identifier[core:intelligence]{INT} and maximum
        @Identifier[core:hit-points-and-mana-points]{MP} are instantly restored
        upon reverting from a greater transformation. As with minor and full
        transformations, greater transformations do not layer on top of each
        other. However, a full or minor transformation can be layered on top of
        a greater in the same way that a minor transformation can be layered on
        a full one.</dd></dl>
      format: 1
    title:
      level: 1
      show: true
    type: rule
