  - _id: hacked0000000000
    _key: '!journal.pages!condition0000000.hacked0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Hacked
    system:
      identifier: hacked
      img: systems/teriock/src/icons/conditions/hacked.webp
    text:
      content: >-
        <p>A creature that's <b>hacked</b> is one suffering from
        @Identifier[damage:hack]{hack damage}.

        <b>Hack</b> damage does not reduce
        @Identifier[core:hit-points-and-mana-points]{HP}. Instead, it applies
        different @Wiki[Category:Conditions]{conditions} or effects to creatures
        depending on the part of their body being hacked. Hack damage will
        always have some body part specified.</p><dl><dt>Arm Hacks</dt>

        <dd><b>1st Arm Hack:</b> @Wiki[Category:Attack abilities]{Attacks} you
        make with handheld @Wiki[Category:Item delivery abilities]{items},
        @Wiki[Category:Missile delivery abilities]{missiles}, or your
        @Wiki[Category:Hand delivery abilities]{hands} are done with
        @Identifier[core:disadvantage]{disadvantage}. And you cannot make any
        @Wiki[Category:Attack abilities]{attacks} requiring two hands (such as
        those with @Identifier[property:two-handed]{two-handed}
        @Wiki[Category:Weapons]{weapons}). You also cannot execute
        @Wiki[Category:Somatic component abilities]{somatic abilities} unless
        both your hands are free.</dd>

        <dd><b>2nd Arm Hack:</b> You now cannot @Wiki[Category:Attack
        abilities]{attack}, @Wiki[Category:Block abilities]{block}, nor use any
        other @Pack[teriock.abilities]{abilities} with handheld
        @Wiki[Category:Item delivery abilities]{items}, @Wiki[Category:Missile
        delivery abilities]{missiles}, or your @Wiki[Category:Hand delivery
        abilities]{hands} at all. You also cannot execute @Wiki[Category:Somatic
        component abilities]{somatic abilities} at all.</dd>

        <dt>Leg Hacks</dt>

        <dd><b>1st Leg Hack:</b> You are @Identifier[status:slowed]{slowed} and
        @Wiki[Category:Attack abilities]{attacks} you make with your
        @Identifier[body:foot]{feet} are done with
        @Identifier[core:disadvantage]{disadvantage}.</dd>

        <dd><b>2nd Leg Hack:</b> You are
        @Identifier[status:immobilized]{immobilized} and cannot make
        @Wiki[Category:Attack abilities]{attacks} with your
        @Identifier[body:foot]{feet}.</dd>

        <dt>Vitals Hacks</dt>

        <dd>The effects of Vitals Hacks have even more granularity. Vitals Hacks
        will always have a more specific body part specified and apply effects
        accordingly.</dd>

        <dd><b>Vitals Ear Hack:</b> You are @Identifier[status:deaf]{deaf}.</dd>

        <dd><b>Vitals Eye Hack:</b> You are
        @Identifier[status:blind]{blind}.</dd>

        <dd><b>Vitals Nose Hack:</b> You are
        @Identifier[status:anosmatic]{anosmatic}.</dd>

        <dd><b>Vitals Mouth Hack:</b> You are @Identifier[status:mute]{mute} and
        cannot make @Wiki[Category:Attack abilities]{attacks} with your
        @Pack[teriock.equipment]{mouth}.</dd>

        <dt>Body Hacks</dt>

        <dd>You are @Identifier[status:immobile]{immobile}.</dd></dl><p>Despite
        not reducing @Identifier[core:hit-points-and-mana-points]{HP}, hack
        damage can be @Identifier[core:healing]{healed}.
        @Identifier[core:healing]{Healing} hack damage does not typically
        consume @Identifier[core:hit-points-and-mana-points]{hit dice}. However,
        one @Identifier[core:hit-points-and-mana-points]{hit die} worth of
        @Identifier[core:healing]{healing} only mends one Hack. Each type of
        Vitals Hack must be @Identifier[core:healing]{healed} independently.
        Arms and legs must receive an amount of
        @Identifier[core:healing]{healing} equal to the amount of Hacks they've
        taken in order to be fully @Identifier[core:healing]{healed}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: hidden0000000000
    _key: '!journal.pages!condition0000000.hidden0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Hidden
    system:
      identifier: hidden
      img: systems/teriock/src/icons/conditions/hidden.webp
    text:
      content: >-
        <p>When you are <b>hidden</b>, you cannot be seen. This condition is
        always associated with some <b>hidden DC</b> it takes to see you. Unless
        otherwise noted, it's your @Wiki[Core:Passive Attributes]{passive}
        @Identifier[core:sneak]{sneak} (10 + 2 × @Identifier[core:sneak]{SNK}).
        Other creatures will only be able to see you (or know that you're there)
        if they use @Identifier[ability:perceive]{some relevant ability} that
        lets them do so, if their @Wiki[Core:Passive Attributes]{passive}
        @Identifier[core:perception]{perception} (10 + 2 ×
        @Identifier[core:perception]{PER}) is greater than your hidden DC, or if
        enabled to by some other effect. In most cases, a creature trying to see
        you will have some check which must pass your hidden DC.</p><p>While
        hidden, if someone knows where you are but is unable to see you, any
        @Wiki[Category:Attack abilities]{attacks} they make against you are done
        with @Identifier[core:disadvantage]{disadvantage}. Similarly, any
        @Wiki[Category:Attack abilities]{attacks} you make against someone that
        can't see you are done with @Identifier[core:advantage]{advantage}.
        @Wiki[Category:Attack abilities]{Attacking} causes you to no longer be
        hidden.</p><p>While hidden, you must not @Identifier[ability:move]{Move}
        faster than your @Identifier[core:movement-speed]{hidden speed}. Any
        other @Wiki[Category:Movement effects]{movement effects} require a DC 15
        @Identifier[core:sneak]{SNK} @Identifier[core:feat-interaction]{feat
        save} to remain hidden.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
