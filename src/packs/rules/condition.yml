        journalIcon: ms-cyclone
    name: Anosmatic
    system:
      identifier: anosmatic
      img: icons/creatures/slimes/slime-face-hollow-green.webp
    text:
      content: >-
        <p>If you are <b>anosmatic</b> then you have no sense of smell and
