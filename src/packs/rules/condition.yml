    text:
      content: >-
        <p>A creature that's <b>unconscious</b> is incapacitated. They are
        @Identifier[status:down]{down}, but @Identifier[status:alive]{alive}.
        They have no awareness of their surroundings, and can't use any
        non-passive @Pack[teriock.abilities]{abilities}. They also automatically
        fail any @Wiki[Category:Feat abilities]{feat saves}. A creature that's
        unconscious with 0 or greater
        @Identifier[core:hit-points-and-mana-points]{HP}, but not
        @Identifier[status:asleep]{asleep} will
        @Identifier[keyword:awaken]{awaken} after 1 hour.</p>
