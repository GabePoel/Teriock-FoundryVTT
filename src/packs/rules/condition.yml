    text:
      content: >-
        <p>If you are <b>blind</b>, then you cannot see anything and any
        @Wiki[Category:Attack abilities]{attack} you make against another
        creature is done with @Identifier[core:disadvantage]{disadvantage}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: conscious0000000
    _key: '!journal.pages!condition0000000.conscious0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Conscious
    system:
      identifier: conscious
      img: systems/teriock/src/icons/conditions/conscious.webp
    text:
      content: >-
        <p>A creature that's <b>conscious</b> is aware of its surroundings and
        can respond to stimuli. It can perceive its environment, process
        information, and act upon it. A conscious creature can also communicate,
        make decisions, and exhibit complex behaviors. This is the default state
        for most creatures. Any type of creature, including
        @Wiki[Category:Undead creatures]{undead} and @Wiki[Category:Construct
        creatures]{constructs} is able to be conscious.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: charmed000000000
    _key: '!journal.pages!condition0000000.charmed000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Charmed
    system:
      identifier: charmed
      img: systems/teriock/src/icons/conditions/charmed.webp
    text:
      content: >-
        <p>A creature that is <b>charmed</b> has their allegiances switched.
        They will fight their former allies and defend their former foes. This
        does not change the alignment of the creature, only their loyalties. A
        charmed creature is visibly so, they have a glazed and bloodshot look in
        their eyes.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: dead000000000000
    _key: '!journal.pages!condition0000000.dead000000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Dead
    system:
      identifier: dead
      img: systems/teriock/src/icons/conditions/dead.webp
    text:
      content: >-
        <p>Creatures become <b>dead</b> if they are half their maximum
        @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} below zero
        @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} respectively. They
        cannot have their @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} reduced below this
        value. If a creature is @Identifier[status:down]{down} and at negative
        @Identifier[core:hit-points-and-mana-points]{HP} for more than 10
        minutes, they die.</p><p>When a creature dies and is
        @Wiki[Category:Revival effects]{revived}, they release control over
        anything that is no longer on their person, freeing up the corresponding
        @Identifier[core:presence]{presence} in the process. This includes
        @Pack[teriock.equipment]{equipment} that is no longer equipped, mounts
        that no longer with them, and so on. They also must pull from the
        @Identifier[core:death-bag]{death bag}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: criticallyWounde
    _key: '!journal.pages!condition0000000.criticallyWounde'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Critically Wounded
    system:
      identifier: critically-wounded
      img: systems/teriock/src/icons/conditions/critically-wounded.webp
    text:
      content: >-
        <p>Creatures become <b>critically wounded</b> when they are 1
        @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} above half their
        maximum @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} below zero but also
        have at least zero @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} respectively. This is 1
        @Identifier[core:hit-points-and-mana-points]{HP} or
        @Identifier[core:hit-points-and-mana-points]{MP} above the threshold for
        being dead. A creature that's critically wounded cannot be
        @Identifier[keyword:awaken]{awakened}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: disguised0000000
    _key: '!journal.pages!condition0000000.disguised0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
