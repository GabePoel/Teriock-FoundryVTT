    name: Disguised
    system:
      identifier: disguised
      img: systems/teriock/src/icons/conditions/disguised.webp
    text:
      content: >-
        <p>A creature that's <b>disguised</b> is not
        @Identifier[status:transformed]{transformed}, but still appears
        differently than their natural form. Any creature can detect if someone
        is disguised using @Identifier[ability:check-disguise]{Check
        Disguise}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: down000000000000
    _key: '!journal.pages!condition0000000.down000000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Down
    system:
      identifier: down
      img: systems/teriock/src/icons/conditions/down.webp
    text:
      content: >-
        <p>A creature is <b>down</b> if it is
        @Identifier[status:unconscious]{unconscious} or
        @Identifier[status:dead]{dead}. The act of going from
        @Identifier[status:up]{up} to down is called "dropping". If a creature
        is down and at negative @Identifier[core:hit-points-and-mana-points]{HP}
        for more than 10 minutes, they @Identifier[status:dead]{die}. When a
        creature goes down, they are usually also knocked
        @Identifier[status:prone]{prone}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: deaf000000000000
    _key: '!journal.pages!condition0000000.deaf000000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Deaf
    system:
      identifier: deaf
      img: systems/teriock/src/icons/conditions/deaf.webp
    text:
      content: >-
        <p>If you are <b>deaf</b> then you have no sense of hearing and cannot
        use any @Pack[teriock.abilities]{abilities} that would require one.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: dueling000000000
    _key: '!journal.pages!condition0000000.dueling000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Dueling
    system:
      identifier: dueling
      img: systems/teriock/src/icons/conditions/dueling.webp
    text:
      content: >-
        <p>Creatures that are <b>dueling</b> each other are
        @Wiki[Category:Spiritual effects]{spiritually} linked to each other in a
        state that's slightly out of phase with everyone else. This doesn't have
        any inherent mechanical effects in and of itself, but it implies a
        structure for how those @Pack[teriock.creatures]{creatures} interact
        with each other and the world around them that may be interacted with by
        @Wiki[Category:Duel modifying effects]{duel modifying effects} or other
        @Pack[teriock.abilities]{abilities}. The term "in a duel" is often used
        to refer to a creature that is dueling. This does <i>not</i> mean that
        the "duel" must have been started by
        @Identifier[ability:duel]{Duel}.</p><p>If a creature that is dueling
        becomes incapacitated, then they are considered to have "lost" the duel.
        If a dueling creature incapacitates themselves, they are considered to
        have "forfeited" the duel which in turn also makes them count as
        "losing". If a dueling creature @Wiki[Category:Attack
        abilities]{attacks} a creature that they are not dueling, that is also
        considered to be "forfeiting". If a creature is ever the only one
        remaining in a given duel, the duel ends and they are considered to have
        "won" the duel.</p><p>Duels typically have a "range" of 30 feet. This
        means that if any creature that is dueling
        @Identifier[ability:move]{Moves} more than 30 feet away from any other
        creature that they are dueling with, they are considered to have
        "forfeited" the duel.</p><p>The dueling state is not visible in the
        Material Realm, but there is a very slight tether that can be seen in
        the @Identifier[status:ethereal]{Ethereal Realm}. There are no
        restrictions on what realm a duel can take place in, but all
        participants must be within the same realm. Any participant that leaves
        that realm is considered to have gone out of range and therefore "lost
        the duel".</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: defyingDeath0000
    _key: '!journal.pages!condition0000000.defyingDeath0000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Defying Death
    system:
      identifier: defying-death
      img: systems/teriock/src/icons/conditions/defying-death.webp
    text:
      content: >-
        <p>If you are <b>defying death</b>, make an
        @Identifier[core:presence]{UNP} @Identifier[core:feat-interaction]{feat
        save} every time you would take @Identifier[core:damage]{damage}. The DC
        of this save is equal to 6 plus the number of damage dice that would be
        dealt. If you succeed, you take no @Identifier[core:damage]{damage} from
        that source. If you fail, you @Identifier[status:dead]{die}.</p><p>While
        defying death, you also @Identifier[keyword:resistance]{resist}
        @Identifier[status:dead]{death} and
        @Identifier[status:unconscious]{unconsciousness}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: encumbered000000
    _key: '!journal.pages!condition0000000.encumbered000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Encumbered
    system:
      identifier: encumbered
      img: systems/teriock/src/icons/conditions/encumbered.webp
    text:
      content: >-
        <p>An <b>encumbered</b> creature can be either <b>lightly encumbered</b>
        or <b>heavily encumbered</b>. The consequences are as
        follows.</p><dl><dt>Lightly Encumbered</dt>

        <dd>The creature's @Identifier[core:movement-speed]{movement speed} is
        reduced by 10.</dd>

        <dt>Heavily Encumbered</dt>

        <dd>The creature is @Identifier[status:slowed]{slowed}. The creature
        also has @Identifier[core:disadvantage]{disadvantage} on
        @Identifier[core:attack-interaction]{attacks} and
        @Identifier[core:movement]{MOV} @Identifier[core:feat-interaction]{feat
        saves}.</dd></dl>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: ethereal00000000
    _key: '!journal.pages!condition0000000.ethereal00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Ethereal
    system:
      identifier: ethereal
      img: systems/teriock/src/icons/conditions/ethereal.webp
    text:
      content: >-
        <p>If a creature is <b>ethereal</b>, it is in the <b>Ethereal Realm</b>.
        This is the domain of spirits and does not take kindly to those with a
        physical form. Ethereal beings cannot typically be interacted with nor
        sensed by material (non-ethereal) ones. The main exception is that if an
        ethereal being passes within 5 feet of a material one, the material
        creature feels a strange unnatural chill pass over them.</p><p>If a
        creature that's ethereal is not innately a spirit, then they still have
        a size and shape while ethereal, but it is blurry and transparent. They
        cannot pass through material (non-ethereal) walls or objects. However,
        they also cannot push, pull, grab, nor interact with material objects in
        any way. It is as though the ethereal creature has no material strength
        whatsoever.</p><p>If you go @Identifier[status:down]{down} while
        ethereal, you @Identifier[status:dead]{die}, become a
        @Identifier[status:wisping]{wisp} and your body dissipates. Any being
        that has a physical form and that isn't being kept ethereal by some
        effect will manifest back into the Material Realm at dawn. They remember
        what they experienced while ethereal, but the details and order of
        events is a little jumbled and hazy.</p><p>There is a slight whooshing
        sound like a gust of wind whenever a creature enters or exits the
        Ethereal Realm.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: frightened000000
    _key: '!journal.pages!condition0000000.frightened000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Frightened
    system:
      identifier: frightened
      img: systems/teriock/src/icons/conditions/frightened.webp
    text:
      content: >-
        <p>A frightened creature cannot make @Wiki[Category:Attack
        abilities]{attacks} against nor intentionally
        @Identifier[ability:move]{get closer to} the source of their fear.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: frozen0000000000
    _key: '!journal.pages!condition0000000.frozen0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Frozen
    system:
      identifier: frozen
      img: systems/teriock/src/icons/conditions/frozen.webp
    text:
      content: >-
        <p>A creature with this condition cannot use any
        @Pack[teriock.abilities]{abilities} or be affected by anything until
        this condition is cleared. They have no perception of the world around
        them or the passage of time at all. Any other ongoing
        @Wiki[Category:Conditions]{conditions} or other ongoing effects are
        paused while this condition is in place. If a creature is no longer
        frozen, time immediately catches up to them. They age the amount of time
        that they were frozen and any effects with a finite duration that would
        have ended do so.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: grounded00000000
    _key: '!journal.pages!condition0000000.grounded00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Grounded
    system:
      identifier: grounded
      img: systems/teriock/src/icons/conditions/grounded.webp
    text:
      content: >-
        <p>If a creature is <b>grounded</b> then their flying, climbing, and
        leaping (both vertical and horizontal)
        @Identifier[core:movement-speed]{speed adjustments} are set to
        "none".</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: frenzied00000000
    _key: '!journal.pages!condition0000000.frenzied00000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Frenzied
    system:
      identifier: frenzied
      img: systems/teriock/src/icons/conditions/frenzied.webp
    text:
      content: >-
        <p>While <b>frenzied</b>, you will not leave combat willingly and are
        @Identifier[keyword:inept]{inept} at not killing anyone who opposes you.
        This includes anyone who tries to stop you through actions or words. You
        are also @Identifier[keyword:resistant]{resistant} to being
        @Identifier[status:frightened]{frightened}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: goaded0000000000
    _key: '!journal.pages!condition0000000.goaded0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
