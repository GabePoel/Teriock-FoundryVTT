    name: Alive
    system:
      identifier: alive
      img: systems/teriock/src/icons/conditions/alive.webp
    text:
      content: >-
        <p>A creature that is <b>alive</b> is one that is not
        @Identifier[status:dead]{dead}. An @Wiki[Category:Undead
        creatures]{undead} creature could be Alive.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: asleep0000000000
    _key: '!journal.pages!condition0000000.asleep0000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Asleep
    system:
      identifier: asleep
      img: systems/teriock/src/icons/conditions/asleep.webp
    text:
      content: >-
        <p>A creature that's <b>asleep</b> is unconscious, but not necessarily
        at 0 or fewer @Identifier[core:hit-points-and-mana-points]{HP}. Unless
        otherwise specified, a creature that's asleep will
        @Identifier[keyword:awaken]{awaken} if they take any damage (that
        doesn't reduce them to 0 or fewer
        @Identifier[core:hit-points-and-mana-points]{HP}) or if they are within
        range of something @Wiki[Category:Loud effects]{loud}. If an effect
        specifies a range it can be heard at, it is assumed that half that range
        is the range it can wake sleeping creatures at.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: bound00000000000
    _key: '!journal.pages!condition0000000.bound00000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Bound
    system:
      identifier: bound
      img: systems/teriock/src/icons/conditions/bound.webp
    text:
      content: >-
        <p>If you are <b>bound</b> to another group, concept, or being, you
        cannot intentionally let them come to harm through action or inaction.
        This is a @Wiki[Category:Control effects]{control effect}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: anosmatic0000000
    _key: '!journal.pages!condition0000000.anosmatic0000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
