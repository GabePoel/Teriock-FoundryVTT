    name: Burned
    system:
      identifier: burned
      img: systems/teriock/src/icons/conditions/burned.webp
    text:
      content: >-
        <p>A <b>burned</b> creature is @Identifier[keyword:incapable]{incapable}
        of @Identifier[core:healing]{healing} itself with
        @Wiki[Category:Regeneration effects]{regeneration effects}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: allured000000000
    _key: '!journal.pages!condition0000000.allured000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
    flags:
      teriock:
        journalIcon: ms-cyclone
    name: Allured
    system:
      identifier: allured
      img: systems/teriock/src/icons/conditions/allured.webp
    text:
      content: >-
        <p>A creature that is <b>allured</b> to another creature will do
        whatever they tell them to. They are totally loyal to that other
        creature and also @Identifier[status:bound]{bound} to them. This is a
        @Wiki[Category:Control effects]{control effect}, but it is not forcing
        actions directly. Rather, an allured creature <i>wants</i> to take
        action, is does so of their own volition. In a "regular"
        @Identifier[status:bound]{binding}, the creature is aware they are being
        @Wiki[Category:Control effects]{controlled} and can attempt to thwart
        the confines of their tether. But an allured creature is <i>not</i>
        aware of the effect that's been placed on them. It is more akin to being
        insane, blurring reality and shaping it to what they <i>believe</i> to
        be true.</p><p>This rare and dangerous type of @Wiki[Category:Control
        effects]{control} is usually employed by
        @Identifier[creature:nymph]{nymphs}, @Wiki[Category:Vampires]{vampires},
        and other manipulative and generally evil creatures.</p>
      format: 1
    title:
      level: 1
      show: true
    type: rule
    video:
      controls: true
      volume: 0.5
  - _id: blind00000000000
    _key: '!journal.pages!condition0000000.blind00000000000'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.78
