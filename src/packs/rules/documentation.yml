_id: pIYm1KYBRZQdHajT
_key: '!journal!pIYm1KYBRZQdHajT'
name: Documentation
pages:
  - _id: t14xGhzsmr4mZ3Hn
    _key: '!journal.pages!pIYm1KYBRZQdHajT.t14xGhzsmr4mZ3Hn'
    name: Enrichers
    text:
      content: >-
        <p>A number of <strong>enrichers</strong> are available for use in text.
        These are strings of text that will be displayed to have special
        functionality.</p><h2>Link Enrichers</h2><p>By default, Foundry provides
        enrichers of the form [[code @UUID​[&lt;uuid&gt;]{&lt;label&gt;}]] to
        link to documents. For instance, writing [[code
        @UUID​[Compendium.teriock.essentials.Item.fb31c853fddd91bb]]] will
        produce the link
        @UUID[Compendium.teriock.essentials.Item.fb31c853fddd91bb].</p><p>In
        addition to the built-in [[code @UUID]] enricher, the Teriock system
        implements several other ways to link to relevant
        information.</p><h3>Identifier Links</h3><p>Used to link to the
        canonical document for a given typed
        identifier.</p><table><tbody><tr><td
        data-colwidth="127"><p>Format</p></td><td><p>[[code
        @Identifier​[&lt;identifier&gt;]{&lt;label&gt;} ]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example Input</p></td><td><p>[[code
        @Identifier​[ability:snare]]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example
        Result</p></td><td><p>@Identifier[ability:snare]</p></td></tr></tbody></table><h4></h4><h3>Wiki
        Links</h3><p>Used to link to a page on the Teriock wiki by its name. The
        page's namespace must be included in the name.</p><table><tbody><tr><td
        data-colwidth="127"><p>Format</p></td><td><p>[[code
        @Wiki​[&lt;name&gt;]{&lt;label&gt;} ]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example Input</p></td><td><p>[[code
        @Wiki​[Equipment:Longsword]]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example
        Result</p></td><td><p>@Wiki[Equipment:Longsword]</p></td></tr></tbody></table><h4></h4><h3>Compendium
        Links</h3><p>Used to link to a compendium pack by its
        ID.</p><table><tbody><tr><td
        data-colwidth="127"><p>Format</p></td><td><p>[[code
        @Pack​[&lt;name&gt;]{&lt;label&gt;} ]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example Input</p></td><td><p>[[code
        @Pack​[teriock.properties]]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example
        Result</p></td><td><p>@Pack[teriock.properties]</p></td></tr></tbody></table><p></p><h2>Command
        Enrichers</h2><p>Anything that can be invoked as a chat command can also
        be used as an enricher. By default, Foundry lets you use [[code [[/roll
        1d20]]]] to create a button roll a d20 that looks like [[/roll 1d20]].
        This corresponds to typing [[code /roll 1d20]] directly into the
        chat.</p><p>A full list of possible commands can be seen by typing
        [[code /help]] in the chat or by [[/help]]{clicking here}. For example,
        [[code [​[/heal]​]{a healing button} ]] can be used to make [[/heal]]{a
        healing button}.</p><table><tbody><tr><td
        data-colwidth="127"><p>Format</p></td><td><p>[[code [/&lt;command&gt;
        &lt;options&gt;]{&lt;label&gt;} ]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example Input</p></td><td><p>[[code
        [​[/heal]​]]]</p></td></tr><tr><td data-colwidth="127"><p>Example
        Result</p></td><td><p>[[/heal]]</p></td></tr></tbody></table><p></p><h2>Display
        Enrichers</h2><p>These enrichers exist just for formatting
        text.</p><h3>Lookup Enricher</h3><p>Used to display information about
        the current document as formatted text.</p><table><tbody><tr><td
        data-colwidth="127"><p>Format</p></td><td><p>[[code [​[lookup
        &lt;path&gt; &lt;options&gt;]​] ]]</p></td></tr><tr><td
        data-colwidth="127"><p>Example Input</p></td><td><p>[[code [​[lookup
        name style=uc]​] ]]</p></td></tr><tr><td data-colwidth="127"><p>Example
        Result</p></td><td><p>[[lookup name
        style=uc]]</p></td></tr></tbody></table><h3>Code Enricher</h3><p>Used to
        display inline code in monospace with the option to click on it to copy
        the displayed text. This is the enricher that's been used throughout
        this documentation.</p><table><tbody><tr><td
        data-colwidth="127"><p>Format</p></td><td><p>[[code [​[code
        &lt;text&gt;]​] ]]</p></td></tr><tr><td data-colwidth="127"><p>Example
        Input</p></td><td><p>[[code [​[code /dmg 1d10[fire magic]​]​]
        ]]</p></td></tr><tr><td data-colwidth="127"><p>Example
        Result</p></td><td><p>[[code /dmg 1d10[fire
        magic]]]</p></td></tr></tbody></table><p></p><h2>Embed
        Enrichers</h2><p>Foundry normally allows [[code @Embed​[uuid options]]]
        to be used to display a document within a block of text. We expand this
        functionality so identifiers can be used in place of UUIDs. For
        instance, [[code @Embed​[body:claw inline=true]]] will display the
        following.</p><p>@Embed[body:claw inline=true]</p><p>In addition to the
        normal Foundry embed options, we allow the use of [[code panel]] to
        documents in a panel like it would appear in tooltips or chat messages.
        This means the text [[code @Embed​[body:claw panel inline=true]]]
        produces the following.</p><p>@Embed[body:claw panel
        inline=true]</p><p>The panel format can be used regardless of whether an
        identifier or UUID is used to invoke the embed enricher.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: wQnmIwHqgTnNI3Yl
    _key: '!journal.pages!pIYm1KYBRZQdHajT.wQnmIwHqgTnNI3Yl'
    name: Identifiers
    text:
      content: >-
        <p>The Teriock game system makes extensive use of
        <strong>identifiers</strong>. These are keys that correspond to the
        "canonical" document for a given piece of rules text. These are readible
        kebab-case strings that are assigned for each document and can be
        customized in a document's "Configure Document" options. For example,
        the identifier for @Identifier[ability:arcane-ray] is [[code
        arcane-ray]]. Only active effects, actors, items, and journal entry
        pages have identifiers.</p><figure><img
        src="systems/teriock/src/assets/screenshots/configure-document-button.webp"><figcaption>The
        "Configure Document" button.</figcaption></figure><p>Each document also
        has a <strong>typed identifier</strong>, which consists of the
        document's "type" followed by a colon and its identifier. So, typed
        identifier for @Identifier[ability:arcane-ray] is [[code
        ability:arcane-ray]]. Any document's typed identifier can be copied to
        the clipboard by middle clicking on the "Copy Document UUID" button in
        its sheet's header.</p><p>Any built-in game content will have a
        corresponding typed identifier. This should correspond to a baseline
        version of the document that's not
        @Identifier[keyword:limited]{limited},
        @Identifier[keyword:improved]{improved},
        @Identifier[keyword:adept]{adept}, @Identifier[keyword:gifted]{gifted},
        @Identifier[keyword:inept]{inept}, or otherwise modified. This allows a
        document that <em>has</em> been modified in some way to maintain a
        reference to its original (canonical) version that hasn't been modified.
        You can set what compendiums are prioritized for defining canonical
        documents in the settings.</p><p>If you're creating <em>new</em>
        content, you can click the "Reset to Default Identifier" in the document
        configuration window button to automatically generate an identifier for
        it.</p><figure><img
        src="systems/teriock/src/assets/screenshots/configure-document-window.webp"><figcaption>The
        document configuration window.</figcaption></figure><h2>Damage and Drain
        Type Identifiers</h2><p>The types of damage or drain dealt by some
        effect are specified by their identifiers a the flavor for that effect's
        roll formula. These are not typed identifiers as the type should be
        implicit in the effect itself. For instance, dealing damage with the
        formula [[/damage 1d10[silver] + 1d4[fire magic]]] will automatically
        pull the effects of @Identifier[damage:silver]{silver damage},
        @Identifier[damage:fire]{fire damage}, and
        @Identifier[damage:magic]{magic damage} from their identifiers.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: qckPYoz2ZvjQydoz
    _key: '!journal.pages!pIYm1KYBRZQdHajT.qckPYoz2ZvjQydoz'
    name: Roll Formulas
    text:
      content: >-
        <p>A handful of special functions can be added to roll formulas to
        provide Teriock-specific functionality. They are listed in the table
        below. Click on any example to see what it evaluates
        to.</p><h2>Comparison Operators</h2><p>All of the following functions
        compare two values and return either [[code 1]] ("true") or [[code 0]]
        ("false") depending on the relationship between those two values. Each
        example is written to have a 50% chance of either
        outcome.</p><table><tbody><tr><td
        data-colwidth="134"><p><strong>Function</strong></p></td><td><p><strong>Description</strong></p></td><td><p><strong>Example</strong></p></td></tr><tr><td
        data-colwidth="134"><p>[[code
        eq]]</p></td><td><p>Equal?</p></td><td><p>[[/r eq(1d2,
        2)]]</p></td></tr><tr><td data-colwidth="134"><p>[[code
        gt]]</p></td><td><p>Greater than?</p></td><td><p>[[/r gt(1d2,
        1)]]</p></td></tr><tr><td data-colwidth="134"><p>[[code
        gte]]</p></td><td><p>Greater than or equal to?</p></td><td><p>[[/r
        gte(1d4, 3)]]</p></td></tr><tr><td data-colwidth="134"><p>[[code
        lt]]</p></td><td><p>Less than?</p></td><td><p>[[/r lt(1d2,
        2)]]</p></td></tr><tr><td data-colwidth="134"><p>[[code
        lte]]</p></td><td><p>Less than or equal to?</p></td><td><p>[[/r lte(1d4,
        2)]]</p></td></tr><tr><td data-colwidth="134"><p>[[code
        neq]]</p></td><td><p>Not equal?</p></td><td><p>[[/r neq(1d2,
        2)]]</p></td></tr></tbody></table><p></p><h2>Logic Gates</h2><p>These
        functions do a bitwise comparison of their inputs based on whether those
        inputs are "truthy" (any number <em>other </em>than [[code 0]]) or
        "falsy" ([[code 0]]).</p><table><tbody><tr><td
        data-colwidth="135"><p><strong>Function</strong></p></td><td><p><strong>Description</strong></p></td><td><p><strong>Example</strong></p></td></tr><tr><td
        data-colwidth="135"><p>[[code and]]</p></td><td><p>Logical
        "and".</p></td><td><p>[[/r and(1d2 - 1, 1d2 - 1, 1d2 -
        1)]]</p></td></tr><tr><td data-colwidth="135"><p>[[code
        if]]</p></td><td><p>Logical "if" and "if then".</p></td><td><p>[[/r
        if(1d2 - 1, 3, 4)]]</p></td></tr><tr><td data-colwidth="135"><p>[[code
        nand]]</p></td><td><p>Logical "not-and".</p></td><td><p>[[/r nand(1d2 -
        1, 1d2 - 1, 1d2 - 1)]]</p></td></tr><tr><td
        data-colwidth="135"><p>[[code nor]]</p></td><td><p>Logical
        "not-or".</p></td><td><p>[[/r nor(1d2 - 1, 1d2 - 1, 1d2 -
        1)]]</p></td></tr><tr><td data-colwidth="135"><p>[[code
        not]]</p></td><td><p>Logical "not".</p></td><td><p>[[/r not(1d2 - 1, 1d2
        - 1, 1d2 - 1)]]</p></td></tr><tr><td data-colwidth="135"><p>[[code
        or]]</p></td><td><p>Logical "or".</p></td><td><p>[[/r or(1d2 - 1, 1d2 -
        1, 1d2 - 1)]]</p></td></tr><tr><td data-colwidth="135"><p>[[code
        xnor]]</p></td><td><p>Logical "exclusive not-or".</p></td><td><p>[[/r
        xnor(1d2 - 1, 1d2 - 1, 1d2 - 1)]]</p></td></tr><tr><td
        data-colwidth="135"><p>[[code xor]]</p></td><td><p>Logical "exclusive
        or".</p></td><td><p>[[/r xor(1d2 - 1, 1d2 - 1, 1d2 -
        1)]]</p></td></tr></tbody></table><p></p><h2>Boosts and
        Deboosts</h2><p>Special functions that
        @Identifier[keyword:boosted]{boost},
        @Identifier[keyword:deboosted]{deboost}, or set a specific amount of
        @Identifier[keyword:boosted]{boosting}/@Identifier[keyword:deboosted]{deboosting}
        are implemented. They consider all the sizes of dice and select/adjust
        them accordingly.</p><table><tbody><tr><td
        data-colwidth="135"><p><strong>Function</strong></p></td><td><p><strong>Description</strong></p></td><td><p><strong>Example</strong></p></td></tr><tr><td
        data-colwidth="135"><p>[[code boost]] or [[code
        b]]</p></td><td><p>@Identifier[keyword:boosted]{Boost} a
        formula.</p></td><td><p>[[/r b(1d10 + 1d4)]]</p></td></tr><tr><td
        data-colwidth="135"><p>[[code deboost]] or [[code
        db]]</p></td><td><p>@Identifier[keyword:deboosted]{Deboost} a
        formula.</p></td><td><p>[[/r db(1d10 + 1d4)]]</p></td></tr><tr><td
        data-colwidth="135"><p>[[code setboost]] or [[code
        sb]]</p></td><td><p>Set a specific amount of
        @Identifier[keyword:boosted]{boosting}/@Identifier[keyword:deboosted]{deboosting}
        for a formula.</p></td><td><p>[[/r sb(1d10 + 1d4,
        3)]]</p></td></tr></tbody></table><p></p><h2>Flavor</h2><p>Foundry
        automatically supports adding "flavor" to roll formulas by putting it
        between brackets after some term. For example, [[/r 1d10[example] +
        1d4[roll]]] has the flavor "example" on the d10 and "roll" on the d4.
        This functionality is used to apply types to damage and drain rolls as
        explained in the description of
        @UUID[Compendium.teriock.rules.JournalEntry.pIYm1KYBRZQdHajT.JournalEntryPage.wQnmIwHqgTnNI3Yl]{identifiers}.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: ZsgmRW5EcURO6B4K
    _key: '!journal.pages!pIYm1KYBRZQdHajT.ZsgmRW5EcURO6B4K'
    name: Change Types
    text:
      content: >-
        <p>In additon to the normal active effect change types provided by
        Foundry, several Teriock-specific ones are available to manipulate
        formulas. Fields that aren't formulas will not be affected by these
        change types.</p><table><tbody><tr><td><p><strong>Change
        Type</strong></p></td><td><p><strong>Description</strong></p></td></tr><tr><td><p>Boost</p></td><td><p>Provides
        the specified amonut of @Identifier[keyword:boosted]{boosts} or
        @Identifier[keyword:deboosted]{deboosts} to the formula. Positive for
        for @Identifier[keyword:boosted]{boosting}. Negative for
        @Identifier[keyword:deboosted]{deboosting}.</p></td></tr><tr><td><p>Substitute</p></td><td><p>Replace
        the old formula with a new one where [[code @base]] refers to the old
        formula. For instance, if the formula would have been [[code 1d10]],
        specifying [[code max(@base + 2, 8)]] makes the new formula [[code
        max(1d10 + 2, 8)]].</p></td></tr><tr><td><p>Type Add</p></td><td><p>Adds
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} or
        @UUID[Compendium.teriock.rules.JournalEntry.drain00000000000]{drain
        types} to the formula. For instance, if the formula would have been
        [[code 1d10[magic]]] and you specify [[code fire]] then the formula
        becomes [[code 1d10[magic fire]]].</p></td></tr><tr><td><p>Type
        Remove</p></td><td><p>Removes
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} or
        @UUID[Compendium.teriock.rules.JournalEntry.drain00000000000]{drain
        types} from the formula. For instance, if the formula would have been
        [[code 1d10[magic fire]]] and you specify [[code fire]] then the formula
        becomes [[code 1d10[magic]]].</p></td></tr><tr><td><p>Type
        Replace</p></td><td><p>Replaces
        @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
        types} or
        @UUID[Compendium.teriock.rules.JournalEntry.drain00000000000]{drain
        types} in the formula. For instance, if the formula would have been
        [[code 1d10[magic]]] and you specify [[code fire]] then the formula
        becomes [[code 1d10[fire]]].</p></td></tr></tbody></table>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
  - _id: 7N6eJ7UOOwQKxJ6P
    _key: '!journal.pages!pIYm1KYBRZQdHajT.7N6eJ7UOOwQKxJ6P'
    name: Character Building
    text:
      content: >-
        <p>A newly created character is @Identifier[core:leveling-up]{level} 1
        by default and has no @Pack[teriock.classes]{classes},
        @Pack[teriock.species]{species}, or
        @Pack[teriock.abilities]{abilities}.</p><figure><img
        src="systems/teriock/src/assets/screenshots/new-character.webp" alt="A
        Newly Made Character Sheet"><figcaption>A Newly Made Character
        Sheet</figcaption><p>@Pack[teriock.abilities]{Abilities} cannot be added
        directly to the character. They must always be a part of some other type
        of item such as a @Pack[teriock.species]{species}, piece of
        @Pack[teriock.equipment]{equipment}, or a @Pack[teriock.powers]{power}.
        These can all be added either by dragging the onto the sheet from the
        sidebar or their respective compendium pack. They can also be added by
        going to the corresponding tab of the character sheet and clicking on
        the plus icon.</p><p>Each button on the character sheet has a default
        document type it creates on a left click. Right click to see the full
        list of document types that can be added.</p><figure><img
        src="systems/teriock/src/assets/screenshots/add-species.webp" alt="The
        Button to Add Powers and Species"><figcaption>The Button to Add Powers
        and Species</figcaption><p>This opens options to import or create a new
        document. New documents are typically locked when first opened in order
        to prevent accidential editing. To unlock, click the lock icon in the
        document header.</p><figure><img
        src="systems/teriock/src/assets/screenshots/locked-sheet.webp"
        alt="Header Lock Button"><figcaption>Header Lock
        Button</figcaption><p>Once a document is unlocked, it will have a button
        to add even more documents to it as well. These are called "child"
        documents. Left-clicking the button will give a dropdown of all possible
        child types for the document you're adding them
        to.</p></figure><figure><img
        src="systems/teriock/src/assets/screenshots/add-ability.webp" alt="The
        Button to Add Documents to a Species"><figcaption>The Button to Add
        Documents to a Species</figcaption><p>Documents have many fields that
        can be edited. The most common ones are displayed prominantly below its
        header. By default, these show the <em>current</em> value for a given
        field which includs modifications by any effects on the document or
        actor. Hovering over a field will show its raw value. For a full list of
        fields, click the "Toggle Menu" button below them.</p><figure><img
        src="systems/teriock/src/assets/screenshots/toggle-menu.webp" alt="Menu
        and Mechanics Buttons"><figcaption>Menu and Mechanics
        Buttons</figcaption><p>This will open a full menu of other fields that
        can be edited to affect document appearance and
        behavior.</p><figure><img
        src="systems/teriock/src/assets/screenshots/open-menu.webp" alt="An Open
        Ability Menu"><figcaption>An Open Ability Menu</figcaption><p>Beyond
        these fields, many document types have additional mechanics that operate
        behind the scenes. These can be opened by clicking the gear icon to the
        left of the menu icon. The mechanics come in three varieties. Most
        documents have several types of "Automations" which can be added to them
        to manage how they behave passively or when used.
        @Pack[teriock.abilities]{Abilities} and the effects they create also
        have "Affinities" which allow the creation of simples flaws and
        protections such as @Identifier[keyword:resistance]{resistances} and
        @Identifier[keyword:vulnerability]{vulnerabilities} and "Expirations"
        which set conditions where the effect of a non-passive
        @Pack[teriock.abilities]{ability} expires.</p><figure><img
        src="systems/teriock/src/assets/screenshots/add-automation.webp"
        alt="The Add Automations Button and Menu"><figcaption>The Add
        Automations Button and
        Menu</figcaption></figure></figure></figure></figure></figure></figure>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
