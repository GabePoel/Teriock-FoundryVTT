    name: Identifiers
    text:
      content: >-
        <p>The Teriock game system makes extensive use of
        <strong>identifiers</strong>. These are keys that correspond to the
        "canonical" document for a given piece of rules text. These are readible
        kebab-case strings that are assigned for each document and can be
        customized in a document's "Configure Document" options. For example,
        the identifier for @Identifier[ability:arcane-ray] is [[code
        arcane-ray]].</p><p>Each document also has a <strong>typed
        identifier</strong>, which consists of the document's "type" followed by
        a colon and its identifier. So, typed identifier for
        @Identifier[ability:arcane-ray] is [[code ability:arcane-ray]]. Any
        document's typed identifier can be copied to the clipboard by middle
        clicking on the "Copy Document UUID" button in its sheet's header.</p>
      format: 1
    title:
      level: 1
      show: true
    type: text
    video:
      controls: true
      volume: 0.5
