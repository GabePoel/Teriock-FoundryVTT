    category: semis00000000000
    name: Corsair
    system:
      archetype: semi
      identifier: corsair
      img: systems/teriock/src/icons/classes/corsair.webp
    text:
      content: >-
        <p>People of the sea, they are never very comfortable far from a large
        body of water. Corsairs are wanderers and like to be on the move.
        Corsairs tend to be humble in that they understand that nature is
        greater than they are and respect it for that. If you are an Corsair,
        crave water and sailing, go with the flow, keep on the move, and keep
        things ship shape.</p><h2>Archetype</h2><p>Every semi class gets the
        following archetype.</p><p>@Embed[archetype:semi
        panel]</p><h2>Ranks</h2><p>For ranks 3, 4, and 5, choose one combat
        ability and one support ability to gain at each
        rank.</p><p>@Embed[rank:rank-1-corsair panel
        noBlocks]</p><p>@Embed[rank:rank-2-corsair panel
        noBlocks]</p><p>@Embed[rank:rank-3-corsair panel
        noBlocks]</p><p>@Embed[rank:rank-4-corsair panel
        noBlocks]</p><p>@Embed[rank:rank-5-corsair panel noBlocks]</p>
      format: 1
