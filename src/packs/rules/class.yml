      volume: 0.5
  - _id: df169041e7e45124
    _key: '!journal.pages!class00000000000.df169041e7e45124'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: mages00000000000
    name: Storm Mage
    system:
      archetype: mage
      identifier: storm-mage
      img: systems/teriock/src/icons/classes/storm-mage.webp
    text:
      content: >-
        <p>The true wonder seeker, these mages are the philosophers of the
        world, always seeking out more knowledge and more wisdom. The Storm Mage
        is a logician, a tactical intellectual who prefers to neutralize
        opponents rather than destroy them. Often cold, the Storm Mage is also
        tumultuous and crafty. If you are playing a Storm Mage, be curious,
        hungry for information, always in the clouds, tricky and clever, eluding
        rather than confronting.</p><h2>Archetype</h2><p>Every mage class gets
        the following archetype.</p><p>@Embed[archetype:mage
        panel]</p><h2>Ranks</h2><p>For ranks 3, 4, and 5, choose one combat
        ability and one support ability to gain at each
        rank.</p><p>@Embed[rank:rank-1-storm-mage panel
        noBlocks]</p><p>@Embed[rank:rank-2-storm-mage panel
        noBlocks]</p><p>@Embed[rank:rank-3-storm-mage panel
        noBlocks]</p><p>@Embed[rank:rank-4-storm-mage panel
        noBlocks]</p><p>@Embed[rank:rank-5-storm-mage panel noBlocks]</p>
      format: 1
