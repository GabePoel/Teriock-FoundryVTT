      volume: 0.5
  - _id: '87e8592640700020'
    _key: '!journal.pages!class00000000000.87e8592640700020'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: semis00000000000
    name: Ranger
    system:
      archetype: semi
      identifier: ranger
      img: systems/teriock/src/icons/classes/ranger.webp
    text:
      content: >-
        <p>The true wanderer, they are a bit like
        @Identifier[class:corsair]{Corsairs} of the land. Always on the move and
        scouting about, rangers never like to have much responsibility if they
        can help it and prefer to be on their own. Gritty and worn like old
        leather, these characters are unflinching and realistic at all times. If
        you are playing a Ranger, keep watch, seek solitude, long for the woods
        and be introspective.</p><h2>Archetype</h2><p>Every semi class gets the
        following archetype.</p><p>@Embed[archetype:semi
        panel]</p><h2>Ranks</h2><p>For ranks 3, 4, and 5, choose one combat
        ability and one support ability to gain at each
        rank.</p><p>@Embed[rank:rank-1-ranger panel
        noBlocks]</p><p>@Embed[rank:rank-2-ranger panel
        noBlocks]</p><p>@Embed[rank:rank-3-ranger panel
        noBlocks]</p><p>@Embed[rank:rank-4-ranger panel
