    category: mages00000000000
    name: Flame Mage
    system:
      archetype: mage
      identifier: flame-mage
      img: systems/teriock/src/icons/classes/flame-mage.webp
    text:
      content: >-
        <p>Fierce and brazen, these mages are always at war. The arms dealers of
        the world, their magic is completely focused on destruction and thus
        they seek to create bigger and better ways to blow things up.
        Passionate, wild and a bit chaotic, these mages like the mountains and
        underground spaces. If you are playing a Flame Mage be hot tempered,
        war-like, ready for battle, and consuming
        everything.</p><h2>Archetype</h2><p>Every mage class gets the following
        archetype.</p><p>@Embed[archetype:mage panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-flame-mage panel
        noBlocks]</p><p>@Embed[rank:rank-2-flame-mage panel
        noBlocks]</p><p>@Embed[rank:rank-3-flame-mage panel
        noBlocks]</p><p>@Embed[rank:rank-4-flame-mage panel
        noBlocks]</p><p>@Embed[rank:rank-5-flame-mage panel noBlocks]</p>
      format: 1
    title:
