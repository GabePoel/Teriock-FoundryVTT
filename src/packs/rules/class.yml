  - _id: ce6e38d8e456cf43
    _key: '!journal.pages!class00000000000.ce6e38d8e456cf43'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: semis00000000000
    name: Thief
    system:
      archetype: semi
      identifier: thief
      img: systems/teriock/src/icons/classes/thief.webp
    text:
      content: >-
        <p>Almost as shady as the @Identifier[class:assassin]{Assassin}, a Thief
        is a bit more socially oriented and has a much greater care for her own
        life. Thieves are the flip side of the
        @Identifier[class:duelist]{Duelist} and tend to follow laws and tell the
        truth only if it serves their purpose. Always trying to make a profit,
        thieves are the businessmen of the world and will cheat you without
        blinking an eyelash, that is their job. If you are playing a thief, lie
        and make up stories, be ever watchful for a chance to search or loot and
        look for the profit angle, never doing anything for
        free.</p><h2>Archetype</h2><p>Every semi class gets the following
        archetype.</p><p>@Embed[archetype:semi panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-thief panel
        noBlocks]</p><p>@Embed[rank:rank-2-thief panel
        noBlocks]</p><p>@Embed[rank:rank-3-thief panel
        noBlocks]</p><p>@Embed[rank:rank-4-thief panel
        noBlocks]</p><p>@Embed[rank:rank-5-thief panel noBlocks]</p>
      format: 1
