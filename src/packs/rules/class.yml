  - _id: 97760b47881c8b1e
    _key: '!journal.pages!class00000000000.97760b47881c8b1e'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: warriors00000000
    name: Berserker
    system:
      archetype: warrior
      identifier: berserker
      img: systems/teriock/src/icons/classes/berserker.webp
    text:
      content: >-
        <p>Wild and savage. They distrust magic of all kinds and put their faith
        in themselves before others. Always at the front of a battle, Berserkers
        love the sport of combat and don't like missile weapons. Not reliable as
        guards as they are too distracted and are rarely very intelligent. If
        you are a Berserker be larger than life, brash, not too bright and
        stupidly brave.</p><h2>Archetype</h2><p>Every warrior class gets the
        following archetype.</p><p>@Embed[archetype:warrior
        panel]</p><h2>Ranks</h2><p>For ranks 3, 4, and 5, choose one combat
        ability and one support ability to gain at each
        rank.</p><p>@Embed[rank:rank-1-berserker panel
        noBlocks]</p><p>@Embed[rank:rank-2-berserker panel
        noBlocks]</p><p>@Embed[rank:rank-3-berserker panel
        noBlocks]</p><p>@Embed[rank:rank-4-berserker panel
        noBlocks]</p><p>@Embed[rank:rank-5-berserker panel noBlocks]</p>
