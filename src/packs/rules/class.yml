      volume: 0.5
  - _id: 2066ab65e0fb1342
    _key: '!journal.pages!class00000000000.2066ab65e0fb1342'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: semis00000000000
    name: Archer
    system:
      archetype: semi
      identifier: archer
      img: systems/teriock/src/icons/classes/archer.webp
    text:
      content: >-
        <p>As precise and accurate as a well-crafted arrow, archers don't mess
        around. They prefer to keep their distance, as that is where they are
        the most effective, never letting anyone get too close to them. Archers
        are direct and focused and thus make the best guards. Ever vigilant,
        archers are always looking ahead as, if taken by surprise, they are
        easily killed. If you are playing an Archer be direct, and on target,
        sturdy and perhaps high strung, watchful of the future and of your
        back.</p><h2>Archetype</h2><p>Every semi class gets the following
        archetype.</p><p>@Embed[archetype:semi panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-archer panel
        noBlocks]</p><p>@Embed[rank:rank-2-archer panel
        noBlocks]</p><p>@Embed[rank:rank-3-archer panel
        noBlocks]</p><p>@Embed[rank:rank-4-archer panel
        noBlocks]</p><p>@Embed[rank:rank-5-archer panel noBlocks]</p>
      format: 1
    title:
      level: 1
      show: true
    type: class
    video:
      controls: true
      volume: 0.5
  - _id: c00337a27e3585c4
    _key: '!journal.pages!class00000000000.c00337a27e3585c4'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: semis00000000000
    name: Assassin
    system:
      archetype: semi
      identifier: assassin
      img: systems/teriock/src/icons/classes/assassin.webp
    text:
      content: >-
        <p>The shadiest of all the classes, Assassins see life as expendable and
        unimportant. Even their own life is trivial, someone will kill them
        sooner or later. That's life. Life is short and thus Assassins tend to
        get to the point quickly, literally. Some-what of a martial artist,
        there is something Zen about the Assassin's way, not unlike the
        @Identifier[class:duelist]{Duelist} in that they have strong inner
        motivation, though care nothing for honor. Assassins try to increase
        hatred between people in the hopes of creating more job opportunities
        for themselves. If you're an Assassin, don't think twice about killing
        someone, care little for your own life and cut to the
        chase!</p><h2>Archetype</h2><p>Every semi class gets the following
        archetype.</p><p>@Embed[archetype:semi panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-assassin panel
        noBlocks]</p><p>@Embed[rank:rank-2-assassin panel
        noBlocks]</p><p>@Embed[rank:rank-3-assassin panel
        noBlocks]</p><p>@Embed[rank:rank-4-assassin panel
        noBlocks]</p><p>@Embed[rank:rank-5-assassin panel noBlocks]</p>
      format: 1
    title:
      level: 1
      show: true
    type: class
    video:
      controls: true
      volume: 0.5
  - _id: 29f9ddf664c54e20
    _key: '!journal.pages!class00000000000.29f9ddf664c54e20'
    _stats:
      coreVersion: '14'
