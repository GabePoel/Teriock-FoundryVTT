    type: class
    video:
      controls: true
      volume: 0.5
  - _id: 2b70a453a734079b
    _key: '!journal.pages!class00000000000.2b70a453a734079b'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: mages00000000000
    name: Life Mage
    system:
      archetype: mage
      identifier: life-mage
      img: systems/teriock/src/icons/classes/life-mage.webp
    text:
      content: >-
        <p>The true healers of the world, they are committed to sustaining all
        life. The truly altruistic characters, Life Mages are known to enter
        battles on neither side, healing anyone and everyone who they can.
        Obsessed with keeping people alive and conquering death, Life Mages are
        not as righteous as the Paladin but much more humble and kind. Shying
        away from combat, they prefer to stand behind the troops, healing when
        needed. If you are playing a Life Mage be helpful, kind and loving,
        protective but committed to saving lives and fighting
        death.</p><h2>Archetype</h2><p>Every mage class gets the following
        archetype.</p><p>@Embed[archetype:mage panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-life-mage panel
        noBlocks]</p><p>@Embed[rank:rank-2-life-mage panel
        noBlocks]</p><p>@Embed[rank:rank-3-life-mage panel
        noBlocks]</p><p>@Embed[rank:rank-4-life-mage panel
        noBlocks]</p><p>@Embed[rank:rank-5-life-mage panel noBlocks]</p>
      format: 1
    title:
      level: 1
      show: true
    type: class
    video:
