  - _id: 3743957c10da8991
    _key: '!journal.pages!class00000000000.3743957c10da8991'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: warriors00000000
    name: Duelist
    system:
      archetype: warrior
      identifier: duelist
      img: systems/teriock/src/icons/classes/duelist.webp
    text:
      content: >-
        <p>Honor-bound and honest to the core, Duelists are often judges and
        referees for duels as well as devoted warriors. Duelists prize the honor
        of their family above any sort of personal gain and thus strive for
        excellence in everything that they do. A true Duelist wins the battle
        before it has begun. Strategy and personal perfection are the Duelist's
        way. If you are a Duelist, be calm, focused, well spoken and confident
        in yourself.</p><h2>Flaws</h2><p>Duelists cannot use
        @Wiki[Category:Shields]{shields}.</p><h2>Archetype</h2><p>Every warrior
        class gets the following archetype.</p><p>@Embed[archetype:warrior
        panel]</p><h2>Ranks</h2><p>For ranks 3, 4, and 5, choose one combat
        ability and one support ability to gain at each
        rank.</p><p>@Embed[rank:rank-1-duelist panel
        noBlocks]</p><p>@Embed[rank:rank-2-duelist panel
        noBlocks]</p><p>@Embed[rank:rank-3-duelist panel
        noBlocks]</p><p>@Embed[rank:rank-4-duelist panel
        noBlocks]</p><p>@Embed[rank:rank-5-duelist panel noBlocks]</p>
      format: 1
