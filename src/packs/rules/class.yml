      volume: 0.5
  - _id: fda2f0e9a683c338
    _key: '!journal.pages!class00000000000.fda2f0e9a683c338'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: mages00000000000
    name: Nature Mage
    system:
      archetype: mage
      identifier: nature-mage
      img: systems/teriock/src/icons/classes/nature-mage.webp
    text:
      content: >-
        <p>The enchanter of the woods, these wandering spell casters resemble
        Rangers in their wanderlust. More comfortable with animals than people,
        Nature Mages are always heading to the woods and keeping to themselves.
        Ever in defense of the land, Nature Mages are like environmentalists.
        Nature Mages are in tune with the world at all times. If you are playing
        a Nature Mage be reclusive, avoiding people if you can, happy in nature
        and eager to leave any civilization.</p><h2>Archetype</h2><p>Every mage
        class gets the following archetype.</p><p>@Embed[archetype:mage
        panel]</p><h2>Ranks</h2><p>For ranks 3, 4, and 5, choose one combat
        ability and one support ability to gain at each
        rank.</p><p>@Embed[rank:rank-1-nature-mage panel
        noBlocks]</p><p>@Embed[rank:rank-2-nature-mage panel
