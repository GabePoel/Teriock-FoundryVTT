  - _id: c3517c4ac8ebe97c
    _key: '!journal.pages!class00000000000.c3517c4ac8ebe97c'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: warriors00000000
    name: Paladin
    system:
      archetype: warrior
      identifier: paladin
      img: systems/teriock/src/icons/classes/paladin.webp
    text:
      content: >-
        <p>The least martial of the warriors, their outlook on life is that of
        the combat medic, focusing on keeping others alive on the front lines.
        Paladins are often leaders, as their charismatic charm draws followers
        to them and everyone likes to have a healer on their side. Paladins see
        themselves as somewhat better than most others as they have magical
        powers that other warriors lack. Paladins usually have a strong guiding
        force in their life to help those in need and do what is right. If you
        are a Paladin be righteous, concerned for others, and take
        charge.</p><h2>Archetype</h2><p>Every warrior class gets the following
        archetype.</p><p>@Embed[archetype:warrior panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-paladin panel
        noBlocks]</p><p>@Embed[rank:rank-2-paladin panel
        noBlocks]</p><p>@Embed[rank:rank-3-paladin panel
        noBlocks]</p><p>@Embed[rank:rank-4-paladin panel
        noBlocks]</p><p>@Embed[rank:rank-5-paladin panel noBlocks]</p>
      format: 1
    title:
