  - _id: 5776174f35755cf8
    _key: '!journal.pages!class00000000000.5776174f35755cf8'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: mages00000000000
    name: Necromancer
    system:
      archetype: mage
      identifier: necromancer
      img: systems/teriock/src/icons/classes/necromancer.webp
    text:
      content: >-
        <p>The true dealer of death, Necromancers are most at home in the
        cemetery digging up future minions. Shunned by most of society, these
        dark mages are not necessarily evil, they simply see death as full of
        potential energy while others see it as the end of life. Necromancers
        fear nothing, as they are always facing death. If you are playing a
        Necromancer be unafraid, kill without remorse and be interested in dead
        bodies, close to death yourself, almost in another
        world.</p><h2>Archetype</h2><p>Every mage class gets the following
        archetype.</p><p>@Embed[archetype:mage panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-necromancer panel
        noBlocks]</p><p>@Embed[rank:rank-2-necromancer panel
        noBlocks]</p><p>@Embed[rank:rank-3-necromancer panel
        noBlocks]</p><p>@Embed[rank:rank-4-necromancer panel
        noBlocks]</p><p>@Embed[rank:rank-5-necromancer panel noBlocks]</p>
      format: 1
    title:
