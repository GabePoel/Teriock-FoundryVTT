      volume: 0.5
  - _id: 00689e4c34a8455c
    _key: '!journal.pages!class00000000000.00689e4c34a8455c'
    _stats:
      coreVersion: '14'
      lastModifiedBy: teriockBuilder00
      systemId: teriock
      systemVersion: 0.12.69
    category: warriors00000000
    name: Knight
    system:
      archetype: warrior
      identifier: knight
      img: systems/teriock/src/icons/classes/knight.webp
    text:
      content: >-
        <p>The true glory seekers, Knights are chivalrous to a point but have
        none of the @Identifier[class:duelist]{Duelist's} respect for battles.
        Knights are the weapon masters, well-armored but relying on their swift,
        powerful attacks and powerful strength to destroy their enemy before
        they can counter-attack. Knights are the real behemoths of the
        battlefield, leading troops into the fray and slaughtering all they can.
        If you are a Knight, be looking for glory, looking for the next powerful
        weapon.</p><h2>Archetype</h2><p>Every warrior class gets the following
        archetype.</p><p>@Embed[archetype:warrior panel]</p><h2>Ranks</h2><p>For
        ranks 3, 4, and 5, choose one combat ability and one support ability to
        gain at each rank.</p><p>@Embed[rank:rank-1-knight panel
        noBlocks]</p><p>@Embed[rank:rank-2-knight panel
        noBlocks]</p><p>@Embed[rank:rank-3-knight panel
        noBlocks]</p><p>@Embed[rank:rank-4-knight panel
        noBlocks]</p><p>@Embed[rank:rank-5-knight panel noBlocks]</p>
      format: 1
