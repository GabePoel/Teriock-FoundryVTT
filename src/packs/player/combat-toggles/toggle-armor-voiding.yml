    if (actor.system.offense.piercing.value === 1)
      ui.notifications.success("TERIOCK.MACROS.ToggleUb.enabled", { localize: true, format: { name: actor.name } });
    else ui.notifications.info("TERIOCK.MACROS.ToggleAv0.disabled", { localize: true, format: { name: actor.name } });
  } else {
    ui.notifications.warn("TERIOCK.DIALOGS.Common.ERRORS.noActor", { localize: true });
  }
