description: >-
  <p>All physical (in game) dice rolls that you make are made with
  @Identifier[core:disadvantage]{disadvantage}. Any time a card is drawn from a
  deck, you instead draw two cards, the @Identifier[core:game-master]{GM} picks
  one of them that they suspect to be the "worse" draw, and that is the card
  that is actually drawn. The other card is shuffled back into the deck.
  Additionally, while within the area, you must spend 1
  @Identifier[core:hit-points-and-mana-points]{MP} or else you have
  @Identifier[core:disadvantage]{disadvantage} on any
  @Identifier[core:attack-interaction]{attack roll},
  @Identifier[core:feat-interaction]{feat save}, or
  @Identifier[keyword:resistance]{resistance save} you make.</p>
