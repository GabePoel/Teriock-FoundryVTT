description: >-
  <p>All physical (in game) dice rolls that you make are made with
  @L[Core:Disadvantage]{disadvantage}. Any time a card is drawn from a deck, you
  instead draw two cards, the @L[Core:Game Master]{GM} picks one of them that
  they suspect to be the "worse" draw, and that is the card that is actually
  drawn. The other card is shuffled back into the deck. Additionally, while
  within the area, you must spend 1 @L[Core:Hit Points and Mana Points]{MP} or
  else you have @L[Core:Disadvantage]{disadvantage} on any @L[Core:Attack
  Interaction]{attack roll}, @L[Core:Feat Interaction]{feat save}, or
  @L[Keyword:Resistance]{resistance save} you make.</p>
