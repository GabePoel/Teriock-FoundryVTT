description: >-
  <p>All physical (in game) dice rolls that you make are made with
  @L[Core:Advantage]{advantage}. Any time you draw a card from a deck, you
  instead draw two cards, pick one of them to have actually drawn, and shuffle
  the other card back into the deck. Additionally, you may choose to spend 1
  @L[Core:Hit Points and Mana Points]{MP} to have @L[Core:Advantage]{advantage}
  on any @L[Core:Attack Interaction]{attack roll}, @L[Core:Feat
  Interaction]{feat save}, or @L[Keyword:Resistance]{resistance save} you
  make.</p>
