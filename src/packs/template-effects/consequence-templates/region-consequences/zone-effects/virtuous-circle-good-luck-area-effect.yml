description: >-
  <p>All physical (in game) dice rolls that you make are made with
  @Identifier[core:advantage]{advantage}. Any time you draw a card from a deck,
  you instead draw two cards, pick one of them to have actually drawn, and
  shuffle the other card back into the deck. Additionally, you may choose to
  spend 1 @Identifier[core:hit-points-and-mana-points]{MP} to have
  @Identifier[core:advantage]{advantage} on any
  @Identifier[core:attack-interaction]{attack roll},
  @Identifier[core:feat-interaction]{feat save}, or
  @Identifier[keyword:resistance]{resistance save} you make.</p>
