  consumable: true
  description: >-
    <p>A <strong>mana storing</strong> item has some latent energy held within
    it that creatures can use to power their own
    @Pack[teriock.abilities]{abilities}. Mana storing items will always have a
    number N associated with them (1, by default, if no number is listed). This
    number refers to a "mana die" analogous to those that creatures have. It is
    always [[/roll 1d4]] (3 MP), which means the item stores a maximum of N × 4
    @Identifier[core:hit-points-and-mana-points]{MP}. At dawn, if
    @Identifier[ability:attune]{attuned} to the mana storing item, roll [[/roll
    d4]]. The item regains up to this much spent
    @Identifier[core:hit-points-and-mana-points]{MP}. If dawn comes and nobody
    is @Identifier[ability:attune]{attuned} to a Mana Storing item, it releases
    all @Identifier[core:hit-points-and-mana-points]{MP} it had stored.</p>
  identifier: stored-mana
  quantity:
    maxFormula: '4'
    value: 0
transfer: true
type: resource
