      - _id: l0DloLPunYOhfFIU
        _key: >-
          !actors.items.effects!a00517cfd7c03d8f.a00517cfd7c03d8f.l0DloLPunYOhfFIU
        _stats:
          compendiumSource: Compendium.teriock.abilities.ActiveEffect.173a2c554d1d6249
          coreVersion: '14'
          lastModifiedBy: teriockBuilder00
          systemId: teriock
          systemVersion: 0.12.73
        img: systems/teriock/src/icons/abilities/haunting.webp
        name: Haunting
        system:
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          executionTime:
            base: passive
          form: special
          identifier: haunting
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>Gain @Identifier[ability:haunt-escalation]{Haunt Escalation}
              and @Identifier[ability:haunt-deescalation]{Haunt
              Deescalation}.</p><p>You are spiritually tied to a specific
              object, place, person or deed and have some "unresolved business"
              involving this. Until this business is "resolved", you cannot be
              truly killed. Instead of @Identifier[status:dead]{dying}, you
              escalate, dissipating into a spectral mist and remanifesting as a
              more threatening being at the point your [[lookup name style=lc]]
              originates from.</p><p>It is also possible for you to be "solved"
              if someone addresses whatever it is that is causing you to haunt.
              This typically involves making you come to terms with something
              and could be as simple as convincing you that you are dead and
              telling you how it happened. But it could also be providing some
              sort of justice or revenge or something much more arcane. The
              details differ from @Identifier[creature:haunt]{haunt} to
              @Identifier[creature:haunt]{haunt}, but there are often hints in
              the @Identifier[creature:haunt]{haunt's} behavior and
              surroundings.</p><p>If a creature makes progress towards solving
              you, that reflects in your behavior. You may be less aggressive
              towards them, appear to be listening to what they say, or even
              deescalate.</p>
          powerSources:
            - unknown
          range:
            unit: self
          requirements: <p>You are a @Identifier[creature:haunt]{haunt}.</p>
          targets:
            - self
        transfer: true
        type: ability
      - _id: MUcaDudD3IvRHbuZ
        _key: >-
          !actors.items.effects!a00517cfd7c03d8f.a00517cfd7c03d8f.MUcaDudD3IvRHbuZ
        _stats:
          compendiumSource: Compendium.teriock.abilities.ActiveEffect.1abfbe0001d304a0
          coreVersion: '14'
          lastModifiedBy: teriockBuilder00
          systemId: teriock
          systemVersion: 0.12.73
        img: systems/teriock/src/icons/abilities/haunt-escalation.webp
        name: Haunt Escalation
        system:
          _sup: l0DloLPunYOhfFIU
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          effectTypes:
            - automatic
          executionTime:
            base: r0
          form: special
          identifier: haunt-escalation
          interaction: manifest
          maneuver: reactive
          overview:
            base: >-
              <p>You remanifest at the start of your next turn as an angrier and
              more powerful @Wiki[Category:Undead creatures]{undead} being,
              lashing out at whatever @Identifier[status:dead]{killed} you as
              well as anything else in your way. This resets all
              @Identifier[core:hit-points-and-mana-points]{HP},
              @Identifier[core:hit-points-and-mana-points]{MP}, and temporary
              effects that may be present on you. Every time you escalate, you
              move one step forward on the following track. For instance, if you
              were already a @Identifier[creature:phantom]{phantom}, you would
              escalate into being a
              @Identifier[creature:specter]{specter}.</p><p>@Embed[Compendium.teriock.tables.RollTable.1abfbe0001d304a0]</p><p>Most
              @Identifier[creature:haunt]{haunts} do not escalate past
              @Identifier[creature:wraith]{wraith}. But the
              @Identifier[core:game-master]{GM} may rule that certain especially
              angry or powerful ones have additional
              @Pack[teriock.abilities]{abilities} or escalation steps. If you
              escalate while already fully escalated, you do not change
              @Wiki[Category:Spectral undead creatures]{species} or gain
              additional @Pack[teriock.abilities]{abilities}, but you still
              become more aggressive, harder to solve, and reset all
              @Identifier[core:hit-points-and-mana-points]{HP},
              @Identifier[core:hit-points-and-mana-points]{MP}, and temporary
              effects.</p>
          powerSources:
            - unknown
          range:
            unit: self
          requirements: <p>You are a @Identifier[creature:haunt]{haunt}.</p>
          targets:
            - self
          trigger: >-
            <p>You would @Identifier[status:dead]{die}. This triggers
            automatically. You cannot choose to not use it if you are able
            to.</p>
        transfer: true
        type: ability
      - _id: cCMyCfeaPZ8fenH3
        _key: >-
          !actors.items.effects!a00517cfd7c03d8f.a00517cfd7c03d8f.cCMyCfeaPZ8fenH3
        _stats:
          compendiumSource: Compendium.teriock.abilities.ActiveEffect.539d3a32dcd1f917
          coreVersion: '14'
          lastModifiedBy: teriockBuilder00
          systemId: teriock
          systemVersion: 0.12.73
        img: systems/teriock/src/icons/abilities/haunt-deescalation.webp
        name: Haunt Deescalation
        system:
          _sup: l0DloLPunYOhfFIU
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          effectTypes:
            - automatic
          executionTime:
            base: r0
          form: special
          identifier: haunt-deescalation
          interaction: manifest
          maneuver: reactive
          overview:
            base: >-
              <p>You become a calmer and less powerful @Wiki[Category:Undead
              creatures]{undead} being. Every time you deescalate, you move one
              step back on the following track. For instance, if you were
              already a @Identifier[creature:specter]{specter}, you would
              deescalate into being a
              @Identifier[creature:phantom]{phantom}.</p><p>@Embed[Compendium.teriock.tables.RollTable.1abfbe0001d304a0]</p>
          powerSources:
            - unknown
          range:
            unit: self
          targets:
            - self
          trigger: >-
            <p>24 hours passes without anyone interacting with you or a someone
            makes substantial progress towards resolving whatever it is that is
            causing your haunting in a way that would not aggravate you. This
            triggers automatically. You cannot choose to not use it if you are
            able to.</p>
        transfer: true
        type: ability
