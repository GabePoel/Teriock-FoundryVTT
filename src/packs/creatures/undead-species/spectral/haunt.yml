    system:
      appearance: >-
        <p>Haunts often appear to be transparent @Wiki[Category:Humanoid
        creatures]{humanoids} with the traits of some type of
        @Wiki[Category:Spectral undead creatures]{spectral undead}. But, if
        powerful enough, they may also shape the world around them in a way that
        reflects the time in which they lived or the circumstances of their
        @Identifier[status:dead]{death}.</p>
      br: 15
      competence:
        raw: 1
      description: >-
        <p>Haunts always have some other baseline @Wiki[Category:Spectral undead
        creatures]{spectral undead} that they are. They will
        @Identifier[ability:haunt-escalation]{escalate} or
        @Identifier[ability:haunt-deescalation]{deescalate} from this point.
        Haunts often have additional @Wiki[Category:Abilities]{abilities}
        reflecting who they were in life or whatever it is that is causing them
        to @Identifier[ability:haunting]{haunt}.</p>
