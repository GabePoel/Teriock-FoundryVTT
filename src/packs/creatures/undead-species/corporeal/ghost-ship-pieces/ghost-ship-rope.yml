        img: systems/teriock/src/icons/abilities/constructed-body.webp
        name: Constructed Body
        system:
          automations:
            29b275994cf9f5b1:
              _id: 29b275994cf9f5b1
              competencies:
                - 0
                - 1
                - 2
              formula: 1d10
              heighten:
                - 1
                - 0
              impact: damage
              merge: true
              type: roll
          competence:
            raw: 0
