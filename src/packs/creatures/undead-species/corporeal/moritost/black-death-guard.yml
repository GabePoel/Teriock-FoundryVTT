        img: systems/teriock/src/icons/abilities/constructed-body.webp
        name: Constructed Body
        system:
          automations:
            29b275994cf9f5b1:
              _id: 29b275994cf9f5b1
              formula: 1d10
              impact: damage
              merge: true
              type: roll
          competence:
            raw: 0
          delivery: self
          duration:
            raw: '0'
            unit: unlimited
          executionTime:
            base: passive
