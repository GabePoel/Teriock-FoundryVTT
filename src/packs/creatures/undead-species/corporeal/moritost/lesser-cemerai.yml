          form: normal
          identifier: animate-dead
          interaction: attack
          invoked: true
          limitation: <p>Self only.</p>
          maneuver: active
          overview:
            base: >-
              <p>Target is @Identifier[status:alive]{alive} (but still
              @Wiki[Category:Undead creatures]{undead}) at 1
              @Identifier[core:hit-points-and-mana-points]{HP}, although its
              maximum @Identifier[core:hit-points-and-mana-points]{HP} is halved
              (minimum of 1) until it completes a
              @Identifier[core:short-rest]{short rest}. This does not count as a
              @Wiki[Category:Revival effects]{revival effect}.</p>
            fluent: <p>Target's @Wiki[Core:HP]{HP} is no longer halved.</p>
            proficient: >-
              <p>Target has all @Wiki[Core:HP]{HP} restored, but its maximum
              @Wiki[Core:HP]{HP} is still halved. This does not count as a
              @Wiki[Category:Healing effects]{healing effect}.</p>
          piercing:
            raw: 2
          powerSources:
            - magical
          range:
            unit: contact
          requirements: >-
            <p>Target is @Identifier[status:dead]{dead} and
            @Wiki[Category:Undead creatures]{undead}.</p>
          spell: true
          standard: true
          targets:
            - creature
        transfer: true
        type: ability
      - _id: KnpX8MBXdWTQD4BI
        _key: >-
