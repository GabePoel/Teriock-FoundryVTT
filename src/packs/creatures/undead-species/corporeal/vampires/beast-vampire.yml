            base: >-
              <p>You must @Identifier[drain:mana]{mana drain} at least 1
              creature with @Identifier[core:intelligence]{INT} of 0 or greater
              to @Identifier[status:dead]{death} every day 30 minutes or you
              start taking penalties. If 30 minutes pass and you have not fed,
