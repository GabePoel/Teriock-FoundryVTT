              without feeding, you lose your next largest @Wiki[Core:HP]{hit
              die} and @Wiki[Core:MP]{mana die}. To restore lost
              @Wiki[Core:HP]{hit dice} and @Wiki[Core:MP]{mana dice}, you must
              feed more than normal. If you feed on at least 2 creatures within
              a 30 minute period, you restore 1 lost @Wiki[Core:HP]{hit die} and
