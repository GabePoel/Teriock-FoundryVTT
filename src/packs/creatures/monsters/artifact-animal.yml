      description: >-
        <p>@UUID[Compendium.teriock.tables.RollTable.77cfb7b27d7836e5]{Common
        animals} (or Teriock animals) with the spirit and some of the form of a
        Teriock magic item embedded in it. Most (but not all) of them are items
        that had spirited prior to the Misting. The items must be present as a
        @Pack[teriock.bodyParts]{part} of the @Wiki[Category:Animal
        creatures]{animal}. For example,
        @Identifier[creature:yellow-crab]{yellow crabs} can have magic axes
        embedded in them. If defeated, a @Identifier[tradecraft:hunter]{hunter}
        check can be used to harvest the item with a DC of 5 per
        @Identifier[core:presence]{item tier}. It exists as a temporary item
        with powers that fade after 24 hours. Once the powers fade, the body
        part crumbles away.</p>
