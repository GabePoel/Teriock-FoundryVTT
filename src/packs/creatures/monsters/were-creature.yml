              <i>not</i> consume your
              @Identifier[core:hit-points-and-mana-points]{hit die}. If you were
              @Identifier[condition:dead]{dead} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss, this brings
              you @Identifier[rule:alive]{back to life}. If you take
              @Identifier[damage:fire]{fire damage}, this effect doesn't apply
              on your next @Identifier[core:turns]{turn}. You only
              @Identifier[condition:dead]{die} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss if you start
              your @Identifier[core:turns]{turn} without successfully [[lookup
              name style=lc]]
