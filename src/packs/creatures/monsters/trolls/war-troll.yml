            iCn9pFDIGFJWxm6H:
              _id: iCn9pFDIGFJWxm6H
              activeQualifier: and(not(@status.burned), not(@status.frozen))
              consumeStatDice: false
              forHarm: false
              noStatDice: false
              trigger: turnStart
              type: heal
          competence:
            raw: 1
          costs:
            primary:
              gp:
                formula: "0"
              hp:
                formula: "0"
              lp:
                formula: "0"
              mp:
                formula: "0"
          delivery: self
          duration:
            unit: unlimited
          effectTypes:
            - healing
            - regeneration
            - revival
          executionTime:
            base: passive
          form: special
          identifier: regenerating
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>At the start of each of your @Identifier[core:turns]{turns},
              you @Identifier[core:healing]{heal} and regain that many
              @Identifier[core:hit-points-and-mana-points]{HP}. This does
              <i>not</i> consume your
              @Identifier[core:hit-points-and-mana-points]{hit die}. If you were
              @Identifier[condition:dead]{dead} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss, this brings
              you @Identifier[rule:alive]{back to life}. If you take
              @Identifier[damage:fire]{fire damage}, this effect doesn't apply
              on your next @Identifier[core:turns]{turn}. You only
              @Identifier[condition:dead]{die} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss if you start
              your @Identifier[core:turns]{turn} without successfully [[lookup
              name style=lc]]
              @Identifier[core:hit-points-and-mana-points]{HP}.</p>
          powerSources:
            - primal
          range:
            unit: self
          targets:
            - self
        transfer: true
        type: ability
