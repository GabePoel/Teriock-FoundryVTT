    img: systems/teriock/src/icons/creatures/greater-hydra-body.webp
    name: Greater Hydra Body
    system:
      appearance: >-
        <p>A massive lizard with multiple @Wiki[Category:Snakes]{snake}-like
        heads.</p>
      br: 21
      competence:
        raw: 1
      description: >-
        <p>A single greater hydra is represented by multiple different creatures
        at once. There is one greater hydra body and at least one
        @Identifier[creature:greater-hydra-head]{greater hydra head}. If the
        greater hydra body @Identifier[condition:dead]{dies} then each
        @Identifier[creature:greater-hydra-head]{greater hydra head} does as
        well. Otherwise, each @Identifier[creature:greater-hydra-head]{greater
        hydra head} acts independently. No
        @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
        other than @Identifier[condition:dead]{death} are shared. However, each
        @Identifier[creature:greater-hydra-head]{greater hydra head} cannot go
        more than the greater hydra body's @Identifier[core:size]{SIZE} × 5 feet
        away from the greater hydra body.</p>
      hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
      identifier: greater-hydra-body
      size:
        enabled: true
        max: 10
        min: 8
        value: 8
      statDice:
        hp:
          disabled: false
          formula: (@species.size - 3)d10
          stat: hp
        mp:
          disabled: false
          formula: 1d2
          stat: mp
      traits:
        - animal
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/greater-hydra-body.webp
        ring: true
    type: species
