    folder: bd20345e7214a088
    img: systems/teriock/src/icons/creatures/hydra-body.webp
    name: Hydra Body
    system:
      appearance: >-
        <p>A massive lizard with multiple @Wiki[Category:Snakes]{snake}-like
        heads.</p>
      br: 16
      competence:
        raw: 1
      description: >-
        <p>A single hydra is represented by multiple different creatures at
        once. There is one hydra body and at least one
        @Identifier[creature:hydra-head]{hydra head}. If the hydra body
        @Identifier[condition:dead]{dies} then each
        @Identifier[creature:hydra-head]{hydra head} does as well. Otherwise,
        each @Identifier[creature:hydra-head]{hydra head} acts independently. No
        @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
        other than @Identifier[condition:dead]{death} are shared. However, each
        @Identifier[creature:hydra-head]{hydra head} cannot go more than the
        hydra body's @Identifier[core:size]{SIZE} × 5 feet away from the hydra
        body.</p>
      hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
      identifier: hydra-body
      size:
        enabled: true
        max: 7
        min: 5
        value: 5
      statDice:
        hp:
          disabled: false
          formula: (@species.size - 2)d10
          stat: hp
        mp:
          disabled: false
          formula: 1d2
          stat: mp
      traits:
        - animal
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/hydra-body.webp
        ring: true
    type: species
