        <p>[[lookup name]]s usually attack in large numbers. These creatures are
        ferocious protectors of their territory, and often use weapons to
        excellent effect. Their lack of a bipedal stance means that they cannot
        run while holding weapons so they tend to wear baldrics and sheaths for
        this.</p>
