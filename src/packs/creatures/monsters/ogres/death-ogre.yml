    name: Death Ogre
    system:
      appearance: <p>Ugly muscular humanoids with sharp teeth and olive skin.</p>
      br: 6
      competence:
        raw: 1
      description: >-
        <p>Very smart and solitary. Often cruel and evil. These people look like
        bigger and stronger
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks}.
        @UUID[Compendium.teriock.tables.RollTable.d0620c450e5092db]{Ogres} have
        a wild culture, tending towards solitude and hunting smaller humanoid
        species for food. Relying on superior strength and toughness in combat,
        ogres are known to underestimate their foes. Ogres are often recruited
        by evil armies due to their hunting instincts for humanoids, which are
        their natural prey.</p>
      identifier: death-ogre
      size:
        enabled: true
        value: 5
      statDice:
