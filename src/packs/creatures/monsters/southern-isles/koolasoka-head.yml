    img: systems/teriock/src/icons/creatures/koolasoka-head.webp
    name: Koolasoka Head
    system:
      appearance: >-
        <p>Koolasokas look like giant sea-faring amphibians with striking
        tongues and limbs.</p>
      br: 11
      competence:
        raw: 1
      description: >-
        <p>Koolasokas are found throughout the seas of Teriock in coastal caves
        they always have four legs. A single koolasoka is represented by
        multiple different creatures at once. There is one koolasoka head and at
        least one @Identifier[creature:koolasoka-leg]{koolasoka leg}. If the
        koolasoka head @Identifier[status:dead]{dies} then each
        @Identifier[creature:koolasoka-leg]{koolasoka leg} does as well.
        Otherwise, each @Identifier[creature:koolasoka-leg]{koolasoka leg} acts
        independently. No
        @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
        other than @Identifier[status:dead]{death} are shared. However, each
        @Identifier[creature:koolasoka-leg]{koolasoka leg} cannot go more than
        the koolasoka head's @Identifier[core:size]{SIZE} × 5 feet away from the
        koolasoka head.</p>
      identifier: koolasoka-head
      size:
        enabled: true
        value: 7
      statDice:
        hp:
          disabled: false
          formula: 5d10
        mp:
          disabled: false
          formula: 1d6
      traits:
        - animal
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/koolasoka-head.webp
        ring: true
    type: species
