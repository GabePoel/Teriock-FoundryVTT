    folder: dbf885a327caa735
    img: systems/teriock/src/icons/creatures/mongoose-squirrel.webp
    name: Mongoose Squirrel
    system:
      appearance: >-
        <p>These creatures are typically found in packs of three or more.
        Mongoose squirrels are known to eat
        @Identifier[creature:noble-snake]{noble snake} eggs and pester the
        snakes from their lairs. Despite their seeming animalistic behavior,
        [[lookup name style=lc]]s tend to display traits of intelligence beneath
        the surface (much like @Identifier[creature:toothed-whale]{dolphins} and
        other high functioning mammals).</p>
      br: 8
      competence:
        raw: 1
      description: >-
        <p>@Identifier[creature:halfling]{Halfling}-sized mongooses with
        squirrel tails and gliding membranes like those of flying squirrels.</p>
      identifier: mongoose-squirrel
      size:
        enabled: true
        value: 1
      statDice:
        hp:
          disabled: false
          formula: 1d10
          stat: hp
        mp:
          disabled: false
          formula: 1d10
          stat: mp
      traits:
        - animal
      transformation:
        img: systems/teriock/src/icons/tokens/mongoose-squirrel.webp
        ring: true
    type: species
