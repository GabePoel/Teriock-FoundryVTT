        @Identifier[ability:giant-strength]{Giant Strength} if at least
        @Identifier[core:size]{size} 4.
        @Identifier[ability:supernatural-strength]{Supernatural Strength} if at
        least @Identifier[core:size]{size} 6.
        @Identifier[ability:monstrous-strength]{Monstrous Strength} if at least
        @Identifier[core:size]{size} 8.</p>
