                formula: "0"
                type: description
          delivery: sight
          duration:
            unit: instant
          executionTime:
            base: 10 Minutes
            slow:
              raw: "10"
              unit: minute
          form: normal
          identifier: exorcism
          interaction: manifest
          maneuver: slow
          overview:
            base: >-
              <p>If the target of this ritual is
              @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead},
              it is @Identifier[keyword:incapable]{incapable} of
              @Wiki[Category:Regeneration effects]{regeneration effects} and
              @Wiki[Category:Reanimation effects]{reanimation effects} while
              this ritual is being cast. In addition, any
              @Wiki[Category:Regeneration effects]{regeneration effects} or
              @Wiki[Category:Reanimation effects]{reanimation effects} that
              target them during this time
              @Identifier[core:fizzles]{fizzle}.</p><p>When this ritual is
              completed, make a [[/tc priest]]{priest check} to see if the
              @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead}
              target is destroyed. The check's DC is typically equal to the
              @Wiki[Category:Creatures by BR]{battle rating} of the target's
              @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead
              type}. The @Identifier[core:game-master]{GM} may adjust the DC
              based on other factors as they see fit.</p><p>[[lookup name]] can
              also be used to cleanse effects other than being
              @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead}.
              The @Identifier[core:game-master]{GM} decides the DC of the [[/tc
              priest]]{priest check} based on the severity of the effect being
              cleansed. If the check is successful, the effect is removed and
              the target is destroyed in a similar manner to an
              @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead}
              target. The target pulls stones from the [[/bag]]{death bag} based
              on the severity of the effect being cleansed (see
              @Identifier[core:game-master]{GM}).</p>
            fluent: >-
              <p>You may add @Identifier[core:fluency-bonus]{F} to the [[/tc
              priest]]{priest check} regardless of whether or not you are fluent
              in @Identifier[tradecraft:priest]{priest}.</p>
            proficient: >-
              <p>You may add @Identifier[core:proficiency-bonus]{P} to the [[/tc
              priest]]{priest check} regardless of whether or not you are
              proficient in @Identifier[tradecraft:priest]{priest}.</p>
          powerSources:
            - divine
          range:
            raw: "5"
            unit: ft
          results:
            fail: >-
              <p>You pay an amount of
              @Identifier[core:hit-points-and-mana-points]{MP} and
              @Identifier[core:hit-points-and-mana-points]{HP} equal to the
              [[/tc priest]]{priest check's} DC.</p>
            save: >-
              <p>The target is "destroyed". They
              @Identifier[condition:dead]{die}, they are
              @Identifier[condition:ruined]{ruined}, and they pull additional
              stones from the @Identifier[core:death-bag]{death bag} depending
              on the extent of the undead blight being cleansed from
              them.</p><ul><li>@Identifier[ability:partial-undead]{Partial
              undead}: +1 stone</li>

              <li>@Identifier[ability:minor-undead]{Minor undead}: +2
              stones</li>

              <li>@Identifier[ability:full-undead]{Full undead}: +5 stones</li>

              <li>@Identifier[ability:greater-undead]{Greater undead}: +10
              stones</li></ul><p>The target also pulls an additional stone for
              each century they've spent as an undead creature. Assuming they
              survive, their body must be
              @Identifier[ability:summon-the-dead]{reconstructed} and then they
              can be @Wiki[Category:Revival effects]{revived} in a non-undead
              state.</p>
          ritual: true
          skill: true
          standard: true
          targets:
            - creature
        transfer: true
        type: ability
