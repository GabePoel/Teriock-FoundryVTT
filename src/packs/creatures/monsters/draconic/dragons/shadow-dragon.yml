    name: Rank 1 Assassin
    system:
      _sup: e575cc2833903bfc
      archetype: semi
      class: assassin
      competence:
        raw: 1
      description: >-
        <p>The shadiest of all the classes,
        @Identifier[class:assassin]{Assassins} see life as expendable and
        unimportant. Even their own life is trivial, someone will kill them
        sooner or later. That's life. Life is short and thus
        @Identifier[class:assassin]{Assassins} tend to get to the point quickly,
        literally. Some-what of a martial artist, there is something Zen about
        the @Identifier[class:assassin]{Assassin}'s way, not unlike the
        @Identifier[class:duelist]{Duelist} in that they have strong inner
        motivation, though care nothing for honor.
        @Identifier[class:assassin]{Assassins} try to increase hatred between
        people in the hopes of creating more job opportunities for themselves.
        If you're an @Identifier[class:assassin]{Assassin}, don't think twice
        about killing someone, care little for your own life and cut to the
        chase!</p>
      identifier: rank-1-assassin
      innate: false
      maxAv: 2
      number: 1
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d10
    type: rank
