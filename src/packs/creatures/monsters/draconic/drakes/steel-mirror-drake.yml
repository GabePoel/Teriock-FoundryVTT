    folder: c2095fb63315614f
    img: systems/teriock/src/icons/creatures/steel-mirror-drake.webp
    name: Steel Mirror Drake
    system:
      appearance: >-
        <p>Like a smaller and more aerodynamic
        @Identifier[creature:steel-drake]{steel drake} with giant reflective
        wings and enormous gaping maws.</p>
      br: 14
      competence:
        raw: 1
      description: >-
        <p>This breed of
        @UUID[Compendium.teriock.tables.RollTable.997cd433ccad17d7]{drake} is
        closely related to the
        @UUID[Compendium.teriock.tables.RollTable.ef11f14f1679c1b6]{speed
        drakes} and comes only in certain metallic breeds. Rather than
        propelling themselves against the wind, they extend their enormous
        reflective wings outwards and seem to get pushed by the radiation of the
        sun. While traveling at high speed, these creatures can unhinge their
        jaws and scoop up creatures that pass them by. These creatures' typical
        hunting pattern is to fly straight, use their breath weapon, and quickly
        consume anything that appears in their way. Their prey are often limp
        before they see anything coming.</p>
