        life. The truly altruistic characters, @Identifier[class:life-mage]{Life
        Mages} are known to enter battles on neither side, healing anyone and
        everyone who they can. Obsessed with keeping people alive and conquering
        death, @Identifier[class:life-mage]{Life Mages} are not as righteous as
        the Paladin but much more humble and kind. Shying away from combat, they
        prefer to stand behind the troops, healing when needed. If you are
        playing a @Identifier[class:life-mage]{Life Mage} be helpful, kind and
        loving, protective but committed to saving lives and fighting death.</p>
