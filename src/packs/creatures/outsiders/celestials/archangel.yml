        img: systems/teriock/src/icons/abilities/bless.webp
        name: Bless
        system:
          competence:
            raw: 1
          costs:
            components:
              material:
                description: >-
                  <p>You may sacrifice any material components as a part of this
                  ritual, but you must have a symbol of your deity present.</p>
                type: description
              somatic:
                type: tag
              verbal:
                type: tag
            primary:
              hp:
                description: >-
                  <p>You may sacrifice any amount of health as a part of this
                  ritual.</p>
                type: description
              mp:
                description: >-
                  <p>You may sacrifice any amount of mana as a part of this
                  ritual.</p>
                type: description
          delivery: sight
          duration:
            unit: unlimited
          effectTypes:
            - contract
          executionTime:
            base: Short Rest
            slow:
              unit: shortRest
          form: normal
          identifier: bless
          interaction: manifest
          maneuver: slow
          overview:
            base: >-
              <p>[[lookup name]] is a ritual that improves your
              @Identifier[ability:divine-gift]{Divine Gift}. It follows the same
              rules as that ritual, but allows you to revise and strengthen that
              ritual's effects. Remind the @Identifier[core:game-master]{GM} of
              the effects of your Divine Gift, as they determine the effects of
              this ritual. The improved @Identifier[ability:divine-gift]{Divine
              Gift} still counts as a
              @Identifier[keyword:blessing]{blessing}.</p><p
              class="note"><b>Note:</b> Keep track of your original
              @Identifier[ability:divine-gift]{Divine Gift's} effects. If you
              loose or become @Identifier[keyword:incapable]{incapable} of
              [[lookup name]], your @Identifier[ability:divine-gift]{Divine
              Gift} returns to the state it was in before. If you loose or
              become @Identifier[keyword:incapable]{incapable} of
              @Identifier[ability:divine-gift]{Divine Gift}, then you loose the
              effects of [[lookup name]].</p>
          powerSources:
            - divine
          range:
            raw: '5'
            unit: ft
          requirements: >-
            <p>You already have a @Identifier[ability:divine-gift]{Divine Gift}.
            This ritual can typically be used only once.</p>
          ritual: true
          skill: true
          standard: true
          sustained: true
          targets:
            - creature
        transfer: true
        type: ability
