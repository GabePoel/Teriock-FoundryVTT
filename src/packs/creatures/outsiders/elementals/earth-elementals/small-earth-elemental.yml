          identifier: familiar-bond
          interaction: manifest
          maneuver: slow
          overview:
            base: >-
              <p>[[lookup name]] is a ritual that allows you to bond with an
              animal companion. As part of this ritual, you call an animal to
              you and it chooses whether or not to become your <b>familiar</b>.
              If it chooses to be your familiar, you and it are
              @Wiki[Category:Spiritual effects]{spiritually} bonded. You can
