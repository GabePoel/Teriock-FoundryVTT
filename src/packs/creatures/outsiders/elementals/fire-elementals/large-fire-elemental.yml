              attempting to learn that spell again. The
              @Identifier[core:game-master]{GM} may modify the DC based on the
              spell's complexity, your knowledge of the spell, any special
              training you receive, if the spell's creator is there to assist
              you, or for any other factors they see fit. You may also attempt
              to learn words that you come across as long as they are of
              elements you are @Identifier[core:fluency-bonus]{fluent} in. The
              @Identifier[core:game-master]{GM} may adjust the DC for these as
              they see fit as well, but the default is DC 15 + OP
              @Identifier[core:intelligence]{INT}
