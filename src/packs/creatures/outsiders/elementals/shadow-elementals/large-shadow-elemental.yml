              are @Identifier[core:fluency-bonus]{fluent} in, can make a DC 12 +
              OP @Wiki[Core:INT]{INT} @Identifier[core:feat-interaction]{feat
              save} to attempt to learn it over the course of a
              @Identifier[core:long-rest]{long rest}. If you succeed, you can
              add it to your rotator spell list. If you fail, you are
              @Identifier[keyword:incapable]{incapable} of attempting to learn
              that spell again. The @Identifier[core:game-master]{GM} may modify
              the DC based on the spell's complexity, your knowledge of the
              spell, any special training you receive, if the spell's creator is
              there to assist you, or for any other factors they see fit. You
              may also attempt to learn words that you come across as long as
              they are of elements you are
