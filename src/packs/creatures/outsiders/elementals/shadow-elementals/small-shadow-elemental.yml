        img: systems/teriock/src/icons/abilities/take-amorphous-elemental-form.webp
        name: Take Amorphous Elemental Form
        system:
          competence:
            raw: 0
          delivery: self
          duration:
            unit: instant
          effectTypes:
            - transformation
          executionTime:
            base: a1
          form: special
          identifier: take-amorphous-elemental-form
          interaction: manifest
          maneuver: active
          overview:
            base: >-
              <p>You take on an amorphous form of pure elemental magic. While in
              this state you have all the innate
              @Pack[teriock.abilities]{abilities} and
              @Pack[teriock.classes]{ranks} of your @Wiki[Category:Elemental
              creatures]{creature type}. However, you have no
              @Identifier[body:hand]{hands}, @Identifier[body:foot]{feet},
              @Identifier[body:mouth]{mouth}, nor any other @Wiki[Category:Body
              parts]{body parts}. The one exception to this are the
              @Wiki[Category:Tendrils]{tendrils} of your
              @Wiki[Category:Elemental creatures]{creature type}.</p>
          powerSources:
            - magical
          range:
            unit: self
          requirements: >-
            <p>You are in a
            @Identifier[ability:take-humanoid-elemental-form]{humanoid elemental
            form}.</p>
          targets:
            - self
        transfer: true
        type: ability
