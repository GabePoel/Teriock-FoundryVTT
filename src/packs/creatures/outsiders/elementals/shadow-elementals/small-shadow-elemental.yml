          competence:
            raw: 0
          delivery: missile
          duration:
            unit: instant
          effectTypes:
            - killing
          elements:
            - necromancy
          executionTime:
            base: a1
          form: normal
          heightened: >-
            <p>For each additional
            @Identifier[core:hit-points-and-mana-points]{MP} spent, roll an
