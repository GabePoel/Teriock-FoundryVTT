        img: systems/teriock/src/icons/abilities/summon-the-dead.webp
        name: Summon the Dead
        system:
          competence:
            raw: 0
          costs:
            primary:
              hp:
                description: >-
                  <p>[[lookup name]] costs 0
                  @Identifier[core:hit-points-and-mana-points]{HP} if the body
                  is in your possession. Otherwise, it costs 3
                  @Identifier[core:hit-points-and-mana-points]{HP} per
                  @Identifier[core:size]{size} of the body.</p>
                type: description
              mp:
                description: >-
                  <p>[[lookup name]] costs 0
                  @Identifier[core:hit-points-and-mana-points]{MP} if the body
                  is in your possession. Otherwise, it costs 2
                  @Identifier[core:hit-points-and-mana-points]{MP} per
                  @Identifier[core:size]{size} of the body.</p>
                type: description
          delivery: sight
          duration:
            unit: instant
          effectTypes:
            - summoning
          elements:
            - necromancy
          executionTime:
            base: 10 Minutes
            slow:
              raw: '10'
              unit: minute
          form: normal
          identifier: summon-the-dead
          interaction: manifest
          maneuver: slow
          overview:
            base: >-
              <p>If you have the body of the target in your possession, you can
              put the spirit back into its body such that it is no longer
              @Identifier[status:wisping]{wisping}. The body maintains all
              damage it had when it died.</p>
            proficient: >-
              <p>If the body is thoroughly damaged (such as if it's
              @Identifier[status:ruined]{ruined}) or missing entirely, you can
              expend some of your own life force to recreate the body from the
              spirit for additional
              @Identifier[core:hit-points-and-mana-points]{MP} and
              @Identifier[core:hit-points-and-mana-points]{HP}. The creature is
              still dead, but the body is now intact.</p>
          powerSources:
            - magical
            - primal
            - spiritual
          range:
            raw: '5'
            unit: ft
          requirements: <p>Target must be @Identifier[status:wisping]{wisping}.</p>
          ritual: true
          spell: true
          standard: true
          targets:
            - creature
        transfer: true
        type: ability
