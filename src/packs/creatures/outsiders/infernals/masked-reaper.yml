                  phase: derived
                  priority: 10
                  target: Actor
                  type: upgrade
                  value: 2 * (@rank.mage - 1)
              competencies:
                - 1
              type: changes
            f7da3b5e1992a724:
              _id: f7da3b5e1992a724
              changes:
                - key: system.rotators.max
                  phase: derived
                  priority: 10
                  target: Actor
                  type: upgrade
                  value: 2 * (@rank.mage - 1) + @p
              competencies:
                - 2
              type: changes
          competence:
