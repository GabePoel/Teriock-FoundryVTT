        img: systems/teriock/src/icons/abilities/feeding.webp
        name: Feeding
        system:
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          elements:
            - necromancy
          executionTime:
            base: passive
          form: flaw
          identifier: feeding
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>You must @Identifier[drain:mana]{mana drain} at least 3
              creatures to @Identifier[status:dead]{death} every day 24 hours or
              you start taking penalties. If 24 hours pass and you have not fed,
              you lose your your largest
              @Identifier[core:hit-points-and-mana-points]{hit die} and
              @Identifier[core:hit-points-and-mana-points]{mana die}. Your
              @Identifier[core:hit-points-and-mana-points]{HP} and
              @Identifier[core:hit-points-and-mana-points]{MP} maximums decrease
              by the value of those dice. For each additional 24 hours you go
              without [[lookup name style=lc]], you lose your next largest
              @Identifier[core:hit-points-and-mana-points]{hit die} and
              @Identifier[core:hit-points-and-mana-points]{mana die}. To restore
              lost @Identifier[core:hit-points-and-mana-points]{hit dice} and
              @Identifier[core:hit-points-and-mana-points]{mana dice}, you must
              feed more than normal. If you feed on at least 6 creatures within
              a 24 hour period, you restore 1 lost
              @Identifier[core:hit-points-and-mana-points]{hit die} and
              @Identifier[core:hit-points-and-mana-points]{mana die}.</p>
          powerSources:
            - martial
          range:
            unit: self
          targets:
            - self
        transfer: true
        type: ability
