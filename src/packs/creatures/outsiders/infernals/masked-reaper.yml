        img: systems/teriock/src/icons/abilities/nature-rotators.webp
        name: Nature Rotators
        system:
          automations:
            e789ed5e109ebd1a:
              _id: e789ed5e109ebd1a
              changes:
                - key: system.rotators.max
                  phase: derived
                  priority: 10
                  target: Actor
