          overview:
            base: >-
              <p>At the start of each of your @Identifier[core:turns]{turns},
              you @Identifier[keyword:warded]{warded}
              @Identifier[core:healing]{heal} and regain that many
              @Identifier[core:hit-points-and-mana-points]{HP}. This does
              <i>not</i> consume your @Wiki[Core:HP]{hit die}. If you were
              @Identifier[status:dead]{dead} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss, this brings
              you @Identifier[status:alive]{back to life}. You only
              @Identifier[status:dead]{die} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss if you start
