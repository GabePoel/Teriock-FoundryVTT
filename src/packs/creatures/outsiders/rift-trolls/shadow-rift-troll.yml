              competencies:
                - 2
              deleteOnTurnChange: false
              excludeToken: true
              expandWithToken: true
              innerWidth: '0'
              multi: false
              outerWidth: '0'
              radius: 10 + (10 * @f)
              regionType: circle
              restriction:
                enabled: false
                priority: 0
                type: move
              targeting: false
              type: region
              visibility: 2
          competence:
            raw: 1
          costs:
            primary:
              mp:
                formula: '3'
          delivery: self
          duration:
            unit: unlimited
          effectTypes:
            - control
          elements:
            - necromancy
          executionTime:
            base: passive
          form: special
          identifier: necromancy-element-shaping
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>You have immense control over @Wiki[Category:Necromancy element
              abilities]{elemental necromancy} around you. Any time a
              @Wiki[Category:Necromancy element abilities]{necromancy element
              ability} is executed within range, you and the creature that
              executed it may both make @Identifier[core:presence]{UNP}
              @Identifier[core:feat-interaction]{feat saves}. If you roll at
              least as high as the creature that executed the
              @Wiki[Category:Necromancy element abilities]{ability}, you take
              control over it. This lets you choose a new valid target with its
              range determined from a point of your choosing within the area
              affected by [[lookup name]]. You may also choose to
              @Identifier[core:heightening]{heighten} the
              @Wiki[Category:Necromancy element abilities]{ability} up to
              @Identifier[core:proficiency-bonus]{P} additional times, so long
              as you pay the additional
              @Identifier[core:hit-points-and-mana-points]{MP} to do so.
              Alternatively, you may choose to have the
              @Wiki[Category:Necromancy element abilities]{ability} fizzle. If
              there was no creature that executed the @Wiki[Category:Necromancy
              element abilities]{ability} or you were the one that did so, you
              take control over it without needing to make any
              @Identifier[core:presence]{UNP}
              @Identifier[core:feat-interaction]{feat save}. You also gain
              @Identifier[keyword:limited]{Limited}
              @Identifier[ability:command-elite]{Command Elite}.</p>
            fluent: >-
              <p>The range of this ability increases by 10 ×
              @Identifier[core:fluency-bonus]{F} feet and you may add
              @Identifier[core:fluency-bonus]{F} to the
              @Identifier[core:presence]{UNP}
              @Identifier[core:feat-interaction]{feat saves} you make to take
              take control of @Wiki[Category:Necromancy element
              abilities]{necromancy element abilities} if you wouldn't
              otherwise.</p>
            proficient: >-
              <p>The range of this ability increases by 10 ×
              @Identifier[core:proficiency-bonus]{P} feet and you may add
              @Identifier[core:proficiency-bonus]{P} to the
              @Identifier[core:presence]{UNP}
              @Identifier[core:feat-interaction]{feat saves} you make to take
              take control of @Wiki[Category:Necromancy element
              abilities]{necromancy element abilities} if you wouldn't
              otherwise.</p>
          powerSources:
            - magical
          range:
            unit: self
          targets:
            - area
        transfer: true
        type: ability
