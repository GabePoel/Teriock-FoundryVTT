          interaction: manifest
          maneuver: passive
          mundane: false
          overview:
            base: >-
              <p>At the start of each of your @L[Core:Turns]{turns}, you
              @L[Keyword:Warded]{warded} @L[Core:Healing]{heal} and regain that
              many @L[Core:Hit Points and Mana Points]{HP}. This does <i>not</i>
              consume your @L[Core:HP]{hit die}. If you were
              @L[Condition:Dead]{dead} due to @L[Core:Hit Points and Mana
              Points]{HP} loss, this brings you @L[Condition:Alive]{back to
              life}. You only @L[Condition:Dead]{die} due to @L[Core:Hit Points
              and Mana Points]{HP} loss if you start your @L[Core:Turns]{turn}
              without successfully regenerating @L[Core:Hit Points and Mana
              Points]{HP}. You may do this <i>even if you are
              @L[Condition:Burned]{burned}</i>.</p>
