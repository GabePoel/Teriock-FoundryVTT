              competencies:
                - 2
              deleteOnTurnChange: false
              excludeToken: true
              expandWithToken: true
              innerWidth: '0'
              multi: false
              outerWidth: '0'
              radius: 10 + (10 * @f)
              regionType: circle
              restriction:
                enabled: false
