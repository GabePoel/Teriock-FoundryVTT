        img: systems/teriock/src/icons/abilities/outsider-regenerating.webp
        name: Outsider Regenerating
        system:
          automations:
            1728b3a84ea27844:
              _id: 1728b3a84ea27844
              common:
                - bag
                - revive
              showConfirmationDialog: true
              type: common
            HMVJizUXvyQ9mtt9:
              _id: HMVJizUXvyQ9mtt9
              conditions:
                absent:
                  - frozen
              consumeStatDice: false
              forHarm: false
              noStatDice: false
              trigger: turnStart
              type: heal
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          effectTypes:
            - healing
            - regeneration
            - revival
          executionTime:
            base: passive
          form: special
          identifier: outsider-regenerating
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>At the start of each of your @Identifier[core:turns]{turns},
              you @Identifier[keyword:warded]{warded}
              @Identifier[core:healing]{heal} and regain that many
              @Identifier[core:hit-points-and-mana-points]{HP}. This does
              <i>not</i> consume your @Wiki[Core:HP]{hit die}. If you were
              @Identifier[status:dead]{dead} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss, this brings
              you @Identifier[status:alive]{back to life}. You only
              @Identifier[status:dead]{die} due to
              @Identifier[core:hit-points-and-mana-points]{HP} loss if you start
              your @Identifier[core:turns]{turn} without successfully
              regenerating @Identifier[core:hit-points-and-mana-points]{HP}. You
              may do this <i>even if you are
              @Identifier[status:burned]{burned}</i>.</p>
          powerSources:
            - magical
          range:
            unit: self
          targets:
            - self
        transfer: true
        type: ability
