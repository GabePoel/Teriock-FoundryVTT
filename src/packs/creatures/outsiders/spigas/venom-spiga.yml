      description: >-
        <p>The enchanter of the woods, these wandering spell casters resemble
        Rangers in their wanderlust. More comfortable with @Wiki[Category:Animal
        creatures]{animals} than @Wiki[Category:Humanoid creatures]{people},
        @Identifier[class:nature-mage]{Nature Mages} are always heading to the
        woods and keeping to themselves. Ever in defense of the land,
        @Identifier[class:nature-mage]{Nature Mages} are like environmentalists.
        @Identifier[class:nature-mage]{Nature Mages} are in tune with the world
        at all times. If you are playing a @Identifier[class:nature-mage]{Nature
        Mage} be reclusive, avoiding people if you can, happy in nature and
        eager to leave any civilization.</p>
