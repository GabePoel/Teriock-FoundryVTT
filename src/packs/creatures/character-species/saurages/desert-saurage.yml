        <p>Saurages look like humanoid lizard men and are native to the southern
        deserts in mainland Teriock. Desert saurages are about human sized and
        covered in scales, but have no tails.</p>
      br: 1
      competence:
        raw: 1
      description: >-
        <p>Saurages in Teriock have piercings corresponding to their clan of
        origin. Saurages are generally tribal and often have trouble adjusting
        to cities and guilds.</p>
