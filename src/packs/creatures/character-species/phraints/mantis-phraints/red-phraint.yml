    folder: 08634b691f84308c
    img: systems/teriock/src/icons/creatures/red-phraint.webp
    name: Red Phraint
    system:
      adult: 12
      appearance: >-
        <p>Phraints look like sexless insectoid people. They are like praying
        mantises, but with only two arms and two legs.</p>
      br: 1
      competence:
        raw: 1
      description: >-
        <p>Phraints are from the southern Teriock deserts and have a hive-like
        culture in which they are constantly serving the queen. Phraints do not
        feel emotions though they are often "afraid" of water and incapable of
        swimming. Most common phraints are
        @Identifier[creature:green-phraint]{green} and incapable of going mage,
        though rarely there are red phraints which must go mage and only resist
        fear. Phraint Queen's are @Identifier[creature:gold-phraint]{gold} and
        extremely rare and the only type that can show emotion (no fear
        protection).</p>
      identifier: red-phraint
      lifespan: 100
      size:
        enabled: true
        value: 3
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d10
      transformation:
        img: systems/teriock/src/icons/tokens/red-phraint.webp
        ring: true
    type: species
