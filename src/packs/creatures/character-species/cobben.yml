          form: special
          identifier: spirit-item
          interaction: manifest
          maneuver: active
          overview:
            base: >-
              <p>You summon a @Identifier[property:magic]{magical} item for the
              duration of this effect. The item is the same every time, but is
              unique to you. The @Pack[teriock.equipment]{type of item} is
              determined by the @Identifier[core:game-master]{GM}. The item has
              @Identifier[core:fluency-bonus]{F} number of
              @Pack[teriock.abilities]{abilities}. The
              @Identifier[core:game-master]{GM} decides what these
              @Pack[teriock.abilities]{abilities} are based on your character's
              behavior, actions, and personal development. As you increase in
              @Identifier[core:leveling-up]{LVL}, the item gets more and more
              detailed. The item uses 1 @Identifier[core:presence]{presence
              tier}.</p><p>Upon summoning, the item appears in your hand (if you
              would hold it) and is instantly
              @Identifier[ability:attune]{attuned} and equipped. You must be
              able to @Identifier[ability:attune]{Attune} the item and be able
              to use it in order to summon it.</p><p>If the item is ever
              @Identifier[property:shattered]{shattered}, you
              @Identifier[condition:dead]{die}. If it is ever
              @Identifier[property:destroyed]{destroyed}, you
              @Identifier[condition:dead]{die} and your body is
              @Identifier[condition:ruined]{ruined}.</p>
          powerSources:
            - magical
            - spiritual
          range:
            unit: self
          targets:
            - self
        transfer: true
        type: ability
