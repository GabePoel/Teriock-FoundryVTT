          identifier: gold-joro-channeling
          interaction: manifest
          maneuver: active
          mundane: false
          overview:
            base: >-
              <p>You gain one @L[Category:Abilities]{ability} that your
              @L[Ability:Joro Totem]{Joro Totem} @L[Category:Common animal
              creatures]{species} has. You are not @L[Core:Proficiency
              Bonus]{proficient} nor @L[Core:Fluency Bonus]{fluent} in it.</p>
            fluent: >-
              <p>While executing Gold Joro Chanelling, you may spend 1
              additional @L[Core:Hit Points and Mana Points]{MP} to be
              @L[Core:Fluency Bonus]{fluent} in the
              @L[Category:Abilities]{ability}.</p>
            proficient: >-
              <p>While executing Gold Joro Chanelling, you may spend 1
              additional @L[Core:Hit Points and Mana Points]{MP} to be
              @L[Core:Proficiency Bonus]{proficient} in the
              @L[Category:Abilities]{ability}.</p>
          piercing:
