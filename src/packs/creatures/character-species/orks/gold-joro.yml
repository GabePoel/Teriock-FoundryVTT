    folder: 10c541c05a2efaea
    img: systems/teriock/src/icons/creatures/gold-joro.webp
    name: Gold Joro
    system:
      adult: 12
      appearance: >-
        <p>Like @Identifier[creature:common-ork]{common orks} with more
        @Identifier[creature:human]{human} features, Gold skin, and Gold
        eyes.</p>
      br: 1
      competence:
        raw: 1
      description: >-
        <p>Joro come from Amon and speak an odd language that seems reminiscent
        of @UUID[Compendium.teriock.tables.RollTable.de1d9513b900de6e]{elven}
        and @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orkish}
        languages, but with other odd features as well. Joro typically become
        connected to some totem animal during their childhood and, upon reaching
        adulthood, are able to tap into the powers of this animal.</p>
      identifier: gold-joro
      lifespan: 60
      size:
        enabled: true
        value: 3
      statDice:
        hp:
          disabled: false
          formula: 1d10
          stat: hp
        mp:
          disabled: false
          formula: 1d10
          stat: mp
      traits:
        - humanoid
      transformation:
        img: systems/teriock/src/icons/tokens/gold-joro.webp
        ring: true
    type: species
