    folder: 10c541c05a2efaea
    img: systems/teriock/src/icons/creatures/ogrekai-ork.webp
    name: Ogrekai Ork
    system:
      appearance: >-
        <p>Tall, heavily muscular
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks}.</p>
      br: 5
      competence:
        raw: 1
      description: >-
        <p>Ogrekai are a cross-breed between
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks} and
        @UUID[Compendium.teriock.tables.RollTable.d0620c450e5092db]{ogres}. They
        are very rare and tend not to breed well. An often misunderstood group
        of people,
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks} have a
        wide range of cultures and behaviors. They have evolved to be tougher
        and more resilient than many other species, but due to the harsh climate
        and demands of their region, their culture is similarly rough and
        brutal. They are not evil, but more survival driven, making them prone
        to control by evil forces who tend to use them as troops for their
        strength and resilience.</p>
      identifier: ogrekai-ork
      size:
        enabled: true
        value: 4
      statDice:
        hp:
          disabled: false
          formula: 2d8
        mp:
          disabled: false
          formula: 1d10
      traits:
        - humanoid
      transformation:
        img: systems/teriock/src/icons/tokens/ogrekai-ork.webp
        ring: true
    type: species
