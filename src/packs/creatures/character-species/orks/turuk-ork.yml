    folder: 10c541c05a2efaea
    img: systems/teriock/src/icons/creatures/turuk-ork.webp
    name: Turuk Ork
    system:
      appearance: >-
        <p>Tall, heavily muscular
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks}.</p>
      br: 4
      competence:
        raw: 1
      description: >-
        <p>Tougher, battle-hardened
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks} chesn
        young for harsh training. Turuks tend to be very combat-oriented and are
        rarely @Identifier[archetype:mage]{mages}. Known for their wild and
        effective battle tactics, turuks are deadly foes. An often misunderstood
        group of people,
        @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks} have a
        wide range of cultures and behaviors. They have evolved to be tougher
        and more resilient than many other species, but due to the harsh climate
        and demands of their region, their culture is similarly rough and
        brutal. They are not evil, but more survival driven, making them prone
        to control by evil forces who tend to use them as troops for their
        strength and resilience.</p>
      identifier: turuk-ork
      size:
        enabled: true
        value: 3
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d10
      traits:
        - humanoid
      transformation:
        img: systems/teriock/src/icons/tokens/turuk-ork.webp
        ring: true
    type: species
