        img: systems/teriock/src/icons/abilities/classtoids.webp
        name: Classtoids
        system:
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          executionTime:
            base: passive
          form: special
          identifier: classtoids
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>You do not get to choose what @Wiki[Category:Classes]{classes}
              you go. Instead, they are determined for you through some external
              force. If not otherwise specified by the
              @Identifier[core:game-master]{GM}, this is determined randomly.
              However, you get your first @Wiki[Category:Classes]{rank} at
              @Identifier[core:leveling-up]{level 1} instead of
              @Identifier[core:leveling-up]{level 6}. You are still
              @Identifier[core:proficiency-bonus]{proficient} in the
              @Pack[teriock.abilities]{abilities} you get through this
              @Wiki[Category:Classes]{rank}. This extra
              @Wiki[Category:Classes]{rank} does not give you additional
              @Identifier[core:hit-points-and-mana-points]{hit dice},
              @Identifier[core:hit-points-and-mana-points]{mana dice},
              @Identifier[core:hit-points-and-mana-points]{HP}, or
              @Identifier[core:hit-points-and-mana-points]{MP}.</p><p>Once a
              @Wiki[Category:Classes]{class} is determined, you stick with it
              for two @Wiki[Category:Classes]{ranks}. After that, you will start
              learning a new @Wiki[Category:Classes]{class} and stick with it
              for another two @Wiki[Category:Classes]{ranks}. It is possible to
              get the same @Wiki[Category:Classes]{class} for multiple sets of
              two @Wiki[Category:Classes]{ranks}.</p><p>Every two
              @Wiki[Category:Classes]{ranks}, you gain an additional
              @Wiki[Category:Flaw abilities]{flaw} as well from the following
              list.</p><p>@Embed[Compendium.teriock.tables.RollTable.09fca586eb2cb654
              rollable]</p>
          powerSources:
            - primal
          range:
            unit: self
          targets:
            - self
        transfer: true
        type: ability
