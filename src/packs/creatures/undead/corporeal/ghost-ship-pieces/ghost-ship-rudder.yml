        img: systems/teriock/src/icons/abilities/constructed-body.webp
        name: Constructed Body
        system:
          automations:
            29b275994cf9f5b1:
              _id: 29b275994cf9f5b1
              formula: 1d10
              impact: damage
              type: roll
          competence:
            raw: 1
          delivery: self
          duration:
            unit: unlimited
          executionTime:
            base: passive
          form: normal
          identifier: constructed-body
          improvement: >-
            <p>Your @Identifier[equipment:rudder]{rudder} counts as part of your
            body, it has no minimum @Identifier[core:strength]{strength}
            requirement, and you may
            @Identifier[core:attack-interaction]{attack} with it as though it
            were a
            @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon}.</p>
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>You count as an @Pack[teriock.equipment]{item} for the purposes
              of certain @Wiki[Category:Item target abilities]{abilities that
              target them}. The relevant @Wiki[Category:Item target
              abilities]{abilities} are those would apply one of the following
              @Pack[teriock.properties]{properties} to a piece of
              @Pack[teriock.equipment]{equipment}. You take the effect listed
              below instead. If the @Wiki[Category:Item target
              abilities]{ability} was @Wiki[Category:Magically powered
              abilities]{magically powered}, then any
              @Identifier[core:damage]{damage} dealt is
              @Identifier[damage:magic]{magic} in addition to its other
              @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{types}.
              If the @Wiki[Category:Item target abilities]{ability} was
              delivered by a @Wiki[Category:Weapon delivery abilities]{weapon},
              then the @Identifier[core:damage]{damage} has all the
              @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
              types} that
              @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon}
              would deal in addition to its other
              @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{types}.</p><ul><li>@Identifier[property:destroyed]{Destroyed}:
              Take [[/damage 1d10]] @Identifier[core:damage]{damage}.</li>

              <li>@Identifier[property:shattered]{Shattered}: Take a
              @Identifier[damage:hack]{hack} of your choice.</li>

              <li>@Identifier[property:warded]{Warded}: The next
              @Wiki[Category:Self delivery abilities]{self delivery ability} you
              use is @Identifier[keyword:warded]{warded}.</li></ul><p>For any
              other passive @Pack[teriock.properties]{properties} that the
              @Pack[teriock.equipment]{equipment} may gain, your
              @Pack[teriock.bodyParts]{body parts} gain those
              @Pack[teriock.properties]{properties}. Additionally, any
              @Wiki[Category:AV granting abilities]{natural AV} you may have
              counts as <a
              href="/index.php?title=Equipment:Armor&amp;action=edit&amp;redlink=1"
              class="new" title="Equipment:Armor (page does not
              exist)">armor</a> for these purposes.</p>
          powerSources:
            - martial
          range:
            unit: self
          targets:
            - self
        transfer: true
        type: ability
