          overview:
            base: >-
              <p>You challenge the target to advance and fight you. They may
              immediately @Identifier[ability:move]{Move} towards you as a
              @Identifier[core:reactive-maneuvers]{free reaction} to this and
              begin @Identifier[status:dueling]{dueling} with you. If they
              choose not to or are unable to do so, then they are considered to
              have "forfeited" the [[lookup name style=lc]] (but are not
              considered to have "lost" it). Any creature that forfeits this
              [[lookup name style=lc]] becomes
              @Identifier[status:lighted]{lighted} to each of their would-be
              opponents in the [[lookup name style=lc]] until the end of that
              opponent's next @Identifier[core:turns]{turn}.</p>
            proficient: >-
              <p>You may also @Identifier[ability:move]{Move} or make a
              @Wiki[Category:Single action abilities]{single action}
              @Wiki[Category:Duelist class abilities]{Duelist ability} as a
              @Identifier[core:reactive-maneuvers]{free reaction} to the
              target's decision and subsequent movement.</p>
