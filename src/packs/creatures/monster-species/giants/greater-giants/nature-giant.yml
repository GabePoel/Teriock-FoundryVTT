          competence:
            raw: 0
          costs:
            components:
              material:
                description: >-
                  <p>Something symbolic of the animal you wish to bond with and
                  the relationship you wish to have with it.</p>
                type: description
            primary:
              mp:
                formula: '3'
                type: formula
          delivery: sight
          duration:
            unit: unlimited
