          executionTime:
            base: a1
          form: normal
          heightened: >-
            <p>For each additional
            @Identifier[core:hit-points-and-mana-points]{MP} spent, deal an
            additional [[/damage 1d6[magic]]] or @Identifier[core:healing]{heal}
            the target again (depending on what you chose).</p>
          identifier: empathic-ray
          interaction: attack
          maneuver: active
          overview:
            base: >-
              <p>As you cast [[lookup name]], choose either "damage" or
              "healing". The effect varies depending on what you choose.
              [[lookup name]] only counts as a @Wiki[Category:Damaging
              effects]{damaging effect} if you choose "damage" and only as a
              @Wiki[Category:Healing effects]{healing effect} if you choose
              "healing".</p><p>If you do not take any damage before the start of
              your next @Identifier[core:turns]{turn}, you regain the
              @Identifier[core:hit-points-and-mana-points]{HP} you spent on
              [[lookup name]]. This counts as a @Wiki[Category:Regeneration
              effects]{regeneration effect} and a @Wiki[Category:Healing
              effects]{healing effect}. This is the only part of [[lookup name]]
              that counts as a @Wiki[Category:Regeneration effects]{regeneration
              effect}.</p>
          piercing:
            raw: 1
          powerSources:
            - magical
          range:
            raw: '60'
            unit: ft
          results:
            critHit: >-
              <p>Double the @Identifier[core:damage]{damage dice} dealt by this
              @Pack[teriock.abilities]{ability}. Or, if you chose "healing",
              double the number of times that target
              @Identifier[core:healing]{heals}.</p>
            hit: >-
              <p>Deal [[/damage 1d6[magic]]] @Identifier[core:damage]{damage} to
              target or @Identifier[core:healing]{heal} them (depending on what
              you chose).</p>
          spell: true
          standard: true
