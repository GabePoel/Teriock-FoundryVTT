    folder: dbf885a327caa735
    img: systems/teriock/src/icons/creatures/koolasoka-leg.webp
    name: Koolasoka Leg
    system:
      adult: 0
      appearance: >-
        <p>Koolasokas look like giant sea-faring amphibians with striking
        tongues and limbs.</p>
      br: 6
      competence:
        raw: 1
      description: >-
        <p>Koolasokas are found throughout the seas of Teriock in coastal caves
        they always have four legs. A single koolasoka is represented by
        multiple different creatures at once. There is one @L[Creature:Koolasoka
        Head]{koolasoka head} and at least one <a class="mw-selflink
        selflink">koolasoka leg</a>. If the @L[Creature:Koolasoka
        Head]{koolasoka head} @L[Condition:Dead]{dies} then each <a
        class="mw-selflink selflink">koolasoka leg</a> does as well. Otherwise,
        each <a class="mw-selflink selflink">koolasoka leg</a> acts
        independently. No @L[Category:Conditions]{conditions} other than
        @L[Condition:Dead]{death} are shared. However, each <a
        class="mw-selflink selflink">koolasoka leg</a> cannot go more than the
        @L[Creature:Koolasoka Head]{koolasoka head's} @L[Core:Size]{SIZE} × 5
        feet away from the @L[Creature:Koolasoka Head]{koolasoka head}.</p>
      identifier: koolasoka-leg
      lifespan: 0
      size:
        enabled: true
        value: 4
      statDice:
        hp:
          disabled: false
          formula: 3d10
        mp:
          disabled: false
          formula: 1d2
      traits:
        - animal
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/koolasoka-leg.webp
        ring: true
    type: species
