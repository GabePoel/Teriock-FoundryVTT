        name: Rebirth
        system:
          automations:
            1728b3a84ea27844:
              _id: 1728b3a84ea27844
              common:
                - bag
                - revive
              showConfirmationDialog: true
              type: common
            b44n6ppQ1MLfhoxg:
              _id: b44n6ppQ1MLfhoxg
              consumeStatDice: false
              forHarm: true
              noStatDice: false
              type: heal
          competence:
            raw: 0
          costs:
            components:
              somatic:
                type: tag
              verbal:
                type: tag
            primary:
              mp:
                formula: '1'
                type: formula
          delivery: hand
          duration:
            unit: instant
          effectTypes:
            - healing
            - revival
          elements:
            - life
          executionTime:
            base: a1
          form: special
          heightened: >-
            <p>For each additional
            @Identifier[core:hit-points-and-mana-points]{MP} spent, target can
            have been @Identifier[status:dead]{dead} for an additional 10
            minutes. If target is @Wiki[Category:Undead creatures]{undead}, they
            are @Identifier[core:healing]{healed} an additional time.</p>
          identifier: rebirth
          interaction: attack
          invoked: true
          maneuver: active
          overview:
            fluent: >-
              <p>If target is @Wiki[Category:Undead creatures]{undead}, they are
              @Identifier[core:healing]{healed} for
              @Identifier[core:damage]{damage}
              @Identifier[core:fluency-bonus]{F} times.</p>
            proficient: >-
              <p>If target is @Wiki[Category:Undead creatures]{undead}, they are
              @Identifier[core:healing]{healed} for
              @Identifier[core:damage]{damage}
              @Identifier[core:proficiency-bonus]{P} times.</p>
          piercing:
            raw: 0
          powerSources:
            - magical
          range:
            unit: contact
          requirements: >-
            <p>Target is @Wiki[Category:Undead creatures]{undead} or has
            @Identifier[status:dead]{died} within the last 10 minutes.</p>
          results:
            hit: >-
              <p>If target is @Identifier[status:dead]{dead}, they are brought
              back to life. If they had less than 1
              @Identifier[core:hit-points-and-mana-points]{HP}, they have 1
              @Identifier[core:hit-points-and-mana-points]{HP}. If they had less
              than 1 @Identifier[core:hit-points-and-mana-points]{MP}, they have
              1 @Identifier[core:hit-points-and-mana-points]{MP}. Otherwise,
              their @Identifier[core:hit-points-and-mana-points]{HP} and
              @Identifier[core:hit-points-and-mana-points]{MP} do not change. If
              target is @Wiki[Category:Undead creatures]{undead}, you can choose
              to have them be @Identifier[core:healing]{healed} for
              @Identifier[core:damage]{damage}. [[lookup name]] does not count
              as a @Wiki[Category:Healing effects]{healing effect} unless you
              choose to @Identifier[core:healing]{heal} with it.</p>
          rotator: true
          spell: true
          standard: true
          targets:
            - creature
        transfer: true
        type: ability
