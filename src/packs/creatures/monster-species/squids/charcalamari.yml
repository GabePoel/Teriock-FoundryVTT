            <p>Target is neither @Identifier[status:dead]{dead} nor
            @Wiki[Category:Undead creatures]{undead}.</p>
          results:
            critHit: <p>Double the number of dice rolled.</p>
            hit: >-
              <p>Roll [[/kill 2d6]] if this is greater than or equal to the
