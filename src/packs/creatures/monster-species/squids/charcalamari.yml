        img: systems/teriock/src/icons/abilities/disable-ray.webp
        name: Disable Ray
        system:
          automations:
            d635eb44dba086dd:
              _id: d635eb44dba086dd
              combat:
                what:
                  roll: 2d4kh1
                  threshold: 4
                  type: rolled
                when:
                  skip: 0
                  time: end
                  trigger: turn
                who:
                  type: target
              override:
                combat: true
              type: expiration
          competence:
            raw: 0
          costs:
            primary:
              mp:
                description: >-
                  <p>This costs 0
                  @Identifier[core:hit-points-and-mana-points]{MP} if the
                  triggering @Pack[teriock.abilities]{ability} was used on you
                  or some @Pack[teriock.equipment]{equipment} you
                  @Identifier[keyword:bearing]{bear}. It costs 1
                  @Identifier[core:hit-points-and-mana-points]{MP}
                  otherwise.</p>
                type: description
          delivery: missile
          duration:
            raw: '1'
            unit: minute
          endCondition: >-
            <p>At the end of each of the target's
            @Identifier[core:turns]{turns}, they roll [[/roll 2d4]]. If either
            of these dice roll a 4, this effect ends.</p>
          executionTime:
            base: r1
          form: normal
          identifier: disable-ray
          interaction: attack
          maneuver: reactive
          overview:
            proficient: >-
              <p>This also makes the effect of that
              @Pack[teriock.abilities]{ability}
              @Identifier[core:fizzles]{fizzle}.</p>
          piercing:
            raw: 1
          powerSources:
            - spiritual
          range:
            raw: '60'
            unit: ft
          requirements: <p>You may only target the triggering creature.</p>
          results:
            hit: >-
              <p>Target becomes @Identifier[keyword:incapable]{incapable} of the
              @Pack[teriock.abilities]{ability} they were using.</p>
          skill: true
          standard: true
          targets:
            - creature
          trigger: >-
            <p>Another creature uses a
            non-@Identifier[power:basic-abilities]{basic} @Wiki[Category:Active
