    folder: aa772458d708a91e
    img: systems/teriock/src/icons/creatures/kraken-arm.webp
    name: Kraken Arm
    system:
      appearance: <p>A huge scaly tentacle.</p>
      br: 7
      competence:
        raw: 1
      description: >-
        <p>A single kraken is represented by multiple different creatures at
        once. There is one @Identifier[creature:kraken-head]{kraken head} and at
        least one <a class="mw-selflink selflink">kraken arm</a>. If the
        @Identifier[creature:kraken-head]{kraken head}
        @Identifier[status:dead]{dies} then each <a class="mw-selflink
        selflink">kraken arm</a> does as well. Otherwise, each <a
        class="mw-selflink selflink">kraken arm</a> acts independently. No
        @Wiki[Category:Conditions]{conditions} other than
        @Identifier[status:dead]{death} are shared. However, each <a
        class="mw-selflink selflink">kraken arm</a> cannot go more than the
        @Identifier[creature:kraken-head]{kraken head's}
        @Identifier[core:size]{SIZE} × 5 feet away from the
        @Identifier[creature:kraken-head]{kraken head}.</p>
      identifier: kraken-arm
      size:
        enabled: true
        value: 3
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d6
      traits:
        - animal
        - aquatic
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/kraken-arm.webp
        ring: true
    type: species
