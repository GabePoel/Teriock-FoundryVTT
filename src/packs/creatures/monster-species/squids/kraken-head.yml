    folder: aa772458d708a91e
    img: systems/teriock/src/icons/creatures/kraken-head.webp
    name: Kraken Head
    system:
      adult: 0
      appearance: <p>An enormous squid covered in scaly armor.</p>
      br: 18
      competence:
        raw: 1
      description: >-
        <p>A single kraken is represented by multiple different creatures at
        once. There is one <a class="mw-selflink selflink">kraken head</a> and
        at least one @L[Creature:Kraken Arm]{kraken arm}. If the <a
        class="mw-selflink selflink">kraken head</a> @L[Condition:Dead]{dies}
        then each @L[Creature:Kraken Arm]{kraken arm} does as well. Otherwise,
        each @L[Creature:Kraken Arm]{kraken arm} acts independently. No
        @L[Category:Conditions]{conditions} other than @L[Condition:Dead]{death}
        are shared. However, each @L[Creature:Kraken Arm]{kraken arm} cannot go
        more than the <a class="mw-selflink selflink">kraken head's</a>
        @L[Core:Size]{SIZE} × 5 feet away from the <a class="mw-selflink
        selflink">kraken head</a>.</p>
      hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
      identifier: kraken-head
      lifespan: 0
      size:
        enabled: true
        max: 7
        min: 5
        value: 5
      statDice:
        hp:
          disabled: false
          formula: (@species.size - 1)d10
        mp:
          disabled: false
          formula: 1d10
      traits:
        - animal
        - aquatic
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/kraken-head.webp
        ring: true
    type: species
