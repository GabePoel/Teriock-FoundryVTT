        No @L[Category:Conditions]{conditions} other than
        @L[Condition:Dead]{death} are shared. However, each <a
        class="mw-selflink selflink">greater kraken arm</a> cannot go more than
        the @L[Creature:Greater Kraken Head]{greater kraken head's}
        @L[Core:Size]{SIZE} × 5 feet away from the @L[Creature:Greater Kraken
        Head]{greater kraken head}.</p>
