      appearance: >-
        <p>Similar to @L[Creature:Green Dragon]{green dragons}, but smaller and
        more bestial.</p>
      br: 13
      competence:
        raw: 1
      description: >-
        <p>These "half-dragons" are a hybrid of @L[Category:Dragons]{dragons}
        created by @L[Core:Elder Sorcery]{Elder Sorcery}.
        @L[Category:Dragons]{Dragons} hate these beasts, who possess little
        intelligence beyond the desire to kill. Drakes can be ridden and are
        often found as mounts for imperial guards. They spawn drakespawn.</p>
