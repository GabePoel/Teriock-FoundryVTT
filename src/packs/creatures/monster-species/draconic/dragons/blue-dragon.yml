        img: systems/teriock/src/icons/abilities/elder-sorcery-creation.webp
        name: Elder Sorcery Creation
        system:
          _sup: Fd2kOZ1CEYqnQhqc
          competence:
            raw: 0
          costs:
            components:
              material:
                description: >-
                  <p>Creation cost is at least 3 × the material components of
                  the spell itself.</p>
                type: description
            primary:
              hp:
                description: >-
                  <p>Creation cost is at least 3 × @L[Core:HP]{HP} of the spell
                  itself.</p>
                type: description
              mp:
                description: >-
                  <p>Creation cost is at least 1 @L[Core:MP]{MP} per
                  @L[Core:Elder Sorcery]{OP} of <i>each</i> word in the spell
                  plus 3 × @L[Core:MP]{MP} of the spell itself.</p>
