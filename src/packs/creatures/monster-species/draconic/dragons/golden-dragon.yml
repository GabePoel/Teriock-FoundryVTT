        img: systems/teriock/src/icons/abilities/clan-fealty.webp
        name: Clan Fealty
        system:
          competence:
            raw: 0
          delivery: self
          duration:
            unit: unlimited
          executionTime:
            base: passive
          form: normal
          identifier: clan-fealty
          interaction: manifest
          maneuver: passive
          overview:
            base: >-
              <p>You may declare "fealty" 1 group or individual. You are said to
              have declared fealty to these individuals and members of these
              groups. They must accept your declaration of fealty and can revoke
              it at any time. You get bonuses while defending, fighting with, or
              doing a quest given by something or someone you have declared
              fealty to, you get various bonuses. They are as
              follows.</p><ul><li>@Identifier[keyword:adept]{Adept} at
              @Identifier[ability:duel-swap]{Duel Swap} with creatures you have
              declared fealty to.</li>

              <li>If you have @Identifier[ability:resolve-conflict]{Resolve
              Conflict}, it is @Identifier[keyword:warded]{warded} when used in
              defense of those you have declared fealty to, or when used in the
              interest of a quest given by them.</li>

              <li>@Identifier[ability:tea-ceremony]{Tea Ceremony} is
              @Identifier[keyword:warded]{warded} on those you have declared
              fealty to and costs one less
              @Identifier[core:hit-points-and-mana-points]{MP} per participant
              you've declared fealty to.</li></ul><div
              style="padding:0em"></div>
            fluent: >-
              <p>You may declare "fealty" to up to
              @Identifier[core:fluency-bonus]{F} groups or individuals.</p>
            proficient: >-
              <p>You may declare "fealty" to up to
              @Identifier[core:proficiency-bonus]{P} groups or individuals.</p>
          powerSources:
            - spiritual
          range:
            unit: self
          skill: true
          standard: true
          targets:
            - self
        transfer: true
        type: ability
