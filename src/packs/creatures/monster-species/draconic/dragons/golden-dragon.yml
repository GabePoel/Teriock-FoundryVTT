              <p>The target leaves their @Identifier[status:dueling]{duel} and
              you enter in their place. This does not end the
              @Identifier[status:dueling]{duel} and the target is not considered
              to have "lost" or "forfeited". Any @Wiki[Category:Duel modifying
              effects]{duel modifying effects} remain in place.</p><div
              class="note"><b>Note:</b> This ability costs no
              @Identifier[core:hit-points-and-mana-points]{MP} to use on
