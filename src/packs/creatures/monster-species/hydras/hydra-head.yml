        <p>A massive lizard with multiple @Wiki[Category:Snakes]{snake}-like
        heads.</p>
      br: 8
      competence:
        raw: 1
      description: >-
        <p>A single hydra is represented by multiple different creatures at
        once. There is one @Identifier[creature:hydra-body]{hydra body} and at
        least one <a class="mw-selflink selflink">hydra head</a>. If the
        @Identifier[creature:hydra-body]{hydra body}
        @Identifier[status:dead]{dies} then each <a class="mw-selflink
        selflink">hydra head</a> does as well. Otherwise, each <a
        class="mw-selflink selflink">hydra head</a> acts independently. No
        @Wiki[Category:Conditions]{conditions} other than
        @Identifier[status:dead]{death} are shared. However, each <a
        class="mw-selflink selflink">hydra head</a> cannot go more than the
        @Identifier[creature:hydra-body]{hydra body's}
        @Identifier[core:size]{SIZE} × 5 feet away from the
        @Identifier[creature:hydra-body]{hydra body}.</p>
      identifier: hydra-head
      size:
        enabled: true
        value: 2
      statDice:
        hp:
          disabled: false
          formula: 2d10
        mp:
          disabled: false
          formula: 1d6
      traits:
        - animal
