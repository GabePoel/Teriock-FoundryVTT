    img: systems/teriock/src/icons/creatures/greater-hydra-head.webp
    name: Greater Hydra Head
    system:
      adult: 0
      appearance: >-
        <p>A massive lizard with multiple @L[Category:Snakes]{snake}-like
        heads.</p>
      br: 13
      competence:
        raw: 1
      description: >-
        <p>A single greater hydra is represented by multiple different creatures
        at once. There is one @L[Creature:Greater Hydra Body]{greater hydra
        body} and at least one <a class="mw-selflink selflink">greater hydra
        head</a>. If the @L[Creature:Greater Hydra Body]{greater hydra body}
        @L[Condition:Dead]{dies} then each <a class="mw-selflink
        selflink">greater hydra head</a> does as well. Otherwise, each <a
        class="mw-selflink selflink">greater hydra head</a> acts independently.
        No @L[Category:Conditions]{conditions} other than
        @L[Condition:Dead]{death} are shared. However, each <a
        class="mw-selflink selflink">greater hydra head</a> cannot go more than
        the @L[Creature:Greater Hydra Body]{greater hydra body's}
        @L[Core:Size]{SIZE} × 5 feet away from the @L[Creature:Greater Hydra
        Body]{greater hydra body}.</p>
      identifier: greater-hydra-head
      lifespan: 0
      size:
        enabled: true
        value: 4
      statDice:
        hp:
          disabled: false
          formula: 2d10
        mp:
          disabled: false
          formula: 1d6
      traits:
        - animal
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/greater-hydra-head.webp
        ring: true
    type: species
