    img: systems/teriock/src/icons/creatures/death-ogre.webp
    name: Death Ogre
    system:
      appearance: <p>Ugly muscular humanoids with sharp teeth and olive skin.</p>
      br: 6
      competence:
        raw: 1
      description: >-
        <p>Very smart and solitary. Often cruel and evil. These people look like
        bigger and stronger @L[Category:Orks]{orks}. @L[Category:Ogres]{Ogres}
        have a wild culture, tending towards solitude and hunting smaller
        humanoid species for food. Relying on superior strength and toughness in
        combat, ogres are known to underestimate their foes. Ogres are often
        recruited by evil armies due to their hunting instincts for humanoids,
        which are their natural prey.</p>
      identifier: death-ogre
      size:
        enabled: true
        value: 5
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d12
      traits:
        - partialHumanoid
        - monstrous
      transformation:
        img: systems/teriock/src/icons/tokens/death-ogre.webp
        ring: true
    type: species
