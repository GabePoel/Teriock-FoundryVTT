    folder: d0620c450e5092db
    img: systems/teriock/src/icons/creatures/dark-ogre.webp
    name: Dark Ogre
    system:
      appearance: <p>Ugly muscular humanoids with sharp teeth and blue-green skin.</p>
      br: 5
      competence:
        raw: 1
      description: >-
        <p>Dark ogres are a cross between
        @Identifier[creature:death-ogre]{death} and
        @Identifier[creature:common-ogre]{common ogres}. Smarter and solitary,
        they tend to be cruel and dangerous. These people look like bigger and
        stronger @Wiki[Category:Orks]{orks}. @Wiki[Category:Ogres]{Ogres} have a
        wild culture, tending towards solitude and hunting smaller humanoid
        species for food. Relying on superior strength and toughness in combat,
        ogres are known to underestimate their foes. Ogres are often recruited
        by evil armies due to their hunting instincts for humanoids, which are
        their natural prey.</p>
      identifier: dark-ogre
      size:
        enabled: true
        value: 5
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d10
      traits:
        - monstrous
        - partialHumanoid
      transformation:
        img: systems/teriock/src/icons/tokens/dark-ogre.webp
        ring: true
    type: species
