    name: Grey Ogre
    system:
      appearance: <p>Ugly muscular humanoids with sharp teeth and grayish skin.</p>
      br: 4
      competence:
        raw: 1
      description: >-
        <p>Grey ogres are terrified of magic and will flee from it. These people
        look like bigger and stronger @Wiki[Category:Orks]{orks}.
        @Wiki[Category:Ogres]{Ogres} have a wild culture, tending towards
        solitude and hunting smaller humanoid species for food. Relying on
        superior strength and toughness in combat, ogres are known to
        underestimate their foes. Ogres are often recruited by evil armies due
        to their hunting instincts for humanoids, which are their natural
        prey.</p>
      identifier: grey-ogre
      size:
        enabled: true
        value: 5
      statDice:
        hp:
          disabled: false
          formula: 1d10
        mp:
          disabled: false
          formula: 1d8
      traits:
        - monstrous
        - partialHumanoid
      transformation:
