              @L[Category:Abilities]{ability}. Or, if you chose "healing",
              double the number of times that target
              @L[Core:Healing]{heals}.</p>
            hit: >-
              <p>Deal [[/damage 1d6[magic]]] @L[Core:Damage]{damage} to target
              or @L[Core:Healing]{heal} them (depending on what you chose).</p>
