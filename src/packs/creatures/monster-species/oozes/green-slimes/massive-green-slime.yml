            base: >-
              <p>You may ask a question to a deity or other supernatural being
              with which you have a connection and receive a
              @Identifier[keyword:visions]{vision} in response. There are
              limitations on how often you can do this and the strength of the
              answer you receive. Once per @Identifier[core:short-rest]{short
              rest}, you may ask a question and get a
              @Identifier[keyword:visions]{minor vision} in response. If you are
              at a place of great power or significance to the deity or entity
              you are asking, you will receive a
              @Identifier[keyword:visions]{full vision} instead.</p>
            fluent: >-
              <p>Your @Identifier[core:short-rest]{short rest} questions receive
              a @Identifier[keyword:visions]{full vision} and your
              @Identifier[core:long-rest]{long rest} questions receive a
              @Identifier[keyword:visions]{greater vision}. If you are at a
              place of great power or significance to the deity or entity you
              are asking, your visions are made even more powerful at
              @Identifier[core:game-master]{GM} discretion.</p>
            proficient: >-
              <p>Once per @Identifier[core:long-rest]{long rest}, you may ask a
              question and get a @Identifier[keyword:visions]{full vision} in
              response. If you are at a place of great power or significance to
              the deity or entity you are asking, you will receive a
              @Identifier[keyword:visions]{greater vision} instead.</p>
