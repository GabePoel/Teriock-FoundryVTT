        <p>Strangely elongated and carnivorous @Wiki[Category:Goblins]{goblins}
        that almost appear to be on stilts.</p>
      br: 5
      competence:
        raw: 1
      description: >-
        <p>The origin of brittlemen is unknown. They are often said to be some
        sort of drakespawn or some sort of failed species creation attempt.
        Brittlemen tend to attack in hordes, eating whatever they can find. They
        use @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons}
        if they can find them.</p>
      identifier: brittleman
      size:
