  identifier: delay
  interaction: manifest
  maneuver: active
  overview:
    base: >-
      <p>Rather than acting now, you [[lookup name style=lc]] until a later
      time. The rest of your @Identifier[core:turns]{turn} doesn't happen yet.
      Instead, you're removed from the initiative order. You can return to the
      initiative order at the end of any other creature's turn. This permanently
      changes your initiative to the new position. You can't use any
      @Wiki[Category:Reaction abilities]{reaction abilities} until you return to
      the initiative order. If you [[lookup name]] for an entire
      @Identifier[core:rounds]{round} without returning to the initiative order,
      the actions from the [[lookup name style=lc]]ed turn are lost, your
      initiative order doesn't change, and your next turn occurs at your
      original position in the initiative order.</p><p>When you use [[lookup
      name]], any negative effects that normally occur at the start or end of
      your turn occur immediately when you use the [[lookup name style=lc]]ed
      action. Any beneficial effects that would end at any point during your
      turn also end. The @Identifier[core:game-master]{GM} might determine that
      other effects end when you use [[lookup name]] as well. Essentially, you
      can't [[lookup name]] to avoid negative consequences that would happen on
      your turn or to extend beneficial effects that would end on your turn.</p>
  powerSources:
    - martial
  range:
    unit: self
  targets:
    - self
transfer: true
type: ability
