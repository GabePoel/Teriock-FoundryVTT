  overview:
    base: >-
      <p>You take on an amorphous form of pure elemental magic. While in this
      state you have all the innate @Pack[teriock.abilities]{abilities} and
      @Pack[teriock.classes]{ranks} of your
      @UUID[Compendium.teriock.tables.RollTable.515508e582a2a4db]{creature
      type}. However, you have no @Identifier[body:hand]{hands},
      @Identifier[body:foot]{feet}, @Identifier[body:mouth]{mouth}, nor any
      other @Pack[teriock.bodyParts]{body parts}. The one exception to this are
      the @UUID[Compendium.teriock.tables.RollTable.1AsIvEE39D9t0hkp]{tendrils}
      of your
      @UUID[Compendium.teriock.tables.RollTable.515508e582a2a4db]{creature
      type}.</p>
