  mundane: false
  overview:
    base: >-
      <p>Set up a ritual space no greater than 30 feet wide in any direction
      that a @L[Condition:Dueling]{duel} will take place in. You must be the
      only creature within this ritual space. The target then makes their
      @L[Core:Presence]{UNP} @L[Core:Feat Interaction]{feat save}. They adds
      their @L[Core:Fluency Bonus]{fluency bonus} to their @L[Core:Feat
      Interaction]{feat} roll against you in <i>addition</i> to any
      @L[Core:Presence]{UNP} bonuses (including @L[Core:Proficiency
      Bonus]{proficiency} and @L[Core:Fluency Bonus]{fluency}) that they may
      have. They do not get this bonus if you speak their @L[Core:Elder
      Sorcery]{true name} as a part of this ritual's incantation. The
      @L[Core:Game Master]{GM} may also adjust the target's bonus up or down for
      other reasons at their discretion. If the target is aware that you are
      hunting them, they make their roll with @L[Core:Advantage]{advantage}.</p>
    fluent: >-
      <p>The range of this ritual becomes 10 × @L[Core:Fluency Bonus]{F} miles
      and the number of additional creatures you can bring increases to
      @L[Core:Fluency Bonus]{F}.</p>
    proficient: >-
      <p>The range of this ritual becomes 10 × @L[Core:Proficiency Bonus]{P}
      miles. You may also have up to @L[Core:Proficiency Bonus]{P} additional
      creatures be within the ritual space as you use [[lookup name]]. They will
      be part of the @L[Condition:Dueling]{duel}. However, the target may choose
      to bring a number of creatures with them equal to the number that you have
      joining you. The target must select from creatures they have no debt to
      and can only be creatures within their proximity at the moment [[lookup
      name]] is executed. The @L[Core:Battle Rating]{BR} and @L[Core:Leveling
      Up]{LVL} of each creature the target brings cannot exceed their own. The
      @L[Condition:Dueling]{duel} still ends when either you or the target
      @L[Condition:Dead]{dies}.</p>
  piercing:
    raw: 0
  powerSources:
    - divine
    - financial
  range:
    unit: self
  requirements: >-
    <p>Target must be behind on paying a debt to you or an entity you
    represent.</p>
  results:
    fail: >-
      <p>Target is summoned to within the ritual and is forced into a
      @L[Condition:Dueling]{duel} with you. This @L[Condition:Dueling]{duel} is
      @L[Category:Duel modifying effects]{modified} such that nobody can exit or
      enter the space until the @L[Condition:Dueling]{duel} is complete.
      Creatures within the space cannot affect creatures outside it or vice
      versa. The @L[Condition:Dueling]{duel} only ends if either you or the
      target @L[Condition:Dead]{die}. It cannot be forfeited. If you lose, the
      target can choose to remain in the site of the ritual or return to where
      it came from. If you win, the target is forced to remain at the ritual
      site. These are @L[Category:Duel modifying effects]{duel modifying
      effects}. So, if @L[Ability:Reactive Bow Out]{Reactive Bow Out} is used on
      [[lookup name]], it becomes an ordinary @L[Condition:Dueling]{duel}.
      @L[Ability:Duel Swap]{Duel Swap} can be used to change places with a
      creature within the @L[Condition:Dueling]{duel} from outside it.</p>
    save: >-
      <p>Target is aware that you are hunting them, becomes
      @L[Keyword:Resistance]{resistant} to your @L[Category:Divinely powered
      abilities]{divine abilities}, and you become
      @L[Keyword:Incapable]{incapable} of targeting them with [[lookup name]]
      for 1 week.</p>
  ritual: true
  skill: true
  standard: true
  targets:
    - creature
transfer: true
type: ability
