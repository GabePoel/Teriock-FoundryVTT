name: Debtor Hunter
system:
  automations:
    WkRS2uec1XQaiYlY:
      _id: WkRS2uec1XQaiYlY
      executor: false
      multi: true
      relation: include
      status: dueling
      target: false
      type: status
  competence:
    raw: 0
  costs:
    components:
      material:
        description: >-
          <p>Something symbolic of your deity. A contract of a debt of the same
          type as the one violated by the creature being summoned.</p>
        type: description
    primary:
      mp:
        formula: '1'
        type: formula
  delivery: self
  duration:
    unit: unlimited
  effectTypes:
    - displacement
    - duelModifying
    - longRange
  executionTime:
    base: 10 Minutes
    slow:
      raw: '10'
      unit: minute
  featSaveAttribute: unp
  form: normal
  identifier: debtor-hunter
  interaction: feat
  maneuver: slow
  overview:
    base: >-
      <p>Set up a ritual space no greater than 30 feet wide in any direction
      that a @Identifier[status:dueling]{duel} will take place in. You must be
      the only creature within this ritual space. The target then makes their
      @Identifier[core:presence]{UNP} @Identifier[core:feat-interaction]{feat
      save}. They adds their @Identifier[core:fluency-bonus]{fluency bonus} to
      their @Identifier[core:feat-interaction]{feat} roll against you in
      <i>addition</i> to any @Identifier[core:presence]{UNP} bonuses (including
      @Identifier[core:proficiency-bonus]{proficiency} and
      @Identifier[core:fluency-bonus]{fluency}) that they may have. They do not
      get this bonus if you speak their @Identifier[core:elder-sorcery]{true
      name} as a part of this ritual's incantation. The
      @Identifier[core:game-master]{GM} may also adjust the target's bonus up or
      down for other reasons at their discretion. If the target is aware that
      you are hunting them, they make their roll with
      @Identifier[core:advantage]{advantage}.</p>
    fluent: >-
      <p>The range of this ritual becomes 10 ×
      @Identifier[core:fluency-bonus]{F} miles and the number of additional
      creatures you can bring increases to
      @Identifier[core:fluency-bonus]{F}.</p>
    proficient: >-
      <p>The range of this ritual becomes 10 ×
      @Identifier[core:proficiency-bonus]{P} miles. You may also have up to
      @Identifier[core:proficiency-bonus]{P} additional creatures be within the
      ritual space as you use [[lookup name]]. They will be part of the
      @Identifier[status:dueling]{duel}. However, the target may choose to bring
      a number of creatures with them equal to the number that you have joining
      you. The target must select from creatures they have no debt to and can
      only be creatures within their proximity at the moment [[lookup name]] is
      executed. The @Identifier[core:battle-rating]{BR} and
      @Identifier[core:leveling-up]{LVL} of each creature the target brings
      cannot exceed their own. The @Identifier[status:dueling]{duel} still ends
      when either you or the target @Identifier[status:dead]{dies}.</p>
  powerSources:
    - divine
    - financial
  range:
    unit: self
  requirements: >-
    <p>Target must be behind on paying a debt to you or an entity you
    represent.</p>
  results:
    fail: >-
      <p>Target is summoned to within the ritual and is forced into a
      @Identifier[status:dueling]{duel} with you. This
      @Identifier[status:dueling]{duel} is @Wiki[Category:Duel modifying
      effects]{modified} such that nobody can exit or enter the space until the
      @Identifier[status:dueling]{duel} is complete. Creatures within the space
      cannot affect creatures outside it or vice versa. The
      @Identifier[status:dueling]{duel} only ends if either you or the target
      @Identifier[status:dead]{die}. It cannot be forfeited. If you lose, the
      target can choose to remain in the site of the ritual or return to where
      it came from. If you win, the target is forced to remain at the ritual
      site. These are @Wiki[Category:Duel modifying effects]{duel modifying
      effects}. So, if @Identifier[ability:reactive-bow-out]{Reactive Bow Out}
      is used on [[lookup name]], it becomes an ordinary
      @Identifier[status:dueling]{duel}. @Identifier[ability:duel-swap]{Duel
      Swap} can be used to change places with a creature within the
      @Identifier[status:dueling]{duel} from outside it.</p>
    save: >-
      <p>Target is aware that you are hunting them, becomes
      @Identifier[keyword:resistance]{resistant} to your @Wiki[Category:Divinely
      powered abilities]{divine abilities}, and you become
      @Identifier[keyword:incapable]{incapable} of targeting them with [[lookup
      name]] for 1 week.</p>
  ritual: true
  skill: true
  standard: true
  targets:
    - creature
transfer: true
type: ability
