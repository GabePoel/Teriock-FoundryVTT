  executionTime:
    base: r0
  form: normal
  identifier: combo
  interaction: manifest
  maneuver: reactive
  overview:
    base: >-
      <p>You gain a benefit that you can expend in one of following ways of your
      choosing.</p><dl><dt>Attack [[lookup name]]</dt>

      <dd>The next @Identifier[core:attack-interaction]{attack} you make is
      @Identifier[keyword:armor-voiding]{AV0}.</dd>

      <dt>Check [[lookup name]]</dt>

      <dd>The next time you @Identifier[ability:attempt-check]{Attempt Check}
      you do so with @Identifier[core:advantage]{advantage}.</dd></dl><p>You may
      only choose one benefit per use of [[lookup name]], but you may choose
      which you use at the time in you use it.</p>
    proficient: >-
      <p>The list of possible benefits you can choose from is expanded to
      include the following.</p><dl><dt>Block [[lookup name]]</dt>

      <dd>The next @Wiki[Category:Block abilities]{block} you make may be done
      with <i>2</i> @Pack[teriock.equipment]{items} instead of 1. You add the
      @Identifier[core:block-interaction]{BV} for both.</dd>

      <dt>Condition [[lookup name]]</dt>

      <dd>Instead of rolling [[/roll 2d4]] to end some
      @Wiki[Category:Effects]{effect}, you may roll either [[/roll 1d4]] or
      [[/roll 3d4]] (you choose). The effect ends if any of the dice roll a
      4.</dd>

      <dt>Feat [[lookup name]]</dt>

      <dd>The next time you make a @Wiki[Category:Feat abilities]{feat save},
      you do so with @Identifier[core:advantage]{advantage}.</dd>

      <dt>Resistance [[lookup name]]</dt>

      <dd>The next time you make a @Wiki[Category:Resistance effects]{resistance
      save}, you do so with @Identifier[core:advantage]{advantage}.</dd></dl>
  powerSources:
    - martial
  range:
    unit: self
  skill: true
  standard: true
  targets:
    - self
  trigger: >-
    <p>You use an @Wiki[Category:Active abilities]{active ability} that takes at
    least @Wiki[Category:Single action abilities]{one action}.</p>
transfer: true
type: ability
