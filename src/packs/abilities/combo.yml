      4.</dd><dt>Feat [[lookup name]]</dt><dd>The next time you make a
      @L[Category:Feat abilities]{feat save}, you do so with
      @L[Core:Advantage]{advantage}.</dd><dt>Resistance [[lookup
      name]]</dt><dd>The next time you make a @L[Category:Resistance
      effects]{resistance save}, you do so with
      @L[Core:Advantage]{advantage}.</dd></dl>
