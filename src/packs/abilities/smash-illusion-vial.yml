  overview:
    base: >-
      <p>All @Pack[teriock.creatures]{creatures} and
      @Pack[teriock.equipment]{objects} within the area of effect are
      @Identifier[status:hidden]{hidden} with a hidden DC of 10 +
      @Identifier[core:presence]{UNP} (your @Identifier[core:presence]{UNP}, not
      theirs). This is a @Identifier[keyword:illusionary]{minor illusion}. If a
      creature successfully @Identifier[ability:disbelieve]{Disbelieves} it,
      then they can see everything that was @Identifier[status:hidden]{hidden}
      in this area. Creatures that become @Identifier[status:hidden]{hidden} by
      this effect can move freely within the area and remain
      @Identifier[status:hidden]{hidden} as long as they do not leave the area.
      If they leave the area, they are no longer
      @Identifier[status:hidden]{hidden} and they do not become
      @Identifier[status:hidden]{hidden} if they re-enter it. At the start of
      each of each @Identifier[core:rounds]{round}, the
      @Identifier[core:game-master]{GM} rolls [[/roll 1d100]]. On a 75 or
      higher, some unexpected additional random
      @Identifier[keyword:illusionary]{illusion} occurs in the area as
      determined by the @Identifier[core:game-master]{GM}.</p><p></p>
  powerSources:
    - alchemical
  range:
