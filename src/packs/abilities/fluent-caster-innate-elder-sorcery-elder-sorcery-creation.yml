_stats:
  compendiumSource: Compendium.teriock.abilities.ActiveEffect.0q5khIx32nw3ihVe
  coreVersion: '14'
  lastModifiedBy: teriockBuilder00
  systemId: teriock
  systemVersion: 0.12.84
img: systems/teriock/src/icons/abilities/elder-sorcery-creation.webp
name: Elder Sorcery Creation
system:
  _sup: Xu4AwZbAasI5fDIc
  competence:
    raw: 0
  costs:
    components:
      material:
        description: >-
          <p>Creation cost is at least 3 × the material components of the spell
          itself.</p>
        type: description
    primary:
      hp:
        description: >-
          <p>Creation cost is at least 3 ×
          @Identifier[core:hit-points-and-mana-points]{HP} of the spell
          itself.</p>
        type: description
      mp:
        description: >-
          <p>Creation cost is at least 1
          @Identifier[core:hit-points-and-mana-points]{MP} per
          @Identifier[core:elder-sorcery]{OP} of <i>each</i> word in the spell
          plus 3 × @Identifier[core:hit-points-and-mana-points]{MP} of the spell
          itself.</p>
        type: description
  delivery: sight
  duration:
    unit: instant
  elderSorcery: true
  executionTime:
    base: Long Rest
    slow:
      unit: longRest
  form: special
  identifier: elder-sorcery-creation
  interaction: manifest
  maneuver: slow
  overview:
    base: >-
      <p>You may create 1 custom "rotator" @Wiki[Category:Spells]{spells} using
      @Identifier[core:elder-sorcery]{Elder Sorcery} words that you know using
      whatever @Identifier[core:elder-sorcery]{Elder Sorcery} creation rules are
      dictated to you by your @Identifier[core:game-master]{GM}. As with other
      rotators, this spell is not always available to you. You have to "rotate"
      into having it prepared. This spell may have a maximum number of words
      equal to your @Identifier[core:leveling-up]{level}. Your
      @Identifier[core:game-master]{GM} may allow you to "improvise"
      @Wiki[Category:Spells]{spells} as well, using whatever rules they
      wish.</p>
    fluent: >-
      <p>In addition to the spells that you create, you can learn
      @Identifier[core:proficiency-bonus]{P} additional spells from other
      @Identifier[core:elder-sorcery]{Elder Sorcery} users. See
      @Identifier[core:elder-sorcery]{Elder Sorcery} for more information.</p>
    proficient: >-
      <p>You may now create 2 × (@Identifier[archetype:mage]{MR} - 1) custom
      "rotator" @Wiki[Category:Spells]{spells} where
      @Identifier[archetype:mage]{MR} is the number of
      @Identifier[core:leveling-up]{ranks} you have in
      @Identifier[archetype:mage]{mage classes}.</p>
  powerSources:
    - magical
  range:
    unit: contact
  ritual: true
  skill: true
  targets:
    - self
transfer: true
type: ability
