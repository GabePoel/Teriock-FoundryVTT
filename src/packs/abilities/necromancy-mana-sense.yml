    base: >-
      <p>You can see the presence of Necromancy magic within range. Any active
      @Wiki[Category:Necromancy element spells]{necromancy}, leylines, mana
      wells, and @Wiki[Category:Necromancy elemental creatures]{necromancy
      elemental creatures} are visible to you. You have
      @Identifier[core:advantage]{advantage} on @Wiki[Category:PER save
      abilities]{PER saves} against them. If they are
      @Identifier[status:invisible]{invisible}, you may still see them as though
      they are @Identifier[status:hidden]{hidden}.</p>
