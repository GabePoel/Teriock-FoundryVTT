  overview:
    base: >-
      <p>Target creature is moved to a location you have studied within your
      level in miles. You can study locations by performing this ritual on an
      area you are in over the course of a @Identifier[core:long-rest]{long
      rest}. This location must be a static part of the environment, not a
      moving location like a wagon or ship. If the location substantially
      changes beyond recognition, your ritual will fail to transport creatures
      there. You can only have 2 location studied at a time.</p>
    fluent: >-
      <p>You may now have 2 × @Identifier[core:fluency-bonus]{F} locations
      studied and can [[lookup name style=lc]] a distance of up to
      @Identifier[core:fluency-bonus]{F} × your level in miles.</p>
    proficient: >-
      <p>You may now have 2 × @Identifier[core:proficiency-bonus]{P} locations
      studied and can [[lookup name style=lc]] a distance of up to
      @Identifier[core:proficiency-bonus]{P} × your level in miles.</p>
