  overview:
    base: >-
      <p>Having mastered the basic techniques in this field of magic, you are
      able to cast more advanced @Wiki[Category:Spells]{spells}. If you create
      any @Identifier[core:elder-sorcery]{Elder Sorcery}
      @Wiki[Category:Spells]{spells} of your own, they get added to this list.
      However, just because you "know" how to cast these spells, doesn't mean
      you are always prepared to. Although all @Identifier[archetype:mage]{mage
      classes} grant their own @Identifier[core:elder-sorcery]{Elder Sorcery}
      and @Wiki[Category:Rotator spells]{rotator spells}, you may only have a
      maximum of @Identifier[archetype:mage]{MR} - 1 of these spells rotated
      into your spell list at any given time across <i>all</i> classes.
      @Identifier[archetype:mage]{MR} refers to the number of
      @Identifier[core:leveling-up]{ranks} you have in
      @Identifier[archetype:mage]{mage classes}. During a
      @Identifier[core:long-rest]{long rest}, you can "rotate" which spells you
      have prepared. The @Wiki[Category:Rotator spells]{rotator spells}
      automatically available to you are @Identifier[ability:bellows]{Bellows},
      @Identifier[ability:control-and-resist-fire]{Control and Resist Fire},
      @Identifier[ability:crown-of-flame]{Crown of Flame},
      @Identifier[ability:melting-grasp]{Melting Grasp}, and
      @Identifier[ability:rupture-mark]{Rupture Mark}.</p><div
      class="expandable-table"></div>
    fluent: >-
      <p>You may instead prepare 2 × (MR - 1) +
      @Identifier[core:proficiency-bonus]{P} of these
      @Wiki[Category:Spells]{spells}.</p>
    proficient: >-
      <p>You may instead prepare 2 × (MR - 1) of these
      @Wiki[Category:Spells]{spells}.</p>
  powerSources:
    - martial
  range:
    unit: self
  skill: true
  targets:
    - self
transfer: true
type: ability
