  overview:
    base: >-
      <p>Having mastered the basic techniques in this field of magic, you are
      able to cast more advanced @Wiki[Category:Spells]{spells}. If you create
      any @Identifier[core:elder-sorcery]{Elder Sorcery}
      @Wiki[Category:Spells]{spells} of your own, they get added to this list.
      However, just because you "know" how to cast these spells, doesn't mean
      you are always prepared to. Although all @Wiki[Category:Mage classes]{mage
      classes} grant their own @Identifier[core:elder-sorcery]{Elder Sorcery}
      and @Wiki[Category:Rotator spells]{rotator spells}, you may only have a
      maximum of @Wiki[Category:Mage classes]{MR} - 1 of these spells rotated
      into your spell list at any given time across <i>all</i> classes.
      @Wiki[Category:Mage classes]{MR} refers to the number of
      @Identifier[core:leveling-up]{ranks} you have in @Wiki[Category:Mage
      classes]{mage classes}. During a @Identifier[core:long-rest]{long rest},
      you can "rotate" which spells you have prepared. The
      @Wiki[Category:Rotator spells]{rotator spells} automatically available to
      you are @Identifier[ability:crown-of-ice]{Crown of Ice},
      @Identifier[ability:dispel-magic]{Dispel Magic},
      @Identifier[ability:displace]{Displace},
      @Identifier[ability:resist-effects]{Resist Effects}, and
      @Identifier[ability:spell-trigger]{Spell Trigger}.</p><div
      class="expandable-table"></div>
    fluent: >-
      <p>You may instead prepare 2 × (MR - 1) +
      @Identifier[core:proficiency-bonus]{P} of these
      @Wiki[Category:Spells]{spells}.</p>
    proficient: >-
      <p>You may instead prepare 2 × (MR - 1) of these
      @Wiki[Category:Spells]{spells}.</p>
  piercing:
