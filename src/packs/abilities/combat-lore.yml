  overview:
    base: >-
      <p>You recognize details about past or ongoing battles by sight. For a
      given combat, you know the following.</p><ul><li>What the chain of command
      is.</li>

      <li>Who in the combat has their primary role as a healer, tank, damage
      dealer, or in doing battlefield control.</li>

      <li>How long the battle has been ongoing.</li>

      <li>Who has the most/least @Identifier[core:armor-class]{AC},
      @Identifier[core:hit-points-and-mana-points]{HP}, and
      @Identifier[core:hit-points-and-mana-points]{MP}.</li>

      <li>Who in the combat is of a particular class that you pick upon using
      this ability.</li>

      <li>Any noteworthy features of of the combat.</li></ul><p>You may also
      make an @Identifier[tradecraft:enforcer]{enforcer}
      @Identifier[core:tradecrafts]{check} to learn more about the combat, its
      participants, their strategy, or other details the
      @Identifier[core:game-master]{GM} allows.</p><p>At
      @Identifier[core:game-master]{GM} discretion, you can also spend 10
      minutes studying a combat up close to get additional information.</p>
