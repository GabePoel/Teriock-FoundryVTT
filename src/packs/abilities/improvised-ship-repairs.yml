  overview:
    base: >-
      <p>During a @Identifier[core:short-rest]{short rest}, you may scavenge
      materials and [[/repair]]{repair} 1 part of a ship. This part is
      @Identifier[property:improvised]{improvised}. The types of repairs you can
      make are as follows.</p><ul><li>A mast.</li>

      <li>A sail.</li>

      <li>A steering wheel.</li>

      <li>A rudder.</li>

      <li>A hole in the hull.</li>

      <li>A cannon.</li>

      <li>A crow's nest.</li>

      <li>A figurehead.</li>

      <li>A plank.</li>

      <li>A ladder.</li>

      <li>An anchor.</li></ul><p>With @Identifier[core:game-master]{GM}
      permission, you may be able to repair other parts of a ship as well.</p>
    fluent: >-
      <p>You can instead make up to @Identifier[core:fluency-bonus]{F}
      repairs.</p>
    proficient: >-
      <p>You can instead make up to @Identifier[core:proficiency-bonus]{P}
      repairs.</p>
