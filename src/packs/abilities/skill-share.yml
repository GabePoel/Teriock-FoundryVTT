  competence:
    raw: 0
  delivery: sight
  duration:
    raw: '1'
    unit: hour
  effectTypes:
    - contract
  endCondition: <p>You use [[lookup name]] again.</p>
  executionTime:
    base: a1
  form: normal
  identifier: skill-share
  interaction: manifest
  maneuver: active
  overview:
    base: >-
      <p>Target gains one @Pack[teriock.abilities]{ability} of your choice that
      you have from your first rank in a @Pack[teriock.classes]{class}. The
      @Pack[teriock.abilities]{ability} must not be @Wiki[Category:Elder Sorcery
      abilities]{Elder Sorcery}, must not be a @Wiki[Category:Contract
      effects]{contract effect}, must be one you are
      @Identifier[core:proficiency-bonus]{proficient} in, and must be one you
      aren't @Identifier[keyword:incapable]{incapable} of. The target also
      becomes @Identifier[keyword:incapable]{incapable} of [[lookup name]]. You
      may only have this active on one creature at a time.</p>
    fluent: >-
      <p>You can now share @Pack[teriock.abilities]{abilities} you have from any
      of your first 1 + @Identifier[core:fluency-bonus]{F} ranks in a
      @Pack[teriock.classes]{class}.</p>
    proficient: >-
      <p>You can now share @Pack[teriock.abilities]{abilities} you have from any
      of your first 1 + @Identifier[core:proficiency-bonus]{P} ranks in a
      @Pack[teriock.classes]{class}.</p>
  powerSources:
    - magical
  range:
    raw: '30'
    unit: ft
  skill: true
  standard: true
  sustained: true
  targets:
