  overview:
    base: >-
      <p>You gain @Identifier[ability:elder-sorcery-creation]{Elder Sorcery
      Creation} and @Identifier[ability:all-elder-sorcery-words]{All Elder
      Sorcery Words}. In addition, you can create
      @Identifier[core:elder-sorcery]{Elder Sorcery} spells on a
      @Identifier[core:short-rest]{short rest} instead of a
      @Identifier[core:long-rest]{long rest}. Creating
      @Identifier[core:elder-sorcery]{Elder Sorcery} spells in combat has the
      same consequences and penalties as typical casters would have with
      creating them during a @Identifier[core:short-rest]{short rest}. You can
      create, cast, and learn spells with any "grammar".</p>
    fluent: >-
      <p>You are @Identifier[core:fluency-bonus]{fluent} at
      @Identifier[ability:elder-sorcery-creation]{Elder Sorcery Creation} and
      @Identifier[ability:all-elder-sorcery-words]{All Elder Sorcery Words} and
      also always gain a +(10 * @Identifier[core:fluency-bonus]{F}) experience
      bonus during @Identifier[core:elder-sorcery]{Elder Sorcery} spell
      creation.</p>
    proficient: >-
      <p>You are @Identifier[core:proficiency-bonus]{proficient} at
      @Identifier[ability:elder-sorcery-creation]{Elder Sorcery Creation} and
      @Identifier[ability:all-elder-sorcery-words]{All Elder Sorcery Words} and
      also always gain a +(10 * @Identifier[core:proficiency-bonus]{P})
      experience bonus during @Identifier[core:elder-sorcery]{Elder Sorcery}
      spell creation.</p>
