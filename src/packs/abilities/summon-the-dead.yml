  overview:
    base: >-
      <p>If you have the body of the target in your possession, you can put the
      spirit back into its body such that it is no longer
      @Identifier[status:wisping]{wisping}. The body maintains all damage it had
      when it died.</p>
    proficient: >-
      <p>If the body is thoroughly damaged (such as if it's
      @Identifier[status:ruined]{ruined}) or missing entirely, you can expend
      some of your own life force to recreate the body from the spirit for
      additional @Identifier[core:hit-points-and-mana-points]{MP} and
      @Identifier[core:hit-points-and-mana-points]{HP}. The creature is still
      dead, but the body is now intact.</p>
