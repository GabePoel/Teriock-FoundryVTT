      hp:
        description: >-
          <p>[[lookup name]] costs 0
          @Identifier[core:hit-points-and-mana-points]{HP} if the body is in
          your possession. Otherwise, it costs 3
          @Identifier[core:hit-points-and-mana-points]{HP} per
          @Identifier[core:size]{size} of the body.</p>
        type: description
      mp:
