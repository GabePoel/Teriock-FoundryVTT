    base: >-
      <p>During a @Identifier[core:short-rest]{short rest}, you may scavenge
      materials and make 1 @Wiki[Category:Bows]{bow} a set of 5
      @Identifier[equipment:arrow]{arrows} (these count as "1 item" for the
      purpose of [[lookup name]]), general @Wiki[Category:Supplies]{supplies}.
      They are @Identifier[property:improvised]{improvised}. Only common
      @Identifier[damage:mundane]{mundane} items can typically be made in this
      way, but the @Identifier[core:game-master]{GM} may specify if other
      options are available to you.</p>
    fluent: >-
