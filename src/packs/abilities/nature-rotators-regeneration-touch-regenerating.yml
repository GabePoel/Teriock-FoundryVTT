  limitation: >-
    <p>You must spend 1 @L[Core:Hit Points and Mana Points]{MP} or
    @L[Core:Healing]{healing} in this way consumes a @L[Core:Hit Die]{hit die}
    as normal (except that it can @L[Category:Revival effects]{revive} you).
    This can only @L[Category:Revival effects]{revive} creatures that have been
    @L[Condition:Dead]{dead} for 1 minute or less.</p>
  maneuver: passive
  mundane: false
  overview:
    base: >-
      <p>At the start of each of your @Identifier[core:turns]{turns}, you 
      @Identifier[core:healing]{heal} and regain that many
      @Identifier[core:hit-points-and-mana-points]{HP}. This does <i>not</i>
      consume your @Wiki[Core:HP]{hit die}. If you were
      @Identifier[status:dead]{dead} due to
      @Identifier[core:hit-points-and-mana-points]{HP} loss, this brings you
      @Identifier[status:alive]{back to life}. If you take
      @Identifier[damage:fire]{fire damage}, this effect doesn't apply on your
      next @Identifier[core:turns]{turn}. You only @Identifier[status:dead]{die}
      due to @Identifier[core:hit-points-and-mana-points]{HP} loss if you start
      your @Identifier[core:turns]{turn} without successfully [[lookup name
      style=lc]] @Identifier[core:hit-points-and-mana-points]{HP}.</p>
