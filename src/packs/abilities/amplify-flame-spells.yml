    base: >-
      <p>When you @Identifier[core:attack-interaction]{attack} with
      @Identifier[ability:flame-ray]{Flame Ray} or
      @Identifier[ability:fire-ball]{Fire Ball}, you may target an additional
      creature or the same creature twice. Any costs you pay must be paid twice
      and be the same for both @Identifier[core:attack-interaction]{attacks}.
      These incur @Identifier[core:attack-interaction]{attack penalties} as
      though they were two separate
      @Identifier[core:attack-interaction]{attacks}.</p>
    fluent: >-
      <p>You may instead choose up to 1 + @Identifier[core:fluency-bonus]{F}
      additional or repeated targets.</p>
