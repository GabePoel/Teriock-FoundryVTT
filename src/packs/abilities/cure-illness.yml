name: Cure Illness
system:
  class: lifeMage
  competence:
    raw: 0
  costs:
    components:
      somatic:
        type: tag
      verbal:
        type: tag
    primary:
      mp:
        formula: '1'
        type: formula
  delivery: sight
  duration:
    raw: '1'
    unit: hour
  effectTypes:
    - healing
  elements:
    - life
  executionTime:
    base: 10 Minutes
    slow:
      raw: '10'
      unit: minute
  expansion:
    featSaveAttribute: mov
    range:
      unit: self
  featSaveAttribute: mov
  form: normal
  heightened: >-
    <p>For each additional @L[Core:MP]{MP} spent, The DC of the check is reduced
    by 1.</p>
  identifier: cure-illness
  interaction: manifest
  invoked: true
  maneuver: slow
  mundane: false
  overview:
    base: >-
      <p>Make an [[/tc herbalist]]{herbalist check} to remove a
      @L[Category:Disease effects]{disease or illness} from some creature. The
      @L[Core:Game Master]{GM} determines the difficulty based on the severity
      of the illness. The @L[Core:Game Master]{GM} may also require you to have
      access to specific ingredients or tools or put other conditions in place.
      If the illness is mental in nature, then [[lookup name]] acts as a
      @L[Category:Mental effects]{mental effect}.</p>
    proficient: >-
      <p>You are @L[Keyword:Adept]{adept} at [[lookup name]]. Before you make
      the check, you may spend 1 additional @L[Core:Hit Points and Mana
      Points]{MP} to know the DC if it is less than your total level. You may
      also add your @L[Core:Proficiency Bonus]{proficiency bonus} to the [[/tc
      herbalist]]{herbalist check} regardless of whether or not you are
      proficient in @L[Tradecraft:Herbalist]{herbalist}.</p>
  piercing:
    raw: 0
  powerSources:
    - magical
  range:
    raw: '5'
    unit: ft
  results:
    fail: >-
      <p>The target is not cured, but the illness does not worsen for the
      duration of Healing Touch. You may cast [[lookup name]] again to keep the
      disease from progressing, but you may not attempt the check again.</p>
    save: <p>The target is cured of the illness.</p>
  ritual: true
  spell: true
  standard: true
  targets:
    - creature
transfer: true
type: ability
