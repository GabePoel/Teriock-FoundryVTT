  overview:
    base: >-
      <p>When you @Identifier[status:down]{drop}, your body vanishes and you
      become a "@Identifier[property:morganti]{morganti} filament". This is an
      imperceptible two-dimensional thread through space cutting any
      @Pack[teriock.creatures]{creature} that passes through it. Any being that
      passes through the filament takes [[/damage 1d20[lethal morganti]]]
      @Identifier[core:damage]{damage} as well as a random limb
      @Identifier[damage:hack]{hack} unless they are wearing
      @Identifier[property:silver]{silver}
      @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor}.
      @Identifier[property:silver]{Silver} doesn't get cut by the filament.
      Instead, it "reactivates" and immediately @Identifier[core:healing]{fully
      heals} you upon hitting the filament.</p>
