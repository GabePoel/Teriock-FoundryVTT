  overview:
    base: >-
      <p>You are @Identifier[keyword:immunity]{immune} to @Wiki[Category:Mental
      effects]{mental} and @Wiki[Category:Control effects]{control effects},
      being @Identifier[condition:frightened]{frightened},
      @Identifier[condition:charmed]{charmed},
      @Identifier[condition:bound]{bound}, or
      @Identifier[condition:frenzied]{frenzied}, and having your
      @Identifier[core:intelligence]{INT} change. This makes you
      @Identifier[keyword:incapable]{incapable} of @Wiki[Category:INT setting
      abilities]{INT setting abilities} that you gain while this ability is
      active (but not ones that you already had). In addition, you maintain
      control over your own mind when being @Wiki[Category:Reanimation
      effects]{reanimated} and are immune to @Pack[teriock.abilities]{abilities}
      that would change your behavior such as
      @Identifier[ability:taunt]{Taunt}.</p>
