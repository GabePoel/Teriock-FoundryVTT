    base: >-
      <p>You are @L[Keyword:Immunity]{immune} to @L[Category:Mental
      effects]{mental} and @L[Category:Control effects]{control effects}, being
      @L[Condition:Frightened]{frightened}, @L[Condition:Charmed]{charmed},
      @L[Condition:Bound]{bound}, or @L[Condition:Frenzied]{frenzied}, and
      having your @L[Core:Intelligence]{INT} change. This makes you
      @L[Keyword:Incapable]{incapable} of @L[Category:INT setting abilities]{INT
      setting abilities} that you gain while this ability is active (but not
      ones that you already had). In addition, you maintain control over your
      own mind when being @L[Category:Reanimation effects]{reanimated} and are
      immune to @L[Category:Abilities]{abilities} that would change your
      behavior such as @L[Ability:Taunt]{Taunt}.</p>
