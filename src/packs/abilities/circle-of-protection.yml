  identifier: circle-of-protection
  interaction: manifest
  maneuver: slow
  overview:
    base: >-
      <p>You enchant an area no larger than 30 feet in any direction. This area
      is surrounded by a barrier of light that creatures cannot easily pass into
      or out of this area by any means, including @Wiki[Category:Displacement
      effects]{displacement effects}. However,
      @Identifier[property:ranged]{items} can move in and out.
      @Wiki[Category:Missile delivery abilities]{missile abilities} and other
      ones with a sufficiently large range can cross this barrier so long as
      their executor remains on one side and makes a
      @Identifier[core:strength]{STR} @Identifier[core:feat-interaction]{feat
      save}. A creature that's higher @Identifier[core:leveling-up]{level} than
      you may pass across this barrier without issue. Any other creature may
      attempt to pass by making a @Identifier[tradecraft:priest]{priest check}
      with a DC equal to the difference between
      @Identifier[core:leveling-up]{your level} and theirs.</p>
    fluent: >-
      <p>You may select up to 2 × @Identifier[core:fluency-bonus]{F} creatures
      that can pass through this barrier without issue. You may also select up
      to 2 × @Identifier[core:fluency-bonus]{F} creatures that cannot pass
      through this barrier at all.</p>
    proficient: >-
      <p>You may select up to 2 × @Identifier[core:proficiency-bonus]{P}
      creatures that can pass through this barrier without issue. You may also
      select up to 2 × @Identifier[core:proficiency-bonus]{P} creatures that
      cannot pass through this barrier at all.</p>
