  overview:
    base: >-
      <p>You prepare to use an action that will occur outside your turn. Choose
      a @Wiki[Category:Single action abilities]{single action} or
      @Wiki[Category:Free action abilities]{free action ability} you can use,
      and designate a trigger. Your turn then ends. If the trigger you
      designated occurs before the start of your next turn, you can use the
      chosen @Wiki[Category:Single action abilities]{ability} as a
      @Wiki[Category:Reactive abilities]{reaction} (provided you still meet the
      requirements to use it).</p><p>If you have an @Wiki[Core:Attack
      Penalty]{attack penalty} from making multiple
      @Identifier[core:attack-interaction]{attacks} and your readied
      @Wiki[Category:Single action abilities]{ability} is an
      @Identifier[core:attack-interaction]{attack ability}, your readied
      @Wiki[Category:Single action abilities]{ability} takes the same
      @Wiki[Core:Attack Penalty]{attack penalty} you had at the time you used
      [[lookup name]]. This is one of the few times the @Wiki[Core:Attack
      Penalty]{attack penalty} applies when it's not your turn.</p>
  powerSources:
    - martial
  range:
    unit: self
  sustained: true
  targets:
    - self
transfer: true
type: ability
