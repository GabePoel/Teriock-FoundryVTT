    base: >-
      <p>As you execute [[lookup name]], choose either "damage" or "healing".
      The effect varies depending on what you choose. [[lookup name]] only
      counts as a @Wiki[Category:Damaging effects]{damaging effect} if you
      choose "damage" and only as a @Wiki[Category:Healing effects]{healing
      effect} if you choose "healing".</p><p>If you do not take any damage
