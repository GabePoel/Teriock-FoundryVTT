  overview:
    base: >-
      <p>You recognize details about living creatures by sight. For a given
      creature, you know the following.</p><ul><li>If it's a species you know
      of, even if it is obscured or
      @Identifier[condition:disguised]{disguised}.</li><li>Its typical habitat
      and behavior.</li><li>Whether it is predator or prey.</li><li>Whether it
      is adolescent or adult.</li><li>If it is native to the area you are
      in.</li><li>Any noteworthy features of of the creature.</li></ul><p>You
      may also make a @Identifier[tradecraft:hunter]{hunter}
      @Identifier[core:tradecrafts]{check} to learn more about the creature, its
      behavior, its natural @Pack[teriock.abilities]{abilities}, or other
      details the @Identifier[core:game-master]{GM} allows.</p><p>At
      @Identifier[core:game-master]{GM} discretion, you can also spend 10
      minutes studying a creature up close to get additional information.</p>
