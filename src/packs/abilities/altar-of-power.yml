  heightened: >-
    <p>For each additional @Identifier[core:hit-points-and-mana-points]{MP}
    spent, increase the @Identifier[property:mana-storing]{mana storing} amount
    by 1.</p>
  identifier: altar-of-power
  interaction: manifest
  maneuver: slow
  overview:
    base: >-
      <p>You construct a stationary altar no larger than 10 feet in any
      direction. The altar is @Identifier[property:magelore]{magelore} and
      @Identifier[property:mana-storing]{mana storing} (1). It does not
      immediately gain the stored
      @Identifier[core:hit-points-and-mana-points]{MP}, but any creature may
      @Identifier[ability:pay-mana]{Pay Mana} to put half the paid
      @Identifier[core:hit-points-and-mana-points]{MP} (rounded down) into it.
      Any number of creatures may @Identifier[ability:attune]{Attune} to the
      altar and anyone may use the altar's stored
      @Identifier[core:hit-points-and-mana-points]{MP} so long as they are
      @Identifier[ability:attune]{attuned} to it. It uses 1
      @Identifier[core:presence]{presence tier}. If the altar ever takes at
      least 50 @Identifier[core:damage]{damage} within a single
      @Identifier[core:rounds]{round}, it is
      @Identifier[property:destroyed]{destroyed} and all
      @Identifier[core:hit-points-and-mana-points]{MP} stored in it
      dissipates.</p>
    fluent: >-
      <p>The altar is now @Identifier[property:mana-storing]{mana storing} (1 +
      @Identifier[core:fluency-bonus]{F}). If you like, you may also specify up
      to @Identifier[core:fluency-bonus]{F} creatures while creating the altar.
      You can choose to have these creatures as the only ones able to be
      @Identifier[ability:attune]{attuned} to the altar or the only ones that
      can't be.</p>
    proficient: >-
      <p>The altar is now @Identifier[property:mana-storing]{mana storing} (1 +
      @Identifier[core:proficiency-bonus]{P}). If you like, the altar is also
      @Identifier[property:magelore]{magelore} and can be used as creatures'
      @Identifier[property:handy]{hands} if they have
      @Identifier[ability:staff-touch]{Staff Touch} and are
      @Identifier[ability:attune]{attuned} to it.</p>
