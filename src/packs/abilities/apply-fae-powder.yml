    base: >-
      <p>Cover a surface no greater than 25 square feet with the source of this
      ability. If the surface is a @L[Category:Creatures]{creature}, it is
      @L[Keyword:Resistance]{resistant} to becoming
      @L[Condition:Burned]{burned}, @L[Keyword:Resistance]{resistant} to
      @L[Damage:Fire]{fire damage}, takes @L[Keyword:Deboosted
      Damage]{deboosted} @L[Damage:Fire]{fire damage}, and is
      @L[Keyword:Resistance]{resistant} being set on fire or being harmed by
      acid. Otherwise, the target is @L[Keyword:Immunity]{immune} to being
      @L[Property:Shattered]{shattered} or @L[Property:Destroyed]{destroyed} by
      fire or acid.</p>
