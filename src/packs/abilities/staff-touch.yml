img: systems/teriock/src/icons/abilities/staff-touch.webp
name: Staff Touch
system:
  competence:
    raw: 0
  delivery: self
  duration:
    unit: unlimited
  executionTime:
    base: passive
  form: normal
  identifier: staff-touch
  interaction: manifest
  maneuver: passive
  overview:
    base: >-
      <p>You may use your @Identifier[property:magelore]{magelore} items as
      though they were your @Identifier[body:hand]{hand}. This makes them
      @Identifier[property:handy]{handy} and
      @Identifier[property:prehensile]{prehensile}. You are not
      @Identifier[core:proficiency-bonus]{proficient} nor
      @Identifier[core:fluency-bonus]{fluent} with
      @Pack[teriock.abilities]{abilities} you use through your
      @Identifier[property:magelore]{magelore} items.</p>
    fluent: >-
      <p>If you are @Identifier[core:fluency-bonus]{fluent} with an
      @Pack[teriock.abilities]{ability} you use through your
      @Identifier[property:magelore]{magelore} items, you regain the
      @Identifier[core:fluency-bonus]{fluency bonus} for that
      @Pack[teriock.abilities]{ability}.</p>
    proficient: >-
      <p>If you are @Identifier[core:proficiency-bonus]{proficient} with an
      @Pack[teriock.abilities]{ability} you use through your
      @Identifier[property:magelore]{magelore} items, you regain the
      @Identifier[core:proficiency-bonus]{proficiency bonus} for that
      @Pack[teriock.abilities]{ability}.</p>
  powerSources:
    - magical
  range:
    unit: self
  skill: true
  standard: true
  targets:
    - self
transfer: true
type: ability
