  overview:
    base: >-
      <p>Target is @Identifier[rule:alive]{alive} (but still
      @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead}). It's
      @Identifier[core:hit-points-and-mana-points]{HP} and
      @Identifier[core:hit-points-and-mana-points]{MP} are both increased to 1
      if they were less than that value. However, the target's maximum
      @Identifier[core:hit-points-and-mana-points]{HP} and
      @Identifier[core:hit-points-and-mana-points]{MP} are both halved to a
      minimum of 1. This effect lasts until the target completes a
      @Identifier[core:short-rest]{short rest}. This does not <i>count</i> as a
      @Wiki[Category:Revival effects]{revival effect} although it acts as
      one.</p>
    fluent: >-
      <p>Target's @Identifier[core:hit-points-and-mana-points]{HP} and
      @Identifier[core:hit-points-and-mana-points]{MP} are no longer halved.</p>
    proficient: >-
      <p>Target has all @Identifier[core:hit-points-and-mana-points]{HP} and
      @Identifier[core:hit-points-and-mana-points]{MP} restored, but its maximum
      @Identifier[core:hit-points-and-mana-points]{HP} and
      @Identifier[core:hit-points-and-mana-points]{MP} are still halved. This
      does not count as a @Wiki[Category:Healing effects]{healing effect} or a
      @Wiki[Category:Revival effects]{revival effect}.</p>
  piercing:
