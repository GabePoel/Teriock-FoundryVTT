      save} using <i>your</i> DC. Do not add your
      @Identifier[core:proficiency-bonus]{proficiency bonus} to the DC. This
      detonating @Wiki[Category:Aura delivery abilities]{aura} is
      @Wiki[Category:Loud effects]{loud}.</p>
