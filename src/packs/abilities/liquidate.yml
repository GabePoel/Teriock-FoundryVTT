  overview:
    base: >-
      <p>When this ritual is completed, make a [[/tc priest]]{priest check} to
      see if the targeted item is [[lookup name style=lc]]d. The check's DC is
      entirely up to @Identifier[core:game-master]{GM} discretion, but the
      following can be used as a benchmark.</p><ul><li>Non-passively magic
      items: 4</li><li>Common passively magic items: 8</li><li>Uncommon
      passively magic items: 12</li><li>Rare passively magic items:
      16</li><li>Mythic passively magic items: 20</li><li>Legendary passively
      magic items: 50+</li></ul><p>These benchmarks are for reference only and
      the @Identifier[core:game-master]{GM} may adjust them as they see fit.
      Item rarity may or may not correspond to how challenging it is to [[lookup
      name style=lc]].</p>
    fluent: >-
      <p>You may add @Identifier[core:fluency-bonus]{F} to the [[/tc
      priest]]{priest check} regardless of whether or not you are fluent in
      @Identifier[tradecraft:priest]{priest}.</p>
    proficient: >-
      <p>You may add @Identifier[core:proficiency-bonus]{P} to the [[/tc
      priest]]{priest check} regardless of whether or not you are proficient in
      @Identifier[tradecraft:priest]{priest}.</p>
  powerSources:
    - divine
    - financial
  range:
    raw: '5'
    unit: ft
  results:
    fail: >-
      <p>You pay an amount of @Identifier[core:hit-points-and-mana-points]{MP}
      and @Identifier[core:hit-points-and-mana-points]{HP} equal to the [[/tc
      priest]]{priest check's} DC.</p>
    save: >-
      <p>The item is @Identifier[property:destroyed]{destroyed} and the economic
      value of its raw materials and @Wiki[Category:Magical properties]{magical
      properties} are extracted. This is very inefficient. Only 20% of the value
      of the item's materials and @Pack[teriock.properties]{properties} are
      extracted.</p>
  ritual: true
  skill: true
  standard: true
  targets:
