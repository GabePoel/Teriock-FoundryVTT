  form: special
  identifier: haunt-escalation
  interaction: manifest
  maneuver: reactive
  overview:
    base: >-
      <p>You remanifest at the start of your next turn as an angrier and more
      powerful
      @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead} being,
      lashing out at whatever @Identifier[condition:dead]{killed} you as well as
      anything else in your way. This resets all
      @Identifier[core:hit-points-and-mana-points]{HP},
      @Identifier[core:hit-points-and-mana-points]{MP}, and temporary effects
      that may be present on you. Every time you escalate, you move one step
      forward on the following track. For instance, if you were already a
      @Identifier[creature:phantom]{phantom}, you would escalate into being a
      @Identifier[creature:specter]{specter}.</p><p>@Embed[Compendium.teriock.tables.RollTable.1abfbe0001d304a0]</p><p>Most
      @Identifier[creature:haunt]{haunts} do not escalate past
      @Identifier[creature:wraith]{wraith}. But the
      @Identifier[core:game-master]{GM} may rule that certain especially angry
      or powerful ones have additional @Pack[teriock.abilities]{abilities} or
      escalation steps. If you escalate while already fully escalated, you do
      not change @Wiki[Category:Spectral undead creatures]{species} or gain
      additional @Pack[teriock.abilities]{abilities}, but you still become more
      aggressive, harder to solve, and reset all
      @Identifier[core:hit-points-and-mana-points]{HP},
      @Identifier[core:hit-points-and-mana-points]{MP}, and temporary
      effects.</p>
  powerSources:
    - unknown
  range:
    unit: self
  requirements: <p>You are a @Identifier[creature:haunt]{haunt}.</p>
  targets:
    - self
  trigger: >-
    <p>You would @Identifier[condition:dead]{die}. This triggers automatically.
    You cannot choose to not use it if you are able to.</p>
transfer: true
type: ability
