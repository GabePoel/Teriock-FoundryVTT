  heightened: >-
    <p>For each additional @Identifier[core:hit-points-and-mana-points]{MP}
    spent, the duration of this effect increases by 1 hour.</p>
  identifier: mana-blade
  interaction: manifest
  maneuver: active
  overview:
    base: >-
      <p>A @Identifier[property:magic]{magical}
      @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon} of
      pure energy appears in your hand. It is
      @Identifier[property:grafted]{grafted} and
      @Identifier[property:indestructible]{indestructible}. You can choose what
      type of
      @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon} it is.
      This @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon}
      is called a "[[lookup name style=lc]]".</p>
    fluent: >-
      <p>The additional @Wiki[Category:Elemental damage types]{elemental}
      @Identifier[core:damage]{damage} your [[lookup name style=lc]]s deals is
      increased to [[/damage 1d6[magic]]].</p>
    proficient: >-
      <p>You may spend an additional
      @Identifier[core:hit-points-and-mana-points]{MP} while casting this to
      make the [[lookup name style=lc]] deal an additional [[/damage
      1d4[magic]]] @Identifier[core:damage]{damage} of an
      @Wiki[Category:Elemental damage types]{elemental damage type} of your
      choice.</p>
  powerSources:
    - martial
  range:
    unit: self
  requirements: <p>You have at least one hand free.</p>
  rotator: true
  spell: true
  standard: true
  targets:
    - self
transfer: true
