  competence:
    raw: 0
  costs:
    primary:
      mp:
        description: >-
          <p>This costs 1 @L[Core:Hit Points and Mana Points]{MP} to cast, plus
          an additional @L[Core:Hit Points and Mana Points]{MP} if you choose to
          use the @L[Core:Proficiency Bonus]{proficiency} upgrade.</p>
        type: description
  delivery: self
  duration:
    raw: '1'
    unit: minute
  effectTypes:
    - immunity
  elements:
    - flame
  executionTime:
    base: a1
    slow:
      unit: second
  expansion:
    featSaveAttribute: mov
    range:
      unit: self
  featSaveAttribute: mov
  form: special
  heightened: >-
    <p>For each additional @L[Core:MP]{MP} spent, the duration of this effect
    increases by 1 hour.</p>
  identifier: mana-blade
  interaction: manifest
  maneuver: active
  mundane: false
  overview:
    base: >-
      <p>A @L[Property:Magic]{magical} @L[Category:Weapons]{weapon} of pure
      energy appears in your hand. It is attached to you and therefore cannot be
      @L[Property:Thrown]{thrown} or otherwise used for
      @L[Property:Ranged]{ranged} @L[Category:Attack abilities]{attacks}. It is
      @L[Keyword:Immunity]{immune} to @L[Ability:Disarm]{Disarm} and other
      effects that would cause you to lose it. The @L[Category:Weapons]{weapon}
      is @L[Keyword:Immunity]{immune} to @L[Category:Destruction
      effects]{destruction effects}. You can choose what type of
      @L[Category:Weapons]{weapon} it is. This @L[Category:Weapons]{weapon} is
      called a "[[lookup name style=lc]]".</p>
    fluent: >-
      <p>The additional @L[Category:Elemental damage types]{elemental}
      @L[Core:Damage]{damage} your [[lookup name style=lc]]s deals is increased
      to [[/damage 1d6[magic]]].</p>
    proficient: >-
      <p>You may spend an additional @L[Core:Hit Points and Mana Points]{MP}
      while casting this to make the [[lookup name style=lc]] deal an additional
      [[/damage 1d4[magic]]] @L[Core:Damage]{damage} of an @L[Category:Elemental
      damage types]{elemental damage type} of your choice.</p>
  piercing:
    raw: 0
  powerSources:
    - martial
  range:
    unit: self
  requirements: <p>You have at least one hand free.</p>
  rotator: true
  spell: true
  standard: true
  targets:
    - self
transfer: true
type: ability
