name: Pact Middleman
system:
  competence:
    raw: 0
  delivery: sight
  duration:
    unit: instant
  effectTypes:
    - contract
  executionTime:
    base: a1
  form: normal
  identifier: pact-middleman
  interaction: manifest
  maneuver: active
  overview:
    base: >-
      <p>You may facilitate the creation of other creature's
      @Identifier[ability:spirit-pact]{Spirit Pacts},
      @Identifier[ability:divine-gift]{Divine Gifts}, or other supernatural
      @Wiki[Category:Contract effects]{contracts}. If you do, you take a
      percentage of the power from this contract for yourself. In the process,
      you gain an @Pack[teriock.abilities]{ability} from that contract. You can
      choose the percentage of the contract's power you take, but these terms
      must be made available to all parties before the contract is made. You may
      gain 2 @Pack[teriock.abilities]{abilities} from [[lookup name]]. If you
      facilitate additional contracts in the future, you may swap an
      @Identifier[core:abilities]{ability} for one from the new contract
      instead. You do not typically gain flaws from the contracts you
      facilitate, but the @Identifier[core:game-master]{GM} may give them at
      their discretion. You are responsible for enforcing the terms of all
      contracts you mediate.</p>
    fluent: >-
      <p>You may now have up to 2 × (1 + @Identifier[core:fluency-bonus]{F})
      active @Pack[teriock.abilities]{abilities} from contracts you have
      facilitated through [[lookup name]].</p>
    proficient: >-
      <p>You may now have up to 2 × (1 + @Identifier[core:proficiency-bonus]{P})
      active @Pack[teriock.abilities]{abilities} from contracts you have
      facilitated through [[lookup name]].</p>
  powerSources:
    - divine
    - financial
  range:
    raw: '5'
    unit: ft
  ritual: true
  skill: true
  standard: true
  targets:
    - creature
transfer: true
type: ability
