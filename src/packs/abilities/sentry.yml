  overview:
    base: >-
      <p>When in an area that's been "fortified" with
      @Identifier[ability:fortify-area]{Fortify Area}, you
      @Identifier[keyword:resistance]{resist} being
      @Identifier[core:surprise-rounds]{surprised}, becoming
      @Identifier[condition:frightened]{frightened}, and all
      @Wiki[Category:Mediator tradecrafts]{mediator tradecrafts}. You also gain
      these benefits when you use @Identifier[ability:brace]{Brace} as long as
      you remain stationary and while performing "guard duty". Whether or not
      something counts as "guard duty" is up to the discretion of the
      @Identifier[core:game-master]{GM}. Being on the front lines in a normal
      @Identifier[core:combat]{combat} encounter would not typically count, but
      some cases that might are as follows.</p><ul><li>Being a hired guard for a
      nobleman.</li>

      <li>Keeping watch during a @Identifier[core:long-rest]{long rest}.</li>

      <li>Standing guard while a @Identifier[archetype:mage]{mage} completes a
      @Wiki[Category:Ritual delivery abilities]{ritual}.</li></ul>
