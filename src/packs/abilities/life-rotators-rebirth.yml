  results:
    hit: >-
      <p>If target is @L[Condition:Dead]{dead}, they are brought back to life.
      If they had less than 1 @L[Core:Hit Points and Mana Points]{HP}, they have
      1 @L[Core:Hit Points and Mana Points]{HP}. If they had less than 1
      @L[Core:Hit Points and Mana Points]{MP}, they have 1 @L[Core:Hit Points
      and Mana Points]{MP}. Otherwise, their @L[Core:Hit Points and Mana
      Points]{HP} and @L[Core:Hit Points and Mana Points]{MP} do not change. If
      target is @L[Category:Undead creatures]{undead}, you can choose to have
      them be @L[Core:Healing]{healed} for @L[Core:Damage]{damage}. [[lookup
      name]] does not count as a @L[Category:Healing effects]{healing effect}
      unless you choose to @L[Core:Healing]{heal} with it.</p>
