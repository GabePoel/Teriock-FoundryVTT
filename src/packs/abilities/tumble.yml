  identifier: tumble
  interaction: manifest
  maneuver: reactive
  overview:
    base: >-
      <p>You are moved 5 feet in the direction opposite the source of the damage
      and become @Identifier[status:snared]{snared}. If there is no direction
      associated with the source of the @Identifier[core:damage]{damage}, you
      move in a random direction instead. This movement does not count as a
      trigger for @Identifier[ability:opportunity-attack]{Opportunity Attack}.
      If this all completes without interruption, you take only half the
      triggering @Identifier[core:damage]{damage}. If the
      @Identifier[core:damage]{damage} has multiple types, each type is rounded
      down independently.</p>
