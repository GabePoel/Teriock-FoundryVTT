  overview:
    base: >-
      <p>You are moved 5 feet in the direction opposite the source of the damage
      and become @L[Condition:Snared]{snared}. If there is no direction
      associated with the source of the @L[Core:Damage]{damage}, you move in a
      random direction instead. This movement does not count as a trigger for
      @L[Ability:Opportunity Attack]{Opportunity Attack}. If this all completes
      without interruption, you take only half the triggering
      @L[Core:Damage]{damage}. If the @L[Core:Damage]{damage} has multiple
      types, each type is rounded down independently.</p>
