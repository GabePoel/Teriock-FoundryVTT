  overview:
    base: >-
      <p>Choose a @Wiki[Category:Weapon classes]{class of weapons}. All
      @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapons} you
      use of the chosen @Wiki[Category:Weapon classes]{class} deal either an
      additional [[/damage 1d4[holy]]] @Identifier[core:damage]{damage} or
      [[/damage 1d4]] @Identifier[core:damage]{damage} of a type corresponding
      to the @Identifier[core:domains]{domain} of your deity. You may decide
      which of these benefits a
      @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon} gets
      every time you attempt an @Identifier[core:attack-interaction]{attack}
      with it. In addition, all @Identifier[core:damage]{damage} dealt by a
      single chosen
      @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon} of
      that @Wiki[Category:Weapon classes]{class} is
      @Identifier[damage:magic]{magic} as long as you are
      @Identifier[core:presence]{attuned} to it.</p><table class="wikitable
      sortable mw-collapsible mw-collapsed"><caption>Benefits by Domain
      </caption><tbody><tr><th>Domain</th><th>Might Strike Damage Type
      </th></tr><tr><td>Celestial</td><td>@Identifier[damage:silver]{Silver}
      </td></tr><tr><td>Crafting</td><td>@Identifier[damage:fire]{Fire}
      </td></tr><tr><td>Death</td><td>@Identifier[damage:terror]{Terror}
      </td></tr><tr><td>Destruction</td><td>@Identifier[damage:fire]{Fire}
      </td></tr><tr><td>Fortune</td><td>@Identifier[damage:ice]{Ice}
      </td></tr><tr><td>Healing</td><td>@Identifier[damage:terror]{Terror}
      </td></tr><tr><td>Hearth</td><td>@Identifier[damage:fire]{Fire}
      </td></tr><tr><td>Knowledge</td><td>@Identifier[damage:psychic]{Psychic}
      </td></tr><tr><td>Nature</td><td>@Identifier[damage:vine]{Vine}
      </td></tr><tr><td>Spirit</td><td>@Identifier[damage:spiritual]{Spiritual}
      </td></tr><tr><td>Trickster</td><td>@Identifier[damage:vine]{Vine}
      </td></tr><tr><td>Value</td><td>@Identifier[damage:financial]{Financial}
      </td></tr><tr><td>Weather</td><td>@Identifier[damage:ice]{Ice}
      </td></tr></tbody></table>
