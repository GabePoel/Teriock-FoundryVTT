    base: >-
      <p>You attempt to become @L[Condition:Hidden]{hidden}. If the result of
      your @L[Core:Sneak]{SNK} @L[Core:Feat Interaction]{save} is greater than
      the @L[Core:Perception]{passive perception} (10 + 2 ×
