  identifier: zone-of-light-or-darkness
  interaction: manifest
  maneuver: slow
  overview:
    base: >-
      <p>You enchant an area no larger than 30 feet in any direction. As you
      enchant this area, you must choose whether it is a zone of "light" or
      "darkness".</p><dl><dt>Light</dt>

      <dd>The zone is fully illuminated with magical light. Within the zone,
      creatures are @Identifier[keyword:immunity]{immune} to being
      @Identifier[condition:hidden]{hidden}, cease being
      @Identifier[condition:hidden]{hidden} if they already were, and no shadows
      are cast. Creatures are also @Identifier[keyword:immunity]{immune} be
      becoming @Identifier[condition:blind]{blind} within the zone although this
      does not clear ongoing @Identifier[condition:blind]{blindness} effects
      unless they were caused by darkness. Zones of light are the only cases
      where [[lookup name]] that counts as an @Wiki[Category:Immunity
      effects]{immunity effect}.</dd>

      <dt>Darkness</dt>

      <dd>The zone is filled with magical darkness. All creatures within the
      zone are @Identifier[condition:blind]{blinded} and cannot see
      anything.</dd></dl>
