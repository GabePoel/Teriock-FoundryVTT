  overview:
    base: >-
      <p>You recognize details about nature magic by sight. For a given
      @Wiki[Category:Nature element spells]{nature element spell}, you know the
      following.</p><ul><li>If it is innate,
      @Identifier[property:granting]{granted} from a
      @Identifier[property:magic]{magic} item, self-sustaining, learned, or from
      some other source.</li>

      <li>How complex it is.</li>

      <li>What it's primary purpose is (offensive, defensive, social, utility,
      concealment, and so on).</li>

      <li>How long it's been since casting and how much longer it will last
      (roughly).</li>

      <li>What it took to cast (rough costs, approximate number of casters,
      length of casting time, if it took sacrifices).</li>

      <li>Any noteworthy features of of the @Wiki[Category:Nature element
      spells]{nature element spell}.</li></ul><p>You may also make a
      @Identifier[tradecraft:metaphysicist]{metaphysicist}
      @Identifier[core:tradecrafts]{check} to learn more about the
      @Wiki[Category:Nature element spells]{nature element spell}, its purpose,
      its construction, or other details the @Identifier[core:game-master]{GM}
      allows.</p><p>At @Identifier[core:game-master]{GM} discretion, you can
      also spend 10 minutes studying a @Wiki[Category:Nature element
      spells]{nature element spell} up close to get additional information.</p>
