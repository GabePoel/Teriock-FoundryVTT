  overview:
    base: >-
      <p>You enchant an area no larger than 30 feet in any direction. As you
      enchant this area, you must choose whether it provides "good luck" or "bad
      luck".</p><dl><dt>Good Luck</dt><dd>All physical (in game) dice rolls that
      creatures make in the area are made with
      @Identifier[core:advantage]{advantage}. Any time a card is drawn from a
      deck, the player playing the creature instead draws two cards, picks one
      of them to have actually drawn, and shuffles the other card back into the
      deck. Additionally, creatures within the area may choose to spend 1
      @Identifier[core:hit-points-and-mana-points]{MP} to have
      @Identifier[core:advantage]{advantage} on any
      @Identifier[core:attack-interaction]{attack roll},
      @Identifier[core:feat-interaction]{feat save}, or
      @Identifier[keyword:resistance]{resistance save} they make.</dd><dt>Bad
      Luck</dt><dd>All physical (in game) dice rolls that creatures make in the
      area are made with @Identifier[core:disadvantage]{disadvantage}. Any time
      a card is drawn from a deck, the player playing the creature instead draws
      two cards, the @Identifier[core:game-master]{GM} picks one of them that
      they suspect to be the "worse" draw, and that is the card that is actually
      drawn. The other card is shuffled back into the deck. Additionally,
      creatures within the area must spend 1
      @Identifier[core:hit-points-and-mana-points]{MP} or else they have
      @Identifier[core:disadvantage]{disadvantage} on any
      @Identifier[core:attack-interaction]{attack roll},
      @Identifier[core:feat-interaction]{feat save}, or
      @Identifier[keyword:resistance]{resistance save} they make.</dd></dl>
  powerSources:
    - magical
  range:
    unit: contact
  ritual: true
