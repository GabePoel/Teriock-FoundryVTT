  elements:
    - necromancy
  executionTime:
    base: passive
  form: flaw
  identifier: voracious-feeding
  interaction: manifest
  maneuver: passive
  overview:
    base: >-
      <p>You must @Identifier[drain:mana]{mana drain} at least 1 creature with
      @Identifier[core:intelligence]{INT} of 0 or greater to
      @Identifier[status:dead]{death} every day 30 minutes or you start taking
      penalties. If 30 minutes pass and you have not fed, you lose your your
      largest @Wiki[Core:HP]{hit die} and @Wiki[Core:MP]{mana die}. Your
      @Identifier[core:hit-points-and-mana-points]{HP} and
      @Identifier[core:hit-points-and-mana-points]{MP} maximums decrease by the
      value of those dice. For each additional 30 minutes you go without
      feeding, you lose your next largest @Wiki[Core:HP]{hit die} and
      @Wiki[Core:MP]{mana die}. To restore lost @Wiki[Core:HP]{hit dice} and
      @Wiki[Core:MP]{mana dice}, you must feed more than normal. If you feed on
      at least 2 creatures within a 30 minute period, you restore 1 lost
      @Wiki[Core:HP]{hit die} and @Wiki[Core:MP]{mana die}.</p>
  powerSources:
    - martial
  range:
    unit: self
  targets:
    - self
transfer: true
