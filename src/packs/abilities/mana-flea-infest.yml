  results:
    hit: >-
      <p>You bury yourself into the body of the creature you're infesting. On
      your own, this does nothing. But if many creatures are infested in
      someone, they start taking negative consequences. For every 25 creatures
      [[lookup name]]ed into the target, they lose 1
      @Identifier[core:hit-points-and-mana-points]{mana die}. If they have no
      @Identifier[core:hit-points-and-mana-points]{mana dice} remaining, they
      become @Identifier[condition:paralyzed]{paralyzed}. At that point, if 25
      additional infestations occur, the target is dealt enough
      @Identifier[drain:mana]{mana drain} to @Identifier[condition:dead]{dead}
      kill them the next time they fall
      @Identifier[condition:unconscious]{unconscious}. While infested in
      someone, you cannot be target by
      @Identifier[core:attack-interaction]{attacks}, but you are
      @Identifier[condition:paralyzed]{paralyzed}.</p>
  targets:
