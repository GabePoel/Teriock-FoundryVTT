    base: >-
      <p>You become a calmer and less powerful
      @UUID[Compendium.teriock.tables.RollTable.d79e65e12c44614e]{undead} being.
      Every time you deescalate, you move one step back on the following track.
      For instance, if you were already a
      @Identifier[creature:specter]{specter}, you would deescalate into being a
      @Identifier[creature:phantom]{phantom}.</p><p>@Embed[Compendium.teriock.tables.RollTable.1abfbe0001d304a0]</p>
