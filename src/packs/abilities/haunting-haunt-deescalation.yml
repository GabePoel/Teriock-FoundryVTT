  trigger: >-
    <p>24 hours passes without anyone interacting with you or a someone makes
    substantial progress towards resolving whatever it is that is causing your
    haunting in a way that would not aggravate you. This triggers automatically.
    You cannot choose to not use it if you are able to.</p>
