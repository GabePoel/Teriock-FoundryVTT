_key: '!effects!112ffa17a23ea71c'
_stats:
  coreVersion: '14'
  lastModifiedBy: teriockBuilder00
  systemId: teriock
  systemVersion: 0.13.10
img: systems/teriock/src/icons/abilities/spell-deflection.webp
name: Spell Deflection
system:
  competence:
    raw: 0
  delivery: weapon
  duration:
    unit: instant
  executionTime:
    base: r1
  form: normal
  identifier: spell-deflection
  interaction: block
  maneuver: reactive
  overview:
    fluent: >-
      <p>Add @Identifier[core:fluency-bonus]{F} to your
      @Identifier[core:attack-interaction]{attack roll} (instead of
      @Identifier[core:proficiency-bonus]{P}).</p>
    proficient: >-
      <p>Add @Identifier[core:proficiency-bonus]{P} to your
      @Identifier[core:attack-interaction]{attack roll}.</p>
  powerSources:
    - magical
  range:
    unit: contact
  requirements: >-
    <p>Target is a @Wiki[Category:Missile delivery spells]{missile attack
    spell}.</p>
  results:
    save: >-
      <p>The @Wiki[Category:Missile delivery spells]{spell} does not hit its
      original target. Instead, you may pick a new target within 30 feet of you
      and make an @Identifier[core:attack-interaction]{attack roll} without
      @Identifier[core:proficiency-bonus]{proficiency} against it. This is
      @Identifier[keyword:av0]{AV0} or @Identifier[keyword:unblockable]{UB} if
      the original @Wiki[Category:Missile delivery spells]{spell} was.</p>
  targets:
    - spell
transfer: true
type: ability
