  overview:
    base: >-
      <p>During a @L[Core:Short Rest]{short rest}, you may scavenge materials
      and make 1 piece of @L[Category:Armor]{armor} or a
      @L[Category:Shields]{shield}. It is @L[Property:Improvised]{improvised}.
      Any @L[Category:Armor]{armor} you make in this way counts as a number of
      items equal to the @L[Category:Armor]{armor's} @L[Core:Armor Class]{AV}
      for the purpose of this ability. Only common @L[Damage:Mundane]{mundane}
      items can typically be made in this way, but the @L[Core:Game Master]{GM}
      may specify if other options are available to you.</p>
    fluent: <p>You can instead make up to @L[Core:Fluency Bonus]{F} items.</p>
    proficient: <p>You can instead make up to @L[Core:Proficiency Bonus]{P} items.</p>
