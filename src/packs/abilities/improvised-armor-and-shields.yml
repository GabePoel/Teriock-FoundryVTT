    base: >-
      <p>During a @Identifier[core:short-rest]{short rest}, you may scavenge
      materials and make 1 piece of
      @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} or a
      @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shield}. It is
      @Identifier[property:improvised]{improvised}. Any
      @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor} you
      make in this way counts as a number of items equal to the
      @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor's}
      @Identifier[core:armor-class]{AV} for the purpose of this ability. Only
      common @Identifier[damage:mundane]{mundane} items can typically be made in
      this way, but the @Identifier[core:game-master]{GM} may specify if other
      options are available to you.</p>
    fluent: >-
      <p>You can instead make up to @Identifier[core:fluency-bonus]{F}
      items.</p>
    proficient: >-
