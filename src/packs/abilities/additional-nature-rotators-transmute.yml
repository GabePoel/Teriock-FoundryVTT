  overview:
    base: >-
      <p>The triggering
      @UUID[Compendium.teriock.rules.JournalEntry.class00000000000]{ability} is
      "transformed" into a @Identifier[damage:hack]{hack} instead of its normal
      effect. The type of the @Identifier[damage:hack]{hack} is determined by
      the target of the triggering ability.</p><dl><dt>@Wiki[Category:Creature
      target abilities]{Creature target abilities}</dt>

      <dd>Transformed into a body hack.</dd>

      <dt>@Wiki[Category:Vitals target abilities]{Vitals target abilities}</dt>

      <dd>Transformed into a vitals hack of your choice.</dd>

      <dt>@Wiki[Category:Arm target abilities]{Arm target abilities}</dt>

      <dd>Transformed into an arm hack.</dd>

      <dt>@Wiki[Category:Leg target abilities]{Leg target abilities}</dt>

      <dd>Transformed into a leg hack.</dd>

      <dt>@Wiki[Category:Limb target abilities]{Limb target abilities}</dt>

      <dd>If no limb is specified in either the target or the effect, it is
      transformed into a limb hack of your choice.</dd></dl><p>If the triggering
      @UUID[Compendium.teriock.rules.JournalEntry.class00000000000]{ability} was
      @Identifier[keyword:ub]{UB}, but you otherwise would have been able to
      @Identifier[ability:basic-block]{Block} it, you may treat it as though it
      targeted your arm. </p>
