  overview:
    base: >-
      <p>Once per @Identifier[core:short-rest]{short rest}, you may cast a
      @Wiki[Category:Ritual delivery spells]{ritual} @Wiki[Category:Storm
      element spells]{storm spell} in half the time it would normally take.
      Additionally, once per long rest, you may cast a @Wiki[Category:Storm
      element spells]{storm spell} as though you were
      @Identifier[keyword:adept]{adept} at it.</p><p>You also gain the
      @Identifier[ability:bouncy-casting]{Bouncy} and
      @Identifier[ability:illusive-casting]{Illusive} casting styles.</p>
    fluent: >-
      <p>You may now use the benefits from [[lookup name]]
      @Identifier[core:fluency-bonus]{F} times per
      @Identifier[core:short-rest]{short rest}.</p>
    proficient: >-
      <p>You may now use the benefits from [[lookup name]]
      @Identifier[core:proficiency-bonus]{P} times per
      @Identifier[core:long-rest]{long rest}.</p>
  powerSources:
    - magical
  range:
    unit: self
  skill: true
  standard: true
