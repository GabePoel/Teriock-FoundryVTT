  overview:
    base: >-
      <p>As you cast [[lookup name]], choose either "damage" or "healing". The
      effect varies depending on what you choose. [[lookup name]] only counts as
      a @Wiki[Category:Damaging effects]{damaging effect} if you choose "damage"
      and only as a @Wiki[Category:Healing effects]{healing effect} if you
      choose "healing".</p><p>If you do not take any damage before the start of
      your next @Identifier[core:turns]{turn}, you regain the
      @Identifier[core:hit-points-and-mana-points]{HP} you spent on [[lookup
      name]]. This counts as a @Wiki[Category:Regeneration effects]{regeneration
      effect} and a @Wiki[Category:Healing effects]{healing effect}. This is the
      only part of [[lookup name]] that counts as a @Wiki[Category:Regeneration
      effects]{regeneration effect}.</p>
