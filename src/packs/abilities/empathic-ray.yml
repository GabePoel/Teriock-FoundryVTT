    unit: ft
  results:
    critHit: >-
      <p>Double the @L[Core:Damage]{damage dice} dealt by this
      @L[Category:Abilities]{ability}. Or, if you chose "healing", double the
      number of times that target @L[Core:Healing]{heals}.</p>
    hit: >-
