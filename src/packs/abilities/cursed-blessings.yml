img: systems/teriock/src/icons/abilities/cursed-blessings.webp
name: Cursed Blessings
system:
  competence:
    raw: 0
  delivery: self
  duration:
    unit: unlimited
  elements:
    - necromancy
  executionTime:
    base: passive
  form: special
  identifier: cursed-blessings
  interaction: manifest
  maneuver: passive
  overview:
    base: >-
      <p>When you are @Identifier[condition:dead]{killed}, any
      @Identifier[keyword:blessing]{blessings} on you "invert" and become
      @Identifier[keyword:curse]{curses} on the creature that
      @Identifier[condition:dead]{killed} you. For instance, if you have a
      @Identifier[keyword:blessing]{blessing} of
      @Identifier[ability:flying]{Flying}, the creature that
      @Identifier[condition:dead]{killed} you may be cursed to be eternally
      @Identifier[condition:grounded]{grounded}. The nature and strength of this
      inversion is determined by the @Identifier[core:game-master]{GM}.</p>
  powerSources:
    - divine
    - magical
  range:
    unit: self
  targets:
    - creature
transfer: true
type: ability
