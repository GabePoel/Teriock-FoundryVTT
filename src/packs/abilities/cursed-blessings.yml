  overview:
    base: >-
      <p>When you are @Identifier[status:dead]{killed}, any
      @Identifier[keyword:blessing]{blessings} on you "invert" and become
      @Identifier[keyword:curse]{curses} on the creature that
      @Identifier[status:dead]{killed} you. For instance, if you have a
      @Identifier[keyword:blessing]{blessing} of
      @Identifier[ability:flying]{Flying}, the creature that
      @Identifier[status:dead]{killed} you may be cursed to be eternally
      @Identifier[status:grounded]{grounded}. The nature and strength of this
      inversion is determined by the @Identifier[core:game-master]{GM}.</p>
