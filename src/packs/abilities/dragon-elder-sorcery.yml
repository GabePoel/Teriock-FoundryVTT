  overview:
    base: >-
      <p>You gain @Identifier[ability:innate-elder-sorcery]{Innate Elder
      Sorcery}, @Identifier[ability:elder-sorcery-adept]{Elder Sorcery Adept},
      and @Identifier[ability:dragon-snapcast]{Dragon Snapcast}. You are
      @Identifier[core:fluency-bonus]{fluent} in all of these. In addition, you
      automatically get a +50 metaphysics bonus (a positive metaphysics penalty)
      to your @Identifier[core:elder-sorcery]{Elder Sorcery} creation. Beyond
      this, you have an innate mastery of @Identifier[core:elder-sorcery]{Elder
      Sorcery} akin to a native language that manifests in various ways. For
      one, you know words far beyond the ones listed on the formal
      @Wiki[Core:Elder Sorcery Words]{charts}. When creating, casting, and
      learning @Identifier[core:elder-sorcery]{Elder Sorcery}, you may assume to
      know all words (whether they are on the @Wiki[Core:Elder Sorcery
      Words]{charts} or not) so long as they are of an OP that you would know
      from @Identifier[ability:innate-elder-sorcery]{Innate Elder Sorcery}. It
      is up to the @Identifier[core:game-master]{GM} to determine what the OP of
      a "nonstandard" word would be. You also always have a universal +5 to your
      wording @Identifier[core:elder-sorcery]{Elder Sorcery} creation score and
      a +3 to all others. You may also speak freely in
      @Identifier[core:elder-sorcery]{Elder Sorcery} without creating or casting
      it. This freeform speech can be understood by anyone listening regardless
      of whether or not they know @Identifier[core:elder-sorcery]{Elder
      Sorcery}. However, it <i>must</i> be true. Otherwise, you fumble as though
      you had cast @Identifier[core:elder-sorcery]{Elder Sorcery}.</p>
  powerSources:
    - magical
  range:
    unit: self
  targets:
    - self
transfer: true
type: ability
