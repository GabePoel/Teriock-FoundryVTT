    @L[Category:Undead creatures]{undead}, they are @L[Core:Healing]{healed} an
    additional time.</p>
  identifier: resurrect
  interaction: manifest
  maneuver: slow
  mundane: false
  overview:
    base: >-
      <p>If target is @L[Condition:Dead]{dead}, they are brought back to life
      with 1 @L[Core:Hit Points and Mana Points]{HP}. If target is
      @L[Category:Undead creatures]{undead}, you can choose to have them be
      @L[Core:Healing]{healed} for @L[Core:Damage]{damage}. [[lookup name]] does
      not count as a @L[Category:Healing effects]{healing effect} unless you
      choose to @L[Core:Healing]{heal} with it.</p>
    fluent: >-
      <p>If target is @L[Category:Undead creatures]{undead}, they are
