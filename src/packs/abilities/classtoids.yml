  overview:
    base: >-
      <p>You do not get to choose what @Pack[teriock.classes]{classes} you go.
      Instead, they are determined for you through some external force. If not
      otherwise specified by the @Identifier[core:game-master]{GM}, this is
      determined randomly. However, you get your first
      @Pack[teriock.classes]{rank} at @Identifier[core:leveling-up]{level 1}
      instead of @Identifier[core:leveling-up]{level 6}. You are still
      @Identifier[core:proficiency-bonus]{proficient} in the
      @Pack[teriock.abilities]{abilities} you get through this
      @Pack[teriock.classes]{rank}. This extra @Pack[teriock.classes]{rank} does
      not give you additional @Identifier[core:hit-points-and-mana-points]{hit
      dice}, @Identifier[core:hit-points-and-mana-points]{mana dice},
      @Identifier[core:hit-points-and-mana-points]{HP}, or
      @Identifier[core:hit-points-and-mana-points]{MP}.</p><p>Once a
      @Pack[teriock.classes]{class} is determined, you stick with it for two
      @Pack[teriock.classes]{ranks}. After that, you will start learning a new
      @Pack[teriock.classes]{class} and stick with it for another two
      @Pack[teriock.classes]{ranks}. It is possible to get the same
      @Pack[teriock.classes]{class} for multiple sets of two
      @Pack[teriock.classes]{ranks}.</p><p>Every two
      @Pack[teriock.classes]{ranks}, you gain an additional @Wiki[Category:Flaw
      abilities]{flaw} as well from the following
      list.</p><p>@Embed[Compendium.teriock.tables.RollTable.09fca586eb2cb654
      rollable]</p>
  powerSources:
    - primal
  range:
    unit: self
  targets:
    - self
transfer: true
