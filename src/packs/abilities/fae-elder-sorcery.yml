  overview:
    base: >-
      <p>You gain @Identifier[ability:innate-elder-sorcery]{Innate Elder
      Sorcery} and are @Identifier[core:fluency-bonus]{fluent} in it. In
      addition, you automatically get a +15 metaphysics bonus (a positive
      metaphysics penalty) to your @Identifier[core:elder-sorcery]{Elder
      Sorcery} creation. You may also freely spend
      @Identifier[core:hit-points-and-mana-points]{MP} from willing
      @Wiki[Category:Plant creatures]{plants}, @Wiki[Category:Animal
      creatures]{animals}, and
      @UUID[Compendium.teriock.tables.RollTable.f2c29b199c990ab7]{fae} that
      assist in your @Identifier[core:elder-sorcery]{Elder Sorcery} creation.
      When creating @Identifier[core:elder-sorcery]{Elder Sorcery} spells, you
      often intuit upon "nonstandard" words that are not widely known. This
      manifests as a universal +2 to your wording
      @Identifier[core:elder-sorcery]{Elder Sorcery} creation score.</p>
