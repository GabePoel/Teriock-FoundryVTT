  overview:
    base: >-
      <p>You undergo a @Identifier[condition:transformed]{greater
      transformation} that cannot be reverted from into a particular
      @UUID[Compendium.teriock.tables.RollTable.77cfb7b27d7836e5]{animal}. This
      is typically the type of
      @UUID[Compendium.teriock.tables.RollTable.77cfb7b27d7836e5]{animal} that
      the @Identifier[creature:were-creature]{were-creature} that first bit you
      was. Your @Identifier[core:size]{SIZE} is 1 greater than that
      @UUID[Compendium.teriock.tables.RollTable.77cfb7b27d7836e5]{animal}
      normally is and you maintain all
      @Identifier[creature:were-creature]{were-creature}
      @Pack[teriock.abilities]{abilities},
      @Identifier[core:hit-points-and-mana-points]{hit dice}, and
      @Identifier[core:hit-points-and-mana-points]{HP}. You also have
      @Identifier[ability:impure-durability]{Impure Durability}, and become
      @Identifier[ability:aggressive]{Aggressive} while
      @Identifier[condition:transformed]{transformed}.</p>
  powerSources:
    - magical
  range:
    unit: self
  targets:
    - self
  trigger: >-
    <p>The moon is in a particular phase. This is typically the phase in which
    you were first bitten by a
    @Identifier[creature:were-creature]{were-creature}. This triggers
    automatically. You cannot choose to not use it if you are able to.</p>
