    base: >-
      <p>Once per @L[Core:Short Rest]{short rest}, you may cast a
      @L[Category:Ritual delivery spells]{ritual} @L[Category:Flame element
      spells]{flame spell} in half the time it would normally take.
      Additionally, once per long rest, you may cast a @L[Category:Flame element
      spells]{flame spell} as though you were @L[Keyword:Adept]{adept} at
      it.</p><p>You also gain the @L[Ability:Bombastic Casting]{Bombastic} and
      @L[Ability:Sudden Casting]{Sudden} casting styles.</p>
