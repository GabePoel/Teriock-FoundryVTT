img: systems/teriock/src/icons/abilities/encroaching-touch.webp
name: Encroaching Touch
system:
  competence:
    raw: 0
  delivery: self
  duration:
    unit: unlimited
  executionTime:
    base: passive
  form: special
  identifier: encroaching-touch
  interaction: manifest
  maneuver: passive
  overview:
    base: >-
      <p>You may use your melee items as though they were your
      @Identifier[equipment:hand]{hand}. You are not
      @Identifier[core:proficiency-bonus]{proficient} nor
      @Identifier[core:fluency-bonus]{fluent} with
      @Pack[teriock.abilities]{abilities} you use through your items.</p>
    fluent: >-
      <p>If you are @Identifier[core:fluency-bonus]{fluent} with an
      @Pack[teriock.abilities]{ability} you use through your melee items, you
      regain the @Identifier[core:fluency-bonus]{fluency bonus} for that
      @Pack[teriock.abilities]{ability}.</p>
    proficient: >-
      <p>If you are @Identifier[core:proficiency-bonus]{proficient} with an
      @Pack[teriock.abilities]{ability} you use through your melee items, you
      regain the @Identifier[core:proficiency-bonus]{proficiency bonus} for that
      @Pack[teriock.abilities]{ability}.</p>
  powerSources:
    - magical
  range:
    unit: self
  targets:
    - self
transfer: true
type: ability
