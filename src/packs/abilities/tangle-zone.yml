  overview:
    base: >-
      <p>You enchant an area no larger than 30 feet in any direction. Any
      creature @L[Core:Movement]{moving} at least 5 feet through this area must
      make a @L[Core:Strength]{STR} @L[Core:Feat Interaction]{feat save} or
      become @L[Condition:Snared]{snared}. At the start of each of the target's
      @L[Core:Turn]{turns}, they roll [[/roll 2d4]]. If either of these dice
      roll a 4, this effect ends. In addition, any creature
      @L[Core:Movement]{moving} through this area takes [[/damage 1d4[vine]]]
      @L[Core:Damage]{damage} for every 5 feet they move through it.</p>
