  overview:
    base: >-
      <p>You enchant an area no larger than 30 feet in any direction. If
      desired, this area provides @Identifier[core:cover]{half cover}. Any
      creature @Identifier[core:movement]{moving} at least 5 feet through this
      area must make a @Identifier[core:strength]{STR}
      @Identifier[core:feat-interaction]{feat save} or become
      @Identifier[condition:snared]{snared}. At the start of each of the
      target's @Identifier[core:turns]{turns}, they roll [[/roll 2d4]]. If
      either of these dice roll a 4, this effect ends. In addition, any creature
      @Identifier[core:movement]{moving} through this area takes [[/damage
      1d4[vine]]] @Identifier[core:damage]{damage} for every 5 feet they move
      through it.</p>
