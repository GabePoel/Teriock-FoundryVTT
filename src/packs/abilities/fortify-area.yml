  overview:
    base: >-
      <p>You may spend a @Identifier[core:short-rest]{short rest} building
      defensive fortifications around the area you are resting in. The area must
      not be greater than 30 feet wide in any direction. You and your allies
      that are in this are when @Identifier[core:combat]{combat} begins gain
      [[/gainTempHp 1d10]] @Identifier[core:temporary-hit-points]{temporary HP}
      for the duration of that @Identifier[core:combat]{combat}. This area
      counts as having been "fortified".</p>
    fluent: >-
      <p>You and your allies instead gain [[/gainTempHp 1d10 + (@f)d10]]
      @Identifier[core:temporary-hit-points]{temporary HP}.</p>
    proficient: >-
