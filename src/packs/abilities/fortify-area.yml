  overview:
    base: >-
      <p>You may spend a @L[Core:Short Rest]{short rest} building defensive
      fortifications around the area you are resting in. You and your allies
      that are in this are when @L[Core:Combat]{combat} begins gain
      [[/gainTempHp 1d10]] @L[Core:Temporary Hit Points]{temporary HP} for the
      duration of that @L[Core:Combat]{combat}. This area counts as having been
      "fortified".</p>
    fluent: >-
      <p>You and your allies instead gain [[/gainTempHp 1d10 + (@f)d10]]
      @L[Core:Temporary Hit Points]{temporary HP}.</p>
    proficient: >-
      <p>You and your allies instead gain [[/gainTempHp 1d10 + (@p)d10]]
      @L[Core:Temporary Hit Points]{temporary HP}.</p>
