  overview:
    base: >-
      <p>When you use @Identifier[ability:brace]{Brace}, you gain
      @Identifier[core:temporary-hit-points]{temporary HP} in multiples of
      [[/roll 1d10]] instead of [[/roll 1d6]]. All the same rules regarding the
      @Identifier[core:temporary-hit-points]{temporary HP} from
      @Identifier[ability:brace]{Brace} still apply. In addition, using
      @Identifier[ability:brace]{Brace} causes you to
      @Identifier[keyword:deboosted]{deboost} all
      @Identifier[core:damage]{damage} you take as long as you remain
      stationary.</p><p class="note"><b>Note:</b> Any extra damage dice rolled
      due to a @Identifier[keyword:boosted]{boost} or critical hit are added
      before the @Identifier[keyword:deboosted]{deboost} from [[lookup name]]
      takes them away.</p>
