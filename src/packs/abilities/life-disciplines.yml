  overview:
    base: >-
      <p>Once per @L[Core:Short Rest]{short rest}, you may cast a
      @L[Category:Ritual delivery spells]{ritual} @L[Category:Life element
      spells]{life spell} in half the time it would normally take. Additionally,
      once per long rest, you may cast a @L[Category:Life element spells]{life
      spell} as though you were @L[Keyword:Adept]{adept} at it.</p><p>You also
      gain the @L[Ability:Emergency Casting]{Emergency} and @L[Ability:Sheltered
      Casting]{Sheltered} casting styles.</p>
    fluent: >-
      <p>You may now use the benefits from [[lookup name]] @L[Core:Fluency
      Bonus]{F} times per @L[Core:Short Rest]{short rest}.</p>
    proficient: >-
      <p>You may now use the benefits from [[lookup name]] @L[Core:Proficiency
      Bonus]{P} times per @L[Core:Long Rest]{long rest}.</p>
