    base: >-
      <p>When you @Identifier[core:attack-interaction]{attack} with a
      @Identifier[property:ranged]{ranged weapons}, you may
      @Identifier[core:attack-interaction]{attack} up to 2 additional targets as
      well. You must have enough @Identifier[property:ammunition]{ammunition} or
      @Identifier[property:thrown]{thrown} weapons to make these additional
      @Identifier[core:attack-interaction]{attacks}. These all count as the same
      @Identifier[core:attack-interaction]{attack}, although you roll for the
      @Identifier[core:attack-interaction]{attacks} against each target
      separately. They do not incur additional attack penalties.</p>
