img: systems/teriock/src/icons/properties/volatile.webp
name: Volatile
system:
  applyIfDampened: true
  competence:
    raw: 0
  description: >-
    <p>A <b>[[lookup name style=lc]]</b> item explodes if
    @Identifier[property:shattered]{shattered}. This
    @Identifier[property:destroyed]{destroys} the item and causes everyone
    within 10 feet to make a DC 12 @Identifier[core:movement]{MOV}
    @Identifier[core:feat-interaction]{feat save}. If they fail, they take
    [[/damage 2d8]] @Identifier[core:damage]{damage}. This has any
    @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage types}
    that the item would normally deal. Anyone
    @Identifier[keyword:bearing]{bearing} a [[lookup name style=lc]] item while
    it explodes takes half as much @Identifier[core:damage]{damage} even if they
    succeed on their @Identifier[core:movement]{MOV} save.</p>
  form: flaw
  identifier: volatile
  powerSources:
    - alchemical
transfer: true
type: property
