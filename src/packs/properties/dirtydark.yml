  description: >-
    <p>Items that are <b>[[lookup name style=lc]]</b> are
    @L[Property:Darksteel]{darksteel} and deal @L[Damage:Dirtydark]{dirtydark}
    @L[Core:Damage]{damage}. If a creature is @L[Keyword:Bearing]{bearing} a
    [[lookup name style=lc]] item that gets @L[Property:Shattered]{shattered} or
    @L[Property:Destroyed]{destroyed}, it is as though they had taken [[/damage
    8d20[[[lookup name style=lc]]]]] @L[Core:Damage]{damage} for the purpose of
    developing @L[Damage:Dirtydark]{black rot}. This is instead of the [[/damage
    4d20[[[lookup name style=lc]]]]] @L[Core:Damage]{damage} from
    @L[Property:Darksteel]{darksteel}. In addition, every day spent
    @L[Keyword:Bearing]{bearing} a [[lookup name style=lc]] item acts as 1
    @L[Damage:Dirtydark]{dirtydark} for the purpose of develeoping
    @L[Damage:Dirtydark]{black rot}.</p>
