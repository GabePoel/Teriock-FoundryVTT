_id: ed264d0830324deb
_key: "!effects!ed264d0830324deb"
img: systems/teriock/src/icons/properties/dirtydark.webp
name: Dirtydark
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  damageType: dirtydark
  description: >-
    <p>Items that are <b>[[lookup name style=lc]]</b> are
    @Identifier[property:darksteel]{darksteel} and deal
    @Identifier[damage:dirtydark]{dirtydark} @Identifier[core:damage]{damage}.
    If a creature is @Identifier[keyword:bearing]{bearing} a [[lookup name
    style=lc]] item that gets @Identifier[property:shattered]{shattered} or
    @Identifier[property:destroyed]{destroyed}, it is as though they had taken
    [[/damage 8d20[dirtydark]]] @Identifier[core:damage]{damage} for the purpose
    of developing @Identifier[damage:dirtydark]{black rot}. This is instead of
    the [[/damage 4d20[dirtydark]]] @Identifier[core:damage]{damage} from
    @Identifier[property:darksteel]{darksteel}. In addition, every day spent
    @Identifier[keyword:bearing]{bearing} a [[lookup name style=lc]] item acts
    as 1 @Identifier[damage:dirtydark]{dirtydark} for the purpose of develeoping
    @Identifier[damage:dirtydark]{black rot}.</p>
  form: intrinsic
  identifier: dirtydark
  powerSources:
    - material
transfer: true
type: property
