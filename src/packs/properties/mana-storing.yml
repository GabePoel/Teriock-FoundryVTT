  description: >-
    <p>A <b>[[lookup name style=lc]]</b> item has some latent energy held within
    it that creatures can use to power their own
    @Pack[teriock.abilities]{abilities}. Mana storing items will always have a
    number N associated with them (1, by default, if no number is listed). This
    number refers to a "mana die" analogous to those that creatures have. It is
    always [[/roll 1d4]] (3 MP), which means the item stores a maximum of N × 4
    @Wiki[Core:MP]{MP}. At dawn, if @Identifier[ability:attune]{attuned} to the
    [[lookup name style=lc]] item, roll [[/roll d4]]. The item regains up to
    this much spent @Wiki[Core:MP]{MP}. If dawn comes and nobody is
    @Identifier[ability:attune]{attuned} to a [[lookup name]] item, it releases
    all @Wiki[Core:MP]{MP} it had stored.</p>
