  description: >-
    <p>If an item is <b>[[lookup name style=lc]]</b> it requires some additional
    @L[Core:Hit Points and Mana Points]{MP} in order to operate beyond its
    @L[Core:Presence]{tier}. A [[lookup name style=lc]] item always has some
    number N associated it. When you @L[Ability:Attune]{Attune} to a [[lookup
    name style=lc]] item, you must pay N @L[Core:Hit Points and Mana Points]{MP}
    to keep it from being @L[Property:Dampened]{dampened}. You must pay another
    N @L[Core:Hit Points and Mana Points]{MP} at dawn for as long as you remain
    @L[Core:Presence]{attuned} to the [[lookup name style=lc]] item.</p>
