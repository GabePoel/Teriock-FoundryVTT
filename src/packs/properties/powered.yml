  description: >-
    <p>If an item is <b>[[lookup name style=lc]]</b> it requires some additional
    @Identifier[core:hit-points-and-mana-points]{MP} in order to operate beyond
    its @Identifier[core:presence]{tier}. A [[lookup name style=lc]] item always
    has some number N associated it. When you
    @Identifier[ability:attune]{Attune} to a [[lookup name style=lc]] item, you
    must pay N @Identifier[core:hit-points-and-mana-points]{MP} to keep it from
    being @Identifier[property:dampened]{dampened}. You must pay another N
    @Identifier[core:hit-points-and-mana-points]{MP} at dawn for as long as you
    remain @Identifier[core:presence]{attuned} to the [[lookup name style=lc]]
    item.</p>
