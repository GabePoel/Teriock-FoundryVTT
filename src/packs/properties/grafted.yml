img: systems/teriock/src/icons/properties/grafted.webp
name: Grafted
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>An item that is <b>[[lookup name style=lc]]</b> to your body is
    physically attached to it. It cannot be @Identifier[property:thrown]{thrown}
    or otherwise used for @Identifier[property:ranged]{ranged}
    @Wiki[Category:Attack abilities]{attacks}. You are
    @Identifier[keyword:incapable]{incapable} of letting go of it and are
    @Identifier[keyword:immunity]{immune} to having it knocked out of your hand
    with @Identifier[ability:disarm]{Disarm} or other similar effects. If a
    [[lookup name style=lc]] item is @Identifier[property:shattered]{shattered},
    and you would @Identifier[core:healing]{heal} a
    @Identifier[status:hacked]{hack}, then you can choose to instead repair the
    [[lookup name style=lc]] item.</p>
  form: intrinsic
  identifier: grafted
  mundane: true
  powerSources:
    - martial
transfer: true
type: property
