name: Grafted
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>An item that is <b>[[lookup name style=lc]]</b> to your body is
    physically attached to it. It cannot be @L[Property:Thrown]{thrown} or
    otherwise used for @L[Property:Ranged]{ranged} @L[Category:Attack
    abilities]{attacks}. You are @L[Keyword:Incapable]{incapable} of letting go
    of it and are @L[Keyword:Immunity]{immune} to having it knocked out of your
    hand with @L[Ability:Disarm]{Disarm} or other similar effects. If a [[lookup
    name style=lc]] item is @L[Property:Shattered]{shattered}, and you would
    @L[Core:Healing]{heal} a @L[Condition:Hacked]{hack}, then you can choose to
    instead repair the [[lookup name style=lc]] item.</p>
  form: intrinsic
  identifier: grafted
  mundane: true
  powerSources:
    - martial
transfer: true
type: property
