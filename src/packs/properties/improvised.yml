  description: >-
    <p>An <b>[[lookup name style=lc]]</b> item is one made out scrap or
    temporary pieces. It functions like any other item, but only exists for 8
    hours before falling apart and becoming
    @Identifier[property:destroyed]{destroyed}. It is easy to tell whether an
    item is [[lookup name style=lc]]. @Identifier[ability:interact]{Interacting}
    with an item is enough to determine if it is [[lookup name style=lc]] or
    not.</p>
  form: flaw
  identifier: improvised
