name: Darksteel
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>Items that are <b>[[lookup name style=lc]]</b> can
    @Identifier[core:block-interaction]{block} @Wiki[Category:Magically powered
    abilities]{magically powered abilities} even if they are
    @Identifier[keyword:ub]{UB}. If you are wearing [[lookup name style=lc]]
    @UUID[Compendium.teriock.tables.RollTable.ed3267c1d2c3a7f4]{armor}, then
    @Wiki[Category:Magically powered abilities]{magically powered}
    @Identifier[core:attack-interaction]{attacks} made against you are not
    @Identifier[keyword:av0]{AV0}. [[lookup name]] items are also
    @Identifier[keyword:resistance]{resistant} to all @Wiki[Category:Magical
    effects]{magical effects}. If a creature is
    @Identifier[keyword:bearing]{bearing} a dirty dark item that gets
    @Identifier[property:shattered]{shattered} or
    @Identifier[property:destroyed]{destroyed}, it is as though they had taken
    [[/damage 4d20[dirtydark]]] @Identifier[core:damage]{damage} for the purpose
    of developing @Identifier[damage:dirtydark]{black rot}.</p>
  form: intrinsic
  identifier: darksteel
  powerSources:
    - material
