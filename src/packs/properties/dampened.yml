_id: 6916b713ea43bf45
_key: '!effects!6916b713ea43bf45'
img: systems/teriock/src/icons/properties/dampened.webp
name: Dampened
system:
  applyIfDampened: true
  applyIfDeattuned: true
  automations:
    parameterChanges:
      _id: parameterChanges
      changes:
        - key: system.dampened
          phase: setup
          priority: 10
          target: Item
          type: override
          value: 'true'
      type: changes
  competence:
    raw: 0
  description: >-
    <p>A <b>[[lookup name style=lc]]</b> item has all its @Wiki[Category:Magical
    properties]{magical properties} suppressed. This means, for instance, that
    it cannot @Identifier[property:granting]{grant}
    @Pack[teriock.abilities]{abilities} to its @Identifier[keyword:using]{user}.
    However, any mundane @Wiki[Category:Martially powered abilities]{martially
    powered abilities} that are intrinsic to the item itself (those marked with
    black text in live action <a target="_blank" rel="nofollow noreferrer
    noopener" class="external text" href="https://www.fanwar.com/">FanWar</a>)
    continue to function.</p>
  form: flaw
  identifier: dampened
  powerSources:
    - magical
transfer: true
type: property
