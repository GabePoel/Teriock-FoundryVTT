  description: >-
    <p>If an item is <b>[[lookup name style=lc]]</b> to a creature, it is bonded
    to their spirit. The item and creature are
    @Identifier[keyword:immunity]{immune} to @Wiki[Category:Stealing
    effects]{effects that would steal it} from the creature's body (even if the
    creature is dead).</p><p class="note"><b>Note:</b> This does not prevent the
    creature from throwing, dropping, or handing off the item. In which case,
    the item is still [[lookup name style=lc]] to them.</p>
