_id: 3800224eb08cc2c3
_key: "!effects!3800224eb08cc2c3"
img: systems/teriock/src/icons/properties/cursed.webp
name: Cursed
system:
  competence:
    raw: 0
  description: >-
    <p>When a creature @Wiki[Core:Attunement]{attunes} to a <b>[[lookup name
    style=lc]]</b> item, they gain some @Identifier[keyword:curse]{curse} as
    specified by the item. These @Identifier[keyword:curse]{curses} are
    especially strong and challenging to get rid of. The only way to do so is to
    remove the item that gave the curse from the creature while they are dead
    and have the item @Wiki[Core:Attunement]{attuned}. At
    @Identifier[core:game-master]{GM} discretion, identical items may sometimes
    count as the same item for the purpose of removing these
    @Identifier[keyword:curse]{curses}.</p>
  form: flaw
  identifier: cursed
  powerSources:
    - magical
transfer: true
type: property
