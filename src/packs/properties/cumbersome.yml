  description: >-
    <p>A <b>[[lookup name style=lc]]</b> @Pack[teriock.equipment]{item}
    <i>always</i> makes its user @Identifier[status:encumbered]{encumbered},
    regardless of how much they are
    @Identifier[core:carrying-capacity]{carrying}. If the user would have not
