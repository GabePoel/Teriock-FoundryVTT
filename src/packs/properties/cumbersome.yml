    @Identifier[status:encumbered]{lightly encumbered} otherwise, they are
    @Identifier[status:encumbered]{heavily encumbered}. And if they would have
    been @Identifier[status:encumbered]{heavily encumbered} otherwise, they are
    rendered @Identifier[status:immobile]{immobile}.</p>
