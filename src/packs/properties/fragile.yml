_id: 7b3e6d546e3b26f7
_key: "!effects!7b3e6d546e3b26f7"
img: systems/teriock/src/icons/properties/fragile.webp
name: Fragile
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>An item that's <b>[[lookup name style=lc]]</b> is easily broken. It
    becomes @Identifier[property:shattered]{shattered} if it is used to
    @Identifier[core:block-interaction]{block} or if it is the
    @Wiki[Category:Item target abilities]{target of an ability} that deals it
    @Wiki[Category:Damaging effects]{damage}. If it would become
    @Identifier[property:shattered]{shattered} through some other means, it is
    instead @Identifier[property:destroyed]{destroyed}.</p>
  form: flaw
  identifier: fragile
transfer: true
type: property
