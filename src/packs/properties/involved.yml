name: Involved
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>Using an <b>[[lookup name style=lc]]</b>
    @Identifier[property:involved]{item} is more complicated than a regular one
    and gives other creatures a chance to interfere. Doing any of the following
    with an @Identifier[property:involved]{involved item} counts as a valid
    trigger for @Identifier[ability:opportunity-attack]{opportunity
    attacks}.</p><ul><li>@Identifier[ability:reload]{Reloading} it.</li>

    <li>@Identifier[core:attack-interaction]{Attacking} with it.</li>

    <li>@Identifier[ability:interact]{Interacting} with it to somehow activate
    it. Not all @Identifier[ability:interact]{interactions} involving an
    @Identifier[property:involved]{involved item} count. Drawing a
    @Identifier[equipment:pistol]{pistol} wouldn't, but sliding pieces around in
    some [[lookup name style=lc]] puzzle box would.</li></ul>
  form: flaw
  identifier: involved
  powerSources:
    - technological
transfer: true
type: property
