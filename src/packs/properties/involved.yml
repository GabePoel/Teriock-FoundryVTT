name: Involved
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>Using an <b>[[lookup name style=lc]]</b> @Wiki[Category:Involved
    equipment]{item} is more complicated than a regular one and gives other
    creatures a chance to interfere. Doing any of the following with an
    @Wiki[Category:Involved equipment]{involved item} counts as a valid trigger
    for @Identifier[ability:opportunity-attack]{opportunity
    attacks}.</p><ul><li>@Identifier[ability:reload]{Reloading} it.</li>

    <li>@Wiki[Category:Attack abilities]{Attacking} with it.</li>

    <li>@Identifier[ability:interact]{Interacting} with it to somehow activate
    it. Not all @Identifier[ability:interact]{interactions} involving an
    @Wiki[Category:Involved equipment]{involved item} count. Drawing a
    @Pack[teriock.equipment]{pistol} wouldn't, but sliding pieces around in some
    [[lookup name style=lc]] puzzle box would.</li></ul>
  form: intrinsic
  identifier: involved
  mundane: true
  powerSources:
    - technological
transfer: true
