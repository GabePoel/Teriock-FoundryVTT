name: Involved
system:
  applyIfDampened: true
  applyIfDeattuned: true
  competence:
    raw: 0
  description: >-
    <p>Using an <b>[[lookup name style=lc]]</b> @L[Category:Involved
    equipment]{item} is more complicated than a regular one and gives other
    creatures a chance to interfere. Doing any of the following with an
    @L[Category:Involved equipment]{involved item} counts as a valid trigger for
    @L[Ability:Opportunity Attack]{opportunity
    attacks}.</p><ul><li>@L[Ability:Reload]{Reloading}
    it.</li><li>@L[Category:Attack abilities]{Attacking} with
    it.</li><li>@L[Ability:Interact]{Interacting} with it to somehow activate
    it. Not all @L[Ability:Interact]{interactions} involving an
    @L[Category:Involved equipment]{involved item} count. Drawing a
    @L[Category:Equipment]{pistol} wouldn't, but sliding pieces around in some
    [[lookup name style=lc]] puzzle box would.</li></ul>
  form: flaw
  identifier: involved
  mundane: true
  powerSources:
    - technological
