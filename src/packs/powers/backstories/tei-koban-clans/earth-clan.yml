name: Earth Clan
system:
  competence:
    raw: 1
  description: >-
    <p>A group of @Identifier[creature:cobben]{cobbens} from a group of islands
    connected to the Blue Reefs that practice ancestor worship and have a
    complex set of cultural traditions and dances that imbue their
    @Identifier[ability:spirit-item]{spirit items} with powers mastered by their
    ancestors. They have complex facial tattoos that represent which of the
    eight clans they are from.</p><p>Dancing is an integral part of Tei Koban
    culture. The dances prepare young @Identifier[creature:cobben]{cobbens} for
    obtaining their @Identifier[ability:spirit-item]{spirit items} and helps
    their ancestral connection and training.</p>
  identifier: earth-clan
  maxAv: 4
  type: backstory
