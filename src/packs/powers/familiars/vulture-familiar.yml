      overview:
        base: >-
          <p>If the target of this ritual is @Wiki[Category:Undead
          creatures]{undead}, it is @Identifier[keyword:incapable]{incapable} of
          @Wiki[Category:Regeneration effects]{regeneration effects} and
          @Wiki[Category:Reanimation effects]{reanimation effects} while this
          ritual is being cast. In addition, any @Wiki[Category:Regeneration
          effects]{regeneration effects} or @Wiki[Category:Reanimation
          effects]{reanimation effects} that target them during this time
          @Identifier[core:fizzles]{fizzle}.</p><p>When this ritual is
          completed, make a  to see if the @Wiki[Category:Undead
          creatures]{undead} target is destroyed. The check's DC is typically
          equal to the @Wiki[Category:Creatures by BR]{battle rating} of the
          target's @Wiki[Category:Undead creatures]{undead type}. The
          @Identifier[core:game-master]{GM} may adjust the DC based on other
          factors as they see fit.</p><p>[[lookup name]] can also be used to
          cleanse effects other than being @Wiki[Category:Undead
          creatures]{undead}. The @Identifier[core:game-master]{GM} decides the
          DC of the  based on the severity of the effect being cleansed. If the
          check is successful, the effect is removed and the target is destroyed
          in a similar manner to an @Wiki[Category:Undead creatures]{undead}
          target. The target pulls stones from the  based on the severity of the
          effect being cleansed (see @Identifier[core:game-master]{GM}).</p>
        fluent: >-
          <p>You may add @Identifier[core:fluency-bonus]{F} to the  regardless
          of whether or not you are fluent in
          @Identifier[tradecraft:priest]{priest}.</p>
        proficient: >-
          <p>You may add @Identifier[core:proficiency-bonus]{P} to the 
          regardless of whether or not you are proficient in
          @Identifier[tradecraft:priest]{priest}.</p>
      piercing:
        raw: 0
      powerSources:
        - divine
      range:
        raw: '5'
        unit: ft
      results:
        fail: >-
          <p>You pay an amount of @Wiki[Core:MP]{MP} and @Wiki[Core:HP]{HP}
          equal to the  DC.</p>
        save: >-
          <p>The target is "destroyed". They @Identifier[status:dead]{die}, they
          are @Identifier[status:ruined]{ruined}, and they pull additional
          stones from the @Identifier[core:death-bag]{death bag} depending on
          the extent of the undead blight being cleansed from
          them.</p><ul><li>@Identifier[ability:partial-undead]{Partial undead}:
          +1 stone</li>

          <li>@Identifier[ability:minor-undead]{Minor undead}: +2 stones</li>

          <li>@Identifier[ability:full-undead]{Full undead}: +5 stones</li>

          <li>@Identifier[ability:greater-undead]{Greater undead}: +10
          stones</li></ul><p>The target also pulls an additional stone for each
          century they've spent as an undead creature. Assuming they survive,
          their body must be @Identifier[ability:summon-the-dead]{reconstructed}
          and then they can be @Wiki[Category:Revival effects]{revived} in a
          non-undead state.</p>
