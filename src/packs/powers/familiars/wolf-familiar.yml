      overview:
        base: >-
          <p>Make an [[/tc herbalist]]{herbalist check} to remove a
          @Wiki[Category:Disease effects]{disease or illness} from some
          creature. The @Identifier[core:game-master]{GM} determines the
          difficulty based on the severity of the illness. The
          @Identifier[core:game-master]{GM} may also require you to have access
          to specific ingredients or tools or put other conditions in place. If
          the illness is mental in nature, then [[lookup name]] acts as a
          @Wiki[Category:Mental effects]{mental effect}.</p>
        proficient: >-
          <p>You are @Identifier[keyword:adept]{adept} at [[lookup name]].
          Before you make the check, you may spend 1 additional
          @Identifier[core:hit-points-and-mana-points]{MP} to know the DC if it
          is less than your total level. You may also add your
          @Identifier[core:proficiency-bonus]{proficiency bonus} to the [[/tc
          herbalist]]{herbalist check} regardless of whether or not you are
          proficient in @Identifier[tradecraft:herbalist]{herbalist}.</p>
