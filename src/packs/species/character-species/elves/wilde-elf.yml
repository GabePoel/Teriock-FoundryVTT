    <p>From the Wilde Isles, not much was known about these elves other than
    their bizarre color and the fact that they did not speak. Although they were
    reclusive in nature, they were ruthless when angered. Wilde elves seemed to
    worship nature in some form.</p>
  identifier: wilde-elf
