    img: systems/teriock/src/icons/abilities/classtoids.webp
    name: Classtoids
    system:
      competence:
        raw: 0
      delivery: self
      duration:
        raw: '0'
        unit: unlimited
      executionTime:
        base: passive
        slow:
          unit: second
