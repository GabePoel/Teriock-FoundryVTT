img: systems/teriock/src/icons/creatures/silver-joro.webp
name: Silver Joro
system:
  adult: 12
  appearance: >-
    <p>Like @L[Creature:Common Ork]{common orks} with more
    @L[Creature:Human]{human} features, Silver skin, and Silver eyes.</p>
  br: 1
  competence:
    raw: 1
  description: >-
    <p>Joro come from Amon and speak an odd language that seems reminiscent of
    @L[Category:Elves]{elven} and @L[Category:Orks]{orkish} languages, but with
    other odd features as well. Joro typically become connected to some totem
    animal during their childhood and, upon reaching adulthood, are able to tap
    into the powers of this animal.</p>
  identifier: silver-joro
  lifespan: 60
  size:
    enabled: true
    value: 3
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - humanoid
  transformation:
    img: systems/teriock/src/icons/tokens/silver-joro.webp
    ring: true
type: species
