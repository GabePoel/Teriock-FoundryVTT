  - _id: Qe669Ree8RkXeAuZ
    _key: '!items.effects!94fe6e836bbcd20d.Qe669Ree8RkXeAuZ'
    _stats:
      compendiumSource: Compendium.teriock.abilities.ActiveEffect.b28e62e99157380c
