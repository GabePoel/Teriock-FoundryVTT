folder: 10c541c05a2efaea
img: systems/teriock/src/icons/creatures/urukai-ork.webp
name: Urukai Ork
system:
  appearance: >-
    <p>Tall, heavily muscular
    @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks}.</p>
  br: 1
  competence:
    raw: 1
  description: >-
    <p>High status
    @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks} chosen
    young for intensive physical and mental conditioning. Urukai are very smart
    and are good @Identifier[archetype:warrior]{fighters} and
    @Identifier[archetype:mage]{mages}. They tend to prefer fighting alone
    unless leading other
    @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks}. An often
    misunderstood group of people,
    @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks} have a
    wide range of cultures and behaviors. They have evolved to be tougher and
    more resilient than many other species, but due to the harsh climate and
    demands of their region, their culture is similarly rough and brutal. They
    are not evil, but more survival driven, making them prone to control by evil
    forces who tend to use them as troops for their strength and resilience.</p>
  identifier: urukai-ork
  size:
    enabled: true
    value: 3
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: "1"
    mp:
      disabled: false
      faces: 10
      number:
        raw: "1"
  traits:
    - humanoid
  transformation:
    img: systems/teriock/src/icons/tokens/urukai-ork.webp
    ring: true
type: species
