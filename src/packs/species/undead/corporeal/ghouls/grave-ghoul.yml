  br: 11
  competence:
    raw: 1
  description: >-
    <p>Believed to be a terrifying form of @Identifier[creature:zombie]{zombie},
    ghouls are a mystery. Extremely loathsome. How they devour everything around
    and never get full is unknown some believe them cursed by deities to forever
    walk the earth trying to get full.</p>
  identifier: grave-ghoul
  size:
    enabled: true
    value: 3
  statDice:
