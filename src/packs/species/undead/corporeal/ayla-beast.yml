folder: 1444272ba695c166
img: systems/teriock/src/icons/creatures/ayla-beast.webp
name: Ayla Beast
system:
  appearance: >-
    <p>These creatures take the look of the @Wiki[Category:Animal
    creatures]{animals} they inhabit. Most often, they have been seen as
    walruses, polar bears, or @Identifier[creature:roc]{rocs}. But, they could
    be any @Wiki[Category:Animal creatures]{animal}. Parts of [[lookup name
    style=lc]]s appear black and rotten. Their eyes often appear hollow and
    oozing. They are hulking mutants of what they were but are often two to five
    @Identifier[core:size]{sizes} larger.</p>
  br: 18
  competence:
    raw: 1
  description: >-
    <p>Ayla creatures are thought to be infected by some ancient Dagdeoth magic
    adrift in the high mountains of Northern Teriock. They maintain all
    @Pack[teriock.abilities]{abilities} of the @Wiki[Category:Animal
    creatures]{animal} they inhabit.</p>
  identifier: ayla-beast
  instructions: >-
    <p>This does not describe all of a creature's
    @Pack[teriock.abilities]{abilities}. It should always be paired with another
    @Wiki[Category:Animal creatures]{animal creature type} which it
    modifies.</p>
  size:
    enabled: true
    max: 10
    min: 5
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '8'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '2'
  traits:
    - animal
    - monstrous
    - undead
  transformation:
    img: systems/teriock/src/icons/tokens/ayla-beast.webp
    ring: true
type: species
