  archetype: warrior
  class: duelist
  competence:
    raw: 1
  description: >-
    <p>Honor-bound and honest to the core, @Identifier[class:duelist]{Duelists}
    are often judges and referees for duels as well as devoted warriors.
    @Identifier[class:duelist]{Duelists} prize the honor of their family above
    any sort of personal gain and thus strive for excellence in everything that
    they do. A true @Identifier[class:duelist]{Duelist} wins the battle before
    it has begun. Strategy and personal perfection are the
    @Identifier[class:duelist]{Duelist}'s way. If you are a
    @Identifier[class:duelist]{Duelist}, be calm, focused, well spoken and
    confident in yourself.</p>
  flaws: >-
    <p>Duelists cannot use
    @UUID[Compendium.teriock.tables.RollTable.f596232e51f64ef9]{shields}.</p>
