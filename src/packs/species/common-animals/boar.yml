      add:
        - ability:improved-strength
      qualifier: and(gte(@species.size, 4), lt(@species.size, 99))
      remove:
        - ability:beastly-strength
        - ability:low-strength
        - ability:normal-strength
      trigger: updateDocument
      type: toggleChildren
    e052984bed228186:
