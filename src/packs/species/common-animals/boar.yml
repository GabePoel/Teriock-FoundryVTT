  attributeIncrease: >-
    <p>@Identifier[ability:normal-strength]{Normal Strength} if at least
    @Identifier[core:size]{size} 2.
    @Identifier[ability:beastly-strength]{Beastly Strength} if at least
    @Identifier[core:size]{size} 3.
    @Identifier[ability:improved-strength]{Improved Strength} if at least
    @Identifier[core:size]{size} 4.</p>
  automations:
    1d5376fc7aec0a48:
      _id: 1d5376fc7aec0a48
      add:
        - ability:beastly-strength
      qualifier: and(gte(@species.size, 3), lt(@species.size, 4))
      remove:
        - ability:improved-strength
