name: Monkey
system:
  attributeIncrease: >-
    <p>@Identifier[ability:normal-strength]{Normal Strength} if at least
    @Identifier[core:size]{size} 2.
    @Identifier[ability:beastly-strength]{Beastly Strength} if at least
    @Identifier[core:size]{size} 3.</p>
  automations:
    1d5376fc7aec0a48:
      _id: 1d5376fc7aec0a48
      add:
        - ability:beastly-strength
      qualifier: and(gte(@species.size, 3), lt(@species.size, 99))
      remove:
        - ability:low-strength
        - ability:normal-strength
      trigger: updateDocument
      type: toggleChildren
    554a612832c648e9:
      _id: 554a612832c648e9
      add:
        - ability:normal-strength
      qualifier: and(gte(@species.size, 2), lt(@species.size, 3))
      remove:
        - ability:beastly-strength
        - ability:low-strength
      trigger: updateDocument
      type: toggleChildren
    e052984bed228186:
      _id: e052984bed228186
      add:
        - ability:low-strength
      qualifier: and(gte(@species.size, 0), lt(@species.size, 2))
      remove:
        - ability:beastly-strength
        - ability:normal-strength
      trigger: updateDocument
      type: toggleChildren
  br: 6
  competence:
    raw: 1
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: monkey
  size:
    enabled: true
    max: 3
    min: 1
    value: 1
  statDice:
    hp:
      disabled: false
      faces: 6
      number:
        raw: '@species.size'
    mp:
      disabled: false
      faces: 6
      number:
        raw: '1'
  traits:
    - animal
  transformation:
    img: systems/teriock/src/icons/tokens/monkey.webp
    ring: true
