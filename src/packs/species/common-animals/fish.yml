system:
  attributeIncrease: >-
    <p>@Identifier[ability:low-strength]{Low Strength} if at least
    @Identifier[core:size]{size} 1. @Identifier[ability:normal-strength]{Normal
    Strength} if at least @Identifier[core:size]{size} 2.
    @Identifier[ability:beastly-strength]{Beastly Strength} if at least
    @Identifier[core:size]{size} 4.

    @Identifier[ability:improved-strength]{Improved Strength} if at least
    @Identifier[core:size]{size} 5.</p>
  automations:
    1d5376fc7aec0a48:
      _id: 1d5376fc7aec0a48
      add:
        - ability:beastly-strength
      qualifier: and(gte(@species.size, 4), lt(@species.size, 5))
      remove:
        - ability:improved-strength
        - ability:low-strength
        - ability:normal-strength
        - ability:tiny-strength
      trigger: updateDocument
      type: toggleChildren
    554a612832c648e9:
      _id: 554a612832c648e9
      add:
        - ability:normal-strength
      qualifier: and(gte(@species.size, 2), lt(@species.size, 4))
      remove:
        - ability:beastly-strength
        - ability:improved-strength
        - ability:low-strength
        - ability:tiny-strength
      trigger: updateDocument
      type: toggleChildren
    a9b217158f9a89e2:
      _id: a9b217158f9a89e2
      add:
        - ability:tiny-strength
      qualifier: and(gte(@species.size, 0), lt(@species.size, 1))
      remove:
        - ability:beastly-strength
        - ability:improved-strength
        - ability:low-strength
        - ability:normal-strength
      trigger: updateDocument
      type: toggleChildren
    b7dc74afdec1a704:
      _id: b7dc74afdec1a704
      add:
        - ability:improved-strength
      qualifier: and(gte(@species.size, 5), lt(@species.size, 99))
      remove:
        - ability:beastly-strength
        - ability:low-strength
        - ability:normal-strength
        - ability:tiny-strength
      trigger: updateDocument
      type: toggleChildren
    e052984bed228186:
