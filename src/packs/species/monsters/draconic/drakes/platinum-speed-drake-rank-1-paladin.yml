img: systems/teriock/src/icons/ranks/rank-1-paladin.webp
name: Rank 1 Paladin
system:
  _sup: 739c4071bad786cb
  archetype: warrior
  class: paladin
  competence:
    raw: 1
  description: >-
    <p>The least martial of the @Identifier[archetype:warrior]{warriors}, their
    outlook on life is that of the combat medic, focusing on keeping others
    alive on the front lines. @Identifier[class:paladin]{Paladins} are often
    leaders, as their charismatic charm draws followers to them and everyone
    likes to have a healer on their side. @Identifier[class:paladin]{Paladins}
    see themselves as somewhat better than most others as they have magical
    powers that other warriors lack. @Identifier[class:paladin]{Paladins}
    usually have a strong guiding force in their life to help those in need and
    do what is right. If you are a @Identifier[class:paladin]{Paladin} be
    righteous, concerned for others, and take charge.</p>
  identifier: rank-1-paladin
  innate: false
  maxAv: 3
  number: 1
  statDice:
    hp:
      disabled: false
      formula: 1d12
    mp:
      disabled: false
      formula: 1d8
type: rank
