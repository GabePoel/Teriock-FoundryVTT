img: systems/teriock/src/icons/creatures/platinum-drake.webp
name: Platinum Drake
system:
  appearance: >-
    <p>Similar to @Identifier[creature:platinum-dragon]{platinum dragons}, but
    smaller and more bestial.</p>
  br: 13
  competence:
    raw: 1
  description: >-
    <p>These "half-dragons" are a hybrid of
    @UUID[Compendium.teriock.tables.RollTable.997cd433ccad17d7]{dragons} created
    by @Identifier[core:elder-sorcery]{Elder Sorcery}.
    @UUID[Compendium.teriock.tables.RollTable.997cd433ccad17d7]{Dragons} hate
    these beasts, who possess little intelligence beyond the desire to kill.
    Drakes can be ridden and are often found as mounts for imperial guards. They
    spawn drakespawn.</p>
  identifier: platinum-drake
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 1
    @Identifier[class:paladin]{Paladin}.</p>
  size:
    enabled: true
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '5'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - draconic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/platinum-drake.webp
    ring: true
type: species
