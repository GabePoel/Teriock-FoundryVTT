    <p>As @UUID[Compendium.teriock.tables.RollTable.997cd433ccad17d7]{drakes}
    but slightly longer, more slender, and with enormous multi-colored feathered
    wings.</p>
  br: 15
  competence:
    raw: 1
  description: >-
    <p>These rare beings sometimes seem to be enchanted with passive effects
    that generate or mutate swarms of @Wiki[Category:Insects]{elemental and
    other insects} around them. These creatures are very aggressive and seem to
    have an uncanny awareness of their circumstances and surroundings.</p>
  identifier: green-coatling
