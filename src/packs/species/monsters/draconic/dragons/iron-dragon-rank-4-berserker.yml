    <p>Wild and savage. They distrust @Wiki[Category:Magical effects]{magic} of
    all kinds and put their faith in themselves before others. Always at the
    front of a battle, @Identifier[class:berserker]{Berserkers} love the sport
    of @Identifier[core:combat]{combat} and don't like
    @Identifier[property:ranged]{missile weapons}. Not reliable as guards as
    they are too distracted and are rarely very intelligent. If you are a
    @Identifier[class:berserker]{Berserker} be larger than life, brash, not too
    bright and stupidly brave.</p>
