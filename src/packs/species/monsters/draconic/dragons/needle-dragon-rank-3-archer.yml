system:
  _sup: d8d9e036f44adc09
  archetype: semi
  class: archer
  competence:
    raw: 1
  description: >-
    <p>As precise and accurate as a well-crafted
    @Identifier[equipment:arrow]{arrow}, @Identifier[class:archer]{Archers}
    don't mess around. They prefer to keep their distance, as that is where they
    are the most effective, never letting anyone get too close to them.
    @Identifier[class:archer]{Archers} are direct and focused and thus make the
    best guards. Ever vigilant, @Identifier[class:archer]{Archers} are always
    looking ahead as, if taken by surprise, they are easily killed. If you are
    playing an @Identifier[class:archer]{Archer} be direct, and on target,
    sturdy and perhaps high strung, watchful of the future and of your back.</p>
