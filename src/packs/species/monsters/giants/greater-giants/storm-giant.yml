system:
  appearance: >-
    <p>Humanoid, though of great size and build. Skil colors and features
    varying by their natural @Identifier[archetype:mage]{mage} type.</p>
  br: 21
  competence:
    raw: 1
  description: >-
    <p>@UUID[Compendium.teriock.tables.RollTable.4186d9a2f93add07]{Giants} are
    solitary and prefer fighting alone (though they will come to each others
    aid). They are arrogant and will only attack if they see a large group
    worthy of battle or are attacked themselves.</p>
  identifier: storm-giant
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 1
