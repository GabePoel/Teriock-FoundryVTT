img: systems/teriock/src/icons/creatures/greater-kraken-head.webp
name: Greater Kraken Head
system:
  appearance: <p>An enormous squid covered in scaly armor.</p>
  br: 23
  competence:
    raw: 1
  description: >-
    <p>A single greater kraken is represented by multiple different creatures at
    once. There is one greater kraken head and at least one
    @Identifier[creature:greater-kraken-arm]{greater kraken arm}. If the greater
    kraken head @Identifier[condition:dead]{dies} then each
    @Identifier[creature:greater-kraken-arm]{greater kraken arm} does as well.
    Otherwise, each @Identifier[creature:greater-kraken-arm]{greater kraken arm}
    acts independently. No
    @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
    other than @Identifier[condition:dead]{death} are shared. However, each
    @Identifier[creature:greater-kraken-arm]{greater kraken arm} cannot go more
    than the greater kraken head's @Identifier[core:size]{SIZE} × 5 feet away
    from the greater kraken head.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: greater-kraken-head
  size:
    enabled: true
    max: 15
    min: 8
    value: 8
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: "@species.size - 1"
    mp:
      disabled: false
      faces: 10
      number:
        raw: "1"
  traits:
    - animal
    - aquatic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/greater-kraken-head.webp
    ring: true
type: species
