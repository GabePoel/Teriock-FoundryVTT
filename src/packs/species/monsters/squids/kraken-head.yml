img: systems/teriock/src/icons/creatures/kraken-head.webp
name: Kraken Head
system:
  appearance: <p>An enormous squid covered in scaly armor.</p>
  br: 18
  competence:
    raw: 1
  description: >-
    <p>A single kraken is represented by multiple different creatures at once.
    There is one kraken head and at least one
    @Identifier[creature:kraken-arm]{kraken arm}. If the kraken head
    @Identifier[status:dead]{dies} then each
    @Identifier[creature:kraken-arm]{kraken arm} does as well. Otherwise, each
    @Identifier[creature:kraken-arm]{kraken arm} acts independently. No
    @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
    other than @Identifier[status:dead]{death} are shared. However, each
    @Identifier[creature:kraken-arm]{kraken arm} cannot go more than the kraken
    head's @Identifier[core:size]{SIZE} × 5 feet away from the kraken head.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: kraken-head
  size:
    enabled: true
    max: 7
    min: 5
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '@species.size - 1'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - animal
    - aquatic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/kraken-head.webp
    ring: true
type: species
