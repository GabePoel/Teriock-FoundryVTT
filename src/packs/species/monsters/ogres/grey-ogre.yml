img: systems/teriock/src/icons/creatures/grey-ogre.webp
name: Grey Ogre
system:
  appearance: <p>Ugly muscular humanoids with sharp teeth and grayish skin.</p>
  br: 4
  competence:
    raw: 1
  description: >-
    <p>Grey ogres are terrified of magic and will flee from it. These people
    look like bigger and stronger
    @UUID[Compendium.teriock.tables.RollTable.10c541c05a2efaea]{orks}.
    @UUID[Compendium.teriock.tables.RollTable.d0620c450e5092db]{Ogres} have a
    wild culture, tending towards solitude and hunting smaller humanoid species
    for food. Relying on superior strength and toughness in combat, ogres are
    known to underestimate their foes. Ogres are often recruited by evil armies
    due to their hunting instincts for humanoids, which are their natural
    prey.</p>
  identifier: grey-ogre
  size:
    enabled: true
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 8
      number:
        raw: '1'
  traits:
    - monstrous
    - partialHumanoid
  transformation:
    img: systems/teriock/src/icons/tokens/grey-ogre.webp
    ring: true
