name: Rank 5 Life Mage
system:
  _sup: efbc818cf11794f8
  archetype: mage
  class: life-mage
  competence:
    raw: 1
  description: >-
    <p>The true healers of the world, they are committed to sustaining all life.
    The truly altruistic characters, @Identifier[class:life-mage]{Life Mages}
    are known to enter battles on neither side, healing anyone and everyone who
    they can. Obsessed with keeping people alive and conquering death,
    @Identifier[class:life-mage]{Life Mages} are not as righteous as the Paladin
    but much more humble and kind. Shying away from combat, they prefer to stand
    behind the troops, healing when needed. If you are playing a
    @Identifier[class:life-mage]{Life Mage} be helpful, kind and loving,
    protective but committed to saving lives and fighting death.</p>
  identifier: rank-5-life-mage
  innate: false
  maxAv: 0
  number: 5
  statDice:
    hp:
      disabled: false
      formula: 1d8
    mp:
      disabled: false
      formula: 1d12
