  hpIncrease: <p>Gain another 2 hit dice for every 1 additional size.</p>
  identifier: massive-red-slime
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 5
    @Identifier[class:flame-mage]{Flame Mage}.</p>
  mpIncrease: <p>Gain another mana die for every 1 additional size.</p>
  size:
    enabled: true
    max: 10
    min: 9
    value: 9
  statDice:
    hp:
      disabled: false
      faces: 6
      number:
