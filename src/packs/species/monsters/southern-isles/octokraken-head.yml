img: systems/teriock/src/icons/creatures/octokraken-head.webp
name: Octokraken Head
system:
  appearance: >-
    <p>An enormous @Identifier[creature:octopus]{octopus} covered in scaly
    armor.</p>
  br: 18
  competence:
    raw: 1
  description: >-
    <p>A single octokraken is represented by multiple different creatures at
    once. There is one octokraken head and at least one
    @Identifier[creature:octokraken-arm]{octokraken arm}. If the octokraken head
    @Identifier[condition:dead]{dies} then each
    @Identifier[creature:octokraken-arm]{octokraken arm} does as well.
    Otherwise, each @Identifier[creature:octokraken-arm]{octokraken arm} acts
    independently. No
    @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
    other than @Identifier[condition:dead]{death} are shared. However, each
    @Identifier[creature:octokraken-arm]{octokraken arm} cannot go more than the
    octokraken head's @Identifier[core:size]{SIZE} × 5 feet away from the
    octokraken head.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: octokraken-head
  size:
    enabled: true
    max: 7
    min: 5
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: "@species.size - 1"
    mp:
      disabled: false
      faces: 10
      number:
        raw: "1"
  traits:
    - animal
    - aquatic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/octokraken-head.webp
    ring: true
type: species
