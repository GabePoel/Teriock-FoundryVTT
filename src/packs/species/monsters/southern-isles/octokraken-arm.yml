img: systems/teriock/src/icons/creatures/octokraken-arm.webp
name: Octokraken Arm
system:
  appearance: <p>A huge scaly tentacle.</p>
  br: 7
  competence:
    raw: 1
  description: >-
    <p>A single octokraken is represented by multiple different creatures at
    once. There is one @Identifier[creature:octokraken-head]{octokraken head}
    and at least one octokraken arm. If the
    @Identifier[creature:octokraken-head]{octokraken head}
    @Identifier[condition:dead]{dies} then each octokraken arm does as well.
    Otherwise, each octokraken arm acts independently. No
    @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
    other than @Identifier[condition:dead]{death} are shared. However, each
    octokraken arm cannot go more than the
    @Identifier[creature:octokraken-head]{octokraken head's}
    @Identifier[core:size]{SIZE} × 5 feet away from the
    @Identifier[creature:octokraken-head]{octokraken head}.</p>
  identifier: octokraken-arm
  size:
    enabled: true
    value: 3
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 6
      number:
        raw: '1'
  traits:
    - animal
    - aquatic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/octokraken-arm.webp
    ring: true
type: species
