img: systems/teriock/src/icons/creatures/koolasoka-leg.webp
name: Koolasoka Leg
system:
  appearance: >-
    <p>Koolasokas look like giant sea-faring amphibians with striking tongues
    and limbs.</p>
  br: 6
  competence:
    raw: 1
  description: >-
    <p>Koolasokas are found throughout the seas of Teriock in coastal caves they
    always have four legs. A single koolasoka is represented by multiple
    different creatures at once. There is one
    @Identifier[creature:koolasoka-head]{koolasoka head} and at least one
    koolasoka leg. If the @Identifier[creature:koolasoka-head]{koolasoka head}
    @Identifier[status:dead]{dies} then each koolasoka leg does as well.
    Otherwise, each koolasoka leg acts independently. No
    @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
    other than @Identifier[status:dead]{death} are shared. However, each
    koolasoka leg cannot go more than the
    @Identifier[creature:koolasoka-head]{koolasoka head's}
    @Identifier[core:size]{SIZE} × 5 feet away from the
    @Identifier[creature:koolasoka-head]{koolasoka head}.</p>
  identifier: koolasoka-leg
  size:
    enabled: true
    value: 4
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '3'
    mp:
      disabled: false
      faces: 2
      number:
        raw: '1'
  traits:
    - animal
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/koolasoka-leg.webp
    ring: true
type: species
