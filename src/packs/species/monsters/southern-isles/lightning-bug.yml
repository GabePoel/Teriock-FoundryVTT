folder: dbf885a327caa735
img: systems/teriock/src/icons/creatures/lightning-bug.webp
name: Lightning Bug
system:
  appearance: <p>Bright blue and glowing bugs.</p>
  br: 6
  competence:
    raw: 1
  description: >-
    <p>These creatures are found in the jungles and swamps of the Oni Islands.
    They seem to be attracted to conductive metal of any kind, gathering charge
    from the air. Often times these bugs create a grater charge than they can
    hold onto at any one time. This results in a
    @Identifier[ability:lightning-ray]{lightning bolt} being discharged to the
    nearest "ground" (usually someone's armor). Lightning bugs are drawn to
    metal due to the polarization that occurs while they are feasting. As soon
    as they discharge, [[lookup name style=lc]]s become hungry again and
    instantly charge up from the air around them. They tend to stay clear of
    mushrooms like the @Identifier[creature:deathcap-toadstool]{deathcap
    toadstools} that prey on them.</p>
  identifier: lightning-bug
  size:
    enabled: true
    value: 0.25
  statDice:
    hp:
      disabled: false
      faces: 2
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 4
      number:
        raw: '1'
  traits:
    - animal
  transformation:
    img: systems/teriock/src/icons/tokens/lightning-bug.webp
    ring: true
type: species
