img: systems/teriock/src/icons/creatures/deathcap-toadstool.webp
name: Deathcap Toadstool
system:
  appearance: >-
    <p>Large hybrid mushroom-@Identifier[creature:toad]{toads}. Deathcap
    toadstools are red with black spots.</p>
  br: 6
  competence:
    raw: 1
  description: >-
    <p>Found on the Oni Islands, [[lookup name style=lc]]s are very dangerous
    and have many uses when properly harvested by herbalists. They shoot spores
    of death when potential predators approach them. Toadstools hop on their
    stalks through the forests of Oni in search for
    @Identifier[creature:lightning-bug]{lightning bugs} and
    @Identifier[creature:firefly]{fireflies} or an occasional
    @Identifier[creature:monsquito]{monsquito} to
    @Identifier[ability:snare]{Snare} with its long tongue.</p>
  identifier: deathcap-toadstool
  size:
    enabled: true
    value: 1
  statDice:
    hp:
      disabled: false
      faces: 8
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 4
      number:
        raw: '1'
  traits:
    - animal
    - fungus
  transformation:
    img: systems/teriock/src/icons/tokens/deathcap-toadstool.webp
    ring: true
type: species
