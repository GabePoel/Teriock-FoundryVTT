    <p>Noble snakes are found throughout southern Teriock and the Southern Isles
    and are often given a very wide berth for being fierce apex predators. They
    fear nothing save the packs of
    @Identifier[creature:mongoose-squirrel]{mongoose squirrels} that prey on
    them.</p>
  identifier: noble-snake
