system:
  appearance: >-
    <p>Huge and ugly with a hunched, muscular build, claws, and glazed glassy
    skin. Glass trolls become increasingly transparent and are indistinguishable
    from the environment while not in motion. They are very slow in the
    heat.</p>
  br: 21
  competence:
    raw: 1
  description: >-
    <p>Glass trolls are often thought to be
    @Identifier[creature:rock-troll]{rock trolls} that were transformed in the
    Mists.</p>
  identifier: glass-troll
