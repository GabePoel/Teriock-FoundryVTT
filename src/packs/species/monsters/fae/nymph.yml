      overview:
        base: >-
          <p>You may create 1 custom "rotator" @Wiki[Category:Spells]{spells}
          using @Identifier[core:elder-sorcery]{Elder Sorcery} words that you
          know using whatever @Identifier[core:elder-sorcery]{Elder Sorcery}
          creation rules are dictated to you by your
          @Identifier[core:game-master]{GM}. As with other rotators, this spell
          is not always available to you. You have to "rotate" into having it
          prepared. This spell may have a maximum number of words equal to your
          @Identifier[core:leveling-up]{level}. Your
          @Identifier[core:game-master]{GM} may allow you to "improvise"
          @Wiki[Category:Spells]{spells} as well, using whatever rules they
          wish.</p>
