img: systems/teriock/src/icons/creatures/mithril-golem.webp
name: Mithril Golem
system:
  appearance: >-
    <p>@Wiki[Category:Humanoid creatures]{Humanoid} statue made of
    @Identifier[property:mithril]{mithril}.</p>
  attributeIncrease: >-
    <p>@Identifier[ability:improved-strength]{Improved Strength} if at least
    @Identifier[core:size]{size} 3. @Identifier[ability:giant-strength]{Giant
    Strength} if at least @Identifier[core:size]{size} 4.
    @Identifier[ability:supernatural-strength]{Supernatural Strength} if at
    least @Identifier[core:size]{size} 6.
    @Identifier[ability:monstrous-strength]{Monstrous Strength} if at least
    @Identifier[core:size]{size} 8.</p>
  automations:
    056bba8fd332660a:
      _id: 056bba8fd332660a
      add:
        - ability:monstrous-strength
      qualifier: and(gte(@species.size, 8), lt(@species.size, 99))
      remove:
        - ability:beastly-strength
        - ability:giant-strength
        - ability:improved-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    1d5376fc7aec0a48:
      _id: 1d5376fc7aec0a48
      add:
        - ability:beastly-strength
      qualifier: and(gte(@species.size, 0), lt(@species.size, 3))
      remove:
        - ability:giant-strength
        - ability:improved-strength
        - ability:monstrous-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    37634d0e6b2fae07:
      _id: 37634d0e6b2fae07
      add:
        - ability:giant-strength
      qualifier: and(gte(@species.size, 4), lt(@species.size, 6))
      remove:
        - ability:beastly-strength
        - ability:improved-strength
        - ability:monstrous-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    ab3de966a8f99c9c:
      _id: ab3de966a8f99c9c
      add:
        - ability:supernatural-strength
      qualifier: and(gte(@species.size, 6), lt(@species.size, 8))
      remove:
        - ability:beastly-strength
        - ability:giant-strength
        - ability:improved-strength
        - ability:monstrous-strength
      trigger: updateDocument
      type: toggleChildren
    b7dc74afdec1a704:
      _id: b7dc74afdec1a704
      add:
        - ability:improved-strength
      qualifier: and(gte(@species.size, 3), lt(@species.size, 4))
      remove:
        - ability:beastly-strength
        - ability:giant-strength
        - ability:monstrous-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
  br: 56
  competence:
    raw: 1
  description: >-
    <p>@UUID[Compendium.teriock.tables.RollTable.68067747b6a57d8c]{Golems} are
    built as sentries to guard particular spots or items and have a trigger
    system that activates them. They generally follow a set "program" while
    active.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: mithril-golem
  innateRanks: <p>Innately @Pack[teriock.classes]{rank} 5.</p>
  instructions: <p>Add the chosen innate @Pack[teriock.classes]{ranks} manually.</p>
  size:
    enabled: true
    max: 10
    min: 1
    value: 1
  statDice:
    hp:
      disabled: false
      faces: 20
      number:
        raw: "@species.size + 3"
    mp:
      disabled: false
      faces: 10
      number:
        raw: "3"
  traits:
    - construct
    - humanoid
  transformation:
    img: systems/teriock/src/icons/tokens/mithril-golem.webp
    ring: true
