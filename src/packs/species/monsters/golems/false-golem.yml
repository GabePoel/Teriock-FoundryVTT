img: systems/teriock/src/icons/creatures/false-golem.webp
name: False Golem
system:
  appearance: >-
    <p>@Wiki[Category:Humanoid creatures]{Humanoid} statue made of inanimate
    materials.</p>
  attributeIncrease: >-
    <p>@Identifier[ability:beastly-strength]{Beastly Strength} if at least
    @Identifier[core:size]{size} 3.
    @Identifier[ability:improved-strength]{Improved Strength} if at least
    @Identifier[core:size]{size} 4. @Identifier[ability:giant-strength]{Giant
    Strength} if at least @Identifier[core:size]{size} 6.
    @Identifier[ability:supernatural-strength]{Supernatural Strength} if at
    least @Identifier[core:size]{size} 8.</p>
  automations:
    1d5376fc7aec0a48:
      _id: 1d5376fc7aec0a48
      add:
        - ability:beastly-strength
      qualifier: and(gte(@species.size, 3), lt(@species.size, 4))
      remove:
        - ability:giant-strength
        - ability:improved-strength
        - ability:normal-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    37634d0e6b2fae07:
      _id: 37634d0e6b2fae07
      add:
        - ability:giant-strength
      qualifier: and(gte(@species.size, 6), lt(@species.size, 8))
      remove:
        - ability:beastly-strength
        - ability:improved-strength
        - ability:normal-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    554a612832c648e9:
      _id: 554a612832c648e9
      add:
        - ability:normal-strength
      qualifier: and(gte(@species.size, 0), lt(@species.size, 3))
      remove:
        - ability:beastly-strength
        - ability:giant-strength
        - ability:improved-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    ab3de966a8f99c9c:
      _id: ab3de966a8f99c9c
      add:
        - ability:supernatural-strength
      qualifier: and(gte(@species.size, 8), lt(@species.size, 99))
      remove:
        - ability:beastly-strength
        - ability:giant-strength
        - ability:improved-strength
        - ability:normal-strength
      trigger: updateDocument
      type: toggleChildren
    b7dc74afdec1a704:
      _id: b7dc74afdec1a704
      add:
        - ability:improved-strength
      qualifier: and(gte(@species.size, 4), lt(@species.size, 6))
      remove:
        - ability:beastly-strength
        - ability:giant-strength
        - ability:normal-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
  br: 6
  competence:
    raw: 1
  description: >-
    <p>@UUID[Compendium.teriock.tables.RollTable.68067747b6a57d8c]{Golems} are
    built as sentries to guard particular spots or items and have a trigger
    system that activates them. They generally follow a set "program" while
    active.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: false-golem
  size:
    enabled: true
    max: 10
    min: 1
    value: 1
  statDice:
