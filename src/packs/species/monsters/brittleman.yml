      effectTypes:
        - automatic
        - damaging
      executionTime:
        base: passive
      form: normal
      identifier: passive-endure
      interaction: manifest
      maneuver: passive
      overview:
        base: >-
          <p>Whenever you are hit by an
          @Identifier[core:attack-interaction]{attack} that would
          @Identifier[core:damage]{damage} you, you take that
          @Identifier[core:damage]{damage} as a @Identifier[damage:hack]{limb
          hack} instead. All
          @UUID[Compendium.teriock.rules.JournalEntry.damage0000000000]{damage
          types} still apply. If the hit was critical, you instead take it as
          <i>two</i> @Identifier[damage:hack]{limb hacks}. If you attempted to
          @Identifier[core:block-interaction]{block} the triggering
          @Identifier[core:attack-interaction]{attack}, then a limb that
          @Identifier[keyword:using]{used} whatever @Wiki[Category:Items]{item}
          you @Identifier[core:block-interaction]{blocked} with is the one
          that's @Identifier[damage:hack]{hacked}. Otherwise, if the
          @Identifier[core:damage]{damage} was dealt by a creature, they choose
          which limb is affected. If not, it is random. Only an
          un-@Identifier[damage:hack]{hacked} limb can be used for this. If
          that's not possible, you take the @Identifier[core:damage]{damage}
          normally.</p>
      powerSources:
        - martial
      range:
        unit: self
      targets:
        - self
      trigger: >-
        <p>This triggers automatically. You cannot choose to not use it if you
        are able to.</p>
    transfer: true
    type: ability
