img: systems/teriock/src/icons/creatures/elder-treant.webp
name: Elder Treant
system:
  appearance: >-
    <p>Walking @Identifier[creature:tree]{tree} with a rough face, branches for
    arms, and roots as feet.</p>
  br: 30
  competence:
    raw: 1
  description: >-
    <p>Elder treants are very rare, thought of as the true shepherds of the
    forests. They are believed to be only one per forest. Elder treants are very
    reclusive and spend most of their time dormant (in
    @Identifier[creature:tree]{tree} form). Protectors and shepherds of the
    forest, these ancient beings are believed to be descendants of
    @Identifier[creature:small-earth-elemental]{nature elementals} or
    @UUID[Compendium.teriock.tables.RollTable.f2c29b199c990ab7]{fae}. Each is
    native to a particular forest which it protects and maintains for hundreds
    of years.
    @UUID[Compendium.teriock.tables.RollTable.615ff873d830ae70]{Treants} are
    slow, patient beings, ever on the watch for threats to nature and protecting
    beings who can't protect themselves.</p>
  identifier: elder-treant
  size:
    enabled: true
    value: 8
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '8'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '3'
  traits:
    - plant
  transformation:
    img: systems/teriock/src/icons/tokens/elder-treant.webp
    ring: true
type: species
