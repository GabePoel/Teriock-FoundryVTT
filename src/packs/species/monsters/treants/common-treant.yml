name: Common Treant
system:
  appearance: >-
    <p>Walking @Identifier[creature:tree]{tree} with a rough face, branches for
    arms, and roots as feet.</p>
  br: 15
  competence:
    raw: 1
  description: >-
    <p>Common treants usually @Identifier[core:healing]{heal} anyone in need,
    but will attack anyone with an @Wiki[Category:Axes]{axe}! Protectors and
    shepherds of the forest, these ancient beings are believed to be descendants
    of @Identifier[creature:small-earth-elemental]{nature elementals} or
    @UUID[Compendium.teriock.tables.RollTable.f2c29b199c990ab7]{fae}. Each is
    native to a particular forest which it protects and maintains for hundreds
    of years.
    @UUID[Compendium.teriock.tables.RollTable.615ff873d830ae70]{Treants} are
    slow, patient beings, ever on the watch for threats to nature and protecting
    beings who can't protect themselves.</p>
  identifier: common-treant
  size:
    enabled: true
    value: 8
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: "4"
    mp:
      disabled: false
      faces: 10
      number:
        raw: "2"
  traits:
