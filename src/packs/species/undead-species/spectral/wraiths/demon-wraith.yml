          @L[Core:Hit Points and Mana Points]{HP} and @L[Core:Hit Points and
          Mana Points]{MP} maximums decrease by the value of those dice. For
          each additional 24 hours you go without [[lookup name style=lc]], you
          lose your next largest @L[Core:HP]{hit die} and @L[Core:MP]{mana die}.
