name: White Mist Wraith
system:
  appearance: >-
    <p>Transparent glassy @L[Category:Humanoid creatures]{humanoids} with cracks
    in space instead of eyes. They have long claws and strands of light and
    darkness blowing around them.</p>
  br: 32
  competence:
    raw: 1
  description: >-
    <p>White mist wraiths are the most common type of mist wraith found in light
    and medium mists. They are essentially the "base" species of mist wraith
    that all others are variants of. They never produce any sound at all, even
    while passing into or out of the @L[Condition:Ethereal]{Ethereal Realm}.</p>
  identifier: white-mist-wraith
  innateRanks: >-
    <p>Innately @L[Category:Classes]{rank} 1 @L[Class:Knight]{Knight}. Innately
    @L[Category:Classes]{rank} 2 @L[Class:Necromancer]{Necromancer}. Innately
    @L[Category:Classes]{rank} 1 @L[Class:Storm Mage]{Storm Mage},
    @L[Class:Corsair]{Corsair}, or @L[Class:Thief]{Thief}.</p>
  size:
    enabled: true
    value: 3
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '4'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - undead
  transformation:
    img: systems/teriock/src/icons/tokens/white-mist-wraith.webp
    ring: true
