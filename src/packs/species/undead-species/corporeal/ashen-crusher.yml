name: Ashen Crusher
system:
  appearance: >-
    <p>Pale white, sometimes rotting, giant @L[Category:Humanoid
    creatures]{humanoids}. These beasts are made from pieced together
    @L[Category:Giants]{giant} and @L[Category:Ogres]{ogre} bits. They usually
    have three arms instead of two making their strength even more
    terrifying.</p>
  br: 13
  competence:
    raw: 1
  description: >-
    <p>Used mostly as heavy hitters in @L[Category:Undead creatures]{undead}
    armies, these beasts are a menace and known for crushing through tough
    defenses.</p>
  identifier: ashen-crusher
  size:
    enabled: true
    value: 8
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '3'
    mp:
