img: systems/teriock/src/icons/creatures/ogreboros.webp
name: Ogreboros
system:
  appearance: >-
    <p>Weird black and white creatures that are part ogre and part snake. Some
    have the heads of ogres and the bodies of snakes. Others have this
    reversed.</p>
  attributeIncrease: >-
    <p>@Identifier[ability:giant-strength]{Giant Strength} if at least
    @Identifier[core:size]{size} 7.
    @Identifier[ability:supernatural-strength]{Supernatural Strength} if at
    least @Identifier[core:size]{size} 9.
    @Identifier[ability:monstrous-strength]{Monstrous Strength} if at least
    @Identifier[core:size]{size} 10.</p>
  automations:
    056bba8fd332660a:
      _id: 056bba8fd332660a
      add:
        - ability:monstrous-strength
      qualifier: and(gte(@species.size, 10), lt(@species.size, 99))
      remove:
        - ability:giant-strength
        - ability:improved-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    37634d0e6b2fae07:
      _id: 37634d0e6b2fae07
      add:
        - ability:giant-strength
      qualifier: and(gte(@species.size, 7), lt(@species.size, 10))
      remove:
        - ability:improved-strength
        - ability:monstrous-strength
        - ability:supernatural-strength
      trigger: updateDocument
      type: toggleChildren
    ab3de966a8f99c9c:
      _id: ab3de966a8f99c9c
      add:
        - ability:supernatural-strength
      qualifier: and(gte(@species.size, 9), lt(@species.size, 99))
      remove:
        - ability:giant-strength
        - ability:improved-strength
        - ability:monstrous-strength
      trigger: updateDocument
      type: toggleChildren
    b7dc74afdec1a704:
      _id: b7dc74afdec1a704
      add:
        - ability:improved-strength
      qualifier: and(gte(@species.size, 0), lt(@species.size, 7))
      remove:
        - ability:giant-strength
