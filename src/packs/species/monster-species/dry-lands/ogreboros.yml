system:
  appearance: >-
    <p>Weird black and white creatures that are part ogre and part snake. Some
    have the heads of ogres and the bodies of snakes. Others have this
    reversed.</p>
  attributeIncrease: >-
    <p>@L[Ability:Giant Strength]{Giant Strength} if at least
    @L[Core:Size]{size} 7. @L[Ability:Supernatural Strength]{Supernatural
    Strength} if at least @L[Core:Size]{size} 9. @L[Ability:Monstrous
    Strength]{Monstrous Strength} if at least @L[Core:Size]{size} 10.</p>
  br: 14
  competence:
    raw: 1
  description: >-
    <p>These creatures haven't been seen in Teriock in hundreds of years and are
    sometimes thought to just be little more than a legend. [[lookup name]] may
    have other @L[Category:Abilities]{abilities} in addition to the ones listed
    here.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: ogreboros
  size:
    enabled: true
    max: 10
    min: 5
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 6
      number:
        raw: '@species.size - 2'
    mp:
