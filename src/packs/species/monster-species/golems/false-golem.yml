    hp:
      disabled: false
      faces: 8
      number:
        raw: '@species.size'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - humanoid
    - construct
  transformation:
    img: systems/teriock/src/icons/tokens/false-golem.webp
