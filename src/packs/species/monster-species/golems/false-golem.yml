    <p>@L[Category:Humanoid creatures]{Humanoid} statue made of inanimate
    materials.</p>
  attributeIncrease: >-
    <p>@L[Ability:Beastly Strength]{Beastly Strength} if at least
    @L[Core:Size]{size} 3. @L[Ability:Improved Strength]{Improved Strength} if
    at least @L[Core:Size]{size} 4. @L[Ability:Giant Strength]{Giant Strength}
    if at least @L[Core:Size]{size} 6. @L[Ability:Supernatural
    Strength]{Supernatural Strength} if at least @L[Core:Size]{size} 8.</p>
  br: 6
  competence:
    raw: 1
  description: >-
    <p>@L[Category:Golems]{Golems} are built as sentries to guard particular
    spots or items and have a trigger system that activates them. They generally
    follow a set "program" while active.</p>
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
