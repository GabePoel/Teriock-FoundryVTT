name: Grey Ogre
system:
  appearance: <p>Ugly muscular humanoids with sharp teeth and grayish skin.</p>
  br: 4
  competence:
    raw: 1
  description: >-
    <p>Grey ogres are terrified of magic and will flee from it. These people
    look like bigger and stronger @L[Category:Orks]{orks}.
    @L[Category:Ogres]{Ogres} have a wild culture, tending towards solitude and
    hunting smaller humanoid species for food. Relying on superior strength and
    toughness in combat, ogres are known to underestimate their foes. Ogres are
    often recruited by evil armies due to their hunting instincts for humanoids,
    which are their natural prey.</p>
  identifier: grey-ogre
  size:
    enabled: true
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 8
      number:
        raw: '1'
  traits:
    - partialHumanoid
    - monstrous
  transformation:
