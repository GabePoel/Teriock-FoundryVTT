    name: Tea Ceremony
    system:
      competence:
        raw: 0
      costs:
        primary:
          mp:
            description: >-
              <p>2 MP per participant. Each participant must pay at least 1 MP.
              After that, the remaining cost of may be paid in any combination
              by any of the participants.</p>
            type: description
      delivery: sight
      duration:
        raw: '24'
        unit: hour
      effectTypes:
        - truthDetecting
      executionTime:
        base: 10 Minutes
        slow:
          raw: '10'
          unit: minute
      form: normal
      identifier: tea-ceremony
      interaction: manifest
      maneuver: slow
      overview:
        base: >-
          <p>[[lookup name]] is done in collaboration with up to 1 other
          creature (although they do not need to have [[lookup name]]). It
          requires willing and active participation from all targets. As part of
          [[lookup name]], you must ask three questions about the alignment,
          motives, or intentions of the group. Each participant (including
          yourself) must individually answer these questions. The questions are
          asked one at a time, and each participant must answer before the next
          question is asked. If anyone refuses to answer truthfully, the
          [[lookup name]] fails and all participants are
          @Identifier[keyword:vulnerable]{vulnerable} to
          @Identifier[drain:mana]{mana drain} and @Identifier[drain:mana]{mana
          drain} is @Identifier[keyword:boosted]{boosted} against them for 24
          hours. This occurs once everyone has answered the latest question or
          immediately if someone refuses to answer whatsoever. If the [[lookup
          name]] is successful, all participants are
          @Identifier[keyword:resistance]{resistant} to
          @Identifier[drain:mana]{mana drain} for 24 hours and suffer no
          negative effects of @Wiki[Core:MP]{mana loss} other than
          @Identifier[status:dead]{death} and
          @Identifier[status:unconscious]{unconsciousness}. [[lookup name]] can
          only be performed once per @Identifier[core:long-rest]{long
          rest}.</p><div class="note"><b>Note:</b> [[lookup name]] detects only
          whether the participants believe their answers to be true, not whether
          or not they are.</div><div class="note"><b>Note:</b> If an effect such
          as @Identifier[ability:lie]{Lie} is used to deceive the [[lookup
          name]], it continues as if the lie were true.</div>
        fluent: >-
          <p>You may now target up to 2 × @Identifier[core:fluency-bonus]{F}
          creatures (including yourself) with [[lookup name]].</p>
        proficient: >-
          <p>You may now target up to 2 × @Identifier[core:proficiency-bonus]{P}
          creatures (including yourself) with [[lookup name]].</p>
      powerSources:
        - spiritual
      range:
        raw: '5'
        unit: ft
      ritual: true
      skill: true
      standard: true
      targets:
        - creature
    transfer: true
    type: ability
