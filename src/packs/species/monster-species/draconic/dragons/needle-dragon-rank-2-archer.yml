system:
  _sup: d8d9e036f44adc09
  archetype: semi
  className: archer
  classRank: 2
  competence:
    raw: 1
  description: >-
    <p>As precise and accurate as a well-crafted arrow, archers don't mess
    around. They prefer to keep their distance, as that is where they are the
    most effective, never letting anyone get too close to them. Archers are
    direct and focused and thus make the best guards. Ever vigilant, archers are
    always looking ahead as, if taken by surprise, they are easily killed. If
    you are playing an Archer be direct, and on target, sturdy and perhaps high
    strung, watchful of the future and of your back.</p>
  identifier: rank-2-archer
  innate: false
  maxAv: 2
  statDice:
    hp:
      disabled: false
      formula: 1d10
    mp:
      disabled: false
      formula: 1d10
