img: systems/teriock/src/icons/creatures/sea-drake.webp
name: Sea Drake
system:
  appearance: >-
    <p>Similar to @Identifier[creature:sea-dragon]{sea dragons}, but smaller and
    more bestial.</p>
  br: 13
  competence:
    raw: 1
  description: >-
    <p>These "half-dragons" are a hybrid of @Wiki[Category:Dragons]{dragons}
    created by @Identifier[core:elder-sorcery]{Elder Sorcery}.
    @Wiki[Category:Dragons]{Dragons} hate these beasts, who possess little
    intelligence beyond the desire to kill. Drakes can be ridden and are often
    found as mounts for imperial guards. They spawn drakespawn.</p>
  identifier: sea-drake
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 1
    @Identifier[class:corsair]{Corsair}.</p>
  size:
    enabled: true
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '5'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - draconic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/sea-drake.webp
    ring: true
