img: systems/teriock/src/icons/creatures/golden-drake.webp
name: Golden Drake
system:
  appearance: >-
    <p>Similar to @Identifier[creature:golden-dragon]{golden dragons}, but
    smaller and more bestial.</p>
  br: 13
  competence:
    raw: 1
  description: >-
    <p>These "half-dragons" are a hybrid of @Wiki[Category:Dragons]{dragons}
    created by @Identifier[core:elder-sorcery]{Elder Sorcery}.
    @Wiki[Category:Dragons]{Dragons} hate these beasts, who possess little
    intelligence beyond the desire to kill. Drakes can be ridden and are often
    found as mounts for imperial guards. They spawn drakespawn.</p>
  identifier: golden-drake
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 1
    @Identifier[class:duelist]{Duelist}.</p>
  size:
    enabled: true
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '5'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - draconic
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/golden-drake.webp
