    name: Familiar Bond
    system:
      automations:
        s830o7SWhITduNHX:
          _id: s830o7SWhITduNHX
          all: false
          attachDocuments: true
          automatic: true
          multi: false
          separate: false
          type: addDocuments
          uuids:
            - Compendium.teriock.powers.Folder.31fe961f0b485187
      competence:
        raw: 0
      costs:
        components:
          material:
            description: >-
              <p>Something symbolic of the animal you wish to bond with and the
              relationship you wish to have with it.</p>
            type: description
        primary:
          mp:
            formula: '3'
            type: formula
      delivery: sight
      duration:
        unit: unlimited
      effectTypes:
        - contract
        - longRange
      elements:
        - nature
      executionTime:
        base: Short Rest
        slow:
          unit: shortRest
      form: normal
      identifier: familiar-bond
      interaction: manifest
      maneuver: slow
      overview:
        base: >-
          <p>[[lookup name]] is a ritual that allows you to bond with an animal
          companion. As part of this ritual, you call an animal to you and it
          chooses whether or not to become your <b>familiar</b>. If it chooses
          to be your familiar, you and it are @Wiki[Category:Spiritual
          effects]{spiritually} bonded. You can sense feelings and emotions from
          your familiar and speak to other animals of the same species. Your
          familiar can sense your feelings and emotions as well. You also gain
          an @Identifier[tradecraft:animal-tamer]{animal tamer}
          @Identifier[core:fluency-bonus]{fluency} for your familiar's species.
          This does not grant you
          @Identifier[core:proficiency-bonus]{proficiency} with
          @Identifier[tradecraft:animal-tamer]{animal tamer} in general. If your
          familiar is in combat with you, treat it as a
          @Identifier[core:minions]{minion} under your command.</p>
        proficient: >-
          <p>You also gain an @Pack[teriock.abilities]{ability} chosen by the
          @Identifier[core:game-master]{GM} when your familiar is within 100
          feet of you. The @Pack[teriock.abilities]{ability} is something your
          familiar can do naturally, is symbolic of, or that is related to your
          relationship with it.</p>
      powerSources:
        - magical
        - primal
        - spiritual
      range:
        raw: '5'
        unit: ft
      requirements: <p>This ritual can typically be used only once.</p>
      ritual: true
      spell: true
      standard: true
      sustained: true
      targets:
        - creature
    transfer: true
    type: ability
