name: Were-Creature
system:
  appearance: >-
    <p>A monstrous cross between an @L[Category:Common animal creatures]{animal}
    and a @L[Category:Humanoid creatures]{humanoid species}.</p>
  br: 15
  competence:
    raw: 1
  description: >-
    <p>Were-creatures change during their particular moon phase into a chaotic
    half-beast of themselves and begin attacking everything nearby. The rest of
    the time they appear as a normal @L[Category:Humanoid creatures]{humanoid},
    except they still have the @L[Category:Abilities]{abilities} listed
    here.</p>
  identifier: were-creature
  size:
    enabled: false
    value: 3
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: true
      faces: 10
      number:
        raw: '1'
  traits:
    - partialHumanoid
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/were-creature.webp
    ring: true
