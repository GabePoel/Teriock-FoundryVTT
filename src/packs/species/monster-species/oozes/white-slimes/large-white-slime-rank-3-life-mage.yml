name: Rank 3 Life Mage
system:
  _sup: 2beea20664d2e739
  archetype: mage
  className: lifeMage
  classRank: 3
  competence:
    raw: 1
  description: >-
    <p>The true healers of the world, they are committed to sustaining all life.
    The truly altruistic characters, Life Mages are known to enter battles on
    neither side, healing anyone and everyone who they can. Obsessed with
    keeping people alive and conquering death, Life Mages are not as righteous
    as the Paladin but much more humble and kind. Shying away from combat, they
    prefer to stand behind the troops, healing when needed. If you are playing a
    Life Mage be helpful, kind and loving, protective but committed to saving
    lives and fighting death.</p>
  identifier: rank-3-life-mage
  innate: false
  maxAv: 0
  statDice:
    hp:
      disabled: false
      faces: 8
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 12
      number:
        raw: '1'
