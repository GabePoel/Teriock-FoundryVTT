    <p>Innately @L[Category:Classes]{rank} 1 @L[Class:Storm Mage]{Storm
    Mage}.</p>
  mpIncrease: <p>Gain another mana die for every 1 additional size.</p>
  size:
    enabled: true
    max: 2
    min: 1
    value: 1
