name: Greater Hydra Head
system:
  appearance: >-
    <p>A massive lizard with multiple @Wiki[Category:Snakes]{snake}-like
    heads.</p>
  br: 13
  competence:
    raw: 1
  description: >-
    <p>A single greater hydra is represented by multiple different creatures at
    once. There is one @Identifier[creature:greater-hydra-body]{greater hydra
    body} and at least one greater hydra head. If the
    @Identifier[creature:greater-hydra-body]{greater hydra body}
    @Identifier[status:dead]{dies} then each greater hydra head does as well.
    Otherwise, each greater hydra head acts independently. No
    @UUID[Compendium.teriock.rules.JournalEntry.condition0000000]{conditions}
    other than @Identifier[status:dead]{death} are shared. However, each greater
    hydra head cannot go more than the
    @Identifier[creature:greater-hydra-body]{greater hydra body's}
    @Identifier[core:size]{SIZE} × 5 feet away from the
    @Identifier[creature:greater-hydra-body]{greater hydra body}.</p>
  identifier: greater-hydra-head
  size:
    enabled: true
    value: 4
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '2'
    mp:
      disabled: false
      faces: 6
      number:
        raw: '1'
  traits:
    - animal
