img: systems/teriock/src/icons/creatures/ironwood-treant.webp
name: Ironwood Treant
system:
  appearance: >-
    <p>Walking @L[Creature:Tree]{tree} with a rough face, branches for arms, and
    roots as feet.</p>
  br: 20
  competence:
    raw: 1
  description: >-
    <p>Ironwood treants will attack anyone with an @L[Category:Axes]{axe}!
    Protectors and shepherds of the forest, these ancient beings are believed to
    be descendants of @L[Creature:Small Earth Elemental]{nature elementals} or
    @L[Category:Fae creatures]{fae}. Each is native to a particular forest which
    it protects and maintains for hundreds of years.
    @L[Category:Treants]{Treants} are slow, patient beings, ever on the watch
    for threats to nature and protecting beings who can't protect
    themselves.</p>
  identifier: ironwood-treant
  size:
    enabled: true
    value: 8
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '4'
    mp:
      disabled: false
      faces: 8
      number:
        raw: '2'
  traits:
    - plant
  transformation:
    img: systems/teriock/src/icons/tokens/ironwood-treant.webp
    ring: true
type: species
