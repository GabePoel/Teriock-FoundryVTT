    img: systems/teriock/src/icons/abilities/constructed-body.webp
    name: Constructed Body
    system:
      automations:
        29b275994cf9f5b1:
          _id: 29b275994cf9f5b1
          formula: 1d10
          impact: damage
          type: roll
      competence:
        raw: 0
      delivery: self
      duration:
        unit: unlimited
      executionTime:
        base: passive
      form: normal
      identifier: constructed-body
      interaction: manifest
      maneuver: passive
      overview:
        base: >-
          <p>You count as an @Pack[teriock.equipment]{item} for the purposes of
          certain @Wiki[Category:Item target abilities]{abilities that target
          them}. The relevant @Wiki[Category:Item target abilities]{abilities}
          are those would apply one of the following
          @Pack[teriock.properties]{properties} to a piece of
          @Pack[teriock.equipment]{equipment}. You take the effect listed below
          instead. If the @Wiki[Category:Item target abilities]{ability} was
          @Wiki[Category:Magically powered abilities]{magically powered}, then
          any @Identifier[core:damage]{damage} dealt is
          @Identifier[damage:magic]{magic} in addition to its other
          @Wiki[Category:Damage types]{types}. If the @Wiki[Category:Item target
          abilities]{ability} was delivered by a @Wiki[Category:Weapon delivery
          abilities]{weapon}, then the @Identifier[core:damage]{damage} has all
          the @Wiki[Category:Damage types]{damage types} that
          @Wiki[Category:Weapons]{weapon} would deal in addition to its other
          @Wiki[Category:Damage
          types]{types}.</p><ul><li>@Identifier[property:destroyed]{Destroyed}:
          Take [[/damage 1d10]] @Identifier[core:damage]{damage}.</li>

          <li>@Identifier[property:shattered]{Shattered}: Take a
          @Identifier[damage:hack]{hack} of your choice.</li>

          <li>@Identifier[property:warded]{Warded}: The next @Wiki[Category:Self
          delivery abilities]{self delivery ability} you use is
          @Identifier[keyword:warded]{warded}.</li></ul><p>For any other passive
          @Pack[teriock.properties]{properties} that the
          @Pack[teriock.equipment]{equipment} may gain, your @Wiki[Category:Body
          parts]{body parts} gain those @Pack[teriock.properties]{properties}.
          Additionally, any @Wiki[Category:AV granting abilities]{natural AV}
          you may have counts as @Pack[teriock.equipment]{armor} for these
          purposes.</p>
      powerSources:
        - martial
      range:
        unit: self
      targets:
        - self
    transfer: true
    type: ability
folder: 13ef6e80a087d7cf
img: systems/teriock/src/icons/creatures/artifact-animal.webp
name: Artifact Animal
system:
  br: 6
  competence:
    raw: 1
  description: >-
    <p>@Wiki[Category:Common animal creatures]{Common animals} (or Teriock
    animals) with the spirit and some of the form of a Teriock magic item
    embedded in it. Most (but not all) of them are items that had spirited prior
    to the Misting. The items must be present as a @Wiki[Category:Body
    parts]{part} of the @Wiki[Category:Animal creatures]{animal}. For example,
    @Identifier[creature:yellow-crab]{yellow crabs} can have magic axes embedded
    in them. If defeated, a @Identifier[tradecraft:hunter]{hunter} check can be
    used to harvest the item with a DC of 5 per @Identifier[core:presence]{item
    tier}. It exists as a temporary item with powers that fade after 24 hours.
    Once the powers fade, the body part crumbles away.</p>
  identifier: artifact-animal
  size:
    enabled: false
    value: 3
  statDice:
    hp:
      disabled: true
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: true
      faces: 10
      number:
        raw: '1'
  transformation:
    img: systems/teriock/src/icons/tokens/artifact-animal.webp
    ring: true
