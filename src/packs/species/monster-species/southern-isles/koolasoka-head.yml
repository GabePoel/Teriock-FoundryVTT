img: systems/teriock/src/icons/creatures/koolasoka-head.webp
name: Koolasoka Head
system:
  appearance: >-
    <p>Koolasokas look like giant sea-faring amphibians with striking tongues
    and limbs.</p>
  br: 11
  competence:
    raw: 1
  description: >-
    <p>Koolasokas are found throughout the seas of Teriock in coastal caves they
    always have four legs. A single koolasoka is represented by multiple
    different creatures at once. There is one <a class="mw-selflink
    selflink">koolasoka head</a> and at least one @L[Creature:Koolasoka
    Leg]{koolasoka leg}. If the <a class="mw-selflink selflink">koolasoka
    head</a> @L[Condition:Dead]{dies} then each @L[Creature:Koolasoka
    Leg]{koolasoka leg} does as well. Otherwise, each @L[Creature:Koolasoka
    Leg]{koolasoka leg} acts independently. No
    @L[Category:Conditions]{conditions} other than @L[Condition:Dead]{death} are
    shared. However, each @L[Creature:Koolasoka Leg]{koolasoka leg} cannot go
    more than the <a class="mw-selflink selflink">koolasoka head's</a>
    @L[Core:Size]{SIZE} × 5 feet away from the <a class="mw-selflink
    selflink">koolasoka head</a>.</p>
  identifier: koolasoka-head
  size:
    enabled: true
    value: 7
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '5'
    mp:
      disabled: false
      faces: 6
      number:
        raw: '1'
  traits:
    - animal
    - monstrous
  transformation:
    img: systems/teriock/src/icons/tokens/koolasoka-head.webp
    ring: true
type: species
