folder: dbf885a327caa735
img: systems/teriock/src/icons/creatures/mana-flea.webp
name: Mana Flea
system:
  appearance: <p>Tiny colorful ticks.</p>
  br: 2
  competence:
    raw: 1
  description: >-
    <p>These are tiny relatives to the infamous
    @Identifier[creature:monsquito]{monsquito}. After feeding, they look like
    tiny ticks. They feed off @Identifier[core:hit-points-and-mana-points]{MP}
    and are relatively harmless at first. After four days, they fall off their
    victims to lay their eggs which will hatch in 24 hours. Mana fleas can have
    anywhere from one hundred to two hundred offspring. If a party becomes
    infested by these critters, there can soon be an epidemic of
    @Identifier[core:hit-points-and-mana-points]{MP} loss.</p>
  identifier: mana-flea
  size:
    enabled: true
    value: 0.25
  statDice:
    hp:
      disabled: false
      faces: 10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 10
      number:
        raw: '1'
  traits:
    - animal
  transformation:
    img: systems/teriock/src/icons/tokens/mana-flea.webp
    ring: true
type: species
