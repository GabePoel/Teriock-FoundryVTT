img: systems/teriock/src/icons/creatures/firefly.webp
name: Firefly
system:
  appearance: <p>Bright red and glowing bugs.</p>
  br: 7
  competence:
    raw: 1
  description: >-
    <p>These creatures are found in the jungles and swamps of the Oni Islands.
    They seem to be attracted to dry wood in which they eat, feed, and breed.
    They tend to attack and burn any dry wood they can see (including weapons).
    However, they tend to stay clear of mushrooms like the @L[Creature:Deathcap
    Toadstool]{deathcap toadstools} that prey on them.</p>
  identifier: firefly
  size:
    enabled: true
    value: 0.25
  statDice:
    hp:
      disabled: false
      faces: 2
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 4
      number:
        raw: '1'
  traits:
    - animal
  transformation:
    img: systems/teriock/src/icons/tokens/firefly.webp
    ring: true
type: species
