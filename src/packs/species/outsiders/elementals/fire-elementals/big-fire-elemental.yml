  appearance: >-
    <p>Appear as a mass of fire. This amorphous state is their default form, but
    elementals can also take a humanoid form which resembles a human with an odd
    skin color.</p>
  br: 18
  competence:
    raw: 1
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: big-fire-elemental
  innateRanks: >-
    <p>Innately @Wiki[Category:Classes]{rank} 3
    @Identifier[class:flame-mage]{Flame Mage}.</p>
  size:
    enabled: true
    max: 6
    min: 5
    value: 5
  statDice:
    hp:
      disabled: false
      faces: 6
      number:
        raw: '@species.size'
    mp:
      disabled: false
      faces: 6
      number:
        raw: '4'
  traits:
    - elemental
    - outsider
  transformation:
    img: systems/teriock/src/icons/tokens/big-fire-elemental.webp
    ring: true
type: species
