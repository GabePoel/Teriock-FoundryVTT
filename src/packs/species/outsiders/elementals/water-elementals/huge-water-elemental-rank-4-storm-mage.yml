      interaction: manifest
      maneuver: reactive
      overview:
        base: >-
          <p>You may choose a new target for the @Wiki[Category:Spells]{spell}.
          All @Identifier[core:attack-interaction]{attack rolls},
          @Identifier[core:feat-interaction]{feat saves}, and other dice rolls
          or effects are re-rolled or re-calculated as if the
          @Wiki[Category:Spells]{spell} was cast on the new target. The range of
          the @Wiki[Category:Spells]{spell} remains unchanged, but is calculated
          from the new target instead of from you.</p><p
          class="note"><b>Note:</b> If the @Wiki[Category:Spells]{spell} was
          @Identifier[core:heightening]{heightened}, or you spent any other
          @Wiki[Category:Cost spells]{costs} on the
          @Wiki[Category:Spells]{spell}, those remain unchanged and do not need
          to be re-spent.</p>
