  competence:
    raw: 1
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: big-water-elemental
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 3
    @Identifier[class:storm-mage]{Storm Mage}.</p>
  size:
