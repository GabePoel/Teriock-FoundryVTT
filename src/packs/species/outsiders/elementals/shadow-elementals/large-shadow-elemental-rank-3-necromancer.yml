      overview:
        base: >-
          <p>In addition to the custom rotator spells you create, you can learn
          @Wiki[Category:Rotator spells]{spells} created by others. When you
          come across a fully created spell using only words you are
          @Identifier[core:fluency-bonus]{fluent} in, can make a DC 12 +
          @Identifier[core:elder-sorcery]{OP}
          @Identifier[core:intelligence]{INT}
          @Identifier[core:feat-interaction]{feat save} to attempt to learn it
          over the course of a @Identifier[core:long-rest]{long rest}. If you
          succeed, you can add it to your rotator spell list. If you fail, you
          are @Identifier[keyword:incapable]{incapable} of attempting to learn
          that spell again. The @Identifier[core:game-master]{GM} may modify the
          DC based on the spell's complexity, your knowledge of the spell, any
          special training you receive, if the spell's creator is there to
          assist you, or for any other factors they see fit. You may also
          attempt to learn words that you come across as long as they are of
          elements you are @Identifier[core:fluency-bonus]{fluent} in. The
          @Identifier[core:game-master]{GM} may adjust the DC for these as they
          see fit as well, but the default is DC 15 + OP
          @Identifier[core:intelligence]{INT}
          @Identifier[core:feat-interaction]{feat save}.</p>
