    <p>The true dealer of death, @Identifier[class:necromancer]{Necromancers}
    are most at home in the cemetery digging up future minions. Shunned by most
    of society, these dark mages are not necessarily evil, they simply see death
    as full of potential energy while others see it as the end of life.
    @Identifier[class:necromancer]{Necromancers} fear nothing, as they are
    always facing death. If you are playing a
    @Identifier[class:necromancer]{Necromancer} be unafraid, kill without
    remorse and be interested in @Identifier[condition:dead]{dead} bodies, close
    to death yourself, almost in another world.</p>
