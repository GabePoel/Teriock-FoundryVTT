  appearance: >-
    <p>Appear as a mass of shadow. This amorphous state is their default form,
    but elementals can also take a humanoid form which resembles a human with an
    odd skin color.</p>
  br: 22
  competence:
    raw: 1
  hpIncrease: <p>Gain another hit die for every 1 additional size.</p>
  identifier: large-shadow-elemental
  innateRanks: >-
    <p>Innately @Pack[teriock.classes]{rank} 4
    @Identifier[class:necromancer]{Necromancer}.</p>
  size:
    enabled: true
    max: 8
    min: 7
    value: 7
  statDice:
    hp:
      disabled: false
      faces: 6
      number:
        raw: '@species.size'
    mp:
      disabled: false
      faces: 6
      number:
        raw: '5'
  traits:
    - elemental
    - outsider
  transformation:
    img: systems/teriock/src/icons/tokens/large-shadow-elemental.webp
    ring: true
