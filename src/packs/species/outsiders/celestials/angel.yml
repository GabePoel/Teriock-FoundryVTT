      overview:
        base: >-
          <p>[[lookup name]] is a ritual that improves your
          @Identifier[ability:divine-gift]{Divine Gift}. It follows the same
          rules as that ritual, but allows you to revise and strengthen that
          ritual's effects. Remind the @Identifier[core:game-master]{GM} of the
          effects of your Divine Gift, as they determine the effects of this
          ritual. The improved @Identifier[ability:divine-gift]{Divine Gift}
          still counts as a @Identifier[keyword:blessing]{blessing}.</p><div
          class="note"><b>Note:</b> Keep track of your original
          @Identifier[ability:divine-gift]{Divine Gift's} effects. If you loose
          or become @Identifier[keyword:incapable]{incapable} of [[lookup
          name]], your @Identifier[ability:divine-gift]{Divine Gift} returns to
          the state it was in before. If you loose or become
          @Identifier[keyword:incapable]{incapable} of
          @Identifier[ability:divine-gift]{Divine Gift}, then you loose the
          effects of [[lookup name]].</div>
