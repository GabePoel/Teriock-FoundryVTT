img: systems/teriock/src/icons/creatures/beast-demon.webp
name: Beast Demon
system:
  appearance: >-
    <p>Demonic looking animals or beasts with a supernatural intelligence in the
    eyes and often characteristic infernal traits such as wings, horns, or
    claws.</p>
  attributeIncrease: >-
    <p>@L[Ability:Supernatural Strength]{Supernatural Strength} if at least
    @L[Core:Size]{size} 6. @L[Ability:Monstrous Strength]{Monstrous Strength} if
    at least @L[Core:Size]{size} 12.</p>
  br: 25
  competence:
    raw: 1
  description: >-
    <p>[[lookup name]]s are @L[Category:Outsider creatures]{outsiders} and thus
    they may have many other @L[Category:Abilities]{abilities} not listed here.
    Unlike other demons, [[lookup name style=lc]]s become sidetracked more
    easily and can be distracted.</p>
  identifier: beast-demon
  size:
    enabled: true
    max: 20
    min: 1
    value: 1
  statDice:
    hp:
