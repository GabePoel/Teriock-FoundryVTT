img: systems/teriock/src/icons/ranks/rank-4-knight.webp
name: Rank 4 Knight
system:
  archetype: warrior
  class: knight
  competence:
    raw: 1
  description: >-
    <p>The true glory seekers, @Identifier[class:knight]{Knights} are chivalrous
    to a point but have none of the @Identifier[class:duelist]{Duelist's}
    respect for battles. @Identifier[class:knight]{Knights} are the weapon
    masters, well-armored but relying on their swift, powerful attacks and
    powerful strength to destroy their enemy before they can counter-attack.
    @Identifier[class:knight]{Knights} are the real behemoths of the
    battlefield, leading troops into the fray and slaughtering all they can. If
    you are a @Identifier[class:knight]{Knight}, be looking for glory, looking
    for the next powerful
    @UUID[Compendium.teriock.tables.RollTable.63e9a3bd88895816]{weapon}.</p>
  identifier: rank-4-knight
  innate: false
  instructions: >-
    <p>Choose one combat @Pack[teriock.abilities]{ability} and one support
    @Pack[teriock.abilities]{ability} to gain from [[lookup name]]. Delete the
    other abilities.</p>
  maxAv: 4
  number: 4
  statDice:
    hp:
      disabled: false
      faces: 12
      formula: 1d12
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 8
      formula: 1d8
      number:
        raw: '1'
type: rank
