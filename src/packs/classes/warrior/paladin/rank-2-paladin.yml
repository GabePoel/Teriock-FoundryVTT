      competence:
        raw: 0
      costs:
        primary:
          hp:
            description: >-
              <p>An amount of @Identifier[core:hit-points-and-mana-points]{HP}
              equal to the [[/tc priest]]{priest check's} DC. Paid only on
              failure.</p>
            type: description
          mp:
            description: >-
              <p>An amount of @Identifier[core:hit-points-and-mana-points]{MP}
              equal to the [[/tc priest]]{priest check's} DC. Paid only on
              failure.</p>
            type: description
      delivery: sight
