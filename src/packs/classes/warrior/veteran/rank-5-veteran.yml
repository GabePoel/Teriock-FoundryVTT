img: systems/teriock/src/icons/ranks/rank-5-veteran.webp
name: Rank 5 Veteran
system:
  archetype: warrior
  class: veteran
  competence:
    raw: 1
  description: >-
    <p>Jaded and tough, these warriors act as if they have seen it all.
    Obviously they are not all seasoned warriors, but the training of a
    @Identifier[class:veteran]{Veteran} involves a great deal of time in battle,
    so even a first rank @Identifier[class:veteran]{Veteran} has seen more
    action than other first rank warriors. The strategy of the
    @Identifier[class:veteran]{Veteran} is to be an immovable wall, and hold the
    line. @Identifier[class:veteran]{Veterans} rely on defense in battle, always
    working to better ensure their protection, which is why they survive to be
    veterans. If you are a @Identifier[class:veteran]{Veteran} be jaded,
    unimpressed, hard, and pessimistic.</p>
  identifier: rank-5-veteran
  innate: false
  instructions: >-
    <p>Choose one combat @Pack[teriock.abilities]{ability} and one support
    @Pack[teriock.abilities]{ability} to gain from [[lookup name]]. Delete the
    other @Pack[teriock.abilities]{abilities}.</p>
  maxAv: 4
  number: 5
  statDice:
    hp:
      disabled: false
      faces: 12
      formula: 1d12
      number:
        raw: "1"
    mp:
      disabled: false
      faces: 8
      formula: 1d8
      number:
        raw: "1"
type: rank
