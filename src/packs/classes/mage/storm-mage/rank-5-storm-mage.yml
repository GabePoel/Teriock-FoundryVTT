name: Rank 5 Storm Mage
system:
  archetype: mage
  class: storm-mage
  competence:
    raw: 1
  description: >-
    <p>The true wonder seeker, these mages are the philosophers of the world,
    always seeking out more knowledge and more wisdom. The
    @Identifier[class:storm-mage]{Storm Mage} is a logician, a tactical
    intellectual who prefers to neutralize opponents rather than destroy them.
