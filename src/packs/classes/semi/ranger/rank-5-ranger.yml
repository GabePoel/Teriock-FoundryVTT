img: systems/teriock/src/icons/ranks/rank-5-ranger.webp
name: Rank 5 Ranger
system:
  archetype: semi
  class: ranger
  competence:
    raw: 1
  description: >-
    <p>The true wanderer, they are a bit like
    @Identifier[class:corsair]{Corsairs} of the land. Always on the move and
    scouting about, rangers never like to have much responsibility if they can
    help it and prefer to be on their own. Gritty and worn like old leather,
    these characters are unflinching and realistic at all times. If you are
    playing a @Identifier[class:ranger]{Ranger}, keep watch, seek solitude, long
    for the woods and be introspective.</p>
  identifier: rank-5-ranger
  innate: false
  instructions: >-
    <p>Choose one combat @Pack[teriock.abilities]{ability} and one support
    @Pack[teriock.abilities]{ability} to gain from [[lookup name]]. Delete the
    other abilities.</p>
  maxAv: 4
  number: 5
  statDice:
    hp:
      disabled: false
      faces: 10
      formula: 1d10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 10
      formula: 1d10
      number:
        raw: '1'
type: rank
