img: systems/teriock/src/icons/ranks/rank-3-thief.webp
name: Rank 3 Thief
system:
  archetype: semi
  class: thief
  competence:
    raw: 1
  description: >-
    <p>Almost as shady as the @Identifier[class:assassin]{Assassin}, a
    @Identifier[class:thief]{Thief} is a bit more socially oriented and has a
    much greater care for her own life. Thieves are the flip side of the
    @Identifier[class:duelist]{Duelist} and tend to follow laws and tell the
    truth only if it serves their purpose. Always trying to make a profit,
    thieves are the businessmen of the world and will cheat you without blinking
    an eyelash, that is their job. If you are playing a thief, lie and make up
    stories, be ever watchful for a chance to search or loot and look for the
    profit angle, never doing anything for free.</p>
  identifier: rank-3-thief
  innate: false
  instructions: >-
    <p>Choose one combat @Pack[teriock.abilities]{ability} and one support
    @Pack[teriock.abilities]{ability} to gain from [[lookup name]]. Delete the
    other abilities.</p>
  maxAv: 2
  number: 3
  statDice:
    hp:
      disabled: false
      faces: 10
      formula: 1d10
      number:
        raw: '1'
    mp:
      disabled: false
      faces: 10
      formula: 1d10
      number:
        raw: '1'
type: rank
