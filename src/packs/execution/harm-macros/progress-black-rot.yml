command: |-
  if (actor) {
    let found = 0;
    for (let i = 5; i > 0; i--) {
      const identifier = `consequence:stage-${i}-black-rot`;
      const consequence = await teriock.fromIdentifier(identifier, { relativeOnly: true, relativeTo: actor });
      if (!consequence) continue;
      found++;
      if (i >= 5) continue;
      await consequence.delete();
      await actor.toggleChild(`consequence:stage-${i + 1}-black-rot`, { active: true });
    }
    if (found === 0) await actor.toggleChild("consequence:stage-1-black-rot", { active: true });
  }
