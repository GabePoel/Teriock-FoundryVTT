command: |-
  if (actor?.isOwner) {
    const amount = 1;
    await actor.update({ "system.money.silver": actor.system.money.silver + amount });
    foundry.ui.notifications.success("TERIOCK.DIALOGS.Common.SUCCESSES.gain", {
      localize: true,
      format: { name: actor.name, amount, thing: TERIOCK.config.currency.silver.label.toLowerCase() }
    });
  } else {
    foundry.ui.notifications.error("TERIOCK.DIALOGS.Common.ERRORS.noOwnedActor");
  }
