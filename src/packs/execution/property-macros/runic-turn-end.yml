command: >-
  if ( scope.item.type === "equipment" && scope.item.system.shattered &&
  !scope.item.system.destroyed && scope.item.system.isAttuned ) { const content
  = await TextEditor.implementation.enrichHTML(teriock.helpers.string.dedent(`
  <p>${_loc("TERIOCK.COMMANDS.Repair.prompt", { name:
  `@UUID[${scope.item.uuid}]` })}</p><p>@EMBED[${scope.effect.uuid} panel
  cite=false]</p>`)); const proceed = await
  teriock.applications.api.TeriockDialog.confirm({ content, window: { icon:
  teriock.helpers.icon.makeIconClass(TERIOCK.display.icons.break.repair,
  "title"), title: _loc("TERIOCK.MODELS.Duration.PREREQUISITES.text", { end:
  scope.item.fullName, start: scope.effect.fullName, }), }, yes: { icon:
  teriock.helpers.icon.makeIconClass(TERIOCK.display.icons.ui.dice, "title"),
  label: _loc("TERIOCK.ROLLS.Base.name", { value:
  _loc("TERIOCK.SYSTEMS.Equipment.MENU.repair") }), }, }); if (proceed) { const
  roll = new teriock.dice.rolls.BaseRoll("2d4kh1", {}, { flavor:
  _loc("TERIOCK.ROLLS.Base.name", { value:
  _loc("TERIOCK.SYSTEMS.Equipment.MENU.repair") }), threshold: 4, }); await
  roll.evaluate(); await roll.toMessage({ speaker: ChatMessage.getSpeaker({
  actor: scope.item.actor }) }, { rollMode: game.settings.get("core",
  "rollMode"), }); if (roll.total === 4) await scope.item.system.repair(); } }
